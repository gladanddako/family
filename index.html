  let html=cats.map(c=>`<div class="cat-chip ${rForm.categoryId===c.id?'on':''}" onclick="rForm.categoryId='${c.id}';renderRecordSheet()">
      ${catIconHtml(c)}${escapeHtml(c.name)}</div>`).join('');
  html+=`<div class="cat-add" onclick="toggleCatAdd()">${icon('plus',14)} 카테고리 추가</div>`;
  if(catAddMode){
    const emos=CATEGORY_ICONS.map(e=>`<div class="emoji-opt ${catDraft.icon===e?'on':''}" onclick="catDraft.icon='${e}';renderRecordSheet()">${e}</div>`).join('');
    html+=`<div style="flex-basis:100%"></div>
      <div class="cat-mini" style="width:100%">
        <div class="field" style="margin-bottom:10px"><label>새 ${flow==='in'?'수입':'지출'} 카테고리 이름</label><input type="text" id="catName" value="${escapeHtml(catDraft.name)}" placeholder="${flow==='in'?'예: 부수입':'예: 반려동물'}" oninput="catDraft.name=this.value"></div>
        <div class="field" style="margin-bottom:10px"><label>아이콘</label><div class="emoji-pick">${emos}</div></div>
        <button class="btn btn-primary btn-sm btn-block" onclick="addCategory()">추가하기</button>
      </div>`;
  }
  const customs=(DB.categories||[]).filter(c=>!DEFAULT_CATEGORIES.some(d=>d.id===c.id) && (c.flow||'out')===flow);
  if(customs.length){
    html+=`<div class="cat-mini" style="width:100%">
      <div style="font-size:11px;font-weight:500;color:var(--ink-3);margin-bottom:4px">내가 만든 카테고리</div>
      ${customs.map(c=>`<div class="cat-mini-row">${catIconHtml(c)}<span class="cname">${escapeHtml(c.name)}</span><span class="cdel" onclick="deleteCategory('${c.id}','record')">삭제</span></div>`).join('')}
    </div>`;
  }

}
function toggleCatAdd(){ catAddMode=!catAddMode; if(catAddMode) catDraft={ name:'', color:PRESET_COLORS[Math.floor(Math.random()*PRESET_COLORS.length)], flow:rForm.flow||'out', icon:'🍚' }; renderRecordSheet(); }
function addCategory(){
  if(!catDraft.name.trim()){ toast('카테고리 이름을 입력해주세요'); return; }
  const c={ id:uid(), name:catDraft.name.trim(), color:catDraft.color||'#9aa0a8', flow:rForm.flow||'out', icon:catDraft.icon||'🧾' };

// [P4] 카테고리 삭제 = 확인(사용 건수 안내) + 열린 시트 맞춰 재렌더(버그 수정) + 실행취소
function deleteCategory(id, from){
  const c=(DB.categories||[]).find(x=>x.id===id); if(!c) return;
  const usedN=DB.records.filter(r=>r.categoryId===id).length;
  confirmDanger({
    title:`‘${escapeHtml(c.name)}’ 카테고리를 삭제할까요?`,
    body: usedN ? `이 카테고리를 쓰는 <b>기록 ${usedN}건</b>이 <b>‘미분류’</b>가 돼요. 삭제 직후 실행취소할 수 있어요.` : `연결된 기록이 없어요. 삭제 직후 실행취소할 수 있어요.`,
    onConfirm:`doDeleteCategory('${id}','${from||'record'}')`,
    onCancel: from==='manager' ? 'renderCategoryManager()' : 'renderRecordSheet()'
  });
}
function doDeleteCategory(id, from){
  const c=(DB.categories||[]).find(x=>x.id===id); if(!c) return;
  const snap={...c};
  const affected=DB.records.filter(r=>r.categoryId===id).map(r=>r.id);
  // [QA-M2] 이 카테고리를 대상으로 쓰던 cap/saving 비전 배열도 정리(원본 스냅샷 후 제거, 빈 배열이면 전체 sentinel)
  const visSnap=[];
  DB.visions.forEach(v=>{ ['capCategoryIds','savingCategoryIds'].forEach(k=>{
    if(Array.isArray(v[k]) && v[k].indexOf(id)>=0){
      visSnap.push({vid:v.id, key:k, arr:v[k].slice()});
      v[k]=v[k].filter(x=>x!==id);
      if(!v[k].length) v[k]=[k==='capCategoryIds'?'__allout__':'__allsave__'];
    }
  }); });
  DB.categories=(DB.categories||[]).filter(x=>x.id!==id);
  if(rForm && rForm.categoryId===id) rForm.categoryId='';
  affected.forEach(rid=>{ const r=DB.records.find(x=>x.id===rid); if(r) r.categoryId=null; });
  recomputeVisions(); saveDB();
  if(from==='manager') renderCategoryManager(); else renderRecordSheet();
  toastAction('카테고리를 삭제했어요','실행취소',()=>{
    DB.categories.push(snap);
    affected.forEach(rid=>{ const r=DB.records.find(x=>x.id===rid); if(r) r.categoryId=id; });
    visSnap.forEach(s=>{ const v=visionById(s.vid); if(v) v[s.key]=s.arr.slice(); });
    recomputeVisions(); saveDB();
    if(from==='manager') renderCategoryManager(); else renderRecordSheet();
    toast('되돌렸어요');
  });
}

  const dietVisions = DB.visions.filter(v=>v.type==='QUANT' && v.metric==='manual' && /kg/i.test(v.unit||''));

// [P3] 반복 일정의 특정 회차만 건너뛰기(제외)

function flowLabel(f){ return f==='in' ? '＋ 수입' : '－ 지출'; }
function setRecKindForm(k){

function recordTs(){
  const t=(rForm.time||'09:00').split(':');
  const d=parseYmd(rForm.date); d.setHours(+t[0]||0, +t[1]||0, 0, 0);
  return d.getTime();
}
function saveRecord(){
  if(rForm.kind!=='weight' && !rForm.title.trim()){ toast('내용을 입력해주세요'); return; }
  if(rForm.kind==='weight' && (rForm.value===''||rForm.value==null)){ toast('체중(kg)을 입력해주세요'); return; }
  // [마이크로피드백] 연결 비전의 저장 전 진행률 — 저장 후 변화(+N%)를 즉시 토스트
  const linkV = rForm.visionId ? visionById(rForm.visionId) : null;
  const beforePct = linkV ? (linkV.type==='QUANT'?visionPct(linkV):visionFidelity(linkV)) : 0;
  if(rEditId){
    const r=DB.records.find(x=>x.id===rEditId);
    r.memberId=rForm.memberId; r.kind=rForm.kind; r.title=rForm.title.trim();
    r.visionId=rForm.visionId||null; r.ts=recordTs();
    if(rForm.kind==='expense'){ r.amount=parseInt(rForm.amount)||0; r.categoryId=rForm.categoryId||null; r.flow=(rForm.flow==='in'?'in':(rForm.flow==='save'?'save':'out')); delete r.value; delete r.repeat; delete r.remind; }
    else if(rForm.kind==='weight'){ r.value=parseFloat(rForm.value); delete r.amount; delete r.categoryId; delete r.flow; delete r.repeat; delete r.remind; }
    else if(rForm.kind==='event'){ delete r.amount; delete r.categoryId; delete r.flow; delete r.value; r.repeat=rForm.repeat||'none'; r.remind=rForm.remind||'none'; }
    else { delete r.amount; delete r.categoryId; delete r.flow; delete r.value; delete r.repeat; delete r.remind; }
  } else {
    const rec={ id:uid(), memberId:rForm.memberId, kind:rForm.kind, title:rForm.title.trim(), ts:recordTs(), visionId:rForm.visionId||null };
    if(rForm.kind==='expense'){ rec.amount=parseInt(rForm.amount)||0; rec.categoryId=rForm.categoryId||null; rec.flow=(rForm.flow==='in'?'in':(rForm.flow==='save'?'save':'out')); }
    else if(rForm.kind==='weight'){ rec.value=parseFloat(rForm.value); if(!rec.title) rec.title='체중 기록'; }
    else if(rForm.kind==='event'){ rec.repeat=rForm.repeat||'none'; rec.remind=rForm.remind||'none'; rec.done=(rec.repeat==='none'); }   // [4] 단발 일정은 '이미 한 것' → done=true. [1] 반복 일정은 미래 occurrence 기본 미완료 → done=false. remind=알림 설정
    DB.records.push(rec);
    DB.lastKind=rForm.kind; DB.lastFlow=rForm.flow||'out'; DB.lastMemberId=rForm.memberId;
    // [P3] 기본값 상속: 직전 사용 카테고리 기억 (다음 빠른 기록에 프리셀렉트)
    if(rForm.kind==='expense' && rForm.categoryId) DB.lastCategory=rForm.categoryId;
  }
  // [7] 체중 기록 → 연결된 다이어트(manual) 비전 현재값 갱신
  if(rForm.kind==='weight' && rForm.visionId){
    const dv=visionById(rForm.visionId);
    if(dv && dv.type==='QUANT' && dv.metric==='manual'){ dv.currentValue=parseFloat(rForm.value); }
  }
  recomputeVisions(); saveDB(); closeSheet(); renderAll();
  // [마이크로피드백] "→[비전명] +N%" — 내 기록이 목표를 움직였음을 즉시 체감
  if(rForm.visionId){
    const v=visionById(rForm.visionId);
    if(isCapVision(v)){   // [QA] cap은 %=예산 소진이라 '+진행률'로 표시하면 오해 → '예산 N% 사용'
      const used=capUsedPct(v); const rem=(visionTarget(v)||0)-(v.currentValue||0);
      toast(`→ ${v.title} · 예산 ${used}% 사용${rem<0?` · ${won(-rem)}${escapeHtml(v.unit||'')} 초과`:''}`);
    } else {
      const afterPct = v.type==='QUANT'?visionPct(v):visionFidelity(v);
      const delta = afterPct - beforePct;
      const dTxt = delta>0 ? ` +${delta}%` : (delta<0 ? ` ${delta}%` : '');
      toast(`→ ${v.title}${dTxt} (${afterPct}%)`);
    }
  }
  else {
    // [P4] 카테고리 기반 자동 반영 피드백 — 연결 안 해도 카테고리로 집계되는 비전을 알려줌
    const isExpOut = rForm.kind==='expense' && (rForm.flow||'out')==='out';
    const isSaveOrIn = rForm.kind==='expense' && (rForm.flow==='in' || rForm.flow==='save');
    const capV = (isExpOut && rForm.categoryId) ? DB.visions.find(v=>isCapVision(v) && isActiveVision(v) && capCovers(v, rForm.categoryId)) : null;
    const savingV = (isSaveOrIn && rForm.categoryId) ? DB.visions.find(v=>v.metric==='saving' && isActiveVision(v) && saveCovers(v, rForm.categoryId)) : null;
    if(capV){
      const used=capUsedPct(capV); const rem=(visionTarget(capV)||0)-(capV.currentValue||0);
      toast(`→ ${capV.title} · 예산 ${used}% 사용${rem<0?` · ${won(-rem)}${escapeHtml(capV.unit||'')} 초과`:''}`);
    } else if(savingV){
      toast(`→ ${savingV.title} · ${visionPct(savingV)}%`);
    } else toast(rEditId?'수정되었어요':'기록되었어요');
  }
}
// [P4] 기록 삭제 = 즉시 삭제 + 실행취소(스냅샷 복원)
function deleteRecord(){
  if(!rEditId) return;
  const snap=DB.records.find(r=>r.id===rEditId); if(!snap) return;
  const restore={...snap};
  DB.records=DB.records.filter(r=>r.id!==rEditId);
  recomputeVisions(); saveDB(); closeSheet(); renderAll();
  toastAction('기록을 삭제했어요','실행취소',()=>{
    DB.records.push(restore); recomputeVisions(); saveDB(); renderAll(); toast('되돌렸어요');
  });
}

function saveRoutine(){

function deleteRoutine(){

  });
}

/* ============================================================
   TOAST / 토스트
   ============================================================ */
let toastTimer=null;
let toastActionFn=null;
function toast(msg){ showToast(msg,null,null); }
// [P4] 실행취소 등 액션 달린 토스트. label 있으면 5초 노출 + 클릭 시 fn 실행.
function toastAction(msg,label,fn){ showToast(msg,label,fn); }
function showToast(msg,label,fn){
  const t=document.getElementById('toast'); toastActionFn=fn||null;
  t.innerHTML = `<span>${escapeHtml(msg)}</span>` + (label?`<span class="tundo" onclick="runToastAction()">${escapeHtml(label)}</span>`:'');
  t.classList.toggle('has-act', !!fn); t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>{ t.classList.remove('show'); toastActionFn=null; }, fn?5000:2200);
}
function runToastAction(){ const f=toastActionFn; toastActionFn=null; document.getElementById('toast').classList.remove('show'); if(f) f(); }

/* ============================================================
   [P2] ONBOARDING / 첫 실행 온보딩 (포커스 선택)
   "무엇부터 시작할까요?" → 가계부 / 가족 습관(루틴) / 가족 목표(비전)
   고른 포커스를 DB.focus에 저장하고 홈/비전탭 위계를 그 중심으로 우선 구성. 5탭 기능은 그대로 접근.
   첫 화면이 '단순 캘린더 앱'이 아니라 '가족 비전 앱'임을 보이게 — 비전을 전면에 둠.
   이미 온보딩 완료(DB.onboarded)면 다시 안 뜸. 더보기 > 설정에서 다시 볼 수 있음.
   ============================================================ */
const FOCUS_META = {
  ledger:  { label:'가계부',        ic:'trend-up',  short:'가계부 중심',     desc:'지출·수입을 빠르게 기록하고 한눈에 정리해요.' },
  routine: { label:'가족 습관',     ic:'repeat',    short:'가족 습관 중심',  desc:'함께 지킬 루틴을 만들고 연속·달성률을 챙겨요.' },
  vision:  { label:'가족 목표',     ic:'target',    short:'가족 목표 중심',  desc:'함께 세운 비전으로 시작해 진행률을 키워가요.' }
};
let onbPick = null;   // 온보딩에서 임시로 고른 포커스
function shouldOnboard(){ return !DB.onboarded; }
function openOnboarding(reentry){
  onbPick = DB.focus || null;
  renderOnboarding(reentry);
  requestAnimationFrame(()=>document.getElementById('onbOverlay').classList.add('show'));
}
function renderOnboarding(reentry){
  const opts = ['ledger','routine','vision'].map(k=>{
    const f = FOCUS_META[k];
    const on = onbPick===k;
    return `<button class="onb-opt ${on?'on':''}" onclick="pickFocusOpt('${k}')">
      ${glassIcon(f.ic)}
      <span class="onb-txt"><span class="onb-t">${f.label}</span><span class="onb-d">${f.desc}</span></span>
      <span class="onb-chk">${icon('check-circle',22)}</span>
    </button>`;
  }).join('');
  // 재진입(설정에서 다시 보기)이면 '취소', 첫 실행이면 시작 옵션(빈 상태/샘플)
  const skip = reentry
    ? `<button class="onb-skip" onclick="closeOnboarding()">취소</button>`
    : `<button class="onb-skip" onclick="confirmFocus(true)">${onbPick?"샘플 없이 '나'부터 빈 상태로 시작":'나중에 정할게요'}</button>`;
  document.getElementById('onbSheet').innerHTML = `
    <div class="onb-eyebrow">비전 가족 · 캘린더 앱이 아니에요</div>
    <h2>무엇부터 시작할까요?</h2>
    <div class="onb-sub">함께 세운 '가족 비전'을 키워가는 앱이에요.<br>먼저 집중할 하나를 고르면 홈·비전 화면이 그 중심으로 구성돼요.<br>캘린더·가계부·비전·더보기 5개 탭은 그대로 다 쓸 수 있어요.<br>(언제든 바꿀 수 있어요)</div>
    ${opts}
    <button class="btn btn-primary btn-block" style="margin-top:8px;${onbPick?'':'opacity:.45'}" onclick="confirmFocus()" ${onbPick?'':'disabled'}>${onbPick?(reentry?'이 포커스로 변경':'샘플 데이터로 둘러보기'):'하나를 골라주세요'}</button>
    ${skip}`;
}
function pickFocusOpt(k){ onbPick = (onbPick===k) ? null : k; const re = DB.onboarded; renderOnboarding(re); }
// [P4] fresh=true면 샘플 기록·비전·루틴을 비우고, 샘플 구성원(엄마/아빠/…)도 '나' 1명으로 리셋해 진짜 빈 상태로 시작.
function confirmFocus(fresh){
  if(!onbPick && !fresh) return;
  DB.focus = onbPick || null;
  DB.onboarded = true;
  if(fresh===true){
    DB.records = []; DB.visions = []; DB.routines = []; DB.eventOccDone = {}; DB.eventOccSkip = {};
    const me = { id: uid(), name:'나', color:'#0044FF' };   // 최소 1명 제약 → 샘플 대신 '나' 1명
    DB.members = [me]; DB.currentMemberId = me.id; DB.lastMemberId = me.id; DB.deletedMembers = [];
    DB.categories = DEFAULT_CATEGORIES.map(c=>({...c}));   // 카테고리는 기본으로
    DB.isSample = false;   // 빈 상태로 시작 → 더 이상 샘플 아님
    resetViewState();
  }
  saveDB();
  closeOnboarding();
  go('home');
  toast(fresh===true ? "빈 상태로 시작해요 · '나'부터 기록해보세요" : (onbPick?`${FOCUS_META[onbPick].label} 중심으로 구성했어요`:'시작해요'));
  if(!DB.coachDone) setTimeout(startCoach, 450);   // [P4] 첫 온보딩 직후 코치마크 투어(1회)
}
// [P4] 스포트라이트 코치마크 투어 — 실제 요소를 밝게 비추며 '여기 눌러보세요' 안내
let coachIdx = 0;
const COACH_STEPS = [
  { tab:'home', el:()=>document.querySelectorAll('#tabbar .tabbtn')[3], text:"이루고 싶은 걸 <b>‘비전’</b>으로 세워보세요. 저축·다이어트·예산 등 뭐든 좋아요." },
  { tab:'home', el:()=>document.querySelectorAll('#tabbar .tabbtn')[3], text:"비전에 <b>카테고리를 연결</b>해두면, 그 카테고리로 기록할 때마다 진행률이 <b>저절로 채워져요</b>.<br><span style=\"color:var(--ink-3)\">예) ‘적금 모으기’에 저축·투자를 연결 → 적금 넣을 때마다 자동 +</span>" },
  { tab:'home', el:()=>document.querySelector('.home-qadd'), text:"그다음엔 평소처럼 <b>기록만</b> 하세요. 연결해둔 비전은 <b>알아서 따라 올라가요</b>." }
];
function startCoach(){
  coachIdx = 0;
  go('home');
  document.getElementById('coachOverlay').classList.add('show');
  requestAnimationFrame(()=>setTimeout(renderCoachStep, 60));
}
function renderCoachStep(){
  const step = COACH_STEPS[coachIdx];
  if(!step){ coachEnd(); return; }
  const draw = ()=>{
    const el = step.el();
    if(!el){ coachIdx++; renderCoachStep(); return; }
    const r = el.getBoundingClientRect(), pad = 8;
    const hole = document.getElementById('coachHole');
    hole.style.top=(r.top-pad)+'px'; hole.style.left=(r.left-pad)+'px';
    hole.style.width=(r.width+pad*2)+'px'; hole.style.height=(r.height+pad*2)+'px';
    const tip = document.getElementById('coachTip');
    const last = coachIdx===COACH_STEPS.length-1;
    tip.innerHTML = `<div class="ct-step">${coachIdx+1} / ${COACH_STEPS.length}</div>
      <div class="ct-text">${step.text}</div>
      <div class="ct-row"><button class="ct-skip" onclick="coachEnd()">건너뛰기</button>
      <button class="ct-next" onclick="coachNext()">${last?'시작하기':'다음'}</button></div>`;
    requestAnimationFrame(()=>{
      const th=tip.offsetHeight, tw=tip.offsetWidth, vw=window.innerWidth, vh=window.innerHeight;
      let top = r.bottom + 12; if(top+th > vh-12) top = r.top - th - 12; if(top<12) top=12;
      let left = r.left + r.width/2 - tw/2; left = Math.max(12, Math.min(left, vw-tw-12));
      tip.style.top=top+'px'; tip.style.left=left+'px';
    });
  };
  if(step.tab && curTab!==step.tab){ go(step.tab); requestAnimationFrame(()=>setTimeout(draw, 60)); }
  else draw();
}
function coachNext(){ coachIdx++; renderCoachStep(); }
function coachEnd(){ document.getElementById('coachOverlay').classList.remove('show'); DB.coachDone=true; saveDB(); }
function skipOnboarding(){
  // 건너뛰면 포커스 없이(균형 구성)으로 진행. 온보딩은 완료 처리(다시 안 뜸) — 더보기 > 설정에서 다시 볼 수 있음.
  DB.focus = null; DB.onboarded = true; saveDB(); closeOnboarding();
}
function closeOnboarding(){ document.getElementById('onbOverlay').classList.remove('show'); }
function currentFocus(){ return DB.focus || null; }
// [P2] 홈 포커스 배너 (현재 포커스 표시 + 탭하면 다시 선택)
function focusBannerHtml(){
  const f = currentFocus();
  const label = f ? FOCUS_META[f].short : '균형 구성';
  return `<div class="focus-banner" onclick="openOnboarding(true)">${icon('target')} ${escapeHtml(label)} · <span class="fb-change">바꾸기</span></div>`;
}

/* ============================================================
   [P3] THEME / 테마 — 메인 강조색 스킨 (시즌팩/코스메틱 수익화 골격)
   색=구성원 원칙 유지: 바뀌는 건 '시스템 강조색(accent)'뿐. 무채색 위계는 그대로.
   ============================================================ */
const THEMES = [
  // 기본(선명) 4색 — 강조색만 교체. 계열은 시트 그룹 라벨('선명')이 구분 → 이름은 심플한 색이름
  { id:'blue',   name:'블루',     accent:'#0044FF', accent2:'#0038d6', soft:'#e8eeff', rgb:'0,68,255' },
  { id:'green',  name:'그린',     accent:'#16a866', accent2:'#128a54', soft:'#e4f6ed', rgb:'22,168,102' },
  { id:'violet', name:'바이올렛', accent:'#6b4ef0', accent2:'#573dd0', soft:'#ece8fe', rgb:'107,78,240' },
  { id:'slate',  name:'차콜',     accent:'#3a4658', accent2:'#2b3543', soft:'#eaedf2', rgb:'58,70,88' },
  // 파스텔 4색 — 따뜻한 종이 스킨(skin:'pastel') 공유. 계열은 그룹 라벨('파스텔')이 구분 → 같은 색이름 심플하게
  { id:'diary',           name:'블루',     accent:'#3f6bb5', accent2:'#33589a', soft:'#e6edf8', rgb:'63,107,181', skin:'pastel' },
  { id:'pastel-green',    name:'그린',     accent:'#4f9d78', accent2:'#43855f', soft:'#e7f2eb', rgb:'79,157,120',  skin:'pastel' },
  { id:'pastel-violet',   name:'바이올렛', accent:'#7d6bd0', accent2:'#6a58bd', soft:'#ece8f8', rgb:'125,107,208', skin:'pastel' },
  { id:'pastel-charcoal', name:'차콜',     accent:'#5a6472', accent2:'#49525f', soft:'#e9ebef', rgb:'90,100,114',  skin:'pastel' }
];
function applyTheme(id){
  const t = THEMES.find(x=>x.id===id) || THEMES[0];
  const r = document.documentElement.style;
  r.setProperty('--accent', t.accent);
  r.setProperty('--accent-2', t.accent2);
  r.setProperty('--accent-rgb', t.rgb);   // [P3] --accent-soft는 이 RGB로 CSS에서 자동 계산(테마·다크 적응)
  r.setProperty('--income', t.accent);     // 수입(+)도 테마 강조색을 따름. 지출(−)은 빨강 유지.
  document.documentElement.classList.toggle('skin-diary', t.skin==='pastel');   // [P3] 파스텔 계열 = 따뜻한 종이 팔레트 스킨(클래스명은 skin-diary 유지)
  // [P3] 파스텔 색 계열별 종이 톤 주입. paper 없으면 인라인 제거→클래스 기본 크림(블루)/기본 테마 복귀.
  const P = t.paper, set=(k,v)=> v ? r.setProperty(k,v) : r.removeProperty(k);
  set('--bg', P&&P.bg); set('--card', P&&P.card); set('--surface', P&&P.card);
  set('--track', P&&P.track); set('--fill-soft', P&&P.fill);
  set('--line', P&&P.line); set('--line-2', P&&P.line2);
  document.body.style.background = (P&&P.frame) || '';   // 프레임 바깥 종이톤(블루=클래스 CSS가 담당)
}
function openThemeSheet(){
  const cur = DB.theme || 'blue';
  const optHtml = t=>`
    <div class="theme-opt ${cur===t.id?'on':''}" onclick="pickTheme('${t.id}')">
      <span class="theme-sw" style="background:${t.accent}"></span>
      <span class="theme-nm">${t.name}</span>
      <span class="theme-chk">${icon('check-circle',20)}</span>
    </div>`;
  const grp = (label, list)=>`<div class="theme-grp">${label}</div>${list.map(optHtml).join('')}`;
  const sws = grp('선명하게', THEMES.filter(t=>t.skin!=='pastel'))
            + grp('편안하게', THEMES.filter(t=>t.skin==='pastel'));
  showSheet(`<span class="grab"></span><h3>테마</h3>
    <div style="font-size:13px;color:var(--ink-2);margin:-6px 2px 14px;line-height:1.6">메인 강조색을 바꿔요. 구성원 색·기록은 그대로예요.</div>
    ${sws}
    <button class="btn btn-ghost btn-block" style="margin-top:14px" onclick="closeSheet()">닫기</button>`);
}
function pickTheme(id){
  DB.theme = id; saveDB(); applyTheme(id);
  renderThemeSheetLive(); renderAll();
  toast(`${(THEMES.find(t=>t.id===id)||{}).name} 테마 적용`);
}
function toggleDark(){
  DB.dark = !DB.dark; saveDB();
  document.documentElement.classList.toggle('dark', !!DB.dark);
  renderAll(); toast(DB.dark?'다크 모드 켜짐':'라이트 모드');
}
function renderThemeSheetLive(){ if(document.getElementById('overlay')?.classList.contains('show')) openThemeSheet(); }

/* [P3] 전역 검색 — 기록·일정·비전·루틴 제목 */
let searchQ='';
function openSearchSheet(){
  searchQ='';
  showSheet(`<span class="grab"></span><h3>검색</h3>
    <div class="field"><input type="text" id="searchInput" aria-label="검색어" placeholder="제목·금액·카테고리·이름 검색" oninput="searchQ=this.value;renderSearchResults()"></div>
    <div id="searchResults">${searchResultsHtml()}</div>
    <button class="btn btn-ghost btn-block" style="margin-top:10px" onclick="closeSheet()">닫기</button>`);
  setTimeout(()=>{ const el=document.getElementById('searchInput'); if(el) el.focus(); }, 60);
}
function renderSearchResults(){ const el=document.getElementById('searchResults'); if(el) el.innerHTML=searchResultsHtml(); }
function searchResultsHtml(){
  const q=searchQ.trim().toLowerCase();
  if(!q) return `<div class="muted" style="padding:14px 0">제목·금액·카테고리·이름으로 찾아요</div>`;
  const res=[];
  const qDigits=q.replace(/[^0-9]/g,'');   // [P4] 금액 검색: 숫자만 뽑아 부분일치
  DB.visions.forEach(v=>{ if(String(v.title||'').toLowerCase().includes(q)) res.push({type:'vision',id:v.id,title:v.title,meta:'비전 '+(isCompleted(v)?'· 🏆달성':''),color:'var(--accent)',ic:'target'}); });
  DB.routines.forEach(r=>{ const m=memberById(r.memberId); if(String(r.title||'').toLowerCase().includes(q) || (m&&m.name.toLowerCase().includes(q))){ res.push({type:'routine',id:r.id,title:r.title,meta:'루틴'+(m?' · '+m.name:''),color:m?m.color:'var(--ink-3)',ic:'arrows-clockwise'}); } });
  DB.records.forEach(r=>{
    const m=memberById(r.memberId); const cat=r.categoryId?categoryById(r.categoryId):null;
    const hay=[r.title, m&&m.name, cat&&cat.name].filter(Boolean).join(' ').toLowerCase();
    const amtHit = qDigits.length>=2 && r.kind==='expense' && String(r.amount||'').includes(qDigits);
    if(hay.includes(q) || amtHit){ const km=kindMeta(recordKindKey(r)); res.push({type:'record',id:r.id,title:r.title||(cat?cat.name:'기록'),meta:(km?km[0]:'')+' · '+fmtMonthDay(new Date(r.ts))+(m?' · '+m.name:'')+(cat?' · '+cat.name:''),color:m?m.color:'var(--ink-3)',ic:km?km[1]:'check'}); }
  });
  if(!res.length) return `<div class="muted" style="padding:14px 0">'${escapeHtml(searchQ)}' 결과가 없어요</div>`;
  return res.slice(0,40).map(r=>`<div class="search-res" onclick="pickSearch('${r.type}','${r.id}')">
    <span class="sr-ic" style="background:${escapeHtml(r.color)}">${icon(r.ic)}</span>
    <div class="sr-main"><div class="sr-t">${escapeHtml(r.title)}</div><div class="sr-m">${escapeHtml(r.meta)}</div></div>
  </div>`).join('');
}
function pickSearch(type,id){
  closeSheet();
  if(type==='vision') openVisionDetail(id);
  else if(type==='routine') openRoutineSheet(id);
  else openRecordSheet(id);
}

/* ============================================================
   INIT / 초기화
   ============================================================ */
function init(){
  DB = loadDB();
  if(!DB || !DB.members || !DB.visions || !DB.currentMemberId) seed();
  else recomputeVisions();
  normalizeDB();   // [P4] 하위호환 필드 보정 일원화
  applyTheme(DB.theme);   // [P3] 저장된 테마 적용
  document.documentElement.classList.toggle('dark', !!DB.dark);   // [P3] 다크 모드
  document.getElementById('hdrDate').textContent = NOW.getFullYear()+'년 '+fmtDateK(NOW);
  renderTabbar(); renderAll();
  // [P2] 처음(또는 미설정)이면 온보딩 오버레이 노출
  if(shouldOnboard()) openOnboarding(false);
}
init();
</script>
