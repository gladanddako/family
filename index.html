/* --- 가계부 카테고리 (사용자 정의, 수입/지출 구분) --- */
let catAddMode=false;
let catDraft={ name:'', color:PRESET_COLORS[0], flow:'out', icon:'🧾' };
// [P4] 카테고리 아이콘 = 네이티브 이모지(외부요청 0). 레거시 라인아이콘 키는 그대로 SVG.
function catIconHtml(c){ if(!c||!c.icon) return ''; return ICONS[c.icon] ? `<span class="cat-ic-line">${icon(c.icon)}</span>` : `<span class="cat-ic-emoji">${c.icon}</span>`; }
function categoryChips(){
  const flow = rForm.flow||'out';
  // [회의] 자주 쓴 순 정렬(마찰↓) — 사용 빈도 desc
  const useCount = id => DB.records.reduce((n,r)=>n+(r.categoryId===id?1:0),0);
  const cats=(DB.categories||[]).filter(c=>(c.flow||'out')===flow).slice().sort((a,b)=>useCount(b.id)-useCount(a.id));
  // [요청] 카테고리 = 동그라미(이모지) 위 + 이름 아래 타일 격자. 자주 쓴 순.
  let tiles=cats.map(c=>`<div class="cat-tile ${rForm.categoryId===c.id?'on':''}" onclick="pickCategory('${c.id}')"><span class="cat-ava">${catIconHtml(c)}</span><span class="cat-tname">${escapeHtml(c.name)}</span></div>`).join('');
  tiles+=`<div class="cat-tile" onclick="openCategoryManagerFromRecord()"><span class="cat-ava cat-ava-add">${icon('plus',18)}</span><span class="cat-tname">추가</span></div>`;   // [요청] +추가 → 카테고리 관리 열기
  // [요청] 개수 적으면(수입·저축) 1줄, 많으면(지출) 2줄 가로 스와이프. +추가 타일 포함해 셈.
  const oneRow = (cats.length+1) <= 10;
  let html=`<div class="cat-grid${oneRow?' one-row':''}">${tiles}</div>`;
  if(catAddMode){
    // [회의] 빠른추가 = 이름만(아이콘 자동). 변경·편집·삭제는 관리로.
    html+=`<div class="cat-quickadd"><input type="text" id="catName" value="${escapeHtml(catDraft.name)}" placeholder="새 카테고리 이름" oninput="catDraft.name=this.value"><button class="btn btn-primary btn-sm" type="button" onclick="addCategory()">추가</button></div>`;
  }
  // [회의] 관리(편집·삭제)는 별도 화면으로 일원화 — 링크는 카테고리 라벨 오른쪽(categoryField)에 배치
  return html;
}
// [회의] 기록 폼 ↔ 카테고리 관리 최소 연동: 관리 열되 rForm 보존 → '기록으로'로 복귀 시 renderRecordSheet로 칩 동기화
let catMgrReturnRecord=false;
function openCategoryManagerFromRecord(){ catMgrReturnRecord=true; catMgrFlow=rForm.flow||'out'; catAddMode=false; openCategoryManager(); }
function backToRecordFromCatMgr(){ if(commitCatDraft()) renderAll(); catMgrReturnRecord=false; renderRecordSheet(); }   // [요청] 기록으로 돌아갈 때도 초안 자동 저장
function toggleCatAdd(){ catAddMode=!catAddMode; if(catAddMode) catDraft={ name:'', color:PRESET_COLORS[Math.floor(Math.random()*PRESET_COLORS.length)], flow:rForm.flow||'out', icon:'🏷️' }; renderRecordSheet(); }   // [회의] 빠른추가는 이름만 → 아이콘 자동(중립 기본), 변경은 관리에서
function addCategory(){
  if(!catDraft.name.trim()){ toast('카테고리 이름을 입력해주세요'); return; }
  const c={ id:uid(), name:catDraft.name.trim(), color:catDraft.color||SWATCH_DEFAULT, flow:rForm.flow||'out', icon:catDraft.icon||'🧾' };
  DB.categories=DB.categories||[]; DB.categories.push(c);
  rForm.categoryId=c.id;
  catAddMode=false; saveDB(); renderRecordSheet(); toast('카테고리를 추가했어요');
}
// [P4] 카테고리 삭제 = 확인(사용 건수 안내) + 열린 시트 맞춰 재렌더(버그 수정) + 실행취소
function deleteCategory(id, from){
  const c=(DB.categories||[]).find(x=>x.id===id); if(!c) return;
  const usedN=DB.records.filter(r=>r.categoryId===id).length;
  confirmDanger({
    title:`‘${escapeHtml(c.name)}’ 카테고리를 삭제할까요?`,
    body: usedN ? `이 카테고리를 쓰는 <b>기록 ${usedN}건</b>이 <b>‘미분류’</b>가 돼요. 삭제 직후 실행취소할 수 있어요.` : `연결된 기록이 없어요. 삭제 직후 실행취소할 수 있어요.`,
    onConfirm:`doDeleteCategory('${id}','${from||'record'}')`,
    onCancel: from==='manager' ? 'renderCategoryManager()' : 'renderRecordSheet()'
  });
}
function doDeleteCategory(id, from){
  const c=(DB.categories||[]).find(x=>x.id===id); if(!c) return;
  const snap={...c};
  const wasDefault=DEFAULT_CATEGORIES.some(d=>d.id===id);
  if(wasDefault){ DB.deletedCats=DB.deletedCats||[]; if(!DB.deletedCats.includes(id)) DB.deletedCats.push(id); }   // [요청] 삭제한 기본 카테고리는 재병합 방지
  const affected=DB.records.filter(r=>r.categoryId===id).map(r=>r.id);
  // [QA-M2] 이 카테고리를 대상으로 쓰던 cap/saving 목표 배열도 정리(원본 스냅샷 후 제거, 빈 배열이면 전체 sentinel)
  const visSnap=[];
  DB.visions.forEach(v=>{ ['capCategoryIds','savingCategoryIds'].forEach(k=>{
    if(Array.isArray(v[k]) && v[k].indexOf(id)>=0){
      visSnap.push({vid:v.id, key:k, arr:v[k].slice()});
      v[k]=v[k].filter(x=>x!==id);
      if(!v[k].length) v[k]=[k==='capCategoryIds'?'__allout__':'__allsave__'];
    }
  }); });
  DB.categories=(DB.categories||[]).filter(x=>x.id!==id);
  if(rForm && rForm.categoryId===id) rForm.categoryId='';
  affected.forEach(rid=>{ const r=DB.records.find(x=>x.id===rid); if(r) r.categoryId=null; });
  recomputeVisions(); saveDB();
  if(from==='manager') renderCategoryManager(); else renderRecordSheet();
  toastAction('카테고리를 삭제했어요','실행취소',()=>{
    if(wasDefault && DB.deletedCats) DB.deletedCats=DB.deletedCats.filter(x=>x!==id);   // [요청] 되돌리면 재병합 허용 복구
    DB.categories.push(snap);
    affected.forEach(rid=>{ const r=DB.records.find(x=>x.id===rid); if(r) r.categoryId=id; });
    visSnap.forEach(s=>{ const v=visionById(s.vid); if(v) v[s.key]=s.arr.slice(); });
    recomputeVisions(); saveDB();
    if(from==='manager') renderCategoryManager(); else renderRecordSheet();
    toast('되돌렸어요');
  });
}

  const editing = !!rEditId;
  const isExp = rForm.kind==='expense';
  const isWeight = rForm.kind==='weight';
  const isEvent = rForm.kind==='event';
  // [1] 일정 반복 옵션 (안 함/매일/매주/매월/매년). 매주=요일, 매월='일', 매년=월·일은 선택 날짜 기준.
  const repOpts = ['none','daily','weekly','monthly','yearly'].map(k=>`<option value="${k}" ${(rForm.repeat||'none')===k?'selected':''}>${REPEAT_LABELS[k]}</option>`).join('');
  const repeatField = isEvent ? `<div class="field"><div class="finline"><label>반복</label><select id="rRepeat" onchange="rForm.repeat=this.value">${repOpts}</select></div></div>` : '';
  // [1] 일정 알림(리마인더) 선택 — 없음/정시/10·30분 전/1시간 전/하루 전. 발송은 앱(네이티브)에서 처리.
  const remOpts = EVENT_REMIND_OPTS.map(k=>`<option value="${k}" ${recRemind(rForm)===k?'selected':''}>${REMIND_LABELS[k]}</option>`).join('');
  const remindField = isEvent ? `<div class="field"><div class="finline"><label>알림</label><select id="rRemind" onchange="rForm.remind=this.value">${remOpts}</select></div></div>` : '';
  // 수입/지출 토글 (가계부일 때만)
  // [P4] 유형 3분류: 수입 / 지출 / 저축·투자
  const flowHint = rForm.flow==='save'
      ? `<div style="font-size:var(--fs-sm);color:var(--ink-3);margin:var(--sp-3) var(--sp-2) 0;line-height:var(--lh-body)">저축·투자는 <b>소비가 아니라 자산 이동</b>이에요. 지출 합계엔 안 잡히고, 모으기 목표에 자동으로 쌓여요.</div>`
      : (rForm.flow==='transfer' ? `<div style="font-size:var(--fs-sm);color:var(--ink-3);margin:var(--sp-3) var(--sp-2) 0;line-height:var(--lh-body)">이체는 <b>내 계좌끼리 돈 옮기기</b>(카드값 결제·현금 인출 등). 수입·지출엔 안 잡혀요.</div>` : '');
  const flowToggle = isExp ? `<div class="field"><div class="seg flow4" role="group" aria-label="유형">
      <button class="f-in ${rForm.flow==='in'?'on':''}" onclick="setRecFlowForm('in')">＋수입</button>
      <button class="f-out ${(rForm.flow||'out')==='out'?'on':''}" onclick="setRecFlowForm('out')">－지출</button>
      <button class="f-save ${rForm.flow==='save'?'on':''}" onclick="setRecFlowForm('save')">↔저축</button>
      <button class="f-xfer ${rForm.flow==='transfer'?'on':''}" onclick="setRecFlowForm('transfer')">⇄이체</button>
    </div>${flowHint}</div>` : '';
  // [7] 체중 기록: kg 입력 → 연결된 다이어트(manual) 목표 현재값 갱신
  const dietVisions = DB.visions.filter(v=>v.type==='QUANT' && v.metric==='manual' && /kg/i.test(v.unit||''));
  const weightHint = '';   // [요청] 체중 아래 설명 제거

      ? `<div class="field"><div style="background:var(--good-soft);border-radius:var(--r-sm);padding:11px 13px;font-size:var(--fs-sm);color:var(--ink);line-height:var(--lh-body)">🎯 <b>내가 남긴 이 기록이 '${escapeHtml(autoV.title)}'에 쌓여요.</b><br><span style="color:var(--ink-3)">저축·투자 기록이 이 목표로 모여요.</span></div></div>`
      : `<div class="field"><div style="font-size:var(--fs-sm);color:var(--ink-3);line-height:var(--lh-body)">저축·투자는 ‘모으기’ 목표에 카테고리로 자동 집계돼요.</div></div>`;
  } else {
    visionField = `<div class="field"><div class="finline"><label>목표</label><select id="rVis" onchange="rForm.visionId=this.value;renderRecordSheet()">${vopts}</select></div></div>`;   // [요청] 라벨 '목표'만 + 아래 설명 제거
  }
  // 일정 전용 고급 옵션(반복·알림)만 접기. 목표 연결은 본문으로 올렸으니 아코디언에서 제외.
  const advInner = `${repeatField}${remindField}`;
  // [회의] 탭별 제목 · 종류칩 제거 · 중요도순 필드 · 내용 프리셋
  const kindLabel = {expense:'가계부',workout:'운동',event:'일정',weight:'체중'}[rForm.kind]||'기록';
  const presetList = rForm.kind==='workout'?['걷기','러닝','헬스','요가','홈트']:(isEvent?['병원','학원','가족 모임','기념일','미팅']:[]);
  const presetChips = presetList.length?`<div class="chip-row pchip-row tight">${presetList.map(p=>`<div class="pchip ${rForm.title===p?'on':''}" onclick="pickTitlePreset('${p.replace(/'/g,"\\'")}')">${p}</div>`).join('')}</div>`:'';

  const amtFmt = (rForm.amount!==''&&rForm.amount!=null) ? Number(String(rForm.amount).replace(/[^0-9]/g,'')||0).toLocaleString('ko-KR') : '';

    ? (isXferForm ? `${flowToggle}${amountField}${xferField}${titleField}` : `${flowToggle}${amountField}${categoryField}${accountField}${titleField}`)
    : (isWeight ? weightField : titleField);
  const skipOccBtn = (editing && isEvent && (rForm.repeat&&rForm.repeat!=='none') && rOccDate)?`<div style="font-size:var(--fs-sm);color:var(--ink-3);margin:var(--sp-5) var(--sp-1) var(--sp-3);line-height:var(--lh-body)">반복 일정이에요. 저장하면 <b>전체 회차</b>에 적용돼요.</div><button class="btn btn-neutral btn-block" onclick="skipOccurrence('${rEditId}','${rOccDate}')">${icon('calendar',15)} 이 날짜(${escapeHtml(rOccDate)})만 건너뛰기</button>`:'';
  const html=`<h3>${editing?'기록 수정':kindLabel+' 기록 추가'}</h3>
    ${memberField}
    ${bodyFields}
    ${isExp ? `<div class="field"><input type="date" id="rDate" aria-label="날짜" value="${rForm.date}" oninput="rForm.date=this.value"></div>` : dateTimeField}
    ${isEvent?eventAdvanced:''}
    ${visionField}
    ${skipOccBtn}
    ${editing?`<div class="sheet-foot"><button class="btn-textdanger" onclick="deleteRecord()">삭제</button></div>`:''}`;
  showSheet(html, {fixed:true, formKind:'record', done:{ready:recordFormValid()}, back: editing?null:{label:'뒤로', onclick:'backToQuickMenu()'}});   // [요청] 하단 저장박스 제거 → 헤더 '완료'(자동저장). 편집만 하단 삭제 텍스트
  if(recAutoFocusAmt){ recAutoFocusAmt=false; setTimeout(()=>{ const el=document.getElementById('rAmt'); if(el) el.focus({preventScroll:true}); },340); }   // [회의] 금액 자동 포커스(첫 오픈 1회). 애니메이션 종료 후 포커스 + preventScroll(스크롤·제목 위치 영향 없음)
}
// [P3] 반복 일정의 특정 회차만 건너뛰기(제외)
function skipOccurrence(id, dstr){
  activeSheetKind=null;   // [자동저장] 이 건너뛰기 액션이 편집 폼을 재저장하지 않게
  DB.eventOccSkip = DB.eventOccSkip || {};
  DB.eventOccSkip[eventOccKey(id, dstr)] = true;

}
function setRecKindForm(k){
  rForm.kind=k; if(k!=='expense') rForm.categoryId=''; catAddMode=false;
  // 체중으로 전환 시 다이어트(manual·kg) 목표 자동 연결 제안
  if(k==='weight' && !rForm.visionId){ const dv=DB.visions.find(v=>v.type==='QUANT'&&v.metric==='manual'&&/kg/i.test(v.unit||'')&&isActiveVision(v)); if(dv) rForm.visionId=dv.id; }
  renderRecordSheet();
}
function setRecFlowForm(f){ rForm.flow=f; rForm.categoryId=''; catAddMode=false;
  if(f==='transfer'){ rForm.fromAccountId=rForm.fromAccountId||DB.mainAccountId; if(!rForm.toAccountId||rForm.toAccountId===rForm.fromAccountId) rForm.toAccountId=((DB.accounts||[]).find(a=>a.id!==rForm.fromAccountId)||{}).id||''; }
  if(recWiz){ renderRecordWizard(); return; }
  renderRecordSheet();
}   // flow 변경 시 카테고리 리셋 (수입/지출 카테고리 분리). 이체면 출금·입금 계좌 기본값
function pickRecAccount(id){ rForm.accountId=id; if(recWiz){ saveRecord(); return; } renderRecordSheet(); }
function pickRecFromAcct(id){ rForm.fromAccountId=id; if(rForm.toAccountId===id) rForm.toAccountId=((DB.accounts||[]).find(a=>a.id!==id)||{}).id||''; if(recWiz){ renderRecordWizard(); return; } renderRecordSheet(); }
function pickRecToAcct(id){ rForm.toAccountId=id; if(rForm.fromAccountId===id) rForm.fromAccountId=((DB.accounts||[]).find(a=>a.id!==id)||{}).id||''; if(recWiz){ saveRecord(); return; } renderRecordSheet(); }
// [회의] 기록 폼 헬퍼
function backToQuickMenu(){ activeSheetKind=null; closeSheet(); openQuickSheet(); }   // '←' = 유형 다시 고르기(위저드 뒤로) → 폐기 후 빠른메뉴. [결정] X·바탕·드래그=자동저장 / 뒤로=폐기
function pickTitlePreset(p){ rForm.title=p; rForm._autoTitle=p; renderRecordSheet(); }   // 내용 프리셋 선택
function pickCategory(id){
  rForm.categoryId=id;
  const c=categoryById(id);
  // [회의] 카테고리→내용 자동입력: 내용을 아직 안 건드렸을 때만(비었거나 직전 자동입력값 그대로) — 사용자가 쓴 건 안 덮음
  if(c && (!rForm.title.trim() || rForm.title===rForm._autoTitle)){ rForm.title=c.name; rForm._autoTitle=c.name; }
  if(recWiz){ recStep=3; renderRecordWizard(); return; }   // [모두쓰] 위저드: 카테고리 탭 = 자동 진행(→계좌)
  renderRecordSheet();
}
function recordTs(){
  const t=(rForm.time||'09:00').split(':');
  const d=parseYmd(rForm.date); d.setHours(+t[0]||0, +t[1]||0, 0, 0);
  return d.getTime();
}
function saveRecord(){
  recWiz=false;   // [모두쓰] 저장=위저드 종료
  activeSheetKind=null;   // [자동저장] 명시적/자동 저장 진입 — 이어지는 closeSheet 재저장 방지
  let savedNewId=null;    // [자동저장] 새 기록 id — 배경탭 자동저장 시 '실행취소'로 되돌리기
  const xfer = rForm.kind==='expense' && rForm.flow==='transfer';   // [계좌] 이체
  if(rForm.kind==='expense' && !xfer && !rForm.title.trim() && rForm.categoryId){ const c=categoryById(rForm.categoryId); if(c) rForm.title=c.name; }   // [요청] 지출 제목 비면 저장 시 카테고리명으로(열 땐 안 채움)
  if(xfer){ if(!rForm.fromAccountId||!rForm.toAccountId||rForm.fromAccountId===rForm.toAccountId){ toast('출금·입금 계좌를 다르게 선택해주세요'); return; } }
  else if(rForm.kind!=='weight' && !rForm.title.trim()){ toast('내용을 입력해주세요'); return; }
  if(rForm.kind==='weight' && (rForm.value===''||rForm.value==null)){ toast('체중(kg)을 입력해주세요'); return; }
  if(rForm.kind==='expense' && (!rForm.amount || parseInt(rForm.amount)<=0)){ toast('금액을 입력해주세요'); return; }   // [BUG-5] 0원·빈 금액 저장 방지
  const contCtx = (!rEditId && rForm.kind==='expense' && !xfer) ? { flow:rForm.flow, member:rForm.memberId, date:rForm.date } : null;   // [요청/에이전시] 새 가계부 기록 → '계속 입력' 컨텍스트. 이체 제외
  // [마이크로피드백] 연결 목표의 저장 전 진행률 — 저장 후 변화(+N%)를 즉시 토스트
  const linkV = rForm.visionId ? visionById(rForm.visionId) : null;
  const beforePct = linkV ? visionProgressPct(linkV) : 0;
  if(rEditId){
    const r=DB.records.find(x=>x.id===rEditId);
    r.memberId=rForm.memberId; r.kind=rForm.kind; r.title=rForm.title.trim();
    r.visionId=rForm.visionId||null; r.ts=recordTs(); if(rForm.time==='') r.allDay=true; else delete r.allDay;
    if(rForm.kind==='expense'){
      r.amount=parseInt(rForm.amount)||0;
      r.flow=(rForm.flow==='in'?'in':(rForm.flow==='save'?'save':(rForm.flow==='transfer'?'transfer':'out')));
      if(r.flow==='transfer'){ r.fromAccountId=rForm.fromAccountId; r.toAccountId=rForm.toAccountId; delete r.categoryId; delete r.accountId; r.visionId=null; if(!r.title) r.title='이체'; }
      else { r.categoryId=rForm.categoryId||null; r.accountId=rForm.accountId||DB.mainAccountId; delete r.fromAccountId; delete r.toAccountId; }
      delete r.value; delete r.repeat; delete r.remind;
    }
    else if(rForm.kind==='weight'){ r.value=parseFloat(rForm.value); delete r.amount; delete r.categoryId; delete r.flow; delete r.repeat; delete r.remind; }
    else if(rForm.kind==='event'){ delete r.amount; delete r.categoryId; delete r.flow; delete r.value; r.repeat=rForm.repeat||'none'; r.remind=rForm.remind||'none'; }
    else { delete r.amount; delete r.categoryId; delete r.flow; delete r.value; delete r.repeat; delete r.remind; }
  } else {
    const rec={ id:uid(), memberId:rForm.memberId, kind:rForm.kind, title:rForm.title.trim(), ts:recordTs(), visionId:rForm.visionId||null, allDay:(rForm.time==='')||undefined };
    if(rForm.kind==='expense'){
      rec.amount=parseInt(rForm.amount)||0;
      rec.flow=(rForm.flow==='in'?'in':(rForm.flow==='save'?'save':(rForm.flow==='transfer'?'transfer':'out')));
      if(rec.flow==='transfer'){ rec.fromAccountId=rForm.fromAccountId; rec.toAccountId=rForm.toAccountId; rec.visionId=null; if(!rec.title) rec.title='이체'; }
      else { rec.categoryId=rForm.categoryId||null; rec.accountId=rForm.accountId||DB.mainAccountId; }
    }
    else if(rForm.kind==='weight'){ rec.value=parseFloat(rForm.value); if(!rec.title) rec.title='체중 기록'; }
    else if(rForm.kind==='event'){ rec.repeat=rForm.repeat||'none'; rec.remind=rForm.remind||'none'; rec.done=(rec.repeat==='none' && rec.ts<=NOW.getTime()); }   // [BUG-8] 단발 일정은 '이미 한 것'이라 done=true, 단 미래 날짜는 미완료. 반복은 done=false
    DB.records.push(rec); savedNewId=rec.id;
    DB.lastKind=rForm.kind; DB.lastFlow=rForm.flow||'out'; DB.lastMemberId=rForm.memberId;
    // [P3] 기본값 상속: 직전 사용 카테고리 기억 (다음 빠른 기록에 프리셀렉트)
    if(rForm.kind==='expense' && rForm.categoryId) DB.lastCategory=rForm.categoryId;
  }
  // [7] 체중 기록 → 연결된 다이어트(manual) 목표 현재값 갱신
  if(rForm.kind==='weight' && rForm.visionId){
    const dv=visionById(rForm.visionId);
    if(dv && dv.type==='QUANT' && dv.metric==='manual'){ dv.currentValue=parseFloat(rForm.value); }
  }
  recomputeVisions(); saveDB(); closeSheet(); renderAll();
  // [마이크로피드백] "→[목표명] +N%" — 내 기록이 목표를 움직였음을 즉시 체감
  let fb='';
  if(xfer){
    const fa=accountById(rForm.fromAccountId), ta=accountById(rForm.toAccountId);
    fb=`↔ ${(fa||{}).name||''} → ${(ta||{}).name||''} 이체`;
  }
  else if(rForm.visionId){
    const v=visionById(rForm.visionId);
    if(isCapVision(v)){   // [QA] cap은 %=예산 소진이라 '+진행률'로 표시하면 오해 → '예산 N% 사용'
      const used=capUsedPct(v); const rem=(visionTarget(v)||0)-(v.currentValue||0);
      fb=`→ ${v.title} · 예산 ${used}% 사용${rem<0?` · ${won(-rem)}${escapeHtml(v.unit||'')} 초과`:''}`;
    } else {
      const afterPct = visionProgressPct(v);
      const delta = afterPct - beforePct;
      const dTxt = delta>0 ? ` +${delta}%` : (delta<0 ? ` ${delta}%` : '');
      fb=`→ ${v.title}${dTxt} (${afterPct}%)`;
    }
  }
  else {
    // [P4] 카테고리 기반 자동 반영 피드백 — 연결 안 해도 카테고리로 집계되는 목표를 알려줌
    const isExpOut = rForm.kind==='expense' && (rForm.flow||'out')==='out';
    const isSaveOrIn = rForm.kind==='expense' && (rForm.flow==='in' || rForm.flow==='save');
    const capV = (isExpOut && rForm.categoryId) ? DB.visions.find(v=>isCapVision(v) && isActiveVision(v) && capCovers(v, rForm.categoryId)) : null;
    const savingV = (isSaveOrIn && rForm.categoryId) ? DB.visions.find(v=>v.metric==='saving' && isActiveVision(v) && saveCovers(v, rForm.categoryId)) : null;
    if(capV){
      const used=capUsedPct(capV); const rem=(visionTarget(capV)||0)-(capV.currentValue||0);
      fb=`→ ${capV.title} · 예산 ${used}% 사용${rem<0?` · ${won(-rem)}${escapeHtml(capV.unit||'')} 초과`:''}`;
    } else if(savingV){
      fb=`→ ${savingV.title} · ${visionPct(savingV)}%`;
    } else fb=(rEditId?'수정되었어요':'기록되었어요');
  }
  // [요청/에이전시] 새 가계부 기록 = 저장 후 '계속 입력' 토스트 액션(대상·유형·카테고리·날짜 유지, 금액·메모만 리셋. 단건 경로 무손상)
  if(contCtx){
    // [요청/버그수정] 새 가계부 기록 = '계속 입력' 우선(대상·유형·날짜 유지). 자동저장·완료 저장 모두 동일하게 노출.
    toastAction(fb, '계속 입력', ()=>{ openRecordSheet(null, 'expense', contCtx.flow, contCtx.member, null, contCtx.date); });
  } else if(_autosaving && savedNewId){
    // [자동저장] 배경탭/닫기로 저장된 새 기록(가계부 외) → 실수 대비 '실행취소'
    toastAction(fb||'저장됐어요', '실행취소', ()=>{ DB.records=DB.records.filter(r=>r.id!==savedNewId); recomputeVisions(); saveDB(); renderAll(); toast('되돌렸어요'); });
  } else if(fb){
    toast(fb);
  }
}
// [BUG-4] 반복 일정의 완료/건너뛰기 상태 고아 데이터 정리
function cleanupEventOcc(id){
  [DB.eventOccDone, DB.eventOccSkip].forEach(m=>{ if(m) Object.keys(m).forEach(k=>{ if(k.split('|')[0]===id) delete m[k]; }); });
}
// [UX-7] 기록 삭제 = 확인 다이얼로그 → 삭제 + 실행취소(스냅샷 복원). 구성원·카테고리·목표 삭제와 통일.
function deleteRecord(){
  if(!rEditId) return;
  confirmDanger({ title:'이 기록을 삭제할까요?', body:'삭제 직후 잠깐 <b>실행취소</b>할 수 있어요.', onConfirm:'doDeleteRecord()' });
}
function doDeleteRecord(){
  if(!rEditId) return;
  const snap=DB.records.find(r=>r.id===rEditId); if(!snap) return;
  const restore={...snap};
  DB.records=DB.records.filter(r=>r.id!==rEditId);
  cleanupEventOcc(rEditId);
  recomputeVisions(); saveDB(); closeSheet(); renderAll();
  toastAction('기록을 삭제했어요','실행취소',()=>{
    DB.records.push(restore); recomputeVisions(); saveDB(); renderAll(); toast('되돌렸어요');
  });
}

/* --- 습관 추가/수정 시트 (editId 있으면 수정) --- */
let rtForm={};
// [요청] 습관 시간 선택 — '시간 없음'(종일) 허용. 무시간 습관은 홈 타임라인에서 상단(습관 블록)으로.
function toggleRoutineNoTime(noTime){ rtForm.time = noTime ? '' : (rtForm.time || '09:00'); renderRoutineSheet(); }
function toggleRecNoTime(noTime){ rForm.time = noTime ? '' : (rForm.time || hm(NOW)); renderRecordSheet(); }   // [요청] 기록 '시간 없음'(종일) 토글 — 루틴과 동일
let rtEditId=null;
function openRoutineSheet(editId){
  rtEditId = editId || null;

    activeSheetSnap = JSON.stringify(rtForm);   // [자동저장] 편집 스냅샷
  } else {
    // [단일 운영자] 기본 소유 태그 = 목표탭 습관 필터가 특정 구성원이면 그 구성원, 아니면 직전 사용/첫 구성원

}
function renderRoutineSheet(){

  const rtRemOpts=ROUTINE_REMIND_OPTS.map(k=>`<option value="${k}" ${recRemind(rtForm)===k?'selected':''}>${REMIND_LABELS[k]}</option>`).join('');
  const editing=!!rtEditId;
  const html=`<h3>${editing?'습관 수정':'새 습관 추가'}</h3>
    <div class="field"><div class="chip-row mem" role="group" aria-label="소유 구성원">${mchips}</div></div>
    <div class="field"><input type="text" id="rtT" aria-label="제목" value="${escapeHtml(rtForm.title)}" placeholder="예: 아침 운동 / 물 4잔 마시기" oninput="rtForm.title=this.value;refreshSheetDone()">
      <div class="chip-row pchip-row tight">${['아침 운동','물 마시기','영양제','독서','가계부 정리'].map(p=>`<div class="pchip ${rtForm.title===p?'on':''}" onclick="rtForm.title='${p}';renderRoutineSheet()">${p}</div>`).join('')}</div></div>
    <div class="field"><div class="finline"><label>시간</label>
      <div style="display:flex;align-items:center;gap:var(--gap-row);flex:1;min-width:0">
        ${rtForm.time!=='' ? `<input type="time" id="rtTime" value="${rtForm.time}" oninput="rtForm.time=this.value" style="flex:1;min-width:0">`
                           : `<div style="flex:1;min-width:0;color:var(--ink-3);align-self:center">시간 없음 (종일)</div>`}
        <label class="notime-chk"><input type="checkbox" ${rtForm.time===''?'checked':''} onchange="toggleRoutineNoTime(this.checked)">시간 없음</label>
      </div></div></div>
    <div class="field"><div class="finline"><label>횟수</label><div class="toggle2">
      <button class="${(rtForm.count>1)?'':'on'}" onclick="setRoutineMulti(false)">한 번 완료</button>
      <button class="${(rtForm.count>1)?'on':''}" onclick="setRoutineMulti(true)">하루 여러 번</button></div></div>
      ${(rtForm.count>1)?`<div class="finline" style="margin-top:var(--sp-4)"><label>하루</label><div class="unit-input"><input type="number" id="rtCount" value="${rtForm.count}" min="2" max="20" oninput="rtForm.count=Math.max(2,+this.value||2)"><span class="ui-suffix">회</span></div></div>`:''}</div>
    <div class="field"><div class="finline"><label>반복</label><div class="toggle2">
      <button class="${rtForm.freq==='daily'?'on':''}" onclick="rtForm.freq='daily';renderRoutineSheet()">매일</button>
      <button class="${rtForm.freq==='weekly'?'on':''}" onclick="rtForm.freq='weekly';renderRoutineSheet()">요일 선택</button></div></div></div>
    ${rtForm.freq==='weekly'?`<div class="field"><div class="dow-row">${[0,1,2,3,4,5,6].map(i=>`<button type="button" class="dow-chip ${(rtForm.days||[]).indexOf(i)>=0?'on':''}" onclick="toggleRoutineDay(${i})">${DOW[i]}</button>`).join('')}</div></div>`:''}
    <div class="field"><div class="finline"><label>알림</label><select id="rtRemind" onchange="rtForm.remind=this.value">${rtRemOpts}</select></div></div>
    <div class="field"><div class="finline"><label>목표</label><select id="rtV" onchange="rtForm.visionId=this.value">${vopts}</select></div></div>
    ${editing?`<div class="sheet-foot"><button class="btn-textdanger" onclick="deleteRoutine()">삭제</button></div>`:''}`;
  showSheet(html, {fixed:true, formKind:'routine', done:{ready:routineFormValid()}, back: editing?null:{label:'뒤로', onclick:'backToQuickMenu()'}});   // [요청] 하단 저장박스 제거 → 헤더 '완료'(자동저장). 편집만 하단 삭제
}
function setRoutineMulti(multi){
  rtForm.count = multi ? Math.max(2, rtForm.count||2) : 1;
  renderRoutineSheet();
}
function toggleRoutineDay(i){
  const days = Array.isArray(rtForm.days) ? rtForm.days.slice() : [];
  const at = days.indexOf(i);
  if(at>=0) days.splice(at,1); else days.push(i);
  rtForm.days = days;
  renderRoutineSheet();
}
function saveRoutine(){
  activeSheetKind=null;   // [자동저장] 명시적 저장 — closeSheet 재저장 방지
  if(!rtForm.title.trim()){ toast('제목을 입력해주세요'); return; }
  if(rtForm.freq==='weekly' && (!Array.isArray(rtForm.days) || !rtForm.days.length)){ toast('요일을 하나 이상 선택해주세요'); return; }
  const cnt = Math.max(1, rtForm.count||1);
  const days = (rtForm.freq==='weekly' && Array.isArray(rtForm.days)) ? rtForm.days.slice().sort(function(a,b){return a-b;}) : [];
  if(rtEditId){
    const r=DB.routines.find(x=>x.id===rtEditId);
    r.memberId=rtForm.memberId; r.title=rtForm.title.trim();
    r.freq=rtForm.freq; r.days=days; r.visionId=rtForm.visionId||null; r.time=rtForm.time; r.count=cnt; r.remind=rtForm.remind||'none';
    delete r.emoji; delete r.perWeek;
  } else {
    DB.routines.push({ id:uid(), memberId:rtForm.memberId, title:rtForm.title.trim(), freq:rtForm.freq, days:days, visionId:rtForm.visionId||null, time:rtForm.time, count:cnt, remind:rtForm.remind||'none', createdAt:ymd(NOW), checks:{} });   // [P4] createdAt = 지킨 비율/누적 달성률 시작 기준
  }
  recomputeVisions(); saveDB(); closeSheet(); renderAll(); toast(rtEditId?'수정되었어요':'습관이 추가되었어요');
}
// [UX-7] 습관 삭제 = 확인 다이얼로그 → 삭제 + 실행취소
function deleteRoutine(){
  if(!rtEditId) return;
  confirmDanger({ title:'이 습관을 삭제할까요?', body:'삭제 직후 잠깐 <b>실행취소</b>할 수 있어요.', onConfirm:'doDeleteRoutine()' });
}
function doDeleteRoutine(){
  if(!rtEditId) return;
  const snap=DB.routines.find(r=>r.id===rtEditId); if(!snap) return;
  const restore={...snap};
  DB.routines=DB.routines.filter(r=>r.id!==rtEditId);
  recomputeVisions(); saveDB(); closeSheet(); renderAll();
  toastAction('습관을 삭제했어요','실행취소',()=>{
    DB.routines.push(restore); recomputeVisions(); saveDB(); renderAll(); toast('되돌렸어요');
  });
}

/* ============================================================
   TOAST / 토스트
   ============================================================ */
let toastTimer=null;
let toastActionFn=null;
function toast(msg){ showToast(msg,null,null); }
// [P4] 실행취소 등 액션 달린 토스트. label 있으면 5초 노출 + 클릭 시 fn 실행.
function toastAction(msg,label,fn){ showToast(msg,label,fn); }
function showToast(msg,label,fn){
  const t=document.getElementById('toast'); toastActionFn=fn||null;
  t.innerHTML = `<span>${escapeHtml(msg)}</span>` + (label?`<span class="tundo" onclick="runToastAction()">${escapeHtml(label)}</span>`:'');
  t.classList.toggle('has-act', !!fn); t.classList.add('show');
  setPhoneToasting(true);   // [P4] FAB를 잠깐 비켜(흐리게)
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>{ t.classList.remove('show'); toastActionFn=null; setPhoneToasting(false); }, fn?5000:2200);
}
function setPhoneToasting(on){ const p=document.querySelector('.phone'); if(p) p.classList.toggle('toasting', !!on); }
function runToastAction(){ const f=toastActionFn; toastActionFn=null; document.getElementById('toast').classList.remove('show'); setPhoneToasting(false); if(f) f(); }
// [요청] 색 위 글씨 자동 대비 — WCAG 상대명도로 흰/검정 중 대비 높은 쪽 선택(밝은 구성원색은 검정)
function readableInk(hex){
  try{
    const h=String(hex).replace('#','').trim(); if(h.length<6) return '#fff';
    const lin=c=>{ c/=255; return c<=0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4); };
    const L = 0.2126*lin(parseInt(h.slice(0,2),16)) + 0.7152*lin(parseInt(h.slice(2,4),16)) + 0.0722*lin(parseInt(h.slice(4,6),16));
    // [요청] 파스텔(밝은) 구성원색 → 대부분 검정 글씨(흰 글씨는 어두운 색만). 임계값 0.25.
    return L < 0.55 ? '#fff' : '#1c1c1e';   /* [요청] 임계 0.40→0.55: 아빠(초록 L≈0.48)까지 흰 글씨, 노랑(0.64)·피치(0.59)는 검정 유지 */
  }catch(e){ return '#fff'; }
}
// [P4] 통합 기록 FAB 표시 여부 — 기록을 추가하는 탭(홈·캘린더·가계부)에서만. 목표(진행률 보기)·더보기는 숨김.
// [P4] 필터 버튼 — 캘린더·가계부에서만 표시. 활성 필터(구성원/종류) 있으면 강조 + 활성 내용을 버튼 라벨에 표시.
function renderFilterFab(){
  const f=document.getElementById('filterFab');
  // [P4] 필터 버튼은 캘린더 + 가계부'내역'에서만. 가계 리포트는 자체 대상(가구/개인) 필터가 인라인에 있어 우하단 필터는 숨김(작동 안 하는데 떠있던 문제).
  const show = curTab==='calendar' || curTab==='ledger' || curTab==='home' || curTab==='vision';   // [전역] 구성원 스코프 FAB = 콘텐츠 4탭 전부(더보기 제외)
  const sc=document.getElementById('screen'); if(sc) sc.classList.toggle('has-fbtn', show);
  updateScopeBanner();   // [전역] 스코프 배너 동기화(FAB 유무·표시와 무관하게 항상)
  if(!f) return;
  f.classList.toggle('hide', !show);
  const memActive = memberScope!=='all';
  const kindActive = curTab==='calendar' && recKindFilter!=='all';
  const active = memActive || kindActive;
  f.classList.toggle('has-active', show && memActive);   // [요청] 색 틴트(강조)는 '구성원' 필터일 때만. 종류만(전체+운동 등)이면 기본 필터색 유지 — 라벨로만 표시.
  // [P4] 구성원 필터면 그 구성원 색으로 버튼이 물들게(누구로 걸렀는지 색으로도 표시). 종류만이면 강조색.
  let fc = 'var(--accent)', fcInk = '#fff';
  if(memActive){ const m=memberById(memberScope); if(m){ fc=m.color; fcInk=readableInk(m.color); } }   // [요청] 밝은 구성원색(노랑 등)엔 흰 글씨 대비 낮음 → 명도 따라 흰/검정 자동 선택
  f.style.setProperty('--fc', fc);
  f.style.setProperty('--fc-ink', fcInk);
  // 활성 필터 내용을 버튼 라벨에 직접 표시(상단 칩 대신) → 상단 깔끔 + 무엇으로 걸렀는지 버튼에서 바로 보임
  const lbl = f.querySelector('span');
  if(lbl){
    if(!active){ lbl.textContent='전체'; }   // [회의] 스코프=전체. 용어 통일(필터 pill·배너도 '전체'). '온 가족'은 구성원=영역/렌즈일 수도 있어 부정확 → '전체'
    else {
      const parts=[];
      if(memActive){ const m=memberById(memberScope); if(m) parts.push(m.name); }
      else if(kindActive){ parts.push('전체'); }   // [요청] 종류 필터인데 구성원=전체면 '전체'를 앞에 명시(예: 전체 · 운동) → 사람 필터와 구분
      if(kindActive){ parts.push(REC_KIND_LABELS[recKindFilter]||recKindFilter); }
      lbl.textContent = parts.join(' · ') || '필터';
    }
  }
}

/* [P4] 4탭 + 가운데 도킹 ＋ (기록 추가). 더보기는 상단 헤더 아이콘으로 이동. */

  // [홈][캘린더] · (＋) · [가계부][목표·습관] — 가운데 도킹 기록 버튼

// [P4] FAQ 아코디언 — 탭한 항목만 열고 나머지는 접음(인라인, 재렌더 없이 → max-height 애니메이션)

/* ============================================================
   [P2] ONBOARDING / 첫 실행 온보딩 (포커스 선택)
   "무엇부터 시작할까요?" → 가계부 / 가족 습관(습관) / 가족 목표(목표)
   고른 포커스를 DB.focus에 저장하고 홈/목표탭 위계를 그 중심으로 우선 구성. 5탭 기능은 그대로 접근.
   첫 화면이 '단순 캘린더 앱'이 아니라 '가족 목표 앱'임을 보이게 — 목표를 전면에 둠.
   이미 온보딩 완료(DB.onboarded)면 다시 안 뜸. 더보기 > 설정에서 다시 볼 수 있음.
   ============================================================ */
function shouldOnboard(){ return !DB.onboarded; }
function openOnboarding(reentry){
  renderOnboarding(reentry);
  requestAnimationFrame(()=>document.getElementById('onbOverlay').classList.add('show'));
}
// [FEAT-1/UX-1] 포커스 선택 제거 → 목표 지향 웰컴 + 명확한 두 갈래('샘플 둘러보기' vs 확인 후 '빈 상태 시작'). '나중에 정할게요'의 무경고 데이터 삭제 버그 해소.
function renderOnboarding(reentry){
  document.getElementById('onbSheet').innerHTML = `
    <div class="onb-eyebrow">내가 그리는 우리 라이프 목표</div>
    <h2>기록이 모여<br>우리 목표가 됩니다</h2>
    <div class="onb-sub"><b>자동 연동 없이</b>, 내가 고른 것만 의도적으로 기록해요.<br>그 기록이 쌓여 <b>가족의 목표</b>로 자라요.</div>
    <div class="onb-note" style="margin:var(--sp-6) 0 var(--sp-5)">샘플 데이터로 먼저 둘러본 뒤,<br>언제든 '내 걸로 시작'할 수 있어요.</div>
    <button class="btn btn-primary btn-block" onclick="finishOnboarding(false)">샘플로 둘러볼게요</button>
    <button class="onb-skip" onclick="${reentry?'closeOnboarding()':'confirmFreshStart()'}">${reentry?'닫기':'빈 상태로 바로 시작하기'}</button>`;
}
// [UX-1] 파괴적 '빈 상태 시작'은 온보딩 안에서 명시적 확인 단계로 (오버레이 z-index 이슈 없이)
function confirmFreshStart(){
  document.getElementById('onbSheet').innerHTML = `
    <div class="onb-eyebrow" style="color:var(--danger)">빈 상태로 시작</div>
    <h2>정말 빈 상태로<br>시작할까요?</h2>
    <div class="onb-sub">샘플 기록·목표·습관·구성원이 <b>모두 지워지고</b> ‘나’ 1명으로 새로 시작해요. 되돌릴 수 없어요.</div>
    <div style="height:var(--sp-6)"></div>
    <button class="btn btn-danger btn-block" onclick="finishOnboarding(true)">빈 상태로 시작</button>
    <button class="onb-skip" onclick="renderOnboarding(false)">취소 · 다시 볼게요</button>`;
}
function finishOnboarding(fresh){
  DB.onboarded = true;
  if(fresh===true){
    DB.records = []; DB.visions = []; DB.routines = []; DB.eventOccDone = {}; DB.eventOccSkip = {};
    const me = { id: uid(), name:'나', color:'#0044FF' };
    DB.members = [me]; DB.currentMemberId = me.id; DB.lastMemberId = me.id; DB.deletedMembers = [];
    DB.categories = DEFAULT_CATEGORIES.map(c=>({...c}));
    DB.isSample = false;
    resetViewState();
  }
  saveDB(); closeOnboarding(); go('home');
  toast(fresh===true ? "빈 상태로 시작해요 · '나'부터 기록해보세요" : "샘플로 둘러봐요 · 언제든 '내 걸로 시작'할 수 있어요");
  if(!DB.coachDone) setTimeout(startCoach, 450);
}
// [P4] 스포트라이트 코치마크 투어 — 실제 요소를 밝게 비추며 '여기 눌러보세요' 안내
let coachIdx = 0;
// [P4] 각 스텝이 '설명하는 그 화면'을 실제로 띄움 — 목표·습관은 목표 탭, 기록은 가계부 탭, 필터는 캘린더 탭.
const COACH_STEPS = [
  { tab:'vision', el:()=>document.querySelector('#page-vision .row-add'), text:"여기가 <b>목표·습관</b> 화면이에요.<br>이루고 싶은 걸 <b>‘목표’</b>로 세우고,<br>매일 지킬 <b>‘습관’</b>도 여기서 만들어요." },
  { tab:'vision', el:()=>document.querySelector('#page-vision .vcard'), text:"목표에 <b>카테고리나 습관을 연결</b>하면,<br>기록할 때마다 이 <b>진행률이 저절로 채워져요</b>.<br><br><span style=\"color:var(--ink-3)\">예) ‘적금 모으기’에 저축·투자를 연결 →<br>넣을 때마다 자동 +</span>" },
  { tab:'ledger', el:()=>document.querySelector('.tab-fab'), text:"기록은 <b>가운데 ＋ 버튼</b>으로 해요.<br>지금 보이는 가계부처럼 어느 화면에서든<br>눌러 바로 기록해요.<br><br><span style=\"color:var(--ink-3)\">연결해둔 목표는 알아서 따라 올라가요.</span>" },
  { tab:'ledger', el:()=>document.querySelector('#page-ledger .plabel'), text:"<b>날짜(달)를 탭</b>하면<br>일 · 주 · 월로 기간을 골라 볼 수 있어요.<br><br><span style=\"color:var(--ink-3)\">가계부·캘린더 모두 같은 방식이에요.</span>" },
  { tab:'calendar', el:()=>document.getElementById('filterFab'), text:"<b>오른쪽 아래 버튼</b>으로 구성원을 고르면<br>모든 화면(홈·캘린더·가계부·목표)이<br>그 사람 시점으로 바뀌어요.<br><br><span style=\"color:var(--ink-3)\">‘전체’로 언제든 되돌릴 수 있어요.</span>" }
];
function startCoach(){
  coachIdx = 0;
  document.getElementById('coachOverlay').classList.add('show');
  requestAnimationFrame(()=>setTimeout(renderCoachStep, 60));   // 각 스텝이 알아서 해당 탭으로 이동
}
function renderCoachStep(){
  const step = COACH_STEPS[coachIdx];
  if(!step){ coachEnd(); return; }
  const draw = ()=>{
    const el = step.el();
    const hole = document.getElementById('coachHole');
    const tip = document.getElementById('coachTip');
    const last = coachIdx===COACH_STEPS.length-1;
    tip.innerHTML = `<div class="ct-step">${coachIdx+1} / ${COACH_STEPS.length}</div>
      <div class="ct-text">${step.text}</div>
      <div class="ct-row"><button class="ct-skip" onclick="coachEnd()">건너뛰기</button>
      <button class="ct-next" onclick="coachNext()">${last?'시작하기':'다음'}</button></div>`;
    if(el){
      const r = el.getBoundingClientRect(), pad = 8;
      hole.style.display='block';
      hole.style.top=(r.top-pad)+'px'; hole.style.left=(r.left-pad)+'px';
      hole.style.width=(r.width+pad*2)+'px'; hole.style.height=(r.height+pad*2)+'px';
      requestAnimationFrame(()=>{
        const th=tip.offsetHeight, tw=tip.offsetWidth, vw=window.innerWidth, vh=window.innerHeight;
        let top = r.bottom + 12; if(top+th > vh-12) top = r.top - th - 12; if(top<12) top=12;
        let left = r.left + r.width/2 - tw/2; left = Math.max(12, Math.min(left, vw-tw-12));
        tip.style.top=top+'px'; tip.style.left=left+'px';
      });
    } else {
      // [P4] 대상 요소가 없으면 스킵하지 말고 스포트라이트 없이 화면 중앙에 팁만 표시(스텝이 조용히 사라지는 것 방지)
      hole.style.display='none';
      requestAnimationFrame(()=>{
        const th=tip.offsetHeight, tw=tip.offsetWidth, vw=window.innerWidth, vh=window.innerHeight;
        tip.style.top=Math.max(12,(vh-th)/2)+'px'; tip.style.left=Math.max(12,(vw-tw)/2)+'px';
      });
    }
  };
  if(step.tab && curTab!==step.tab){ go(step.tab); requestAnimationFrame(()=>setTimeout(draw, 60)); }
  else draw();
}
function coachNext(){ coachIdx++; renderCoachStep(); }
function coachEnd(){ document.getElementById('coachOverlay').classList.remove('show'); DB.coachDone=true; saveDB(); }
function closeOnboarding(){ document.getElementById('onbOverlay').classList.remove('show'); }
// [FEAT-1] skipOnboarding·currentFocus·focusBannerHtml 제거 (시작 포커스 폐지)

/* ============================================================
   [P3] THEME / 테마 — 메인 강조색 스킨 (시즌팩/코스메틱 수익화 골격)
   색=구성원 원칙 유지: 바뀌는 건 '시스템 강조색(accent)'뿐. 무채색 위계는 그대로.
   ============================================================ */
const THEMES = [
  // [모두쓰] 순수 잉크 모노 — 종이 2종(백색/미색)만. 강조색=잉크(스킨·다크에 맞춰 applyTheme이 주입). 색 피커 폐기.
  { id:'light', name:'백색', accent:'#2b2b2e', accent2:'#1a1a1c', rgb:'43,43,46',  darkAccent:'#ececE8', darkAccent2:'#ffffff', darkRgb:'236,236,232' },
  { id:'paper', name:'미색', accent:'#3a2e22', accent2:'#241c15', rgb:'58,46,34',  darkAccent:'#ebe0ce', darkAccent2:'#ffffff', darkRgb:'235,224,206', skin:'pastel' }
];
function applyTheme(id){
  let t = THEMES.find(x=>x.id===id);
  if(!t) t = ['diary','pastel-green','pastel-violet','pastel-charcoal'].includes(id) ? THEMES[1] : THEMES[0];   // [모두쓰] 구버전 테마 id 마이그레이션(파스텔→미색, 그 외→백색)
  const dark = !!DB.dark, r = document.documentElement.style;
  r.setProperty('--accent',     dark ? t.darkAccent  : t.accent);
  r.setProperty('--accent-2',   dark ? t.darkAccent2 : t.accent2);
  r.setProperty('--accent-rgb', dark ? t.darkRgb     : t.rgb);   // --accent-soft는 이 RGB로 CSS 자동 계산
  document.documentElement.classList.toggle('skin-diary', t.skin==='pastel');   // 미색=따뜻한 종이 스킨(클래스 skin-diary)
  // 종이 톤은 CSS 클래스(skin-diary)가 담당 — 인라인 오버라이드 제거
  ['--bg','--card','--surface','--track','--fill-soft','--line','--line-2'].forEach(k=>r.removeProperty(k));
  document.body.style.background = '';
}
function openThemeSheet(){
  const cur = DB.theme || 'light';
  // [요청/에이전트] 미리보기 카드 — 각 테마를 그 색으로 칠한 미니 카드(색바+점+이름+미니 진행바). 편안군=크림 배경(종이 스킨 미리보기).
  const optHtml = t=>`
    <div class="theme-card ${cur===t.id?'on':''}${t.skin==='pastel'?' -paper':''}" style="--tc:${t.accent};--tcr:${t.rgb}" onclick="pickTheme('${t.id}')">
      <span class="tc-bar"></span>
      <span class="tc-row"><span class="tc-dot"></span><span class="tc-name">${t.name}</span><span class="tc-chk">${icon('check',13)}</span></span>
      <span class="tc-line"></span>
    </div>`;
  showSheet(`<h3>테마</h3>
    <div class="sheet-lead">종이를 골라요. 잉크·구성원 색·기록은 그대로예요.</div>
    <div class="theme-grid">${THEMES.map(optHtml).join('')}</div><div class="sheet-botpad"></div>`, {tinted:true});
}
function pickTheme(id){
  DB.theme = id; saveDB(); applyTheme(id);
  renderThemeSheetLive(); renderAll();
  toast(`${(THEMES.find(t=>t.id===id)||{}).name} 테마 적용`);
}
function toggleDark(){
  DB.dark = !DB.dark; saveDB();
  document.documentElement.classList.toggle('dark', !!DB.dark);
  applyTheme(DB.theme);   // [모두쓰] 다크 전환 시 강조색을 잉크(분필/크림)로 갱신
  renderAll(); toast(DB.dark?'다크 모드 켜짐':'라이트 모드');
}
function renderThemeSheetLive(){ if(document.getElementById('overlay')?.classList.contains('show')) openThemeSheet(); }

/* [P3] 전역 검색 — 기록·일정·목표·습관 제목 */
let searchQ='';
function openSearchSheet(){
  searchQ='';
  showSheet(`<h3>검색</h3>
    <div class="field"><input type="text" id="searchInput" aria-label="검색어" placeholder="제목·금액·카테고리·이름 검색" oninput="searchQ=this.value;renderSearchResults()"></div>
    <div id="searchResults">${searchResultsHtml()}</div>`);
  setTimeout(()=>{ const el=document.getElementById('searchInput'); if(el) el.focus(); }, 60);
}
function renderSearchResults(){ const el=document.getElementById('searchResults'); if(el) el.innerHTML=searchResultsHtml(); }
function searchResultsHtml(){
  const q=searchQ.trim().toLowerCase();
  if(!q) return `<div class="muted" style="padding:var(--sp-5) 0">제목·금액·카테고리·이름으로 찾아요</div>`;
  const res=[];
  const qDigits=q.replace(/[^0-9]/g,'');   // [P4] 금액 검색: 숫자만 뽑아 부분일치
  DB.visions.forEach(v=>{ if(String(v.title||'').toLowerCase().includes(q)) res.push({type:'vision',id:v.id,title:v.title,meta:'목표 '+(isCompleted(v)?'· 🏆달성':''),color:'var(--accent)',ic:'target'}); });
  DB.routines.forEach(r=>{ const m=memberById(r.memberId); if(String(r.title||'').toLowerCase().includes(q) || (m&&m.name.toLowerCase().includes(q))){ res.push({type:'routine',id:r.id,title:r.title,meta:'습관'+(m?' · '+m.name:''),color:m?m.color:'var(--ink-3)',ic:'arrows-clockwise'}); } });
  DB.records.forEach(r=>{
    const m=memberById(r.memberId); const cat=r.categoryId?categoryById(r.categoryId):null;
    const hay=[r.title, m&&m.name, cat&&cat.name].filter(Boolean).join(' ').toLowerCase();
    const amtHit = qDigits.length>=2 && r.kind==='expense' && String(r.amount||'').includes(qDigits);
    if(hay.includes(q) || amtHit){ const km=kindMeta(recordKindKey(r)); res.push({type:'record',id:r.id,title:r.title||(cat?cat.name:'기록'),meta:(km?km[0]:'')+' · '+fmtMonthDay(new Date(r.ts))+(m?' · '+m.name:'')+(cat?' · '+cat.name:''),color:m?m.color:'var(--ink-3)',ic:km?km[1]:'check'}); }
  });
  if(!res.length) return `<div class="muted" style="padding:var(--sp-5) 0">'${escapeHtml(searchQ)}' 결과가 없어요</div>`;
  return res.slice(0,40).map(r=>`<div class="search-res" onclick="pickSearch('${r.type}','${r.id}')">
    <span class="sr-ic" style="background:${escapeHtml(r.color)}">${icon(r.ic)}</span>
    <div class="sr-main"><div class="sr-t">${escapeHtml(r.title)}</div><div class="sr-m">${escapeHtml(r.meta)}</div></div>
  </div>`).join('');
}
function pickSearch(type,id){
  closeSheet();
  if(type==='vision') openVisionDetail(id);
  else if(type==='routine') openRoutineSheet(id);
  else openRecordSheet(id);
}

/* ============================================================
   INIT / 초기화
   ============================================================ */
function init(){
 try{
  DB = loadDB();
  if(!DB || !DB.members || !DB.visions || !DB.currentMemberId) seed();
  normalizeDB();   // [P4] 스키마 보정을 recomputeVisions보다 먼저 (records 없는 구버전 DB 부팅 백지 방지)
  recomputeVisions();
  applyTheme(DB.theme);   // [P3] 저장된 테마 적용
  document.documentElement.classList.toggle('dark', !!DB.dark);   // [P3] 다크 모드
  document.getElementById('hdrDate').textContent = NOW.getFullYear()+'년 '+fmtDateK(NOW);
  renderTabbar(); renderFilterFab(); renderAll();
  // [P2] 처음(또는 미설정)이면 온보딩 오버레이 노출
  if(shouldOnboard()) openOnboarding(false);
 }catch(e){
  // [P4] 부팅 중 예외 → 손상 데이터로 판단, 시드로 폴백(백지 방지)
  try{ localStorage.removeItem(KEY); }catch(_){}
  seed(); normalizeDB();
  try{ applyTheme(DB.theme); document.documentElement.classList.toggle('dark', !!DB.dark); document.getElementById('hdrDate').textContent = NOW.getFullYear()+'년 '+fmtDateK(NOW); renderTabbar(); renderAll(); }catch(_){}
 }
}
init();

// [P4] iOS 사파리 확대 차단 — meta의 user-scalable=no를 사파리가 무시하므로 제스처/더블탭 줌을 직접 막음.
(function(){
  document.addEventListener('gesturestart', function(e){ e.preventDefault(); }, {passive:false});
  document.addEventListener('gesturechange', function(e){ e.preventDefault(); }, {passive:false});
  let lastTouch=0;
  document.addEventListener('touchend', function(e){
    const now=e.timeStamp||0;
    if(now-lastTouch<=300){ e.preventDefault(); }   // 더블탭 줌 차단(단일 탭은 통과)
    lastTouch=now;
  }, {passive:false});
})();
</script>
