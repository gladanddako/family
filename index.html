  body.printing-report #reportCard{ position:absolute; left:0; top:0; width:100%; margin:0; box-shadow:none; border:none; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  body.printing-report .noprint{ display:none !important; }
}
/* [요청] 가계부 = 날짜마다 '안쪽으로 들인 둥근 흰 카드' + 묶음 사이 간격 + 옅은 그림자. (간격이 날짜를 나누므로 투톤 불필요 → 전부 화이트) 같은 날 안은 들인 구분선. */
.lg-flat{margin:0;}                                                  /* 화면 안쪽(페이지 패딩 안)으로 */
.lg-day-group{background:var(--surface);border-radius:var(--r-sm);overflow:hidden;margin-bottom:var(--sp-4);}   /* [요청] 그림자·테두리 없음 → 진해진 배경과 흰 카드 대비로 구분 */
.lg-day-group .srow{padding-left:var(--sp-5);padding-right:var(--sp-5);background:transparent;position:relative;border-bottom:none;}
.lg-day-group .srow:not(:last-child)::after{content:'';position:absolute;left:var(--sp-5);right:var(--sp-5);bottom:0;height:1px;background:color-mix(in srgb, var(--ink) 8%, transparent);}   /* [토큰] 14px→--sp-5(형제 규칙·행 패딩과 통일) */
.lg-day-head{display:flex;align-items:baseline;justify-content:space-between;gap:var(--gap-row);
  margin:0;padding:var(--sp-4) var(--sp-5) var(--sp-2);}
.lg-day-head .lg-day-date{font-size:var(--fs-base);font-weight:600;color:var(--ink-2);letter-spacing:-.2px;}
.lg-day-head .lg-day-sum{display:inline-flex;align-items:baseline;gap:var(--sp-3);flex-shrink:0;}
.lg-day-head .lg-day-exp{font-size:var(--fs-base);font-weight:600;color:var(--ink-3);letter-spacing:-.2px;}
.lg-day-head .lg-day-inc{font-size:var(--fs-base);font-weight:600;color:var(--income);letter-spacing:-.2px;}   /* [요청] 지출 합계와 크기·두께 통일 */
/* [요청/에이전트] 테마 = 미리보기 카드 그리드(2열). 각 카드를 그 테마색(--tc)으로 미리보기. 편안군(-paper)=크림 배경으로 종이 스킨까지 노출. 선택=테마색 테두리+체크. */
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-3);}
/* [요청] 감싸는 테두리 선 제거 → 그림자(입체감). 선택 = 테마색 그림자 글로우 + 체크(선 없이) */
.theme-card{position:relative;cursor:pointer;background:#ffffff;border:1px solid var(--line);border-radius:var(--r-sm);padding:var(--sp-4);box-sizing:border-box;transition:transform .12s,background .12s,border-color .12s;overflow:hidden;}   /* [요청] 그림자 제거 → 테두리로 정의 */
.theme-card.-paper{background:#f9f5eb;}   /* [모두쓰] 미색 미리보기 = 현재 미색 종이색 */
.theme-card:active{transform:scale(.97);}
.theme-card.on{background:color-mix(in srgb, var(--tc) 14%, #fff);}   /* [요청] 선택 = 옅은 테마색 채움만(테마색 테두리 제거 — 선택 표시는 채움+체크로 충분). 불투명이라 다크에서도 밝게 */
.theme-card .tc-bar{display:block;height:var(--bar-sm);background:transparent;margin-bottom:var(--sp-4);}   /* [요청] 색바 제거(투명), 그 자리 여백은 유지 */
.theme-card .tc-row{display:flex;align-items:center;gap:var(--sp-3);}
.theme-card .tc-dot{width:14px;height:14px;border-radius:50%;background:var(--tc);flex-shrink:0;}
.theme-card .tc-name{font-size:var(--fs-md);font-weight:600;color:#1c1d21;letter-spacing:-.2px;}   /* [버그] 카드 배경은 고정 흰/크림 → 글씨도 고정 다크(다크모드에서 --ink 반전돼 안 보이던 문제) */
.theme-card .tc-chk{margin-left:auto;width:20px;height:20px;border-radius:50%;background:var(--tc);color:#fff;display:none;align-items:center;justify-content:center;flex-shrink:0;}
.theme-card.on .tc-chk{display:inline-flex;}
.theme-card .tc-line{display:block;height:var(--bar-sm);width:58%;border-radius:var(--r-pill);background:var(--tc);opacity:.85;margin-top:var(--sp-3);}   /* [감사] 5→6(bar-sm) */
.sheet-botpad{height:var(--sp-7);flex-shrink:0;}   /* [요청] 시트 하단 여백 */
/* [P4] 도움말 FAQ 아코디언 — 질문 탭 → 답 부드럽게 펼침(max-height 트랜지션) */
.faq-item{border-bottom:1px solid var(--line);}
.faq-q{display:flex;align-items:center;justify-content:space-between;gap:var(--gap-row);width:100%;background:none;border:none;padding:var(--sp-5) var(--sp-1);font-family:inherit;font-size:var(--fs-md);font-weight:600;color:var(--ink);text-align:left;cursor:pointer;letter-spacing:-.2px;}
.faq-q:active{opacity:.6;}
.faq-chev{color:var(--ink-3);flex-shrink:0;display:inline-flex;transition:transform .55s cubic-bezier(.22,1,.36,1);}
.faq-chev svg{width:16px;height:16px;}
.faq-item.open .faq-chev{transform:rotate(180deg);}
/* [요청] max-height 대신 grid-template-rows(0fr→1fr) — 내용 실제 높이에 맞춰 스르륵(뚝딱거림 제거) */
.faq-a{display:grid;grid-template-rows:0fr;opacity:0;transition:grid-template-rows .6s cubic-bezier(.22,1,.36,1),opacity .45s ease;}
.faq-item.open .faq-a{grid-template-rows:1fr;opacity:1;}
.faq-a-inner{overflow:hidden;min-height:0;font-size:var(--fs-base);color:var(--ink-2);line-height:var(--lh-body);padding:0 var(--sp-1) var(--sp-5);}
.theme-grp{font-size:var(--fs-sm);font-weight:600;color:var(--ink-3);letter-spacing:.02em;margin:var(--sp-3) var(--sp-1) var(--sp-3);}
.theme-grp:not(:first-child){margin-top:var(--sp-5);}   /* [요청] 스크롤 없이 fit 위해 그룹 간격 축소(24→14) */
/* [P3] 프로 가격 표기 */
.pro-price{font-size:var(--fs-display);font-weight:700;letter-spacing:-.6px;color:var(--ink);margin:var(--sp-2) var(--sp-1) var(--sp-5);}   /* [감사] 28 → --fs-display(30) 흡수 */
.pro-price span{font-size:var(--fs-base);font-weight:500;color:var(--ink-3);margin-left:var(--sp-3);letter-spacing:0;}
/* [P3] 빈 상태 CTA */
.empty-cta{display:flex;flex-direction:column;align-items:center;gap:var(--sp-4);text-align:center;padding:18px 0 10px;color:var(--ink-3);font-size:var(--fs-base);}
/* [요청] 목표 상세 헤더 ⋯ 관리 버튼 */
/* [요청] 목표 관리 진입 = 회색 동그라미+점점점 대신 연필 아이콘만(배경 제거). 편집·삭제 메뉴로 진입. */
.vedit{position:static;flex-shrink:0;width:var(--sheet-ctrl);height:var(--sheet-ctrl);background:none;border:none;color:var(--ink-3);cursor:pointer;display:flex;align-items:center;justify-content:flex-end;padding:0;margin:0 var(--sp-3) 0 0;}   /* [요청] 연필을 더 오른쪽으로(글리프 우측정렬 + margin-right:-6) → X와 간격 축소 */   /* [요청] 헤더에서 X와 동일 크기 아이콘 박스 → X 옆에 나란히 */
.vedit svg{width:var(--sheet-x-svg,18px);height:var(--sheet-x-svg,18px);}
.vedit:active{transform:scale(.9);}
/* [회의] 우리가 걸어온 길 — 달성·미달 연대기 + 한 줄 소감 */
.jv-row{display:flex;gap:var(--gap-row);align-items:flex-start;padding:var(--sp-4) var(--sp-1);border-bottom:1px solid var(--line);cursor:pointer;}
.jv-row:last-child{border-bottom:none;}
.jv-row:active{opacity:.6;}
/* [요청] 걸어온 길 = 가계부 목록처럼 연도 박스: 박스 안 행 좌우 패딩·구분선을 가계부 srow와 통일 */
.lg-day-group .jv-row{position:relative;padding-left:var(--sp-5);padding-right:var(--sp-5);border-bottom:none;}
.lg-day-group .jv-row:not(:last-child)::after{content:'';position:absolute;left:var(--sp-5);right:var(--sp-5);bottom:0;height:1px;background:color-mix(in srgb, var(--ink) 8%, transparent);}
.jv-yr-sum{font-size:var(--fs-sm);color:var(--ink-3);font-weight:500;letter-spacing:-.2px;}
.jv-lead{width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:var(--fs-title);flex-shrink:0;}   /* [요청] 바탕 동그라미 제거 → 아이콘(🏆/⚑)만 */
.jv-lead.miss{opacity:.75;}
.jv-main{flex:1;min-width:0;}
.jv-top{display:flex;align-items:baseline;gap:var(--sp-3);justify-content:space-between;}
.jv-title{font-size:var(--fs-md);font-weight:500;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}   /* [요청] 목록 제목 통일(14) */
.jv-res{font-size:var(--fs-sm);font-weight:600;flex-shrink:0;}
.jv-res.done{color:var(--accent);}
.jv-res.miss{color:var(--ink-3);}
.jv-date{font-size:var(--fs-sm);color:var(--ink-3);margin-top:2px;}
.jv-note{font-size:var(--fs-sm);color:var(--ink-2);margin-top:var(--sp-2);line-height:var(--lh-body);}
/* [회의] 목표 상세 한 줄 회고 입력 (종료·달성 목표) */
.vd-retro{margin:var(--sp-5) 0 0;}
.vd-retro label{display:block;font-size:var(--fs-sm);font-weight:500;color:var(--ink-2);margin-bottom:var(--sp-2);}   /* [정리] 라벨 두께 통일 600→500(전 라벨 500 규칙) */
.vd-retro input{width:100%;box-sizing:border-box;border:none;background:var(--fill-soft);border-radius:var(--r-sm);padding:var(--sp-4);font-size:var(--fs-base);font-family:inherit;color:var(--ink);}
.vd-retro input:focus{outline:2px solid var(--accent);outline-offset:1px;}
/* [P3] 빠른기록 '옵션 더보기' 아코디언 — 반복·알림·목표연결을 접어둠 */
.qadv-toggle{display:flex;align-items:center;justify-content:center;gap:var(--sp-3);width:100%;cursor:pointer;
  background:none;border:none;font-family:inherit;font-size:var(--fs-base);font-weight:500;color:var(--ink-3);
  padding:var(--sp-4) 0;margin-top:var(--sp-1);user-select:none;}
.qadv-toggle svg{width:16px;height:16px;transition:transform .25s cubic-bezier(.2,.8,.2,1);}
.qadv-toggle.open svg{transform:rotate(180deg);}
.qadv-body{overflow:hidden;max-height:0;opacity:0;transition:max-height .3s cubic-bezier(.2,.8,.2,1),opacity .2s ease;}
.qadv-body.open{max-height:900px;opacity:1;}
/* toast */
.toast{position:absolute;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#15171c;color:#fff;padding:var(--sp-5) var(--sp-6);border-radius:var(--r-sm);font-size:var(--fs-base);font-weight:400;opacity:0;transition:.3s;z-index:90;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.25);white-space:nowrap;display:flex;align-items:center;gap:var(--sp-3);}   /* [통일] 여백 12/18→14/24, 아이콘 간격 6 */
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.has-act{pointer-events:auto;}
.toast .tundo{margin-left:var(--sp-5);color:#8fb4ff;font-weight:700;cursor:pointer;padding:var(--sp-1) var(--sp-3);}   /* [통일] 텍스트↔실행취소 12→14 */
/* [P4] 토스트 배경도 테마 결에 맞춤(종이=딥세피아, 다크=슬레이트) */
html.skin-diary .toast{background:#2c2720;}
html.dark .toast{background:#2a2e37;}
html.dark.skin-diary .toast{background:#221d16;}
/* ============================================================
   HOME 목표 프라이버시 (기본 가림 + 탭 공개)
   ============================================================ */
.vcard.locked .vlocked{display:flex;}
.vcard.locked .vrevealed{display:none;}
.vcard .vlocked{display:none;flex-direction:column;align-items:flex-start;gap:var(--sp-3);padding:var(--sp-3) 0 var(--sp-1);}
.vcard .vrevealed{display:block;}
.vlock-hint{font-size:var(--fs-sm);color:var(--ink-3);font-weight:400;display:flex;align-items:center;gap:var(--sp-3);line-height:var(--lh-body);}
.vlock-hint svg{width:14px;height:14px;}
.vlock-mask{width:62%;height:30px;border-radius:9px;background:linear-gradient(90deg,var(--line),var(--line-2));}
.vlock-mask.sm{width:42%;height:14px;}
.cat-mini{margin-top:var(--sp-4);padding-top:10px;border-top:1px solid var(--line);}
.cat-mini-row{display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-3) 0;}
.cat-mini-row .cname{font-size:var(--fs-base);font-weight:400;}
.cat-mini-row .cdel{font-size:var(--fs-sm);color:var(--danger);font-weight:500;cursor:pointer;}
.cat-mini-row .cedit{font-size:var(--fs-sm);color:var(--accent);font-weight:500;cursor:pointer;}
/* [회의] 기록 폼 카테고리 = 관리 링크 + 이름만 빠른추가 */
.cat-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:7px;}
.cat-head label{margin-bottom:0;}
.cat-head .cat-manage-link{margin:0;padding:0;}
.cat-manage-link{display:inline-flex;align-items:center;gap:var(--sp-2);background:none;border:none;color:var(--ink-3);font-family:inherit;font-size:var(--fs-sm);font-weight:500;padding:var(--sp-3) var(--sp-1) 0;cursor:pointer;}
.cat-manage-link svg{width:13px;height:13px;}
.cat-manage-link:active{opacity:.6;}
.cat-quickadd{display:flex;gap:var(--sp-3);width:100%;margin-top:var(--sp-3);align-items:center;}
.cat-quickadd input{flex:1;min-width:0;-webkit-appearance:none;appearance:none;border:none;border-bottom:1.5px solid var(--line-2);border-radius:0;padding:var(--sp-3) var(--sp-1);font-size:var(--fs-lg);font-family:inherit;background:transparent;color:var(--ink);}
.cat-quickadd input:focus{outline:none;border-bottom-color:var(--accent);}
.cat-quickadd .btn-sm{flex-shrink:0;}
/* [요청] 카테고리 = 동그라미(이모지) 위 · 이름 아래 타일 격자 */
/* [요청] 카테고리 = 2줄 고정 + 많으면 가로 스와이프(오른쪽으로 더 보기). 세로로 길어지지 않게. */
.cat-grid{display:grid;grid-auto-flow:column;grid-template-rows:repeat(2,auto);grid-auto-columns:44px;gap:13px var(--sp-2);margin:var(--sp-1) -20px 0;padding:var(--sp-1) 20px var(--sp-3);overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity;}   /* [요청] 7열 2행 — 타일 54→44·열간격 10→4로 줄여 한 화면 7열 */
.cat-grid.one-row{grid-template-rows:auto;grid-auto-flow:row;grid-template-columns:repeat(6,1fr);grid-auto-columns:auto;overflow-x:visible;}
.cat-grid::-webkit-scrollbar{display:none;}
.cat-tile{scroll-snap-align:start;}
.cat-tile{display:flex;flex-direction:column;align-items:center;gap:var(--sp-2);cursor:pointer;background:none;border:none;padding:0;min-width:0;}
.cat-tile:active{opacity:.6;}
.cat-tile .cat-ava{width:34px;height:34px;border-radius:50%;background:none;display:flex;align-items:center;justify-content:center;transition:.12s;flex-shrink:0;}   /* [모두쓰] 회색 동그라미 제거(플랫) — 아이콘 벽 피로감 완화. 선택 시에만 원 표시 */
.cat-tile .cat-ava .cat-ic-emoji{font-size:var(--fs-title);vertical-align:0;line-height:1;}   /* [모두쓰] 배경 원 제거하며 이모지 살짝 키움(14→17) */
.cat-tile .cat-ava .cat-ic-line{color:var(--ink-2);}
.cat-tile .cat-ava .cat-ic-line svg{width:17px;height:17px;}
.cat-tile .cat-tname{font-size:var(--fs-cap);color:var(--ink-2);font-weight:500;letter-spacing:-.2px;line-height:var(--lh-tight);text-align:center;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cat-tile.on .cat-ava{background:var(--accent-soft);box-shadow:0 0 0 2px var(--sel-ring);}   /* [요청] 캘린더 셀과 선택 링 통일 + 톤다운 */
.cat-tile.on .cat-tname{color:var(--accent);font-weight:600;}
.cat-ava-add{border:1.5px dashed var(--line-2);background:none !important;color:var(--ink-3);}
.cat-manage-link{margin-top:var(--sp-3);}
/* 관리 리스트 행 아이콘도 작은 동그라미(격자와 결 맞춤) */
.cat-ava-sm{width:28px;height:28px;border-radius:50%;background:var(--fill-soft);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.cat-ava-sm .cat-ic-emoji{font-size:var(--fs-sm);vertical-align:0;line-height:1;}   /* [요청] 동그라미 안 이모지 축소(14→12) */
.cat-ava-sm .cat-ic-line{color:var(--ink-2);}
.cat-ava-sm .cat-ic-line svg{width:15px;height:15px;}
/* ============================================================
   [6][7] 빠른 기록 그리드 (아이콘+라벨 타일)
   ============================================================ */
.qgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--sp-3);}   /* [요청] 타일 4개 → 4칸 균등 · 간격 토큰(8) */
/* [P4] 기록 추가 시트의 '반복 습관 만들기' — 일회성 기록 5종과 구분되게 그리드 아래 별도 행(구분선 위) */
.q-routine{display:flex;align-items:center;justify-content:center;gap:var(--sp-3);width:100%;margin-top:0;padding:var(--sp-6) var(--sp-4);
  border:none;border-top:1px solid var(--line);background:transparent;
  color:var(--ink-2);font-size:var(--fs-md);font-weight:600;font-family:inherit;cursor:pointer;letter-spacing:-.2px;}
.qgrid + .q-routine{margin-top:var(--sp-5);}   /* 그리드↔첫 구분선 간격 16. 버튼 사이 margin 0 → 글씨가 두 구분선 사이 정중앙(위·아래 padding 24 동일) */
.q-routine svg{width:16px;height:16px;color:inherit;stroke-width:2;}   /* [요청] 아이콘 색=글씨색(ink-2)으로 통일 */
.q-routine:active{opacity:.55;}
/* [회의] 가이드 기록 종류 타일 — 왼쪽 정렬(위 역할 행과 시작선 통일). 타일 고정폭. */
.qrow{display:flex;gap:var(--gap-row);flex-wrap:wrap;margin-top:var(--sp-1);}
.qrow .qtile{flex:0 0 auto;width:74px;}
/* [3] 깔끔하게: 회색 배경/테두리 제거, 아이콘 라운드(원형)로 통일·무채색, 라벨 크게 */
.qtile{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--sp-2);padding:var(--sp-3) var(--sp-2);border-radius:var(--r-sm);   /* [요청] 아이콘↔이름 간격 좁힘(9→5) */
  background:transparent;border:none;cursor:pointer;transition:.12s;}
.qtile:active{opacity:.55;}   /* [요청] 인터렉션 통일(반복습관 버튼과 동일한 opacity 피드백) */
/* [요청] 빠른기록 타일 아이콘 = 흰 원 걷어내고 평평한 아이콘(담백). 전 테마 공통. */
.qtile .qic{display:flex;align-items:center;justify-content:center;background:none;border:none;box-shadow:none;color:var(--ink-2);}   /* [요청] 아이콘·라벨·버튼 전부 같은 톤(ink-2)으로 통일 */
.qtile .qic svg{width:26px;height:26px;stroke-width:1.5;}   /* [요청] 종류 아이콘 두께 1.5 */
.qtile .qlb{font-size:var(--fs-base);font-weight:500;color:var(--ink-2);letter-spacing:-.2px;white-space:nowrap;}
/* [9] 종류 색 범례 */
.legend{display:flex;gap:var(--sp-4);flex-wrap:wrap;align-items:center;padding:var(--sp-1) var(--sp-2) 0;}
.legend .lg{display:inline-flex;align-items:center;gap:var(--sp-2);font-size:var(--fs-sm);font-weight:400;color:var(--ink-2);}
.legend .lg i{width:10px;height:10px;border-radius:3px;display:inline-block;}
/* [8] 카테고리 이모지 선택 그리드 */
.emoji-pick{display:grid;grid-template-columns:repeat(8,1fr);gap:var(--sp-2);}
/* [회의] 뚱뚱한 라운드 박스 제거 → 투명 이모지 그리드. 선택은 채움·테두리 대신 '밑줄'(텍스트 선택 은유). 탭영역(aspect-ratio 1)은 유지. */
.emoji-opt{position:relative;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;color:var(--ink-2);background:none;border:none;border-radius:0;}
.emoji-opt.on::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:20px;height:2px;background:var(--ink);border-radius:2px;}
.emoji-opt:active{opacity:.55;}
.emoji-opt svg{width:22px;height:22px;}
.emoji-opt img{width:23px;height:23px;}   /* [P3] 컬러 플랫 아이콘(Twemoji) */
.cat-ic{width:17px;height:17px;flex-shrink:0;vertical-align:-3px;}   /* (구) 카테고리 컬러 아이콘(img) */
.cat-ic-emoji{font-size:var(--fs-lg);line-height:1;flex-shrink:0;display:inline-block;vertical-align:-2px;}   /* [P4] 네이티브 이모지 카테고리 아이콘 */
.cat-ic-line{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--ink-2);}
.cat-ic-line svg{width:16px;height:16px;}
/* [5] 습관 허브 — 카드 내 통합: 제목행 / 지표·요일이 하나의 패널로 정렬 */
/* [G1] 카드 없이 열린 리스트에 맞춰 가로 패딩 제거(페이지 여백과 정렬), 행 구분선만 유지 */
.habit-wrap{padding:var(--sp-4) var(--sp-1);border-bottom:1px solid var(--line);}   /* [정리] 아래 13px(매직·비대칭) → sp-4(12)로 위아래 대칭 */
.habit-wrap:last-child{border-bottom:none;}
.habit-wrap .srow{border-bottom:none;padding-left:0;padding-right:0;min-height:auto;}
/* [P4] 습관 현황 간소화 — 큰 지표카드·주간그리드 대신 한 줄(이번주 미니 점 + 이번 달 %). 연속(🔥)은 행 트레일링에 이미 표시. */
.habit-panel{margin-top:var(--sp-3);display:flex;align-items:center;justify-content:space-between;gap:var(--sp-4);}
/* [요청] 주간 점(요일)을 항상 제목 텍스트 시작선에 정렬, '이번 주 %'는 오른쪽 끝으로. 시작선=srow 그리드 계산. */
.habit-panel .wkmini{margin-left:calc(30px + var(--col-role) + var(--col-time) + var(--sp-3) * 3);}   /* 역할 표시: 리드30+역할칸+시간칸+간격3(=제목 1fr 시작 140) */
.habit-wrap.hr-norole .wkmini{margin-left:calc(30px + var(--col-time) + var(--sp-3) * 3);}   /* 역할 생략: 리드30+시간칸+간격들+제목패딩(=110) */
.habit-panel .hm-rate{font-size:var(--fs-sm);color:var(--ink-3);font-weight:400;white-space:nowrap;}
.habit-panel .hm-rate b{color:var(--rc,var(--accent));font-weight:600;}
.wkmini{display:inline-flex;gap:var(--sp-2);}
.wkmini .wmd{width:13px;height:13px;border-radius:4px;background:var(--fill-soft);border:1px solid var(--line-2);box-sizing:border-box;}
.wkmini .wmd.on{background:var(--rc,var(--accent));border-color:var(--rc,var(--accent));}
.wkmini .wmd.partial{background:linear-gradient(90deg,var(--rc,var(--accent)) 50%,var(--track) 50%);border-color:var(--rc,var(--accent));}
.wkmini .wmd.today{box-shadow:0 0 0 2px var(--accent-soft);}
.wkmini .wmd.dim{opacity:.36;}
/* ============================================================
   [하이브리드 홈] 1)오늘 헤더+스트릭 2)주간 스트립 3)통합리스트+빠른입력 4)목표 요약
   ============================================================ */
/* 1) 오늘 헤더 + 대표 스트릭 */
/* [회의] 미니 상태바 — 큰 인사(👋) 제거, '월·요일' 작은 맥락 레이블(좌) + 스트릭(우). 날짜 숫자는 아래 주간 스트립과 중복이라 뺌. 첫 콘텐츠를 위로 끌어올림. */
.home-hero{display:flex;align-items:center;justify-content:space-between;gap:var(--sp-4);min-height:24px;margin:var(--sp-1) 0 var(--sp-4);}   /* [감사] 좌측 마진 0 → 18px 시작선 통일 */
/* [요청] 오늘의 습관 달성 요약 (주간 달력 아래 · 오늘 할 일 위) — 프로토타입6 .focus-hi 디자인 복원 */
.focus-hi{display:flex;align-items:center;gap:var(--sp-5);background:var(--surface);border:none;
  border-radius:var(--r-sm);padding:var(--sp-5) var(--sp-5);margin:var(--gap-section) var(--sp-1) var(--gap-section);cursor:pointer;transition:.12s;}   /* [요청] 박스 위·아래 = 섹션 간격 24(--gap-section). 아래는 다음 섹션 경계 */
.focus-hi:active{transform:scale(.99);}
.focus-hi .fh-col{display:flex;flex-direction:column;gap:var(--sp-1);}
.focus-hi .fh-v{font-size:var(--fs-title);font-weight:600;letter-spacing:-.4px;line-height:var(--lh-tight);color:var(--ink);}
.focus-hi .fh-l{font-size:var(--fs-cap);font-weight:500;color:var(--ink-3);}
.focus-hi .fh-bar{flex:1;height:var(--bar);border-radius:var(--r-pill);background:var(--track);overflow:hidden;}
.focus-hi .fh-bar span{display:block;height:100%;border-radius:var(--r-pill);background:var(--accent);}
.home-hero .hh-lbl{font-size:var(--fs-md);font-weight:500;color:var(--ink-2);letter-spacing:-.2px;}
.home-streak{display:inline-flex;align-items:center;gap:var(--sp-2);background:var(--accent-soft);border-radius:var(--r-pill);
  padding:var(--sp-2) var(--sp-4);flex-shrink:0;}   /* [요청] 통통함 완화: 세로패딩 8→4, 폰트 17→15 */
.home-streak .hs-fire{font-size:var(--fs-lg);line-height:1;}
.home-streak .hs-n{font-size:var(--fs-lg);font-weight:600;color:var(--accent);letter-spacing:-.3px;}
.home-streak .hs-l{font-size:var(--fs-cap);font-weight:400;color:var(--ink-2);}
/* 2) 주간 스트립 (미니 캘린더) — ◀ 7칸 ▶ */
/* [모두쓰] 홈 주간 스트립 = 화살표 없이 손가락 스와이프(가로 스크롤). 콘텐츠 폭 꽉 채움. 셀 디자인은 기존 유지. */
.ws-days{display:flex;gap:var(--sp-2);overflow-x:auto;overflow-y:hidden;
  padding:2px var(--sp-2) 6px;margin:var(--sp-1) calc(-1 * var(--gutter)) var(--sp-3);
  -webkit-overflow-scrolling:touch;scrollbar-width:none;overscroll-behavior-x:contain;}
.ws-days::-webkit-scrollbar{display:none;}
.ws-day{flex:0 0 auto;width:46px;display:flex;flex-direction:column;align-items:center;gap:var(--sp-1);
  padding:var(--sp-4) 1px var(--sp-3);border-radius:var(--r-cell);cursor:pointer;box-sizing:border-box;
  background:var(--surface);border:none;transition:background .12s,transform .12s;}
.ws-day:active{transform:scale(.95);}
.ws-day.today{background:var(--accent-soft);}
.ws-day.today .ws-dd{color:var(--accent);}
.ws-day.sel{outline:2px solid var(--sel-ring);outline-offset:-2px;}
.ws-day .ws-dn{font-size:var(--fs-cap);font-weight:500;color:var(--ink-3);line-height:1;}
.ws-day .ws-dd{font-size:var(--fs-lg);font-weight:500;line-height:1.1;}
/* 점(색=사람) 일정/지출 유무 */
.ws-dots{display:flex;gap:var(--sp-1);justify-content:center;align-items:center;min-height:7px;}
.ws-dots i{width:5px;height:5px;border-radius:50%;display:inline-block;flex-shrink:0;}
.ws-strip-cap{font-size:var(--fs-base);font-weight:500;color:var(--ink-2);text-align:center;margin:var(--sp-1) 0 var(--sp-4);letter-spacing:-.2px;}
/* 4) 목표 진행률 요약 (홈) — 컴팩트 진행 바 행 */
.vsum-row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:var(--gap-row);padding:var(--sp-4) var(--sp-1);cursor:pointer;}   /* [감사] 행 구분선 제거 → 여백으로 분리(밀도↓) */
.vsum-row:last-child{border-bottom:none;}
.vsum-row:active{opacity:.65;}
.vsum-row .vs-main{min-width:0;}
.vsum-row .vs-name{font-size:var(--fs-md);font-weight:500;letter-spacing:-.2px;line-height:var(--lh-normal);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.vsum-row .vs-bar{height:var(--bar-sm);border-radius:var(--r-pill);background:var(--track);overflow:hidden;margin-top:var(--sp-2);}   /* [감사] 높이 7→6(bar-sm), margin 7→4 토큰 */
.vsum-row .vs-bar > span{display:block;height:100%;border-radius:var(--r-pill);background:var(--accent);transition:width .5s ease;}
.vsum-row .vs-pct{font-size:var(--fs-md);font-weight:600;color:var(--ink-2);letter-spacing:-.3px;white-space:nowrap;flex-shrink:0;text-align:right;}   /* [감사] 파란 큰 % 반복 → 중립 회색으로 격하(진행바가 색 담당) */
.vsum-row .vs-delta{font-size:var(--fs-cap);font-weight:600;color:var(--ink-2);display:block;line-height:var(--lh-tight);margin-top:1px;}   /* [P4] 초록 테마에서 안 보이던 문제 → 강조색과 무관한 중립 차콜(ink-2)로 */
/* 백업/내보내기 (더보기) 행 */
.more-action{display:grid;grid-template-columns:auto 1fr auto;align-items:center;column-gap:var(--sp-4);padding:var(--sp-5) var(--sp-1);border-bottom:1px solid var(--line);cursor:pointer;}
.more-action:last-child{border-bottom:none;}
.more-action:active{opacity:.6;}
/* [회의] 더보기 메뉴 아이콘 배경 제거 — 행 구분선·텍스트·화살표가 이미 탭 신호. 라인 아이콘만(잉여 박스 제거) */
.more-action .ma-ic{width:30px;height:36px;display:flex;align-items:center;justify-content:flex-start;background:transparent;color:var(--ink-3);flex-shrink:0;}
.more-action .ma-ic svg{width:18px;height:18px;}
.more-action .ma-t{font-size:var(--fs-md);font-weight:500;letter-spacing:-.2px;}
.more-action .ma-d{font-size:var(--fs-sm);color:var(--ink-3);font-weight:400;line-height:var(--lh-body);margin-top:1px;}
.more-action .ma-go{color:var(--ink-3);flex-shrink:0;}
.more-action .ma-go svg{width:16px;height:16px;}
/* ============================================================
   [접근성] 포커스 가시성 · 모션 최소화 · 터치 히트영역
   ============================================================ */
/* 키보드/스위치 사용자에게만 포커스 링(마우스 클릭엔 안 뜸=focus-visible). 기존 outline:none 이후에 와서 이김. */
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:3px;}
.field input:focus-visible,.field select:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
/* [접근성] 작은 원형 컨트롤 터치 히트영역 44px 확보(시각 크기 유지, 투명 확장). 행 높이 안에서만 확장. */
.check-ctl{position:relative;}
.check-ctl::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;border-radius:50%;}
/* [접근성] 모션 최소화 선호 시 전환·애니메이션 사실상 제거(전정장애 배려). */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.001ms !important;scroll-behavior:auto !important;}
}
</style>

const CATEGORY_ICONS = ['🍚','🍽️','☕','🍰','🛒','🧺','🚌','🚗','⛽','💊','🏥','📚','✏️','🎮','🎬','🎵','👕','👟','🏠','💡','📱','💻','🎁','✈️','🏖️','💰','🏦','📈','💳','✨','🧾','🐶','🐱','⚽','💪','💇','🌸','🍺','🎂','🧸'];
function icon(name, size){
  const p = ICONS[name] || '';
  const sz = size ? `style="font-size:${size}px"` : '';
  return `<span class="ic-svg" ${sz}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${p}</svg></span>`;
}

/* ============================================================
   STORE / 데이터 영속 헬퍼 (localStorage)
   ============================================================ */
const KEY = 'vision-family-app-v21-p4';   // v21(prototype4): 습관 반복=요일 선택 모델(freq 'weekly'+days[] 배열). 구버전 perWeek→월·수·토 마이그레이션. → 재시드. // v20: 예산·저축 대상 카테고리 칩 다중선택(capCategoryIds/savingCategoryIds 배열).
const BACKUP_KEY = 'vision-family-app-autobak';   // [P4] 복원/초기화 직전 현재 DB 자동 스냅샷(롤백용)
let DB = null;

function loadDB(){
  try{ const raw = localStorage.getItem(KEY); if(raw) return JSON.parse(raw); }catch(e){}
  return null;
}
let saveWarned=false;   // [접근성/완성도] 저장 실패(용량 초과 등)를 조용히 삼키지 않고 1회 알림(연속 실패 스팸 방지, 성공 시 리셋)
function saveDB(){
  try{ localStorage.setItem(KEY, JSON.stringify(DB)); saveWarned=false; }
  catch(e){
    if(saveWarned) return;
    saveWarned=true;
    const quota = !!e && (e.name==='QuotaExceededError' || e.code===22 || e.code===1014);
    if(document.getElementById('toast')) toast(quota ? '저장 공간이 꽉 찼어요 — 더보기 > 내보내기로 백업한 뒤 정리해 주세요' : '저장에 실패했어요 — 앱을 다시 시작해 주세요');
  }
}
// [P4] 누락/손상 필드 보정 — 구버전 DB·import·복원 어디서든 동일 스키마 보장(크래시 방지)
function normalizeDB(){
  if(!DB || typeof DB!=='object') return;
  ['members','visions','records','routines','categories','deletedMembers','deletedCats','accounts','deletedAccounts'].forEach(k=>{ if(!Array.isArray(DB[k])) DB[k]=[]; });
  if(!DB.accounts.length) DB.accounts = DEFAULT_ACCOUNTS.map(a=>({...a}));   // [계좌] 기본 계좌 최초 1회
  if(DB.mainAccountId===undefined) DB.mainAccountId = (DB.accounts[0]&&DB.accounts[0].id)||null;   // [계좌] 주계좌(기록 기본선택=0탭)
  if(DB.startBalance!==undefined) delete DB.startBalance;   // [정리] 단일잔액(발생주의) 실험 폐기 → 계좌별 잔액으로 대체
  if(!DB.categories.length) DB.categories = DEFAULT_CATEGORIES.map(c=>({...c}));
  else DEFAULT_CATEGORIES.forEach(dc=>{ if(!DB.categories.some(c=>c.id===dc.id) && !DB.deletedCats.includes(dc.id)) DB.categories.push({...dc}); });   // 신규 기본 카테고리 병합(단, 사용자가 삭제한 기본 카테고리는 재병합 안 함)
  if(!DB.eventOccDone || typeof DB.eventOccDone!=='object') DB.eventOccDone={};
  if(!DB.eventOccSkip || typeof DB.eventOccSkip!=='object') DB.eventOccSkip={};
  if(DB.lastKind===undefined) DB.lastKind='expense';
  if(DB.lastFlow===undefined) DB.lastFlow='out';
  if(DB.lastCategory===undefined) DB.lastCategory='cat-food';
  if(DB.focus===undefined) DB.focus=null;
  if(DB.onboarded===undefined) DB.onboarded=false;
  if(DB.theme===undefined) DB.theme='blue';
  if(DB.isPro===undefined) DB.isPro=false;
  if(DB.dark===undefined) DB.dark=false;
  if(DB.coachDone===undefined) DB.coachDone=false;
  if(DB.isSample===undefined) DB.isSample=false;   // [P4] 둘러보기(샘플) 상태 여부 — 한도 초과 시 '빈 상태로 시작' 안내 분기용
  if(!DB.currentMemberId && DB.members[0]) DB.currentMemberId=DB.members[0].id;
  if(DB.lastMemberId===undefined) DB.lastMemberId=DB.currentMemberId;
  // [요청] 구성원 색 뮤트 실험 롤백 → 비비드 복원. 잠깐 뮤트로 저장된 데이터를 원래 vivid로 되돌림(1회, 플래그로 중복 방지).
  if(!DB._memColorRevert){
    DB._memColorRevert = true;
    const MUTED=['#5b77be','#4e9e73','#d5a24c','#ce6e80','#9578c4','#4fa3ad','#d98a6b','#6b7280'];
    const VIVID=['#0044FF','#16a866','#f5a623','#e0506a','#9b59f0','#16b5c4','#ff8a5b','#3a3f47'];
    const revertMem = m => { if(!m) return; const i = MUTED.indexOf(String(m.color||'').toLowerCase()); if(i>=0) m.color = VIVID[i]; };
    DB.members.forEach(revertMem);
    (DB.deletedMembers||[]).forEach(revertMem);
  }
  // [요청] 구성원 색 채도 -2단계 톤다운(1회). 기존 비비드 색을 desaturated로 매핑.
  if(!DB._memColorDesat){
    DB._memColorDesat = true;
    const V=['#0044ff','#16a866','#f5a623','#e0506a','#9b59f0','#16b5c4','#ff8a5b','#3a3f47'];
    const D=['#1344cb','#319a6a','#e1a94a','#c55d70','#9363d0','#36a8b3','#e79271','#3b3f45'];
    const desatMem = m => { if(!m) return; const i = V.indexOf(String(m.color||'').toLowerCase()); if(i>=0) m.color = D[i]; };
    DB.members.forEach(desatMem);
    (DB.deletedMembers||[]).forEach(desatMem);
  }
  // [요청] 구성원 색 더 뮤트(-45%). vivid·-28% 둘 다 → -45%로 수렴(1회).
  if(!DB._memColorMute){
    DB._memColorMute = true;
    const SRC=['#0044ff','#16a866','#f5a623','#e0506a','#9b59f0','#16b5c4','#ff8a5b','#3a3f47','#1344cb','#319a6a','#e1a94a','#c55d70','#9363d0','#36a8b3','#e79271','#3b3f45'];
    const DST=['#1f44ab','#41916d','#d6aa62','#b46573','#8e69bc','#49a0a9','#d8977e','#3c3f43','#1f44ab','#41916d','#d6aa62','#b46573','#8e69bc','#49a0a9','#d8977e','#3c3f43'];
    const muteMem = m => { if(!m) return; const i = SRC.indexOf(String(m.color||'').toLowerCase()); if(i>=0) m.color = DST[i]; };
    DB.members.forEach(muteMem);
    (DB.deletedMembers||[]).forEach(muteMem);
  }
  // [요청] 구성원 색 밝은 파스텔로(1회). vivid·-28%·-45% 모두 → 파스텔로 수렴.
  if(!DB._memColorPastel){
    DB._memColorPastel = true;

/* ============================================================
   DATE HELPERS / 날짜 헬퍼
   ============================================================ */
const NOW = new Date();
function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function parseYmd(s){ if(!s||typeof s!=='string'||s.indexOf('-')<0) return new Date(NOW); const [y,m,dd]=s.split('-').map(Number); const d=new Date(y,(m||1)-1,dd||1); return isNaN(d)?new Date(NOW):d; }   // [P4] 빈/이상값 방어(크래시 방지)
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function hm(d){ return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
const DOW = ['일','월','화','수','목','금','토'];
function fmtDateK(d){ return (d.getMonth()+1)+'월 '+d.getDate()+'일 ('+DOW[d.getDay()]+')'; }
function fmtMonthDay(d){ return (d.getMonth()+1)+'월 '+d.getDate()+'일'; }   // 목표 기여 기록용(날짜 표시)
function won(n){ const v=Number(n); return (Number.isFinite(v)?v:0).toLocaleString('ko-KR'); }   // [P4] NaN 방어("NaN원" 방지)
// [요청] 큰 금액 축약(히어로 숫자용): 24.5만 / 1.2억. 만 미만은 그대로.
function wonShort(n){ n=Math.round(Number(n)||0); const a=Math.abs(n); if(a>=100000000) return (n/100000000).toFixed(a%100000000?1:0).replace(/\.0$/,'')+'억'; if(a>=10000) return (n/10000).toFixed(a%10000?1:0).replace(/\.0$/,'')+'만'; return won(n); }
// [요청] 큰 숫자 표기에서 한글 단위(만·억·천)를 작게 — 목표 큰 숫자 등에서 '만'이 너무 커 보이는 문제
function wonShortSmall(n){ return String(wonShort(n)).replace(/([억만천])$/, '<small>$1</small>'); }
function todayStr(){ return ymd(NOW); }

/* ============================================================
   [1] REPEAT / 일정 반복 (event 전용 — 습관은 별개)
   event.repeat: 'none'|'daily'|'weekly'|'monthly'|'yearly'
   · weekly = 그 일정의 요일, monthly = 그 일정 날짜의 '일', yearly = 월·일.
   occurrence 완료는 (eventId|ymd) 키로 DB.eventOccDone에 저장 (습관 checks 패턴).
   ============================================================ */
const REPEAT_LABELS = { none:'안 함', daily:'매일', weekly:'매주', monthly:'매월', yearly:'매년' };
/* ============================================================
   [1] REMIND / 알림(리마인더) — event·routine 공용
   값: 'none' | '0'(정시) | '10'·'30'·'60'(분 전) | 'day_before'(전날 저녁)
   실제 발송은 네이티브 빌드 기능 → 여기선 설정·저장·표시(종 아이콘)까지만(데모).
   누락(구버전 기록)이면 'none'으로 간주(하위호환).
   ============================================================ */
const REMIND_LABELS = { none:'없음', '0':'정시', '10':'10분 전', '30':'30분 전', '60':'1시간 전', day_before:'하루 전(전날 저녁)' };
// 일정: 하루 전 옵션 포함 / 습관: 정시~1시간 전까지
const EVENT_REMIND_OPTS = ['none','0','10','30','60','day_before'];
const ROUTINE_REMIND_OPTS = ['none','0','10','30','60'];
function recRemind(r){ return (r && r.remind) ? r.remind : 'none'; }   // 누락 시 'none'
function hasRemind(r){ return recRemind(r)!=='none'; }
function eventRepeat(r){ return (r.kind==='event' && r.repeat) ? r.repeat : 'none'; }
function isRepeatEvent(r){ return r.kind==='event' && eventRepeat(r)!=='none'; }
// 반복 표시 라벨 (예: "매주 월", "매월 5일", "매년 3월 5일")
function repeatLabel(r){
  const rep = eventRepeat(r);
  if(rep==='none') return '';
  const d = new Date(r.ts);
  if(rep==='daily') return '매일';
  if(rep==='weekly') return '매주 '+DOW[d.getDay()];
  if(rep==='monthly') return '매월 '+d.getDate()+'일';
  if(rep==='yearly') return '매년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일';
  return '';
}
// 반복 일정이 특정 날짜(dstr)에 발생하는지. 시작일(원본 ts) 이후만.
function repeatOccursOn(r, dstr){
  if(eventRepeat(r)==='none') return false;
  const base = new Date(r.ts);
  const baseStr = ymd(base);
  if(dstr < baseStr) return false;   // 원본 일정 시작일 이전엔 미발생
  const d = parseYmd(dstr);
  const rep = eventRepeat(r);
  if(rep==='daily') return true;
  if(rep==='weekly') return d.getDay()===base.getDay();
  // [P4][QA] 말일 클램프 — 매월 31일은 짧은 달엔 말일에, 매년 2/29는 평년 2/28에 발생(통째로 사라지지 않게)
  if(rep==='monthly'){ const last=new Date(d.getFullYear(),d.getMonth()+1,0).getDate(); return d.getDate()===Math.min(base.getDate(),last); }
  if(rep==='yearly'){ if(d.getMonth()!==base.getMonth()) return false; const last=new Date(d.getFullYear(),d.getMonth()+1,0).getDate(); return d.getDate()===Math.min(base.getDate(),last); }
  return false;
}
// occurrence 완료 상태 (반복=occ맵 / 원본일=원본 done과 동기화. 단발=event.done)
function eventOccKey(id, dstr){ return id+'|'+dstr; }
function isEventDoneOn(r, dstr){
  if(!isRepeatEvent(r)) return !!r.done;
  // 원본 시작일 occurrence는 기존 r.done과 동일 취급(레거시 호환)
  if(dstr===ymd(new Date(r.ts))) return !!r.done;
  const map = DB.eventOccDone || {};
  return !!map[eventOccKey(r.id, dstr)];
}
function setEventOccDone(r, dstr){
  if(!isRepeatEvent(r) || dstr===ymd(new Date(r.ts))){
    r.done = !r.done;
    return r.done;
  }
  DB.eventOccDone = DB.eventOccDone || {};
  const k = eventOccKey(r.id, dstr);
  if(DB.eventOccDone[k]) delete DB.eventOccDone[k]; else DB.eventOccDone[k]=true;
  return !!DB.eventOccDone[k];
}
// 특정 날짜(dstr)에 표시할 '반복 occurrence' 가상 기록들 (원본일은 제외 — 원본은 실제 기록으로 이미 표시됨).
// 가상 occurrence는 원본을 복제하되 ts를 그 날짜로 옮기고 done을 그 날짜 완료상태로 세팅. _occDate로 occurrence 표식.
function repeatOccurrencesOnDay(dstr, pool){
  const src = pool || DB.records;
  const out = [];
  src.forEach(r=>{
    if(!isRepeatEvent(r)) return;
    if(dstr===ymd(new Date(r.ts))) return;          // 원본 발생일은 실제 기록으로 표시되므로 중복 제외
    if(!repeatOccursOn(r, dstr)) return;
    if((DB.eventOccSkip||{})[eventOccKey(r.id,dstr)]) return;   // [P3] 이 회차 건너뛰기(제외)
    const base = new Date(r.ts);
    const occDt = parseYmd(dstr); occDt.setHours(base.getHours(), base.getMinutes(), 0, 0);
    out.push(Object.assign({}, r, { ts:occDt.getTime(), done:isEventDoneOn(r, dstr), _occDate:dstr, _occOf:r.id }));
  });
  return out;
}
