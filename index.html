   VISION CALC / 비전 진행률 계산
   ============================================================ */
function recomputeVisions(){
  DB.visions.forEach(v=>{
    if(v.type!=='QUANT') return;
    if(v.targetValue==null && v.target!=null) v.targetValue = v.target;
    if(v.startValue==null) v.startValue = 0;
    // saving(저축형): 연결된 수입 기록을 누적 기여로 자동 합산 (지출은 차감)
    if(v.metric==='saving' || (v.metric==null && /모으기|저축/.test(v.title))){
      let sum = 0;
      DB.records.forEach(r=>{
        if(r.kind!=='expense') return;
        if(!recInVisionPeriod(v, r)) return;   // 비전 대상 기간 내 기록만 집계
        // [P4] 집계 대상(자동집계가 정식): savingCategoryId = '__allsave__'(전체 저축·투자) | 특정 저축 카테고리 | (하위호환) visionId 수동연결
        const linked = r.visionId===v.id;
        const sIds = saveCatIds(v);
        const catMatch = sIds.indexOf('__allsave__')>=0 ? isTransfer(r)
                        : (sIds.indexOf(r.categoryId)>=0 && !isExpenseOut(r));
        if(!linked && !catMatch) return;
        // 저축·투자(save)·수입(in)은 + 기여, 지출(out)만 차감
        sum += isExpenseOut(r) ? -(r.amount||0) : (r.amount||0);
      });
      v.metric = 'saving';
      // [회의] 투명 환산: 현재값 = 시작값(이미 모은 돈) + 연결 기여 순합. 임의 보정상수(*5,+21.5M) 제거.
      v.currentValue = Math.max(0, (v.startValue||0) + sum);
    }
    // [P4] cap(상한형·"○○ 이하"): 기간 내 지출 합을 자동 집계. 적을수록 좋음.
    //  집계 대상 = '__allout__'(전체 지출) | 지정 카테고리(capCategoryId) | (하위호환) visionId 연결 지출.
    else if(v.metric==='cap'){
      let sum = 0;
      DB.records.forEach(r=>{
        if(!isExpenseOut(r)) return;   // [P4] 예산 사용액은 지출(out)만 — 수입·저축(save) 제외
        const cIds = capCatIds(v);
        const matchCat = cIds.indexOf('__allout__')>=0 ? true : cIds.indexOf(r.categoryId)>=0;
        const matchVis = r.visionId===v.id;
        if(!matchCat && !matchVis) return;
        if(!recInVisionPeriod(v, r)) return;
        sum += (r.amount||0);
      });
      v.currentValue = sum;
    }
    // [P4] manual(체중 등): 연결된 체중 기록이 있으면 최신값으로 자동 반영(삭제해도 되돌아감). 없으면 사용자 입력값 유지.
    else if(v.metric==='manual'){
      const wr = DB.records.filter(r=>r.visionId===v.id && r.kind==='weight' && r.value!=null && recInVisionPeriod(v,r));
      if(wr.length){ wr.sort((a,b)=>a.ts-b.ts); v.currentValue = wr[wr.length-1].value; }
    }
  });
}
// [P4] cap 비전 = 예산 사용률(%). 100 초과 = 예산 초과. (일반 진행률과 의미 다름)
function capUsedPct(v){
  const t=(v.targetValue!=null)?v.targetValue:v.target;
  if(!t) return 0;
  return Math.round(((v.currentValue||0)/t)*100);
}
function isCapVision(v){ return v.type==='QUANT' && v.metric==='cap'; }
// [P4] cap/saving 대상 카테고리 = 다중선택 배열. 구버전(단일 capCategoryId/savingCategoryId)·빈 값 하위호환.
function capCatIds(v){ return (Array.isArray(v.capCategoryIds)&&v.capCategoryIds.length) ? v.capCategoryIds : (v.capCategoryId?[v.capCategoryId]:['__allout__']); }
function saveCatIds(v){ return (Array.isArray(v.savingCategoryIds)&&v.savingCategoryIds.length) ? v.savingCategoryIds : (v.savingCategoryId?[v.savingCategoryId]:['__allsave__']); }
function capCovers(v, catId){ const ids=capCatIds(v); return ids.indexOf('__allout__')>=0 || ids.indexOf(catId)>=0; }
function saveCovers(v, catId){ const ids=saveCatIds(v); return ids.indexOf('__allsave__')>=0 || ids.indexOf(catId)>=0; }
// 대상 라벨(칩 요약·상세용): '전체 지출' / '식비 + 여가 (2개)'
function catIdsLabel(ids, allWord, allSentinel){
  if(ids.indexOf(allSentinel)>=0) return allWord;
  const names=ids.map(id=>{ const c=categoryById(id); return c?c.name:null; }).filter(Boolean);
  if(!names.length) return allWord;
  return names.length<=2 ? names.join(' + ') : `${names.slice(0,2).join(' + ')} 외 ${names.length-2}`;
}
function visionPct(v){
  if(v.type!=='QUANT') return 0;
  const s = (v.startValue!=null) ? v.startValue : 0;
  const t = (v.targetValue!=null) ? v.targetValue : v.target;
  const c = (v.currentValue!=null) ? v.currentValue : 0;
  const denom = (t - s);
  if(denom===0) return 0;
  return Math.max(0, Math.min(100, Math.round(((c - s) / denom) * 100)));
}
function visionFidelity(v){
  const rts = DB.routines.filter(r=>r.visionId===v.id);
  if(!rts.length) return 0;
  let done=0, total=0;
  rts.forEach(r=>{
    for(let i=0;i<14;i++){
      const d = addDays(NOW,-i);
      if(r.freq==='daily'){ total++; if(routineComplete(r,ymd(d))) done++; }
      else { if([1,3,6].includes(d.getDay())){ total++; if(routineComplete(r,ymd(d))) done++; } }
    }
  });
  return total? Math.round(done/total*100):0;
}
function dday(v){
  return Math.ceil((parseYmd(v.dueDate) - parseYmd(ymd(NOW)))/(1000*60*60*24));
}

/* ============================================================
   VISION PERIOD / 비전 대상 기간 (연간=연도, 월간=연·월)
   year/month 미지정(구버전)이면 올해/이번달로 보정. 진행률·집계 기준.
   ============================================================ */
function visionYear(v){ return (v.year!=null)?v.year:NOW.getFullYear(); }
function visionMonth(v){ return (v.month!=null)?v.month:NOW.getMonth(); }
// 비전 대상 기간의 [from,to] 날짜 문자열 (집계 필터용)
function visionPeriodRange(v){
  const y = visionYear(v);
  if(v.period==='month'){
    const mo = visionMonth(v);
    return { from:ymd(new Date(y,mo,1)), to:ymd(new Date(y,mo+1,0)) };
  }
  return { from:ymd(new Date(y,0,1)), to:ymd(new Date(y,11,31)) };
}
// 비전 대상 기간 표시 라벨 (예: 2026년 / 2026년 6월)
function visionPeriodLabel(v){
  const y = visionYear(v);
  return v.period==='month' ? `${y}년 ${visionMonth(v)+1}월` : `${y}년`;
}
// 해당 비전 기간 안의 기록인지
function recInVisionPeriod(v, r){
  const rng = visionPeriodRange(v);
  const ds = ymd(new Date(r.ts));
  return ds>=rng.from && ds<=rng.to;
}
// [2] 현재 진행 중인 비전인지 (연간=올해, 월간=올해·이번달). 홈·비전탭은 현재 비전만 노출(과거 비전은 보고서에서만).
function isCurrentPeriodVision(v){
  if(v.period==='month') return visionYear(v)===NOW.getFullYear() && visionMonth(v)===NOW.getMonth();
  return visionYear(v)===NOW.getFullYear();
}
// [P3] 완료(달성) 비전 — completedAt 표시 시 보관함으로. 활성 = 현재기간 & 미완료.
function isCompleted(v){ return !!v.completedAt; }
function isActiveVision(v){ return isCurrentPeriodVision(v) && !isCompleted(v); }
// 비전 대상 기간 기준 D-day (기간 종료일까지 남은 일수)
function visionPeriodDday(v){
  const rng = visionPeriodRange(v);
  return Math.ceil((parseYmd(rng.to) - parseYmd(ymd(NOW)))/(1000*60*60*24));
}

/* ============================================================
   COMPONENT: memberPill / 구성원 컬러 라운드 pill (전 화면 공용)
   색 틴트 배경 + 색 점 + 이름. active=선택 상태(더 진한 틴트 + 굵은 테두리).
   opts: { size:'sm'|'md'|'lg', active:bool }
   ============================================================ */
function memberPill(member, opts){
  opts = opts || {};
  const size = opts.size || 'md';
  const active = !!opts.active;
  const c = member.color || 'var(--accent)';
  // [G3] 비선택/표시전용: 중립 회색 pill + 구성원 단색 점.
  //      선택(active): 구성원 색 틴트 배경 + 진한 텍스트(--mc/--mct 인라인 주입).
  const tintStyle = active ? `style="--mc:${escapeHtml(c)};--mct:${hexTint(c,0.16)}"` : '';
  return `<span class="mpill ${size} ${active?'active':''}" ${tintStyle}>
    <span class="mpdot" style="background:${escapeHtml(c)}"></span><span class="mpname">${escapeHtml(member.name)}</span>
  </span>`;
}
// [P4] 삭제된 구성원도 아카이브(deletedMembers)에서 조회 — 리포트·기록에 이름·색이 계속 보이도록. 활성 목록(DB.members)엔 없어 필터/홈/피커엔 안 뜸.
function memberById(id){ return DB.members.find(m=>m.id===id) || (DB.deletedMembers||[]).find(m=>m.id===id); }
function visionById(id){ return DB.visions.find(v=>v.id===id); }
function categoryById(id){ return (DB.categories||[]).find(c=>c.id===id); }
function visionTarget(v){ return (v.targetValue!=null)?v.targetValue:v.target; }
function currentMember(){ return memberById(DB.currentMemberId) || DB.members[0]; }

/* ============================================================
   COMPONENT: memberFilterPills / 공용 구성원 필터 (홈/기록/루틴 재사용)
   ============================================================ */
function memberFilterPills(selId, onPick, includeAll){
  let html = `<div class="mfilter">`;
  if(includeAll){
    // '전체'도 구성원 pill과 동일 형태·크기·정렬 (중립 회색 틴트, active 동일 표현)
    const on = selId==='all';
    html += `<span onclick="${onPick}('all')" style="flex-shrink:0"><span class="mpill md all ${on?'active':''}"><span class="mpdot"></span><span class="mpname">전체</span></span></span>`;
  }
  DB.members.forEach(m=>{
    html += `<span onclick="${onPick}('${m.id}')" style="flex-shrink:0">${memberPill(m,{size:'md',active:selId===m.id})}</span>`;
  });
  html += `</div>`;
  return html;
}

/* ============================================================
   COMPONENT: renderVisionCard / 비전 카드
   ============================================================ */
function visionContribDots(v){
  const set = new Set();
  DB.records.forEach(r=>{ if(r.visionId===v.id){ const m=memberById(r.memberId); if(m) set.add(m.color); } });
  if(!set.size) return '';
  return `<div class="contrib-dots">${[...set].map(c=>`<i style="background:${escapeHtml(c)}"></i>`).join('')}</div>`;
}
function visionMainHtml(v){
  // [P4] cap(상한형) = 예산 트래커: 사용률·남은/초과 예산·경고색
  if(isCapVision(v)){
    const used = capUsedPct(v);
    const cur = v.currentValue||0, tgt = visionTarget(v);
    const over = cur - tgt;
    const barColor = used>=100 ? 'var(--danger)' : (used>=80 ? '#d9a441' : 'var(--good)');
    const remainTxt = over>0 ? `<b style="color:var(--danger)">${won(over)}${escapeHtml(v.unit||'')} 초과</b>` : `남은 예산 ${won(tgt-cur)}${escapeHtml(v.unit||'')}`;
    return {
      big:`<div class="vbig"${used>=100?' style="color:var(--danger)"':''}>${used}<small>%</small></div>`,
      sub:`지출 ${won(cur)} / 예산 ${won(tgt)}${escapeHtml(v.unit||'')} · ${remainTxt}`,
      barPct:Math.min(100,used), barColor
    };
  }
  if(v.type==='QUANT'){
    const pct = visionPct(v);
    return {
      big:`<div class="vbig">${pct}<small>%</small></div>`,
      sub:`${won(v.currentValue)} / ${won(visionTarget(v))} ${escapeHtml(v.unit||'')}`,
      barPct:pct, barColor:'var(--accent)'
    };
  }else{
    const d = dday(v); const fid = visionFidelity(v);
    return {
      big:`<div class="vbig">${d>=0?'D-'+d:'D+'+(-d)}</div>`,
      sub:`목표일 ${escapeHtml(v.dueDate)} · 루틴 지킨 비율 ${fid}%`,
      barPct:fid, barColor:'var(--accent)'
    };
  }
}
const revealedVisions = new Set();
// [버그] 비전 상세 시트가 열려있는 동안의 비전 id. 기여 기록 수정 시트를 닫으면 이 상세로 복귀.
let visionDetailOpen = null;
function renderVisionCard(v, opts){
  opts = opts || {};
  const privacy = !!opts.privacy;
  const periodLabel = (v.period==='year'?'연간':'월간')+' '+visionPeriodLabel(v)+' · 가족 공유';
  const main = visionMainHtml(v);
  const revealed = revealedVisions.has(v.id);

  const revealedBody = `<div class="vrevealed">
      ${main.big}
      <div class="vmeta" style="margin:4px 0 10px;">${main.sub}</div>
      <div class="bar"><span style="width:${main.barPct}%;background:${main.barColor}"></span></div>
      ${visionContribDots(v)}
    </div>`;
  const lockedBody = `<div class="vlocked">
      <div class="vlock-mask"></div>
      <div class="vlock-hint">${icon('lock',14)} 탭하여 진행 보기</div>
    </div>`;

  if(privacy){
    return `<div class="vcard ${revealed?'':'locked'}" id="vcard-${v.id}" onclick="toggleVisionReveal('${v.id}')">
      <div class="vtop"><span class="pill">${v.type==='QUANT'?'숫자 목표':'기한 목표'}</span>
        <span class="more" style="font-size:11px" onclick="event.stopPropagation();openVisionDetail('${v.id}')">자세히</span></div>
      <div class="vname">${escapeHtml(v.title)}</div>
      <div class="vmeta">${periodLabel}</div>
      ${lockedBody}
      ${revealedBody}
    </div>`;
  }
  return `<div class="vcard" onclick="openVisionDetail('${v.id}')">
    <div class="vtop"><span class="pill">${v.type==='QUANT'?'숫자 목표':'기한 목표'}</span></div>
    <div class="vname">${escapeHtml(v.title)}</div>
    <div class="vmeta">${periodLabel}</div>
    ${main.big}
    <div class="vmeta" style="margin:4px 0 10px;">${main.sub}</div>
    <div class="bar"><span style="width:${main.barPct}%;background:${main.barColor}"></span></div>
    ${visionContribDots(v)}
  </div>`;
}
function toggleVisionReveal(id){
  if(revealedVisions.has(id)) revealedVisions.delete(id);
  else revealedVisions.add(id);
  // [B] 버그 수정: 전체 재렌더(renderHome) 시 .vscroll innerHTML이 새로 그려져
  // 캐러셀 scrollLeft가 0으로 리셋됨 → 누른 카드만 toggle (스크롤 위치 보존)
  const card = document.getElementById('vcard-'+id);
  if(card){
    card.classList.toggle('locked', !revealedVisions.has(id));
  } else {
    renderHome();
  }
}

/* ============================================================
   COMPONENT: ScheduleRow / 통일 행 (event / routine / record)
   color = 카테고리(소속), 완료상태는 채움+취소선+opacity로 표현
   ============================================================ */
/* [3] 종류(kind)는 무채색 — 색은 '구성원 원'에만, 종류는 아이콘 모양으로만 구분.
   기존 고유색(teal/orange/indigo/pink) 전면 제거 → 회색 계열로 통일.
   (행 LEAD 원의 색은 구성원 색으로 별도 적용되므로 영향 없음) */
const KIND_COLORS = {
  expense:'var(--ink-3)',
  workout:'var(--ink-3)',
  event:'var(--ink-3)',
  weight:'var(--ink-3)'
};
function kindColor(kind){ return KIND_COLORS[kind] || 'var(--accent)'; }
function kindMeta(k){
  // [라벨, 아이콘명, kind색]
  return ({
    expense_out:['지출','trend-down',KIND_COLORS.expense],
    expense_in:['수입','trend-up',KIND_COLORS.expense],
    expense_save:['저축·투자','bank',KIND_COLORS.expense],
    workout:['운동','barbell',KIND_COLORS.workout],
    event:['일정','calendar',KIND_COLORS.event],
    weight:['체중','scale',KIND_COLORS.weight]
  })[k];
}
function recordKindKey(r){
  if(r.kind==='expense') return isIncome(r)?'expense_in':(isTransfer(r)?'expense_save':'expense_out');
  return r.kind;
}

/* --- variant 'record' --- [A] LEAD=구성원색 타일+종류아이콘, 오른쪽=금액/체중값만 --- */
function scheduleRowRecord(r, opts){
  opts = opts || {};
  const m = memberById(r.memberId);
  const km = kindMeta(recordKindKey(r));
  // [A2] 색 = 구성원, 아이콘 = 종류. (기존 kind색/카테고리색 타일 → 구성원색)
  const tileColor = m ? m.color : 'var(--ink-3)';
  const d = new Date(r.ts);
  // [A6] 오른쪽: 금액(수입 +파랑/지출 -빨강) 또는 체중값만. 종류 배지 삭제.
  let amount = '';
  if(r.kind==='expense'){
    if(isTransfer(r)){   // [P4] 저축·투자 = 중립(초록), ↔ 기호
      amount = `<div class="samt save" style="color:var(--good)">↔${won(r.amount||0)}원</div>`;
    } else {
      const inc = isIncome(r);
      amount = `<div class="samt ${inc?'in':'out'}">${inc?'+':'-'}${won(r.amount||0)}원</div>`;
    }
  } else if(r.kind==='weight'){
    amount = `<div class="samt" style="color:var(--ink)">${r.value!=null?r.value:''}kg</div>`;
  }
  // [2] 1줄 컬럼 정렬: LEAD · 시간/날짜 · 역할(pill) · 제목 · trailing(금액/체중)
  // [비전 기여] contribDate=true면 시간 대신 날짜(예 6월 24일) 표시 (여러 날 기록이므로)
  const timeCol = opts.contribDate ? fmtMonthDay(d) : (opts.showTime ? hm(d) : '');
  // [버그수정] 비전 기여기록은 둘째 컬럼이 '날짜(6월 25일)'라 더 넓음 → 시간 트랙만 넓힘(--col-time).
  // 역할(--col-role)은 공용 고정값 유지 → 이 리스트 내 제목 1fr 시작선이 동일하게 정렬.
  const gridStyle = opts.contribDate ? `style="--col-time:62px"` : '';
  const altCls = opts.alt ? ' alt' : '';   // [요청] 가계부 zebra 줄무늬
  const tapAttr = opts.editable ? `class="srow record tap${altCls}" onclick="openRecordSheet('${r.id}')" ${gridStyle}` : `class="srow record${altCls}" ${gridStyle}`;
  return `<div ${tapAttr}>
    <div class="lead"><div class="lead-tile" style="background:${escapeHtml(tileColor)}">${icon(km[1])}</div></div>
    <div class="stime">${timeCol}</div>
    <div class="srole">${m?memberPill(m,{size:'sm'}):''}</div>
    <span class="stitle-text">${escapeHtml(r.title)}</span>
    <div class="trailing">${amount}</div>
  </div>`;
}

/* --- variant 'event' --- [A] LEAD=원형 완료체크(구성원색), 오른쪽 종류 배지 삭제 --- */
function scheduleRowEvent(r, opts){
  opts = opts || {};
  const m = memberById(r.memberId);
  const d = new Date(r.ts);
  // [A2] 체크 컨트롤 색 = 구성원 색
  const memColor = m ? m.color : 'var(--accent)';
  // [1] occurrence 맥락: _occDate가 있으면 그 날짜, 아니면 원본 ts 날짜. 완료상태는 occurrence별.
  const occDate = r._occDate || ymd(d);
  const realId = r._occOf || r.id;   // 원본 event id (수정 시트는 원본을 연다)
  const done = isRepeatEvent(r) ? isEventDoneOn(r, occDate) : !!r.done;
  // [버그수정] 비전 기여기록(날짜 컬럼)은 시간 트랙만 넓힘(--col-time). 역할 고정폭은 공용 유지.
  const gridStyle = opts.contribDate ? `style="--col-time:62px"` : '';
  const occArg = (isRepeatEvent(r) && r._occDate) ? `,null,null,null,'${occDate}'` : '';
  const tap = opts.editable ? `class="srow event tap ${done?'done':''}" onclick="openRecordSheet('${realId}'${occArg})" ${gridStyle}` : `class="srow event ${done?'done':''}" ${gridStyle}`;
  // [3] 비전 기여(contribDate) 맥락에서는 체크가 표시 전용(완료 상태로 고정 표시, 토글 불가)
  const checkInteractive = opts.editable !== false && !opts.contribDate;
  // [1] occurrence별 완료 토글: (원본 event id, 발생 날짜)로 처리
  const checkClick = checkInteractive ? `onclick="event.stopPropagation();toggleEventDoneOn('${realId}','${occDate}')"` : '';
  // [2] 1줄 컬럼 정렬: LEAD(체크) · 시간/날짜 · 역할(pill) · 제목 · trailing
  const timeCol = opts.contribDate ? fmtMonthDay(d) : hm(d);
  // [1] 반복 라벨/아이콘 (배지 배경 없이 무채색 텍스트 — 기존 주기 배지 스타일)
  const repLbl = repeatLabel(r);
  const repBadge = repLbl ? `<span class="kind-badge cycle">${icon('arrows-clockwise')} ${escapeHtml(repLbl)}</span>` : '';
  // [1] 알림 설정된 일정엔 작은 종 아이콘(무채색, 은은하게) — 원본 기록 기준
  const bell = hasRemind(r) ? `<span class="bell-ind" title="알림 ${escapeHtml(REMIND_LABELS[recRemind(r)]||'')}">${icon('bell')}</span>` : '';
  return `<div ${tap}>
    <div class="lead">${checkCircle(done, memColor, checkClick)}</div>
    <div class="stime">${timeCol}</div>
    <div class="srole">${m?memberPill(m,{size:'sm'}):''}</div>
    <span class="stitle-text">${escapeHtml(r.title)}${bell}</span>
    <div class="trailing">${repBadge}</div>
  </div>`;
}
// 원형 완료 체크 컨트롤 (이진: 일정·일반 루틴 공통). 완료=채움, 미완료=빈 원
function checkCircle(done, color, clickAttr){
  const c = color || 'var(--accent)';
  return `<div class="check-ctl ${done?'done':''}" style="--kc:${escapeHtml(c)}" ${clickAttr||''}>
    ${done ? `<span class="cc-fill">${icon('check')}</span>` : `<span class="cc-ring"></span>`}
  </div>`;
}
function toggleEventDone(id){ toggleEventDoneOn(id, null); }
// [1] occurrence별 완료 토글. dstr 없으면 원본 발생일로 간주.
function toggleEventDoneOn(id, dstr){
  const r = DB.records.find(x=>x.id===id); if(!r) return;
  const day = dstr || ymd(new Date(r.ts));
  const nowDone = setEventOccDone(r, day);
  saveDB();
  if(nowDone) toast('일정을 완료했어요');
  renderAll();
}

/* --- variant 'routine' --- LEAD=progress ring, TRAILING=반복+streak --- */
// 카운트형: checks[day]가 숫자, 단일형: true. 진행도 0~1
function routineProgress(r, dstr){
  const goal = r.count>1 ? r.count : 1;
  const raw = r.checks[dstr];
  const cur = raw===true ? goal : (typeof raw==='number' ? raw : 0);
  return { goal, cur, ratio: goal>0 ? Math.min(1, cur/goal) : 0 };
}
function routineComplete(r, dstr){
  const p = routineProgress(r, dstr);
  return p.cur >= p.goal && p.goal>0;
}
function routineStreak(r){
  let s=0;
  for(let i=0;i<90;i++){
    const d=addDays(NOW,-i);
    if(r.freq==='daily'){ if(routineComplete(r,ymd(d))) s++; else break; }
    else { if([1,3,6].includes(d.getDay())){ if(routineComplete(r,ymd(d))) s++; else break; } }
  }
  return s;
}
function ringSVG(ratio, full){
  const R=18, C=2*Math.PI*R, off=C*(1-ratio);
  const center = full
    ? `<rect class="rfill" x="3" y="3" width="38" height="38" rx="19"/>`
    : '';
  return `<svg viewBox="0 0 44 44">${center}<circle class="rbg" cx="22" cy="22" r="${R}"/><circle class="rfg" cx="22" cy="22" r="${R}" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/></svg>`;
}
function scheduleRowRoutine(r, opts){
  opts = opts || {};
  const interactive = !!opts.interactive;
  const today = opts.day || ymd(NOW);   // [P3] 백필: 선택일 기준 진행/완료/토글
  const p = routineProgress(r, today);
  const done = routineComplete(r, today);
  const m = memberById(r.memberId);
  const st = routineStreak(r);
  const freqLabel = r.freq==='daily'?'매일':`주 ${r.perWeek}회`;
  const isCount = r.count>1;
  // [A2][5] LEAD = 완료 체크(원형 체크/카운트 ring), 완료 시각요소 색=구성원 역할색
  const memColor = m ? m.color : 'var(--accent)';
  let lead;
  if(isCount){
    let center='';
    if(done) center = icon('check');
    else center = `${p.cur}/${p.goal}`;
    const ringCls = `ring ${done?'full':''} ${interactive?'':'disabled'}`;
    const ringClick = interactive ? `onclick="event.stopPropagation();tapRoutine('${r.id}','${today}')"` : '';
    // [5][6] --rc 주입: 링/카운트 '0/4' 글자가 구성원 역할색으로 렌더 (홈·루틴탭 공통)
    lead = `<div class="${ringCls}" style="--rc:${escapeHtml(memColor)}" ${ringClick}>${ringSVG(p.ratio, done)}<div class="rcenter">${center}</div></div>`;
  } else {
    const clk = interactive ? `onclick="event.stopPropagation();tapRoutine('${r.id}','${today}')"` : '';
    lead = checkCircle(done, memColor, clk) ;
    if(!interactive) lead = `<div style="opacity:.55">${lead}</div>`;
  }
  // [2] 1줄 컬럼 정렬: LEAD(링/체크) · 시간 · 역할(pill) · 제목 · trailing(주기 배지+streak)
  // [루틴탭] hideRole=true면 구성원 pill 생략(헤더가 이미 'OO님의 습관' → 중복 제거)
  const timeCol = r.time ? escapeHtml(r.time) : '';
  const roleCell = (!opts.hideRole && m) ? memberPill(m,{size:'sm'}) : '';
  // [1] 알림 설정된 루틴엔 작은 종 아이콘(무채색, 은은하게)
  const bell = hasRemind(r) ? `<span class="bell-ind" title="알림 ${escapeHtml(REMIND_LABELS[recRemind(r)]||'')}">${icon('bell')}</span>` : '';
  return `<div class="srow routine ${done?'done':''}" onclick="openRoutineSheet('${r.id}')">
    <div class="lead">${lead}</div>
    <div class="stime">${timeCol}</div>
    <div class="srole">${roleCell}</div>
    <span class="stitle-text">${escapeHtml(r.title)}${bell}</span>
    <div class="trailing">
      <span class="kind-badge cycle">${icon('arrows-clockwise')} ${freqLabel}</span>
      ${st>1?`<span class="streak-trail">${icon('fire')} ${st}일 연속</span>`:''}
    </div>
  </div>`;
}

/* ============================================================
   RECORD HELPERS / 기록·루틴 조회
   ============================================================ */
function recordsOnDay(dstr){
  return DB.records.filter(r=>ymd(new Date(r.ts))===dstr).sort((a,b)=>a.ts-b.ts);
}
function todayRecords(){ return recordsOnDay(ymd(NOW)); }
function routineDueToday(r){
  if(r.freq==='daily') return true;
  return [1,3,6].includes(NOW.getDay());
}
// [P3] 특정 날짜에 그 루틴이 예정인지 (과거 백필용). 주N회=월·수·토 데모 규칙.
function routineDueOnDay(r, dstr){
  if(r.freq==='daily') return true;
  return [1,3,6].includes(parseYmd(dstr).getDay());
}

/* ============================================================
   PAGE: HOME / 홈 (인사 + 비전 + 오늘의 일정[필터])
   ============================================================ */
// [단일 운영자] 홈 기본 필터 = 전원 통합('all'). '특정 구성원만 보기'는 필터로 유지.
let homeFilter = 'all';
// [하이브리드 홈] 주간 스트립이 보여줄 날짜(기본 오늘). ◀▶로 주 이동, 날짜 탭하면 그날의 통합 리스트로.
let homeSelDay = ymd(NOW);
// [P2] 홈 섹션 접힘 상태 (포커스가 아닌 부가 섹션은 기본 접힘 → 첫인상 경량화). 재렌더 시 유지.
const homeCollapse = {};
function toggleHomeSection(key){
  homeCollapse[key] = !homeCollapse[key];
  const title = document.getElementById('homeSecTitle-'+key);
  const body  = document.getElementById('homeSecBody-'+key);
  if(!title || !body) return;
  const on = homeCollapse[key];
  title.classList.toggle('collapsed', on);
  body.classList.toggle('collapsed', on);
}
// [P2] 홈 섹션 빌더 — collapsible=true면 접기 가능(부가 섹션). more=우측 액션 HTML.
function homeSection(key, capHtml, bodyHtml, opts){
  opts = opts || {};
  if(opts.collapsible){
    const collapsed = !!homeCollapse[key];
    return `<div class="sec-title collapsible ${collapsed?'collapsed':''}" id="homeSecTitle-${key}" onclick="toggleHomeSection('${key}')">
        <span class="sec-cap">${capHtml}</span><span class="sec-chev">${icon('chevron-down')}</span>
      </div>
      <div class="collapse-body ${collapsed?'collapsed':''}" id="homeSecBody-${key}">${bodyHtml}</div>`;
  }
  const more = opts.more ? opts.more : '';
  return `<div class="sec-title">${capHtml}${more}</div>${bodyHtml}`;
}
/* [하이브리드 홈] 대표 streak — 모든 루틴 중 가장 긴 연속(없으면 0). 🔥 표시용 */
function topStreak(){
  let best=0, bestR=null;
  DB.routines.forEach(r=>{ const s=routineStreak(r); if(s>best){ best=s; bestR=r; } });
  return { days:best, routine:bestR };
}
/* [하이브리드 홈] 그날(dstr)에 일정/지출이 있는 구성원 색들 (주간 스트립 점) */
function dayMemberColors(dstr){
  const set=new Set();
  recsForHomeDay(dstr).forEach(r=>{ const m=memberById(r.memberId); if(m) set.add(m.color); });
  return [...set];
}
// 홈 통합 리스트/스트립용 그날 기록 (필터 반영 + 반복 occurrence 포함)
function recsForHomeDay(dstr){
  const sel = homeFilter;
  let recs = DB.records.filter(r=>ymd(new Date(r.ts))===dstr);
  recs = recs.concat(repeatOccurrencesOnDay(dstr));
  if(sel!=='all') recs = recs.filter(r=>r.memberId===sel);
  return recs.sort((a,b)=>a.ts-b.ts);
}
function renderHome(){
  const focus = currentFocus();
  const tStr = ymd(NOW);
  const onToday = homeSelDay===tStr;

  // --- 1) 오늘 헤더 + 대표 스트릭 ---
  const ts = topStreak();
  const streakHtml = ts.days>0
    ? `<div class="home-streak"><span class="hs-fire">🔥</span><span class="hs-n">${ts.days}</span><span class="hs-l">일 연속</span></div>`
    : '';
  // [회의] 포커스 변경은 '더보기 > 시작 포커스'로 일원화 → 홈 배너 제거(자주 바꾸는 설정 아님, 홈 prime 자리 절약). 포커스는 여전히 홈 섹션 위계를 결정.
  // [P4] 둘러보기(샘플) 상태 상시 배너 — 항상 인지 + 한 번에 빠져나갈 출구
  const sampleBanner = DB.isSample
    ? `<div class="sample-bar" onclick="openSampleGate()"><span>🔍 샘플 데이터로 둘러보는 중</span><span class="sb-cta">내 걸로 시작 ${icon('chevron-right',13)}</span></div>`
    : '';
  let html = sampleBanner + `<div class="home-hero">
    <div class="hh-lbl">${NOW.getMonth()+1}월 · ${DOW[NOW.getDay()]}요일</div>
    ${streakHtml}
  </div>`;

  // --- 2) 주간 스트립 (미니 캘린더) ---
  html += weekStripHtml();

  // --- 3) 오늘(선택일) 통합 리스트 + 빠른입력 ---
  //  [#3b] 입력(빠른입력) → 구분선 → 보기(구성원 필터 + 타임라인) 순으로 영역을 분리해 촘촘함 완화.
  const dayLbl = dayTitle(homeSelDay);
  const todayBody = homeQuickAddHtml()
    + `<div class="home-list-div"></div>`
    + memberFilterPills(homeFilter, 'setHomeFilter', true)
    + `<div class="open-list">${renderTodayTimeline(homeSelDay)}</div>`;
  const todaySection = homeSection('today', `${escapeHtml(dayLbl)} 할 일 · 일정`, todayBody, {});

  // --- 4) 비전 진행률 요약 ---
  const homeVisions = DB.visions.filter(isActiveVision).slice(0,4);
  const visionBody = `<div class="open-list">${
    homeVisions.length
      ? homeVisions.map(v=>visionSummaryRow(v)).join('')
      : `<div class="empty-cta">아직 가족 비전이 없어요<button class="btn btn-primary btn-sm" onclick="openVisionSheet()">${icon('plus',15)} 첫 비전 세우기</button></div>`
  }</div>`;
  const visionMore = `<span class="more" onclick="go('vision')">전체</span>`;
  // 포커스가 비전이면 비전 요약을 통합 리스트보다 위로 노출 — 위계만 조정(섹션은 모두 존재)
  const visionSection = homeSection('vision', '우리 가족 비전', visionBody, { more:visionMore, collapsible: focus!=='vision' && focus!=null });

  // [#1] 포커스별 홈 위계: 고른 포커스의 핵심을 통합 리스트보다 '위로' 끌어올림.
  //  vision=비전 요약 / ledger=오늘 가계 요약 / routine=오늘 루틴 진행률. 포커스 없음(균형)=기존 순서.
  if(focus==='vision'){
    html += visionSection + todaySection;
  } else if(focus==='ledger'){
    html += homeFocusLedger(homeSelDay) + todaySection + visionSection;
  } else if(focus==='routine'){
    html += homeFocusRoutine(homeSelDay) + todaySection + visionSection;
  } else {
    html += todaySection + visionSection;
  }
  void onToday;
  document.getElementById('page-home').innerHTML = html;
}
function setHomeFilter(id){ homeFilter = id; renderAll(); }

// [하이브리드 홈] 주간 스트립 — ◀ 월~일 7칸 ▶, 오늘 강조, 날짜 점(색=사람), 탭하면 그날로
function homeWeekStart(){
  const d = parseYmd(homeSelDay);
  return addDays(d, -((d.getDay()+6)%7));   // 월요일 시작
}
function weekStripHtml(){
  const start = homeWeekStart();
  const tStr = ymd(NOW);
  let cells='';
  for(let i=0;i<7;i++){
    const d=addDays(start,i); const ds=ymd(d);
    const dots = dayMemberColors(ds).slice(0,4).map(c=>`<i style="background:${escapeHtml(c)}"></i>`).join('');
    cells += `<div class="ws-day ${ds===tStr?'today':''} ${ds===homeSelDay?'sel':''}" onclick="pickHomeDay('${ds}')">
      <span class="ws-dn">${DOW[d.getDay()]}</span><span class="ws-dd">${d.getDate()}</span>
      <span class="ws-dots">${dots}</span></div>`;
  }
  const e=addDays(start,6);
  const cap = `${start.getMonth()+1}/${start.getDate()} ~ ${e.getMonth()+1}/${e.getDate()}`;
  return `<div class="ws-strip-cap">${cap}</div>
    <div class="wkstrip">
      <button class="ws-nav" onclick="shiftHomeWeek(-1)" aria-label="이전 주">${icon('chevron-left')}</button>
      <div class="ws-days">${cells}</div>
      <button class="ws-nav" onclick="shiftHomeWeek(1)" aria-label="다음 주">${icon('chevron-right')}</button>
    </div>`;
}
function pickHomeDay(ds){ homeSelDay=ds; renderHome(); }
function shiftHomeWeek(dir){ homeSelDay = ymd(addDays(parseYmd(homeSelDay), dir*7)); renderHome(); }

// [하이브리드 홈] 빠른입력 타일 — 지출·수입·운동·일정·체중·루틴 동등

// [#1] 가계부 포커스 — 그날 수입/지출 요약을 홈 상단 하이라이트로 (탭하면 가계부 탭)
function homeFocusLedger(dstr){
  const recs = recsForHomeDay(dstr).filter(r=>r.kind==='expense');
  const inc = sumIncome(recs), exp = sumExpense(recs);
  // [P4] 빈 날엔 +0/−0 대신 안내+CTA (공허한 0 제거)
  const body = (inc===0 && exp===0)
    ? `<div class="focus-empty" onclick="openGuidedRecord('ledger')">이 날 가계 기록이 없어요 <span class="fe-cta">${icon('plus',13)} 기록 추가</span></div>`
    : `<div class="focus-hi" onclick="go('ledger')">
    <div class="fh-col"><div class="fh-v" style="color:var(--income)">+${won(inc)}</div><div class="fh-l">수입(원)</div></div>
    <div class="fh-col"><div class="fh-v" style="color:var(--danger)">-${won(exp)}</div><div class="fh-l">지출(원)</div></div>
    <div class="fh-go">가계부 ${icon('chevron-right',15)}</div>
  </div>`;
  return `<div class="sec-title">${escapeHtml(dayTitle(dstr))} 가계 요약<span class="more" onclick="go('ledger')">전체</span></div>${body}`;
}
// [#1] 가족 습관 포커스 — 오늘 루틴 진행률을 홈 상단 하이라이트로 (탭하면 비전 탭의 습관 현황)
function homeFocusRoutine(dstr){
  let routines = DB.routines.filter(routineDueToday);
  if(homeFilter!=='all') routines = routines.filter(r=>r.memberId===homeFilter);
  const total = routines.length;
  const done = routines.filter(r=>routineComplete(r,ymd(NOW))).length;
  const pct = total ? Math.round(done/total*100) : 0;
  const body = `<div class="focus-hi" onclick="go('vision')">
    <div class="fh-col"><div class="fh-v">${done}/${total}</div><div class="fh-l">오늘 루틴 완료</div></div>
    <div class="fh-bar"><span style="width:${pct}%"></span></div>
    <div class="fh-go">습관 ${icon('chevron-right',15)}</div>
  </div>`;
  return `<div class="sec-title">오늘의 루틴<span class="more" onclick="go('vision')">전체</span></div>${body}`;
}

// [하이브리드 홈] 비전 진행률 요약 행 (이번주 +N% 표기) — 탭하면 비전 상세
function visionSummaryRow(v){
  const cap=isCapVision(v);
  const used=cap?capUsedPct(v):0;
  const barPct = cap ? Math.min(100,used) : (v.type==='QUANT'?visionPct(v):visionFidelity(v));
  const delta = cap ? 0 : weeklyVisionDelta(v);
  const over = cap && used>=100;
  const deltaHtml = over ? `<span class="vs-delta" style="color:var(--danger)">예산 초과</span>`
                    : (delta>0 ? `<span class="vs-delta">이번 주 +${delta}%</span>` : '');
  const barColor = cap ? (over?'var(--danger)':(used>=80?'#d9a441':'var(--good)')) : 'var(--accent)';
  return `<div class="vsum-row" onclick="openVisionDetail('${v.id}')">
    <div class="vs-main">
      <div class="vs-name">${escapeHtml(v.title)}</div>
      <div class="vs-bar"><span style="width:${barPct}%;background:${barColor}"></span></div>
    </div>
    <div><div class="vs-pct"${over?' style="color:var(--danger)"':''}>${cap?used:barPct}%</div>${deltaHtml}</div>
  </div>`;
}
// 이번주 비전 진행 증가분(근사) — 연결 기록/루틴 완료 기반 데모 수치
function weeklyVisionDelta(v){
  const weekStart = ymd(addDays(NOW, -((NOW.getDay()+6)%7)));
  if(v.type==='QUANT'){
    // 이번주에 연결된 기록 금액/값 변화 → 목표 대비 % 근사
    const t = visionTarget(v) || 0;
    if(!t) return 0;
    let moved=0;
    DB.records.forEach(r=>{
      if(r.visionId!==v.id || r.kind!=='expense') return;
      if(ymd(new Date(r.ts))<weekStart) return;
      moved += isIncome(r)?(r.amount||0):0;
    });
    return Math.min(100, Math.round(moved/t*100));   // [회의] 임의 *5 보정 제거 — 실제 기여 기준
  }
  // QUAL: 이번주 연결 루틴 완료 횟수 → 충실도 증가 근사
  let done=0;
  DB.routines.filter(r=>r.visionId===v.id).forEach(r=>{
    for(let i=0;i<7;i++){ const d=addDays(NOW,-i); if(ymd(d)>=weekStart && routineComplete(r,ymd(d))) done++; }
  });
  return Math.min(20, done*2);
}

// 선택일 통합 (일정기록 event + 그날 루틴) 시간순, 무시간/종일은 상단존.
// [하이브리드 홈] dstr 인자로 임의 날짜 지원(주간 스트립 날짜 탭). 구성원 필터는 homeFilter.
function renderTodayTimeline(dstr){
  const tStr = dstr || ymd(NOW);
  const sel = homeFilter;
  const isAll = sel==='all';
  let events = DB.records.filter(r=>r.kind==='event' && ymd(new Date(r.ts))===tStr);
  // [1] 그날이 반복 규칙에 맞는 반복 일정 occurrence도 표시 (원본 발생일은 위에 이미 포함 → 제외됨)
  events = events.concat(repeatOccurrencesOnDay(tStr));
  if(!isAll) events = events.filter(r=>r.memberId===sel);
  // [P3] 루틴은 오늘·과거 날짜까지 표시·체크 가능(백필). 미래일엔 일정만.
  let routines = (tStr<=ymd(NOW)) ? DB.routines.filter(r=>routineDueOnDay(r,tStr)) : [];
  if(!isAll) routines = routines.filter(r=>r.memberId===sel);

  const items = [];
  events.forEach(r=>{
    const d=new Date(r.ts);
    items.push({ min:d.getHours()*60+d.getMinutes(), type:'event', rec:r });
  });
  routines.forEach(r=>{
    const hasTime = !!r.time;
    const t=(r.time||'00:00').split(':'); const min=(+t[0])*60+(+t[1]);
    items.push({ min:hasTime?min:-1, type:'routine', rt:r });
  });
  items.sort((a,b)=>a.min-b.min);  // 무시간(-1) 상단존
  if(!items.length) return `<div class="muted">${tStr===ymd(NOW)?'오늘 일정이 없어요':'이 날 일정이 없어요'}</div>`;

  // [3] 홈에서도 카운트형 포함 모든 루틴을 탭으로 진행/완료 가능 (전체 보기 포함)
  return items.map(it=>{
    if(it.type==='event') return scheduleRowEvent(it.rec, {editable:true});
    return scheduleRowRoutine(it.rt, {interactive:true, day:tStr});
  }).join('');
}

function openVisionDetail(id){

// [E] stat 값(.sv)이 칸 폭을 넘으면 transform:scale로 한 줄에 다 들어오게 축소 (말줄임 없이 전체 노출)
function fitStatValues(){
  const svs = document.querySelectorAll('.stat .sv');
  svs.forEach(sv=>{
    sv.style.transform='';
    const cell = sv.parentElement;
    const avail = cell.clientWidth - 12;   // 좌우 여유
    const w = sv.scrollWidth;
    // 숨겨진 페이지(clientWidth 0)에서는 측정 불가 → 스킵. 보이는 record 탭 진입 시 정확히 맞춤
    if(avail > 0 && w > avail && w > 0){
      const s = Math.max(0.62, avail / w);
      sv.style.transform = `scale(${s})`;
    }
  });
}
function setRecordMode(m){ recordMode=m; renderRecord(); }

function isLedgerAtNow(){

}
function shiftLedgerPeriod(dir){
  if(ledgerView==='today') ledgerDay=ymd(addDays(parseYmd(ledgerDay), dir));
  else if(ledgerView==='week') ledgerWeekStart=ymd(addDays(parseYmd(ledgerWeekStart), dir*7));
  else { let m=ledgerMonth.m+dir, y=ledgerMonth.y; if(m<0){m=11;y--;} if(m>11){m=0;y++;} ledgerMonth={y,m}; }

function ledgerRange(){

  if(ledgerView==='week'){ const s=parseYmd(ledgerWeekStart); const e=addDays(s,6); const isThis=ledgerWeekStart===ymd(addDays(NOW,-((NOW.getDay()+6)%7))); const lab=`${s.getMonth()+1}/${s.getDate()} ~ ${e.getMonth()+1}/${e.getDate()}`; return { from:ymd(s), to:ymd(e), label:isThis?`이번 주 (${lab})`:lab, pickLabel:`${lab} 주간` }; }

//  여러 날(이번 달/최근 7일) 내역에서 며칠 건지 한눈에 구분되게 함.
function ledgerListHtml(recs){
  if(!recs.length) return `<div class="open-list"><div class="muted">기록이 없어요</div></div>`;
  // recs는 ts 내림차순(최신 먼저) → 날짜 그룹도 최신일 먼저
  const groups = [], map = {};
  recs.forEach(r=>{
    const ds = ymd(new Date(r.ts));
    if(!map[ds]){ map[ds] = { ds, items:[] }; groups.push(map[ds]); }
    map[ds].items.push(r);
  });
  // [요청] 같은 날짜 = 한 색으로 묶음(그 안 내역은 선으로 구분). 날짜가 바뀌면 2톤(기본↔연한) 번갈아. 화면 끝까지.
  let html='';
  groups.forEach((g, gi)=>{
    const inc = sumIncome(g.items), exp = sumExpense(g.items);
    // [요청] 날짜 옆 합계는 숫자 하나만 — 지출이 있으면 지출, 지출 없는 날(급여 등)은 수입.
    const sumHtml = exp>0 ? `<span class="lg-day-exp">−${won(exp)}원</span>` : (inc>0 ? `<span class="lg-day-inc">+${won(inc)}원</span>` : '');
    const rows = g.items.map(r=>renderRecordRow(r,{showTime:true,editable:true})).join('');
    html += `<div class="lg-day-group ${gi%2===0?'g0':'g1'}">
      <div class="lg-day-head"><span class="lg-day-date">${escapeHtml(ledgerDayLabel(g.ds))}</span><span class="lg-day-sum">${sumHtml}</span></div>
      ${rows}</div>`;
  });
  return `<div class="lg-flat">${html}</div>`;
}

function ledgerDayLabel(ds){
  const d = parseYmd(ds);
  const base = fmtDateK(d);   // 이미 "6월 28일 (토)" 형태 — 요일 포함
  if(ds===ymd(NOW)) return `오늘 · ${base}`;
  if(ds===ymd(addDays(NOW,-1))) return `어제 · ${base}`;
  return base;
}

function setRecordView(v){
  recordView=v;
  recDay = ymd(NOW);
  recWeekStart = ymd(addDays(NOW, -((NOW.getDay()+6)%7)));
  recMonth = { y:NOW.getFullYear(), m:NOW.getMonth() };

}
// 현재 선택된 기록 기간이 '지금' 기준인지 (세그 활성 표시용)
function isRecordAtNow(){
  if(recordView==='today') return recDay===ymd(NOW);
  if(recordView==='week') return recWeekStart===ymd(addDays(NOW, -((NOW.getDay()+6)%7)));
  return recMonth.y===NOW.getFullYear() && recMonth.m===NOW.getMonth();
}
// [기간 탐색] 이전/다음 기간 이동 (단위별)
function shiftRecPeriod(dir){
  if(recordView==='today'){
    recDay = ymd(addDays(parseYmd(recDay), dir));
    selDay = recDay;
  } else if(recordView==='week'){
    recWeekStart = ymd(addDays(parseYmd(recWeekStart), dir*7));
    selDay = recWeekStart;   // 주 이동 시 선택일을 그 주 시작일로
  } else {
    let m=recMonth.m+dir, y=recMonth.y;
    if(m<0){ m=11; y--; } if(m>11){ m=0; y++; }
    recMonth={ y, m };
    selDay = ymd(new Date(y, m, 1));   // 월 이동 시 선택일을 그 달 1일로
  }
  renderRecord();
}

// [기간 탐색] 현재 단위·기준점의 라벨/범위 (네비게이터 라벨 + 동적 제목용)
//  label: 화면 제목용 (오늘/어제/날짜 · 주 범위 · 선택 월) · pickLabel: 네비게이터 라벨
function recordRange(){
  if(recordView==='today'){
    const d=parseYmd(recDay);
    const todayS=ymd(NOW), yestS=ymd(addDays(NOW,-1));
    let lab;
    if(recDay===todayS) lab='오늘';
    else if(recDay===yestS) lab='어제';
    else lab=fmtDateK(d);
    return { label:lab, pickLabel:`${d.getFullYear()}년 ${fmtDateK(d)}` };
  }
  if(recordView==='week'){
    const s=parseYmd(recWeekStart); const e=addDays(s,6);
    const isThis = recWeekStart===ymd(addDays(NOW, -((NOW.getDay()+6)%7)));
    const rangeLab=`${s.getMonth()+1}/${s.getDate()} ~ ${e.getMonth()+1}/${e.getDate()}`;
    return { label: isThis ? `이번 주 (${rangeLab})` : rangeLab, pickLabel:`${rangeLab} 주간` };
  }
  // month
  const y=recMonth.y, mo=recMonth.m;
  const isThis = (y===NOW.getFullYear() && mo===NOW.getMonth());
  const monthLab=`${y}년 ${mo+1}월`;
  return { label: isThis ? `${monthLab} (이번 달)` : monthLab, pickLabel:monthLab };
}

const REC_KIND_LABELS = { all:'전체', expense:'가계부', workout:'운동', event:'일정', weight:'체중' };
function recHasActiveFilter(){ return recMemberFilter!=='all' || recKindFilter!=='all'; }

function recordFilterBar(scope){
  scope = scope || 'calendar';

  if(recMemberFilter!=='all'){
    const m = memberById(recMemberFilter);
    if(m) chips += `<span class="active-chip" onclick="setRecMember('all')" title="구성원 필터 해제">
      <span class="ac-dot" style="background:${escapeHtml(m.color)}"></span>${escapeHtml(m.name)}

  }
  if(scope==='calendar' && recKindFilter!=='all'){
    chips += `<span class="active-chip" onclick="setRecKind('all')" title="종류 필터 해제">
      ${escapeHtml(REC_KIND_LABELS[recKindFilter]||recKindFilter)}
      <span class="ac-x">${icon('plus')}</span></span>`;
  }
  const has = recMemberFilter!=='all' || (scope==='calendar' && recKindFilter!=='all');
  // 활성 필터 없으면 '전체' 안내 칩(중립) — 첫인상 최소 상태
  if(!chips) chips = `<span class="active-chip" style="cursor:default;opacity:.85"><span class="ac-dot" style="background:var(--ink-3)"></span>전체</span>`;
  return `<div class="filter-bar">
    <button class="filter-btn ${has?'has-active':''}" onclick="openRecordFilterSheet('${scope}')">${icon('funnel')} 필터</button>
    ${chips}
  </div>`;
}
// [P4] 활성 필터 칩의 X는 +아이콘을 45도 회전시켜 ×로 표현 (별도 아이콘 없이 재사용)
//  → CSS에서 .ac-x svg를 회전. 여기선 인라인 스타일로 처리.
function openRecordFilterSheet(scope){
  scope = scope || 'calendar';
  // [#4] 캘린더는 돈 제외 → 종류 옵션에서 '가계부' 제거(일정·운동·체중만). 가계부는 종류 필터 자체를 숨김.
  const memHandler = scope==='ledger' ? 'setRecMemberInSheetL' : 'setRecMemberInSheetC';
  let kindSection = '';
  if(scope==='calendar'){
    const kinds=[['all','전체','funnel'],['event','일정','calendar'],['workout','운동','barbell'],['weight','체중','scale']];
    const kindChips = kinds.map(k=>`<div class="chip ${recKindFilter===k[0]?'on':''}" onclick="setRecMemberInSheetC(null,'${k[0]}')">${icon(k[2],14)} ${k[1]}</div>`).join('');
    kindSection = `<div class="flabel">종류</div><div class="chip-row">${kindChips}</div>`;
  }
  // 구성원 칩은 시트 안에서 선택 즉시 시트도 갱신(active 표시) — scope별 전용 핸들러 사용
  showSheet(`<span class="grab"></span><h3>필터</h3>
    <div class="flabel" style="margin-top:0">구성원</div>
    ${memberFilterPills(recMemberFilter, memHandler, true)}
    ${kindSection}
    <div class="chip-row" style="margin-top:20px;gap:8px">
      <button class="btn btn-ghost" style="flex:1" onclick="resetRecFilters('${scope}')">전체로 초기화</button>
      <button class="btn btn-primary" style="flex:1" onclick="closeSheet()">완료</button>
    </div>`);
}
// 시트 내 선택: 필터 갱신 + 배경(기록 탭) 재렌더 + 시트 재오픈(선택 상태 반영)
//  memberId가 null이면 구성원은 그대로 두고 종류만 변경 (kindChips에서 호출)
function setRecMemberInSheet(memberId, kind, scope){
  if(memberId!==null) recMemberFilter=memberId;
  if(kind!==undefined) recKindFilter=kind;
  renderRecord();
  openRecordFilterSheet(scope||'calendar');
}
// scope별 래퍼 (구성원 칩 onclick에서 호출 — 선택 후 같은 scope로 시트 재오픈)
function setRecMemberInSheetC(memberId, kind){ setRecMemberInSheet(memberId, kind, 'calendar'); }
function setRecMemberInSheetL(memberId, kind){ setRecMemberInSheet(memberId, kind, 'ledger'); }
function resetRecFilters(scope){ recMemberFilter='all'; recKindFilter='all'; renderRecord(); openRecordFilterSheet(scope||'calendar'); }

function recsForDayFiltered(dstr){
  // [#4] 캘린더는 '시간·활동' 전용 → 돈(지출/수입)은 제외. 일정·반복일정·운동·체중만 표시.
  const pool = filteredRecords().filter(r=>r.kind!=='expense');
  // 실제 기록 + 반복 일정의 그날 occurrence (원본 발생일 제외 → 중복 없음). 종류 필터가 'event'/'all'/'전체'면 occurrence도 노출.
  const base = pool.filter(r=>ymd(new Date(r.ts))===dstr);
  let occ = [];
  if(recKindFilter==='all' || recKindFilter==='event'){
    occ = repeatOccurrencesOnDay(dstr, pool);
  }
  return base.concat(occ).sort((a,b)=>a.ts-b.ts);
}
// [안A] 달력 항목 칩: 색=구성원(원), 흰색 아이콘=종류. max 초과분은 "+N"
function calItemsForDay(dstr, max){
  const recs = recsForDayFiltered(dstr);
  if(!recs.length) return '';
  const items = recs.map(r=>{
    const m = memberById(r.memberId);
    const color = m ? m.color : 'var(--ink-3)';
    const km = kindMeta(recordKindKey(r));   // [라벨, 아이콘명, kind색]
    const iconName = km ? km[1] : 'check';
    // [P4] 접근성: 색만으로 사람 구분 불가 → 이름·종류를 title/aria-label로 병기
    const lbl = `${m?m.name:'담당 없음'} · ${km?km[0]:'기록'}`;
    return `<span class="cal-item" style="background:${escapeHtml(color)}" title="${escapeHtml(lbl)}" aria-label="${escapeHtml(lbl)}">${icon(iconName)}</span>`;
  });
  let html = items.slice(0, max).join('');
  if(items.length > max) html += `<span class="cal-more">+${items.length-max}</span>`;
  return html;
}
// [안A] 달력 전용 범례 — 색=구성원 / 아이콘=종류 (현재 필터 반영)
function calLegend(scope){
  scope = scope || 'calendar';
  // 색=구성원: 필터된 구성원만(전체면 모두)
  const mem = recMemberFilter==='all' ? DB.members : DB.members.filter(m=>m.id===recMemberFilter);
  const memRow = mem.map(m=>`<span class="clg">${memberPill(m,{size:'sm'})}</span>`).join('');
  // 아이콘=종류 (회색 원 안 흰 아이콘 = 모양만 구분)
  let kinds;
  if(scope==='ledger'){
    // [#4] 가계부 범례는 돈 종류만 (지출·수입)
    kinds = [['expense_out','지출','trend-down'],['expense_in','수입','trend-up']];
  } else {
    // [#4] 캘린더 범례는 시간·활동 종류만 (돈 제외). 종류 필터 반영.
    const calKinds = [['event','일정','calendar'],['workout','운동','barbell'],['weight','체중','scale']];
    kinds = (recKindFilter!=='all') ? calKinds.filter(k=>k[0]===recKindFilter) : calKinds;
  }
  const kindRow = kinds.map(k=>`<span class="clg"><span class="clg-ic">${icon(k[2])}</span>${k[1]}</span>`).join('');
  return `<div class="cal-legend">
    <div class="clg-row"><span class="clg-cap">색 = 구성원</span>${memRow}</div>
    <div class="clg-row"><span class="clg-cap">아이콘 = 종류</span>${kindRow}</div>
  </div>`;
}
function viewToday(){
  // [기간 탐색] 선택된 일(recDay) 기준. 제목은 오늘/어제/날짜로 동적.
  const recs = recsForDayFiltered(recDay);
  return calSummaryHtml(recs) + `<div class="sec-title" style="margin-top:6px">${escapeHtml(recordRange().label)} 타임라인</div>
    <div class="open-list">${recs.length?recs.map(r=>renderRecordRow(r,{showTime:true,editable:true})).join(''):'<div class="muted">기록이 없어요</div>'}</div>`;
}
function viewWeek(){
  // [기간 탐색] 선택된 주(recWeekStart, 월요일 시작) 기준. 제목은 실제 주 범위로 동적.
  const start = parseYmd(recWeekStart);
  let strip='';
  for(let i=0;i<7;i++){
    const d=addDays(start,i); const ds=ymd(d);
    const isToday = ds===ymd(NOW);
    strip+=`<div class="d ${isToday?'today':''} ${selDay===ds?'sel':''}" onclick="pickDay('${ds}')">
      <div class="dn">${DOW[d.getDay()]}</div><div class="dd">${d.getDate()}</div>
      <div class="cal-items">${calItemsForDay(ds,4)}</div></div>`;
  }
  const recs=recsForDayFiltered(selDay);
  const weekRecs = (function(){ let arr=[]; for(let i=0;i<7;i++){ arr=arr.concat(recsForDayFiltered(ymd(addDays(start,i)))); } return arr; })();
  return calSummaryHtml(weekRecs) + `<div class="sec-title" style="margin-top:6px">${escapeHtml(recordRange().label)}</div>
    <div class="wk" style="margin-bottom:16px">${strip}</div>
    <div class="sec-title">${escapeHtml(dayTitle(selDay))}</div>
    <div class="open-list">${recs.length?recs.map(r=>renderRecordRow(r,{showTime:true,editable:true})).join(''):'<div class="muted">기록이 없어요</div>'}</div>`;
}
// [기간 탐색] 선택일 제목 — 오늘/어제면 그 단어, 그 외엔 "6월 24일 (화)"
function dayTitle(dstr){
  if(dstr===ymd(NOW)) return '오늘';
  if(dstr===ymd(addDays(NOW,-1))) return '어제';
  return fmtDateK(parseYmd(dstr));
}
function calCell(d, inMonth){
  if(!inMonth) return `<div class="cal-cell empty"></div>`;
  const ds=ymd(d);
  const cls = ['cal-cell'];
  if(ds===ymd(NOW)) cls.push('today');
  if(ds===selDay) cls.push('sel');
  return `<div class="${cls.join(' ')}" onclick="pickDay('${ds}')"><span class="cdate">${d.getDate()}</span><div class="cal-items">${calItemsForDay(ds,6)}</div></div>`;
}
function viewMonth(){
  // [기간 탐색] 선택된 월(recMonth) 기준. 제목은 "2026년 5월"(이번 달이면 병기)로 동적.
  const y=recMonth.y, mo=recMonth.m;
  const startDow=new Date(y,mo,1).getDay();
  const daysIn=new Date(y,mo+1,0).getDate();
  let cells='';
  DOW.forEach(d=>cells+=`<div class="cal-dow">${d}</div>`);
  for(let i=0;i<startDow;i++) cells+=calCell(null,false);
  for(let dd=1;dd<=daysIn;dd++) cells+=calCell(new Date(y,mo,dd),true);
  const recs=recsForDayFiltered(selDay);
  // [#4] 캘린더 월 요약도 돈 제외(시간·활동만)
  const monthRecs = filteredRecords().filter(r=>r.kind!=='expense' && (()=>{const d=new Date(r.ts);return d.getFullYear()===y&&d.getMonth()===mo;})());
  return calSummaryHtml(monthRecs) + `<div class="sec-title" style="margin-top:6px">${escapeHtml(recordRange().label)}</div>
    <div class="cal-grid" style="margin-bottom:16px">${cells}</div>
    <div class="sec-title">${escapeHtml(dayTitle(selDay))}</div>
    <div class="open-list">${recs.length?recs.map(r=>renderRecordRow(r,{showTime:true,editable:true})).join(''):'<div class="muted">기록이 없어요</div>'}</div>`;
}
function pickDay(ds){ selDay=ds; renderRecord(); }

/* ============================================================
   REPORT MODE / 보고서 (대상[가구/개인] × 기간[일/주/월/연] + 기간 선택)
   ============================================================ */
let repTarget = 'house';   // house | person
let repPerson = null;
let repPeriod = 'month';   // day | week | month | year
let repShown = true;   // [P4] 리포트는 항상 렌더(생성 버튼 없이 즉시 노출)
// 선택 기준점 (기간 선택용)
let repDay = ymd(NOW);                 // 일간 기준 날짜
let repWeekStart = ymd(addDays(NOW, -((NOW.getDay()+6)%7))); // 주간: 월요일 시작 기준
let repMonth = { y:NOW.getFullYear(), m:NOW.getMonth() };    // 월간
let repYear = NOW.getFullYear();        // 연간

// [재편] 보고서 컨트롤(대상·기간·생성 버튼) — 가계부(가계 리포트)·비전(기간별 회고) 양쪽에서 재사용.
function reportControlsHtml(){ return renderReportMode(); }
function renderReportMode(){
  if(repPerson===null && DB.members.length) repPerson = DB.members[0].id;
  let html = '';
  html += `<div style="font-size:12px;font-weight:500;color:var(--ink-2);margin:2px 4px 6px">대상</div>`;
  html += `<div class="seg">
    <button class="${repTarget==='house'?'on':''}" onclick="setRepTarget('house')">가구 전체</button>
    <button class="${repTarget==='person'?'on':''}" onclick="setRepTarget('person')">개인</button>
  </div>`;
  if(repTarget==='person'){
    html += memberFilterPills(repPerson, 'setRepPerson', false);
  }
  // [10] 원탭 프리셋 칩 (단위+기간 동시 설정) + 과거 이동 ◀▶
  html += `<div style="font-size:12px;font-weight:500;color:var(--ink-2);margin:2px 4px 6px">기간</div>`;
  const atNow = isReportAtNow();
  const presets=[['day','오늘'],['week','이번 주'],['month','이번 달'],['year','올해']];
  html += `<div class="chip-row" style="margin-bottom:10px">${presets.map(p=>
    `<div class="chip ${repPeriod===p[0]&&atNow?'on':''}" onclick="setReportPreset('${p[0]}')">${p[1]}</div>`).join('')}</div>`;
  // 과거/미래 이동 (선택된 단위로 이전/다음 기간) + 라벨 탭 → 날짜 선택기
  const rng = reportRange();
  html += `<div class="pperiod">
    <button class="pnav" onclick="shiftPeriod(-1)">${icon('chevron-left')}</button>
    <div class="plabel ptap" onclick="openReportPeriodPicker()">${escapeHtml(rng.pickLabel)} ${icon('calendar',13)}</div>
    <button class="pnav" onclick="shiftPeriod(1)">${icon('chevron-right')}</button>
  </div>`;
  // [P4] '보고서 생성' 버튼 제거 — 대상/기간을 고르면 아래에 바로 리포트가 렌더됨(항상 노출).
  // 보고서 카드는 호출 탭(가계부=money / 비전=full)이 별도로 렌더 → 여기선 컨트롤만 반환.
  return html;
}
function setRepTarget(t){ repTarget=t; repShown=true; renderRecord(); requestAnimationFrame(fitStatValues); }
function setRepPerson(id){ repPerson=id; repShown=true; renderRecord(); requestAnimationFrame(fitStatValues); }
function setRepPeriod(p){ repPeriod=p; repShown=true; renderRecord(); requestAnimationFrame(fitStatValues); }
// [10] 프리셋: 단위+기간(현재로 점프)을 동시에 설정 후 즉시 보고서 생성
function setReportPreset(p){
  repPeriod=p;
  repDay = ymd(NOW);
  repWeekStart = ymd(addDays(NOW, -((NOW.getDay()+6)%7)));
  repMonth = { y:NOW.getFullYear(), m:NOW.getMonth() };
  repYear = NOW.getFullYear();
  repShown=true; renderRecord();
}
// 현재 선택된 기간이 '지금' 기준인지 (프리셋 칩 활성 표시용)
function isReportAtNow(){
  if(repPeriod==='day') return repDay===ymd(NOW);
  if(repPeriod==='week') return repWeekStart===ymd(addDays(NOW, -((NOW.getDay()+6)%7)));
  if(repPeriod==='month') return repMonth.y===NOW.getFullYear() && repMonth.m===NOW.getMonth();
  return repYear===NOW.getFullYear();
}
function generateReport(){ repShown=true; renderRecord(); requestAnimationFrame(fitStatValues); setTimeout(fitStatValues,60); }
// [P4] PDF 저장 = 브라우저 인쇄(→ 'PDF로 저장'). 인쇄 CSS가 보고서 카드만 남기고 나머지 숨김.
function printReport(){
  document.body.classList.add('printing-report');
  const done=()=>{ document.body.classList.remove('printing-report'); window.removeEventListener('afterprint',done); };
  window.addEventListener('afterprint',done);
  setTimeout(()=>{ window.print(); }, 60);
}
// [P4] 공유 = OS 공유시트(모바일 Web Share API). 지원 안 하면 안내 토스트.
function shareReport(){
  const rng=reportRange();
  const tgt = repTarget==='house' ? '우리 가족' : (memberById(repPerson)||{}).name||'';
  const text = `${tgt} · ${rng.pickLabel} 리포트`;
  if(navigator.share){
    navigator.share({ title:'리포트', text }).catch(()=>{});
  } else {
    toast('이 브라우저는 공유를 지원하지 않아요 · PDF 저장을 이용해 주세요');
  }
}

// 기간 이동 (과거/미래 선택)
function shiftPeriod(dir){
  if(repPeriod==='day') repDay = ymd(addDays(parseYmd(repDay), dir));
  else if(repPeriod==='week') repWeekStart = ymd(addDays(parseYmd(repWeekStart), dir*7));
  else if(repPeriod==='month'){
    let m=repMonth.m+dir, y=repMonth.y;
    if(m<0){ m=11; y--; } if(m>11){ m=0; y++; }
    repMonth={ y, m };
  }
  else if(repPeriod==='year') repYear += dir;
  // [10] 보고서가 이미 보이면 이동 시 즉시 갱신 (재생성 클릭 불필요)
  renderRecord();
}

// [3] 기간 라벨 탭 → 직접 날짜/월/연도 선택 시트 (단위별 입력기)
function openReportPeriodPicker(){
  let field='';
  if(repPeriod==='day'){
    field=`<div class="field"><label>날짜 선택</label><input type="date" id="rpVal" value="${repDay}"></div>`;
  } else if(repPeriod==='week'){
    field=`<div class="field"><label>주 시작일 선택</label><input type="date" id="rpVal" value="${repWeekStart}">
      <div style="font-size:12px;color:var(--ink-3);margin-top:6px;line-height:1.5">고른 날짜가 속한 주(월요일 시작)로 맞춰져요.</div></div>`;
  } else if(repPeriod==='month'){
    const mv=`${repMonth.y}-${String(repMonth.m+1).padStart(2,'0')}`;
    field=`<div class="field"><label>연·월 선택</label><input type="month" id="rpVal" value="${mv}"></div>`;
  } else {
    const baseY=NOW.getFullYear(); let opts='';
    for(let y=baseY-5;y<=baseY+1;y++){ opts+=`<option value="${y}" ${repYear===y?'selected':''}>${y}년</option>`; }
    field=`<div class="field"><label>연도 선택</label><select id="rpVal">${opts}</select></div>`;
  }
  const unitLabel={day:'일간',week:'주간',month:'월간',year:'연간'}[repPeriod];
  showSheet(`<span class="grab"></span><h3>${unitLabel} 기간 선택</h3>
    ${field}
    <button class="btn btn-primary btn-block" onclick="applyReportPeriodPick()">적용</button>
    <button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="closeSheet()">취소</button>`);
}
function applyReportPeriodPick(){
  const el=document.getElementById('rpVal'); if(!el){ closeSheet(); return; }
  const val=el.value;
  if(repPeriod==='day'){
    if(val) repDay=val;
  } else if(repPeriod==='week'){
    if(val){ const d=parseYmd(val); repWeekStart=ymd(addDays(d, -((d.getDay()+6)%7))); }
  } else if(repPeriod==='month'){
    if(val){ const [y,m]=val.split('-').map(Number); repMonth={ y, m:(m-1) }; }
  } else {
    repYear=+val;
  }
  repShown=true; closeSheet(); renderRecord();
}
function reportRange(){
  if(repPeriod==='day'){
    const d=parseYmd(repDay);
    return { from:repDay, to:repDay, label:fmtDateK(d), pickLabel:`${d.getFullYear()}년 ${fmtDateK(d)}` };
  }
  if(repPeriod==='week'){
    const s=parseYmd(repWeekStart); const e=addDays(s,6);
    return { from:ymd(s), to:ymd(e), label:`${fmtDateK(s)} ~ ${fmtDateK(e)}`, pickLabel:`${s.getMonth()+1}/${s.getDate()} ~ ${e.getMonth()+1}/${e.getDate()} 주간` };
  }
  if(repPeriod==='month'){
    const y=repMonth.y, mo=repMonth.m;
    return { from:ymd(new Date(y,mo,1)), to:ymd(new Date(y,mo+1,0)), label:`${y}년 ${mo+1}월`, pickLabel:`${y}년 ${mo+1}월` };
  }
  // year
  const y=repYear;
  return { from:ymd(new Date(y,0,1)), to:ymd(new Date(y,11,31)), label:`${y}년 전체`, pickLabel:`${y}년` };
}
function renderBar(label, value, max, color){
  const pct = max>0 ? Math.round(value/max*100) : 0;
  return `<div class="repbar">
    <div class="rblabel">${escapeHtml(label)}</div>
    <div class="rbtrack"><span style="width:${pct}%;background:${color||'var(--accent)'}"></span></div>
    <div class="rbval">${value}</div>
  </div>`;
}
function renderBarWon(label, value, max, color){
  const pct = max>0 ? Math.round(value/max*100) : 0;
  return `<div class="repbar">
    <div class="rblabel">${escapeHtml(label)}</div>
    <div class="rbtrack"><span style="width:${pct}%;background:${color||'var(--accent)'}"></span></div>
    <div class="rbval">${won(value)}</div>
  </div>`;
}
/* [3] 보고서 접기 섹션 상태 (재렌더 시 유지). 기본: 카테고리=펼침, 운동 목록=접힘 */
const repCollapse = { cat:false, workout:true, weight:false };
function toggleRepSection(key){
  repCollapse[key] = !repCollapse[key];
  const title = document.getElementById('repSecTitle-'+key);
  const body  = document.getElementById('repSecBody-'+key);
  if(!title || !body) return;
  const on = repCollapse[key];
  title.classList.toggle('collapsed', on);
  body.classList.toggle('collapsed', on);
  // scrolly 본문(운동 목록)은 인라인 max-height로 펼침 상한(360px)을 두므로 토글 시 직접 조정
  if(body.classList.contains('scrolly')) body.style.maxHeight = on ? '0px' : '360px';
}
/* [2] 선택한 보고 기간(연/월/일/주)에 해당하는 비전인지.
   연간 보고서 = 그 연도의 연간 비전. 월간 보고서 = 그 연·월의 월간 비전.
   일간/주간 보고서 = 그 기간이 속한 연·월의 (연간+월간) 비전(겹치는 비전 노출). */
function visionInReportPeriod(v){
  const vy = visionYear(v);
  if(repPeriod==='year') return v.period==='year' && vy===repYear;
  if(repPeriod==='month') return v.period==='month' && vy===repMonth.y && visionMonth(v)===repMonth.m;
  // day/week: 보고 범위가 속한 연·월 기준 (범위 시작일로 판정)
  const rng = reportRange();
  const d = parseYmd(rng.from);
  if(v.period==='year') return vy===d.getFullYear();
  return vy===d.getFullYear() && visionMonth(v)===d.getMonth();
}
/* [2] 개인 보고서: 그 구성원과 관련된 비전인지 (그 구성원의 기록 또는 루틴이 연결된 비전) */
function visionRelatedToMember(v, memberId){
  if(DB.records.some(r=>r.visionId===v.id && r.memberId===memberId)) return true;
  if(DB.routines.some(r=>r.visionId===v.id && r.memberId===memberId)) return true;
  return false;
}
/* [3] 체중 미니 스파크라인 (SVG 폴리라인). 값 배열 → 작은 라인. 색 = 구성원 색. */
function weightSparkline(vals, color){
  if(vals.length<2) return '';
  const W=120, H=28, pad=3;
  const mn=Math.min(...vals), mx=Math.max(...vals);
  const span=(mx-mn)||1;
  const pts=vals.map((v,i)=>{
    const x=pad + (i/(vals.length-1))*(W-pad*2);
    const y=pad + (1-(v-mn)/span)*(H-pad*2);   // 위가 큰 값
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" style="display:block" preserveAspectRatio="none">
    <polyline fill="none" stroke="${escapeHtml(color)}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" points="${pts}"/>
  </svg>`;
}
/* [3] 보고서 체중 섹션 본문 — 선택 기간 내 구성원별 시작→최근 + 변화(±kg) + 미니 추세. */
function reportWeightBody(recs, isHouse){
  const wRecs = recs.filter(r=>r.kind==='weight' && r.value!=null);
  if(!wRecs.length) return '<div class="muted" style="padding:14px 0">이 기간 체중 기록이 없어요</div>';
  const members = isHouse ? DB.members : DB.members.filter(m=>m.id===repPerson);
  let rows='';
  members.forEach(m=>{
    const series = wRecs.filter(r=>r.memberId===m.id).sort((a,b)=>a.ts-b.ts);
    if(!series.length) return;
    const first=series[0].value, last=series[series.length-1].value;
    const diff=Math.round((last-first)*10)/10;
    const vals=series.map(s=>s.value);
    const diffColor = diff<0 ? 'var(--good)' : (diff>0 ? 'var(--danger)' : 'var(--ink-3)');
    const diffTxt = diff===0 ? '±0kg' : (diff>0?`+${diff}kg`:`${diff}kg`);
    const datesList = series.map(s=>`${fmtMonthDay(new Date(s.ts))} ${s.value}kg`).join(' · ');
    rows += `<div style="padding:12px 2px;border-bottom:1px solid var(--line)">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px;min-width:0">${memberPill(m,{size:'sm'})}
          <span style="font-size:14px;font-weight:500;color:var(--ink)">${first}kg → ${last}kg</span></div>
        <span style="font-size:14px;font-weight:600;color:${diffColor};flex-shrink:0">${diffTxt}</span>
      </div>
      ${vals.length>1?`<div style="margin:2px 0 6px">${weightSparkline(vals, m.color)}</div>`:''}
      <div style="font-size:11px;color:var(--ink-3);font-weight:400;line-height:1.5;white-space:normal">${escapeHtml(datesList)}</div>
    </div>`;
  });
  return rows || '<div class="muted" style="padding:14px 0">이 기간 체중 기록이 없어요</div>';
}
function renderReportCard(opts){
  opts = opts || {};
  // mode:'money' = 가계부 탭(돈 섹션만: 수입/지출/카테고리/구성원별/월별추이) · 'full' = 비전 회고(운동·체중·비전진행 포함)
  const money = opts.mode==='money';
  const rng = reportRange();
  const isHouse = repTarget==='house';
  let recs = DB.records.filter(r=>{
    const ds=ymd(new Date(r.ts));
    return ds>=rng.from && ds<=rng.to;
  });
  if(!isHouse) recs = recs.filter(r=>r.memberId===repPerson);

  const wks = recs.filter(r=>r.kind==='workout');
  const evs = recs.filter(r=>r.kind==='event');
  const totalInc = sumIncome(recs);
  const totalExp = sumExpense(recs);
  const net = totalInc - totalExp;

  // 카테고리별 지출 — 막대는 중립색(카테고리에 색 없음. 색=구성원 전용). 구분은 아이콘+이름이 담당.
  const catMap = {};
  recs.filter(isExpenseOut).forEach(r=>{
    const c = r.categoryId ? categoryById(r.categoryId) : null;
    const label = c ? ((c.icon?c.icon+' ':'')+c.name) : '미분류';
    if(!catMap[label]) catMap[label] = { sum:0 };
    catMap[label].sum += (r.amount||0);
  });
  const cats = Object.entries(catMap).sort((a,b)=>b[1].sum-a[1].sum).slice(0,8);
  const catMax = cats.length?cats[0][1].sum:0;

  // [3] 체중 기록 섹션 본문 (선택 기간 내). 다이어트 비전과 자연 연계.
  const weightBody = reportWeightBody(recs, isHouse);
  const weightCount = recs.filter(r=>r.kind==='weight' && r.value!=null).length;

  // 구성원별 (가구 전체) — 지출 기준 막대. 막대 색 = 각 구성원 색(member.color)
  //  [P4] 삭제된 구성원도 기록은 남으므로 리포트에 표시: 활성 구성원(항상) + 아카이브 구성원(기록 있으면, '삭제됨') + 담당없음 버킷
  let memBars = '';
  if(isHouse){
    const entries = DB.members.map(m=>({ name:m.name, color:m.color, exp:sumExpense(recs.filter(r=>r.memberId===m.id)) }));
    (DB.deletedMembers||[]).forEach(m=>{
      const mr = recs.filter(r=>r.memberId===m.id);
      if(sumExpense(mr)>0 || sumIncome(mr)>0 || sumSave(mr)>0) entries.push({ name:`${m.name} (삭제됨)`, color:m.color||'var(--ink-3)', exp:sumExpense(mr) });
    });
    const orphan = recs.filter(r=>!memberById(r.memberId));   // memberId가 없거나 아카이브에도 없는 기록
    if(sumExpense(orphan)>0) entries.push({ name:'담당 없음', color:'var(--ink-3)', exp:sumExpense(orphan) });
    entries.sort((a,b)=>b.exp-a.exp);
    const mmax = entries.length?Math.max(...entries.map(e=>e.exp),1):1;
    memBars = `<div class="sec-title" style="margin-top:26px;font-size:14px">구성원별 지출</div>` +
      entries.map(e=>renderBarWon(e.name, e.exp, mmax, e.color)).join('');
  }

  // 연간: 월별 추이 (지출/수입)
  let yearTrend = '';
  if(repPeriod==='year'){
    const expByMon = new Array(12).fill(0);
    const incByMon = new Array(12).fill(0);
    recs.forEach(r=>{
      if(r.kind!=='expense') return;
      const mo = new Date(r.ts).getMonth();
      if(isIncome(r)) incByMon[mo]+=(r.amount||0); else if(isExpenseOut(r)) expByMon[mo]+=(r.amount||0);   // [P4] 저축은 지출 추이에서 제외
    });
    const mx = Math.max(...expByMon, ...incByMon, 1);
    let rows='';
    for(let i=0;i<12;i++){
      if(incByMon[i]===0 && expByMon[i]===0) continue;
      rows += renderBarWon(`${i+1}월 수입`, incByMon[i], mx, 'var(--income)');
      rows += renderBarWon(`${i+1}월 지출`, expByMon[i], mx, 'var(--danger)');
    }
    yearTrend = `<div class="sec-title" style="margin-top:26px;font-size:14px">월별 추이 (수입/지출)</div>${rows||'<div class="muted" style="padding:14px 0">기록이 없어요</div>'}`;
  }

  const targetLabel = isHouse ? '가구 전체' : escapeHtml((memberById(repPerson)||{}).name||'');
  const periodLabel = {day:'일간',week:'주간',month:'월간',year:'연간'}[repPeriod];

  // [2] 비전 진행 현황 = '선택한 보고 기간(연/월)에 해당하는 비전'만 표시.
  //  · 연간 보고서 = 그 연도의 연간 비전, 월간 보고서 = 그 연·월의 월간 비전.
  //  · 일간/주간 보고서 = 그 날짜가 속한 연·월의 (연간+월간) 비전.
  //  · 개인 보고서면 그 구성원 관련 비전만(그 구성원의 기록/루틴이 연결된 비전).
  //  각 비전 진행률은 비전 자체 기간 기준(visionPct/충실도 — 기존 로직 유지). 바 색 메인 #0044FF.
  let periodVisions = DB.visions.filter(v=>visionInReportPeriod(v));
  if(!isHouse) periodVisions = periodVisions.filter(v=>visionRelatedToMember(v, repPerson));
  const visionBars = periodVisions.map(v=>{
    const periodLbl = visionPeriodLabel(v);
    if(v.type==='QUANT'){
      const p = visionPct(v);
      return renderBar(`${v.title} · ${periodLbl}`, p, 100, 'var(--accent)');
    }
    // QUAL: dueDate 우선, 없으면 비전 기간 종료일 기준 D-day
    const dleft = (v.dueDate!=null) ? dday(v) : visionPeriodDday(v);
    const ddLbl = dleft>0 ? `D-${dleft}` : (dleft===0 ? 'D-day' : `D+${-dleft}`);
    return renderBar(`${v.title} · ${ddLbl}`, visionFidelity(v), 100, 'var(--accent)');
  }).join('');

  return `<div class="card glass" id="reportCard">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div style="font-size:17px;font-weight:600">${targetLabel} · ${escapeHtml(rng.pickLabel)} ${periodLabel} 보고서</div>
      <span class="pill">${icon('chart')}</span>
    </div>
    <div style="font-size:12px;color:var(--ink-3);font-weight:400;margin-bottom:14px">${escapeHtml(rng.label)}</div>
    <div class="stat-row">
      <div class="stat"><div class="sv" style="color:var(--income)">+${won(totalInc)}</div><div class="sl">수입(원)</div></div>
      <div class="stat"><div class="sv" style="color:var(--danger)">-${won(totalExp)}</div><div class="sl">지출(원)</div></div>
      <div class="stat"><div class="sv" style="color:${net>=0?'var(--income)':'var(--danger)'}">${net>=0?'+':'-'}${won(Math.abs(net))}</div><div class="sl">순액(원)</div></div>
    </div>
    ${money?'':`<div class="stat-row">
      <div class="stat"><div class="sv">${wks.length}</div><div class="sl">운동 횟수</div></div>
      <div class="stat"><div class="sv">${evs.length}</div><div class="sl">일정 수</div></div>
      <div class="stat"><div class="sv">${recs.length}</div><div class="sl">전체 기록</div></div>
    </div>`}

    ${yearTrend}

    <div class="sec-title collapsible ${repCollapse.cat?'collapsed':''}" id="repSecTitle-cat" style="margin-top:26px;font-size:14px" onclick="toggleRepSection('cat')">
      <span class="sec-cap">카테고리별 지출</span>
      <span class="sec-chev">${icon('chevron-down')}</span>
    </div>
    <div class="collapse-body ${repCollapse.cat?'collapsed':''}" id="repSecBody-cat">
      ${cats.length?cats.map(c=>renderBarWon(c[0], c[1].sum, catMax, 'var(--ink-3)')).join(''):'<div class="muted" style="padding:14px 0">지출 기록이 없어요</div>'}
    </div>

    ${memBars}

    ${money?'':`<div class="sec-title collapsible ${repCollapse.workout?'collapsed':''}" id="repSecTitle-workout" style="margin-top:26px;font-size:14px" onclick="toggleRepSection('workout')">
      <span class="sec-cap">운동 목록 <span class="sec-count">(${wks.length}건)</span></span>
      <span class="sec-chev">${icon('chevron-down')}</span>
    </div>
    <div class="collapse-body scrolly ${repCollapse.workout?'collapsed':''}" id="repSecBody-workout" style="max-height:${repCollapse.workout?'0':'360px'}">
      ${wks.length?wks.sort((a,b)=>b.ts-a.ts).map(r=>{
        // [E][A] 좌측 아이콘 타일 = 구성원 색 (전부 주황 ❌). 본문은 통일 행 형태
        const m=memberById(r.memberId);
        const tileColor = m ? m.color : 'var(--ink-3)';
        // [버그수정] 운동 목록도 날짜 컬럼만 넓힘(--col-time). 역할 고정폭(--col-role) 공용 유지 → 제목 정렬.
        return `<div class="srow" style="--col-time:96px"><div class="lead"><div class="lead-tile" style="background:${escapeHtml(tileColor)}">${icon('barbell')}</div></div><div class="stime">${fmtMonthDay(new Date(r.ts))}</div><div class="srole">${m?memberPill(m,{size:'sm'}):''}</div><span class="stitle-text">${escapeHtml(r.title)}</span><div class="trailing"></div></div>`;
      }).join(''):'<div class="muted" style="padding:14px 0">운동 기록이 없어요</div>'}
    </div>

    <div class="sec-title collapsible ${repCollapse.weight?'collapsed':''}" id="repSecTitle-weight" style="margin-top:26px;font-size:14px" onclick="toggleRepSection('weight')">
      <span class="sec-cap">체중 기록 <span class="sec-count">(${weightCount}회)</span></span>
      <span class="sec-chev">${icon('chevron-down')}</span>
    </div>
    <div class="collapse-body ${repCollapse.weight?'collapsed':''}" id="repSecBody-weight">
      ${weightBody}
    </div>

    <div class="sec-title" style="margin-top:26px;font-size:14px">비전 진행 현황</div>
    ${visionBars||'<div class="muted" style="padding:14px 0">이 기간의 비전이 없어요</div>'}`}

    <div class="chip-row noprint" style="margin-top:16px">
      <button class="btn btn-ghost btn-block" style="flex:1" onclick="printReport()">${icon('floppy-disk',16)} PDF 저장</button>
      <button class="btn btn-ghost btn-block" style="flex:1" onclick="shareReport()">${icon('share',16)} 공유</button>
    </div>
  </div>`;
}

/* ============================================================
   ROUTINE / 루틴(습관) — 탭은 비전 탭의 '습관 현황' 섹션으로 흡수됨.
   아래 통계/허브 헬퍼들은 비전 탭(habitHubRow)에서 그대로 재사용.
   ============================================================ */
// [5] 습관 허브 통계 — 이번주 7칸(월~일), 이번달 달성률%
function routineWeekGrid(r){
  // 이번주 월요일 시작
  const monOff = (NOW.getDay()+6)%7;
  const monday = addDays(NOW, -monOff);
  let cells='';
  for(let i=0;i<7;i++){
    const d=addDays(monday,i); const ds=ymd(d);
    const due = r.freq==='daily' ? true : [1,3,6].includes(d.getDay());
    const future = d.getTime() > NOW.getTime() && ds!==ymd(NOW);
    const p = routineProgress(r, ds);
    let cls='wdc';
    if(routineComplete(r,ds)) cls+=' on';
    else if(p.cur>0) cls+=' partial';
    if(ds===ymd(NOW)) cls+=' today';
    const dim = (!due || future) ? 'opacity:.35' : '';
    const isToday = ds===ymd(NOW);
    cells += `<div class="wd ${isToday?'is-today':''}"><span class="wdn">${DOW[d.getDay()]}</span><span class="${cls}" style="${dim}"></span></div>`;
  }
  return `<div class="wkgrid">${cells}</div>`;
}
function routineMonthRate(r){
  const y=NOW.getFullYear(), mo=NOW.getMonth();
  let done=0, total=0;
  for(let dd=1; dd<=NOW.getDate(); dd++){
    const d=new Date(y,mo,dd);
    const due = r.freq==='daily' ? true : [1,3,6].includes(d.getDay());
    if(!due) continue;
    total++;
    if(routineComplete(r,ymd(d))) done++;
  }
  return total? Math.round(done/total*100):0;
}
// 습관 허브 행: ring/check(상호작용) + 통계(주그리드/연속/달성률)
function habitHubRow(r, interactive, hideRole){
  const base = scheduleRowRoutine(r, {interactive, hideRole});
  const st = routineStreak(r);
  const rate = routineMonthRate(r);
  // [5] 루틴 카드는 구성원 정체성 → 완료 시각요소/달성률 % = 역할색(--rc). 주간 점도 --rc 상속.
  const m = memberById(r.memberId);
  const rc = m ? m.color : 'var(--accent)';
  const panel = `<div class="habit-panel" style="--rc:${escapeHtml(rc)}">
    <div class="habit-metrics">
      <div class="habit-metric"><span class="hv" style="color:var(--warn)">🔥 ${st}<span class="hvu">일 연속</span></span><span class="hl">현재 연속 달성</span></div>
      <div class="habit-metric"><span class="hv" style="color:var(--rc)">${rate}<span class="hvu">%</span></span><span class="hl">이번 달 달성률</span></div>
    </div>
    <div class="hp-divider"></div>
    <div class="habit-week-cap">이번 주 기록</div>
    ${routineWeekGrid(r)}
  </div>`;
  return `<div class="habit-wrap">${base}${panel}</div>`;
}

// ring 탭: 카운트형은 1탭=부분 채움(+1, 목표 도달 후 다시 탭하면 리셋), 단일형은 토글
function tapRoutine(id, dstr){
  const r=DB.routines.find(x=>x.id===id); if(!r) return;
  const t = dstr || ymd(NOW);
  if(t > ymd(NOW)){ toast('미래 날짜는 체크할 수 없어요'); return; }   // [P3] 백필은 과거·오늘만
  const goal = r.count>1 ? r.count : 1;
  if(goal>1){
    const raw = r.checks[t];
    let cur = raw===true ? goal : (typeof raw==='number' ? raw : 0);
    cur = (cur>=goal) ? 0 : cur+1;          // 도달 후 탭하면 리셋
    if(cur<=0) delete r.checks[t]; else r.checks[t]=cur;
  } else {
    if(r.checks[t]) delete r.checks[t]; else r.checks[t]=true;
  }
  recomputeVisions(); saveDB();   // [QA] 다른 저장 경로와 일관되게 비전 재계산

  reader.onerror=function(){ toast('파일을 읽지 못했어요'); };

    let obj;
    try{ obj=JSON.parse(e.target.result); }

/* [1] 빠른기록 바텀시트 — 배경탭 닫기 + 아래로 드래그(손잡이/시트) 닫기 */
(function(){
  const ov = document.getElementById('qsheetOverlay');
  const sheet = document.getElementById('qsheet');
  // 배경 탭 닫기
  ov.addEventListener('click', e=>{ if(e.target===ov) closeQuickSheet(); });
  // 아래로 드래그(스와이프)해서 닫기 — 시트 상단 영역에서 시작
  let startY=null, dy=0, dragging=false;
  function down(e){
    const y = (e.touches?e.touches[0].clientY:e.clientY);
    startY=y; dy=0; dragging=true;
    sheet.style.transition='none';
  }
  function move(e){
    if(!dragging||startY===null) return;
    const y = (e.touches?e.touches[0].clientY:e.clientY);
    dy = Math.max(0, y-startY);          // 아래로만
    sheet.style.transform = `translateY(${dy}px)`;
  }
  function up(){
    if(!dragging) return;
    dragging=false;
    sheet.style.transition='';
    sheet.style.transform='';
    if(dy>80) closeQuickSheet();          // 충분히 끌어내리면 닫기
  }
  // 손잡이 + 헤더 영역에서 드래그 시작 (그리드 스크롤 방해 없이)
  sheet.addEventListener('touchstart', down, {passive:true});
  sheet.addEventListener('touchmove', move, {passive:true});
  sheet.addEventListener('touchend', up);
  sheet.addEventListener('mousedown', down);
  window.addEventListener('mousemove', move);
  window.addEventListener('mouseup', up);
})();

/* [단일 운영자] '구성원 전환(로그인)' 시트/헤더칩 제거됨 — 구성원은 기록 대상 태그.
   currentMemberId는 기록 입력 시 기본 태그(직전 사용)로만 쓰임(멘탈모델 '로그인' 아님). */
// hex 색에 알파 틴트 (배경용). #rgb/#rrggbb 지원, 아니면 원색 반환 — 미리보기 등에서 사용
function hexTint(hex, alpha){
  const h = String(hex).replace('#','');
  let r,g,b;
  if(h.length===3){ r=parseInt(h[0]+h[0],16); g=parseInt(h[1]+h[1],16); b=parseInt(h[2]+h[2],16); }
  else if(h.length===6){ r=parseInt(h.slice(0,2),16); g=parseInt(h.slice(2,4),16); b=parseInt(h.slice(4,6),16); }
  else return hex;
  return `rgba(${r},${g},${b},${alpha})`;
}

function saveMember(id){
  const nameEl=document.getElementById('mName'); if(nameEl) mForm.name=nameEl.value;
  if(!mForm.name.trim()){ toast('이름을 입력해주세요'); return; }
  if(id){ const m=memberById(id); Object.assign(m,mForm); delete m.emoji; delete m.shape; }
  else { mForm.id=uid(); DB.members.push({...mForm}); }
  saveDB(); closeSheet(); renderAll(); toast('저장되었어요');
}
// [P4] 구성원 삭제 = 확인 + 루틴은 함께 삭제(사람 전용)·기록은 담당'없음'으로 보존 + 실행취소
function deleteMember(id){
  if(DB.members.length<=1){ toast('최소 1명은 필요해요'); return; }
  const m=memberById(id); if(!m) return;
  const recN=DB.records.filter(r=>r.memberId===id).length;
  const rouN=DB.routines.filter(r=>r.memberId===id).length;
  const parts=[];
  if(rouN) parts.push(`루틴 ${rouN}개는 <b>함께 삭제</b>`);
  if(recN) parts.push(`기록 ${recN}건은 <b>남아요(담당 없음)</b>`);
  const note = parts.length ? `연결된 ${parts.join(', ')}.` : `연결된 기록·루틴이 없어요.`;
  confirmDanger({
    title:`‘${escapeHtml(m.name)}’ 구성원을 삭제할까요?`,
    body:`${note} 삭제 직후 잠깐 <b>실행취소</b>할 수 있어요.`,
    onConfirm:`doDeleteMember('${id}')`
  });
}
function doDeleteMember(id){
  const m=memberById(id); if(!m) return;
  const snapMember={...m};
  const snapRoutines=DB.routines.filter(r=>r.memberId===id).map(r=>({...r}));   // 루틴은 스냅샷 후 삭제(사람 전용)
  DB.routines=DB.routines.filter(r=>r.memberId!==id);   // 홈에 담당없는 루틴 남지 않게 함께 삭제
  // [P4] 기록은 memberId 그대로 보존(리포트에 남아야 함). 구성원은 아카이브로 이동 → memberById가 이름·색 계속 조회.
  DB.deletedMembers = DB.deletedMembers || [];
  if(!DB.deletedMembers.some(d=>d.id===id)) DB.deletedMembers.push({ id:m.id, name:m.name, color:m.color, deleted:true });
  DB.members=DB.members.filter(x=>x.id!==id);
  const wasCurrent=DB.currentMemberId===id;
  if(wasCurrent) DB.currentMemberId=DB.members[0].id;
  recomputeVisions(); saveDB(); closeSheet(); renderAll();
  toastAction('구성원을 삭제했어요','실행취소',()=>{
    DB.members.push(snapMember);
    DB.deletedMembers=(DB.deletedMembers||[]).filter(d=>d.id!==id);
    snapRoutines.forEach(r=>DB.routines.push({...r}));
    if(wasCurrent) DB.currentMemberId=id;
    recomputeVisions(); saveDB(); renderAll(); toast('되돌렸어요');
  });
}

// [P4] 대상 카테고리 칩 다중선택 토글 ('전체' 칩은 배타적)
function toggleCapCat(id){ vForm.capCategoryIds = toggleCatId(vForm.capCategoryIds, id, '__allout__'); renderVisionSheet(); }
function toggleSaveCat(id){ vForm.savingCategoryIds = toggleCatId(vForm.savingCategoryIds, id, '__allsave__'); renderVisionSheet(); }
function toggleCatId(arr, id, allSentinel){
  let ids = Array.isArray(arr)&&arr.length ? arr.slice() : [allSentinel];
  if(id===allSentinel){ return [allSentinel]; }           // '전체' 선택 = 배타적
  ids = ids.filter(x=>x!==allSentinel);                    // 개별 선택 시 '전체' 해제
  const i=ids.indexOf(id);
  if(i>=0) ids.splice(i,1); else ids.push(id);
  return ids.length ? ids : [allSentinel];                 // 아무것도 없으면 전체로 복귀
}

function saveVision(){
  if(!vForm.title.trim()){ toast('제목을 입력해주세요'); return; }
  const editing = !!vEditId;
  const v = editing ? visionById(vEditId) : { id:uid() };
  if(editing && !v){ toast('비전을 찾을 수 없어요'); return; }
  v.title=vForm.title.trim(); v.type=vForm.type; v.period=vForm.period;
  // [2] 대상 기간(날짜): 연간=year, 월간=year+month
  v.year = (vForm.year!=null)?vForm.year:NOW.getFullYear();
  if(vForm.period==='month') v.month = (vForm.month!=null)?vForm.month:NOW.getMonth(); else delete v.month;
  if(vForm.type==='QUANT'){
    v.metric = (vForm.metric==='saving'?'saving':(vForm.metric==='cap'?'cap':'manual'));
    v.targetValue = vForm.targetValue||1;
    v.unit = vForm.unit||'원';
    if(v.metric==='cap'){
      v.capCategoryIds = (Array.isArray(vForm.capCategoryIds)&&vForm.capCategoryIds.length)?vForm.capCategoryIds.slice():['__allout__'];
      delete v.capCategoryId; delete v.savingCategoryIds; delete v.savingCategoryId;
      v.startValue = 0; v.currentValue = 0;   // recomputeVisions가 지출로 채움
    } else {
      delete v.capCategoryId; delete v.capCategoryIds;
      v.startValue = vForm.startValue||0;
      v.currentValue = (v.metric==='saving') ? 0 : (vForm.currentValue!=null?vForm.currentValue:v.startValue);
      if(v.metric==='saving'){ v.savingCategoryIds = (Array.isArray(vForm.savingCategoryIds)&&vForm.savingCategoryIds.length)?vForm.savingCategoryIds.slice():['__allsave__']; delete v.savingCategoryId; }
      else { delete v.savingCategoryIds; delete v.savingCategoryId; }
    }
    delete v.dueDate;
  } else {
    const rng=visionPeriodRange(v);
    let due=vForm.dueDate||rng.to;
    if(due<rng.from) due=rng.from; if(due>rng.to) due=rng.to;
    v.dueDate=due;
    delete v.metric; delete v.startValue; delete v.targetValue; delete v.unit; delete v.currentValue; delete v.capCategoryId; delete v.savingCategoryId; delete v.capCategoryIds; delete v.savingCategoryIds;
  }
  if(!editing) DB.visions.push(v);
  const reopenId = editing ? v.id : null;
  vEditId=null;
  recomputeVisions(); saveDB(); closeSheet(); renderAll(); toast(editing?'비전을 수정했어요':'비전이 추가되었어요');
  if(reopenId) openVisionDetail(reopenId);   // 편집 후 상세로 복귀
}

function openRecordSheet(editId, defaultKind, defaultFlow, defaultMember, occDate){

    return;
  } else {
    // 체중 기록은 기본적으로 다이어트(manual·kg) 비전에 연결 시도
    let defVis='';
    if((defaultKind||'')==='weight'){ const dv=DB.visions.find(v=>v.type==='QUANT'&&v.metric==='manual'&&/kg/i.test(v.unit||'')); if(dv) defVis=dv.id; }
    // [P3] 기본값 상속: 종류=직전 사용값 / 구성원=헤더 활성 구성원 / 카테고리=최근 사용 칩 / 날짜·시간=지금
    const defKind = defaultKind||DB.lastKind||'expense';
    const defFlow = defaultFlow||DB.lastFlow||'out';
    let defCat='';
    if(defKind==='expense'){
      // 최근 사용 카테고리가 현재 flow와 같으면 프리셀렉트
      const lc = DB.lastCategory ? categoryById(DB.lastCategory) : null;
      if(lc && (lc.flow||'out')===defFlow) defCat = lc.id;
    }
    // [전략 권고] 캘린더에서 특정 구성원을 선택(필터)한 상태로 기록하면 그 사람으로 기본 지정
    const defMember = defaultMember || DB.currentMemberId || DB.members[0].id;
    rForm={ memberId:defMember, kind:defKind, flow:defFlow, title:'', amount:'', value:'', categoryId:defCat, visionId:defVis, date:ymd(NOW), time:hm(NOW), repeat:'none', remind:'none' };
  }
  recAdvOpen = false;   // [P3] '옵션 더보기'는 매번 접힌 상태로 시작
  renderRecordSheet();
}
/* --- 가계부 카테고리 (사용자 정의, 수입/지출 구분) --- */
let catAddMode=false;
let catDraft={ name:'', color:PRESET_COLORS[0], flow:'out', icon:'🧾' };
// [P4] 카테고리 아이콘 = 네이티브 이모지(외부요청 0). 레거시 라인아이콘 키는 그대로 SVG.
function catIconHtml(c){ if(!c||!c.icon) return ''; return ICONS[c.icon] ? `<span class="cat-ic-line">${icon(c.icon)}</span>` : `<span class="cat-ic-emoji">${c.icon}</span>`; }
function categoryChips(){
  const flow = rForm.flow||'out';
