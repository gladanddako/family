  });
}
// [6] 맥락형 요약 — 선택된 종류 필터에 맞게 요약 카드 교체
// [P4] 돈 요약 — 한 박스 안에서 4분할(수입↖ 저축·투자↗ / 지출↙ 순액↘). 얇은 십자 구분선. 가계부 내역·달력·리포트·회고 공통.
function moneyGrid2x2(inc, exp, sav, net){
  const q=(lbl,val,color)=>`<div class="mq"><div class="mq-l">${lbl}</div><div class="mq-v" style="color:${color}">${val}</div></div>`;
  return `<div class="money-box">
    ${q('수입', '+'+won(inc), 'var(--income)')}
    ${q('저축·투자', '↔'+won(sav), 'var(--good)')}
    ${q('지출', '−'+won(exp), 'var(--danger)')}
    ${q('합계', (net>=0?'+':'−')+won(Math.abs(net)), net>=0?'var(--income)':'var(--danger)')}
  </div>`;
}
let ledgerAssetsOpen = false;   // [요청/프라이버시] 자산(총자산·계좌별)은 기본 접힘 — 기록 중 자산 노출 방지
function toggleLedgerAssets(){ ledgerAssetsOpen=!ledgerAssetsOpen; renderLedger(); }
function moneySummaryHtml(recs){
  const inc = sumIncome(recs), exp = sumExpense(recs), sav = sumSave(recs), net = inc-exp;
  const fmt = n=>`${n<0?'−':''}${won(Math.abs(n))}원`;
  // [요청] 지출 결제수단별 소계(현금/통장/카드/저축)
  const byType = {};
  recs.filter(isExpenseOut).forEach(r=>{ const t=(accountById(acctOf(r))||{}).type||'cash'; byType[t]=(byType[t]||0)+(r.amount||0); });
  const spendBreak = ['cash','bank','card','save'].filter(t=>byType[t]).map(t=>`${ACCT_TYPE[t].i} ${won(byType[t])}원`).join(' ');
  // [요청/프라이버시] 자산 = 접힘. 펴면 총자산·계좌별.
  const open = ledgerAssetsOpen, total = totalAssets();
  const acctRows = (DB.accounts||[]).map(a=>{ const b=accountBalance(a.id); return `<div class="asset-row"><span class="asset-ic">${a.icon||(ACCT_TYPE[a.type]||{}).i||'🏦'}</span><span class="asset-name">${escapeHtml(a.name)}</span><span class="asset-bal ${b<0?'neg':''}">${fmt(b)}</span></div>`; }).join('');
  return `${moneyGrid2x2(inc, exp, sav, net)}
    ${spendBreak?`<div class="spend-break"><span class="sb-l">지출 상세</span> ${spendBreak}</div>`:''}
    <div class="asset-fold">
      <div class="asset-foldhead ${open?'open':''}" onclick="toggleLedgerAssets()"><span class="sb-l">자산${open?` · 총 <b class="asset-total ${total<0?'neg':''}">${fmt(total)}</b>`:' 보기'}</span><span class="asset-chev">${icon('chevron-down')}</span></div>
      ${open?`<div class="asset-foldbody">${acctRows}<div class="asset-manage" onclick="event.stopPropagation();acctMgrReturnRecord=false;openAccountManager()">계좌 관리 ›</div></div>`:''}
    </div>`;
}
// [#4] 캘린더 요약 — 시간·활동(일정/운동/체중) 기준. 돈은 안 보여줌. recs엔 expense 없음.
// [P4] 요약 한 박스 그리드(가계부 money-box와 동일 스타일) — items:[{l,v}]. 열 수는 항목 수에 맞춤.
function statBox(items){
  const cells = items.map(it=>`<div class="mq"><div class="mq-l">${it.l}</div><div class="mq-v" style="color:var(--ink)">${it.v}</div></div>`).join('');
  return `<div class="stat-box" style="grid-template-columns:repeat(${items.length},minmax(0,1fr))">${cells}</div>`;
}
function calSummaryHtml(recs){
  if(recKindFilter==='weight'){
    const ws = recs.filter(r=>r.kind==='weight').sort((a,b)=>b.ts-a.ts);
    const latest = ws.length ? ws[0].value : null;
    return statBox([{l:'최근 체중', v:latest!=null?latest+'kg':'-'}, {l:'측정 횟수', v:ws.length+'회'}]);
  }
  if(recKindFilter==='workout'){
    const wks = recs.filter(r=>r.kind==='workout');
    return statBox([{l:'운동 횟수', v:wks.length+'회'}, {l:'전체 활동', v:recs.length+'건'}]);
  }
  if(recKindFilter==='event'){
    const evs = recs.filter(r=>r.kind==='event');
    const upcoming = evs.filter(r=>r.ts>=NOW.getTime()).length;
    return statBox([{l:'일정 건수', v:evs.length+'건'}, {l:'다가오는 일정', v:upcoming+'건'}]);
  }
  // 전체(돈 제외) → 일정/운동/체중 건수
  const evs = recs.filter(r=>r.kind==='event').length;
  const wks = recs.filter(r=>r.kind==='workout').length;
  const wgs = recs.filter(r=>r.kind==='weight').length;
  return statBox([{l:'일정', v:evs+'건'}, {l:'운동', v:wks+'회'}, {l:'체중 기록', v:wgs+'회'}]);
}

/* ============================================================
   PAGE: LEDGER / 가계부 탭 (수입/지출 입력·내역·카테고리 + 가계 리포트)
   기존 가계부(가계부 종류 필터/수입·지출)와 돈 관련 보고서를 이 탭으로 모음.
   구성원/종류/기간 필터 유지. 종류 필터는 기본 '가계부'로 두되 전체도 선택 가능.
   ============================================================ */
// 가계부 전용 기간 상태 (캘린더의 recordView와 충돌 없이 독립)
let ledgerView = 'month';                                           // today | week | month
let ledgerDay = ymd(NOW);
let ledgerWeekStart = ymd(addDays(NOW, -((NOW.getDay()+6)%7)));
let ledgerMonth = { y:NOW.getFullYear(), m:NOW.getMonth() };
// [P4] 내역 하위 뷰: 목록 ⇄ 달력(뱅샐 스타일 — 하루 지출액 + 월 합계). 달력은 항상 월 단위.
// [P4] 달력 셀용 짧은 금액 — 만/천 단위 축약 (긴 원표기 대신)
function wonCell(n){   // [버그수정] 가계부 달력 셀 전용 압축표기(만/천). 기존 이름이 wonShort라 목표용 억/만 wonShort(1373)를 덮어써 '2억'이 '20000만'으로 표기되던 것 → 이름 분리
  n=Math.round(Math.abs(Number(n)||0));
  if(n>=10000){ const man=n/10000; return (man>=100?String(Math.round(man)):String(Math.round(man*10)/10))+'만'; }
  if(n>=1000){ return Math.round(n/1000)+'천'; }
  return String(n);
}
function setLedgerView(v){
  ledgerView=v;
  ledgerDay=ymd(NOW);
  ledgerWeekStart=ymd(addDays(NOW, -((NOW.getDay()+6)%7)));
  ledgerMonth={ y:NOW.getFullYear(), m:NOW.getMonth() };
  renderLedger();
}
function shiftLedgerPeriod(dir){
  if(ledgerView==='today') ledgerDay=ymd(addDays(parseYmd(ledgerDay), dir));
  else if(ledgerView==='week') ledgerWeekStart=ymd(addDays(parseYmd(ledgerWeekStart), dir*7));
  else { let m=ledgerMonth.m+dir, y=ledgerMonth.y; if(m<0){m=11;y--;} if(m>11){m=0;y++;} ledgerMonth={y,m}; }
  renderLedger();
}
function ledgerRange(){
  if(ledgerView==='today'){ const d=parseYmd(ledgerDay); return { from:ledgerDay, to:ledgerDay, label:dayTitle(ledgerDay), pickLabel:`${d.getFullYear()}년 ${fmtDateK(d)}` }; }
  if(ledgerView==='week'){ const s=parseYmd(ledgerWeekStart); const e=addDays(s,6); const isThis=ledgerWeekStart===ymd(addDays(NOW,-((NOW.getDay()+6)%7))); const lab=`${s.getMonth()+1}/${s.getDate()} ~ ${e.getMonth()+1}/${e.getDate()}`; return { from:ymd(s), to:ymd(e), label:isThis?`이번 주 (${lab})`:lab, pickLabel:`${lab} 주간` }; }
  const y=ledgerMonth.y, mo=ledgerMonth.m; const isThis=(y===NOW.getFullYear()&&mo===NOW.getMonth()); const lab=`${y}년 ${mo+1}월`;
  return { from:ymd(new Date(y,mo,1)), to:ymd(new Date(y,mo+1,0)), label:isThis?`${lab} (이번 달)`:lab, pickLabel:lab };
}
// [P4] 단위(일/주/월) 전환을 기간 시트 안에서. 주간·일간은 달력(월 전용)이 아니라 목록으로 자동 전환.
function setLedgerViewInPicker(v){ setLedgerView(v); openLedgerPeriodPicker(); }
function openLedgerPeriodPicker(){
  // [P4][회의] 박스 감량 — 적용/취소 버튼 제거, 날짜 고르면 바로 적용·닫힘. 단위는 세그로 전환.
  let field='';
  if(ledgerView==='today') field=`<div class="field"><label>날짜 선택</label><input type="date" id="lpVal" value="${ledgerDay}" onchange="applyLedgerPeriodPick()"></div>`;
  else if(ledgerView==='week') field=`<div class="field"><label>주 시작일 선택</label><input type="date" id="lpVal" value="${ledgerWeekStart}" onchange="applyLedgerPeriodPick()"><div class="fhint">고른 날짜가 속한 주(월요일 시작)로 맞춰져요.</div></div>`;
  else { const mv=`${ledgerMonth.y}-${String(ledgerMonth.m+1).padStart(2,'0')}`; field=`<div class="field"><label>연·월 선택</label><input type="month" id="lpVal" value="${mv}" onchange="applyLedgerPeriodPick()"></div>`; }
  const unitSeg=`<div class="seg seg-sm" style="margin-bottom:var(--sp-5)">
    <button class="${ledgerView==='today'?'on':''}" onclick="setLedgerViewInPicker('today')">일간</button>
    <button class="${ledgerView==='week'?'on':''}" onclick="setLedgerViewInPicker('week')">주간</button>
    <button class="${ledgerView==='month'?'on':''}" onclick="setLedgerViewInPicker('month')">월간</button>
  </div>`;
  showSheet(`<h3>기간 선택</h3>${unitSeg}${field}`);
}
function applyLedgerPeriodPick(){
  const el=document.getElementById('lpVal'); if(!el){ closeSheet(); return; }
  const val=el.value;
  if(ledgerView==='today'){ if(val) ledgerDay=val; }
  else if(ledgerView==='week'){ if(val){ const d=parseYmd(val); ledgerWeekStart=ymd(addDays(d,-((d.getDay()+6)%7))); } }
  else { if(val){ const [y,m]=val.split('-').map(Number); ledgerMonth={ y, m:(m-1) }; } }
  closeSheet(); renderLedger();
}
// 가계부 내역(기간 내, 필터 반영) — 시간순. 가계부 외 종류도 필터에 따라 포함 가능(종류 필터 유지).
function ledgerRecords(){
  const rng=ledgerRange();
  // [#4] 가계부는 '돈' 전용 → 지출·수입(kind==='expense')만. 일정·운동·체중은 캘린더/목표 소관.
  //  구성원 필터만 적용(종류 필터는 캘린더 전용이라 여기선 무시).
  return DB.records
    .filter(r=>r.kind==='expense')
    .filter(r=>memberScope==='all' || r.memberId===memberScope)
    .filter(r=>{ const ds=ymd(new Date(r.ts)); return ds>=rng.from && ds<=rng.to; })
    .sort((a,b)=>b.ts-a.ts);
}
function renderLedger(){
  // [FEAT-2] 가계부 = 내역만. '가계 리포트'는 목표 탭 '기간별 회고'로 통합(돈/전체 토글). 내역/리포트 모드 토글 제거.
  document.getElementById('page-ledger').innerHTML = renderLedgerList();
  renderFilterFab();
  fitStatValues(); requestAnimationFrame(fitStatValues);
}
function renderLedgerList(){
  let html = '';
  // --- 목록 뷰 ---
  // [P4] 회의 반영(홈탭 담백함): 프리셋 세그(오늘/7일/이번달) 제거 → 기간 바 하나로. 단위(일/주/월)는 기간 시트 안에서 전환.
  const rng=ledgerRange();
  html += `<div class="log-filters">`;
  html += `<div class="period-row">
    <div class="pperiod">
      <button class="pnav" onclick="shiftLedgerPeriod(-1)" aria-label="이전 기간">${icon('chevron-left')}</button>
      <div class="plabel ptap" onclick="openLedgerPeriodPicker()">${escapeHtml(rng.pickLabel)} ${icon('calendar',13)}</div>
      <button class="pnav" onclick="shiftLedgerPeriod(1)" aria-label="다음 기간">${icon('chevron-right')}</button>
    </div>
  </div>`;
  html += `</div>`;
  const recs=ledgerRecords();
  html += moneySummaryHtml(recs);
  if(ledgerView==='week') html += ledgerWeekGrid();   // [요청] 주 선택 시 주간 달력
  else if(ledgerView==='month') html += ledgerMonthGrid();   // [요청] 월 선택 시 월 달력(목록/달력 토글 제거 → 기간 셀렉터로 통일)
  // [P4] '○○ 내역' 제목 제거(탭 이름이 이미 가계부라 중복). 날짜 그룹 헤더가 맥락 담당.
  html += ledgerListHtml(recs);
  // [P4] '카테고리 관리'는 내역 피드에서 제거 → 필터 시트 안으로 이동(설정성 액션이라 읽는 화면 밖으로).
  return html;
}
// [P4] 가계부 달력 뷰(뱅샐 스타일) — 이번 달 그리드에 하루 지출액 + 상단 월 합계. 날짜 탭 → 그날 내역.
// [요청] 가계부 목록 '주간' 선택 시 주간 달력 — 달력 뷰의 lgc-cell 재사용(테두리 없음). 그 주 7일 일별 지출.
function ledgerWeekGrid(){
  const start=parseYmd(ledgerWeekStart), end=addDays(start,6);
  const isThis = ledgerWeekStart===ymd(addDays(NOW,-((NOW.getDay()+6)%7)));
  const rangeLabel = (isThis?'이번 주 · ':'')+`${start.getMonth()+1}/${start.getDate()} ~ ${end.getMonth()+1}/${end.getDate()}`;
  let recs=DB.records.filter(r=>r.kind==='expense');
  if(memberScope!=='all') recs=recs.filter(r=>r.memberId===memberScope);
  const dayExp={};
  recs.forEach(r=>{ if(isExpenseOut(r)){ const ds=ymd(new Date(r.ts)); dayExp[ds]=(dayExp[ds]||0)+(r.amount||0); } });
  let strip='';
  for(let i=0;i<7;i++){
    const d=addDays(start,i), ds=ymd(d), exp=dayExp[ds]||0;
    const isToday=ds===ymd(NOW);
    strip+=`<div class="d ${isToday?'today':''}" onclick="ledgerScrollDay('${ds}')"><div class="dn">${DOW[d.getDay()]}</div><div class="dd">${d.getDate()}</div><div class="lgw-amt">${exp>0?wonCell(exp):''}</div></div>`;   // [회의] 가계부 주간 = 탭하면 그 날 내역으로 스크롤(선택 테두리는 없음 — 전체 목록이라 필터 오해 방지)
  }
  // [요청] 캘린더 주간(viewWeek)과 동일 구조·토큰(.wk, 날짜범위 sec-title) — 흰 배경만 제거
  return `<div class="sec-title">${escapeHtml(rangeLabel)}</div><div class="wk lgw" style="margin-bottom:var(--gap-section)">${strip}</div>`;   // [요청] 주간→지출박스 여백 24(캘린더 grid→오늘 24·박스 위 24 규칙과 통일)
}
// [요청] 월 선택 시 월 달력(달력 뷰 그리드 재사용, 테두리 없는 lgc-cell). 날짜 탭 → 그 날 내역으로 스크롤.
function ledgerMonthGrid(){
  const y=ledgerMonth.y, mo=ledgerMonth.m;
  const from=ymd(new Date(y,mo,1)), to=ymd(new Date(y,mo+1,0));
  let recs=DB.records.filter(r=>r.kind==='expense');
  if(memberScope!=='all') recs=recs.filter(r=>r.memberId===memberScope);
  const dayExp={};
  recs.forEach(r=>{ if(isExpenseOut(r)){ const ds=ymd(new Date(r.ts)); if(ds>=from&&ds<=to) dayExp[ds]=(dayExp[ds]||0)+(r.amount||0); } });
  const startDow=new Date(y,mo,1).getDay(), daysIn=new Date(y,mo+1,0).getDate();
  let cells=DOW.map(d=>`<div class="lgc-dow">${d}</div>`).join('');
  for(let i=0;i<startDow;i++) cells+=`<div class="lgc-cell empty"></div>`;
  for(let dd=1;dd<=daysIn;dd++){
    const ds=ymd(new Date(y,mo,dd)), exp=dayExp[ds]||0;
    const cls=['lgc-cell']; if(ds===ymd(NOW))cls.push('today');
    const amt=exp>0?`<span class="lgc-amt">${wonCell(exp)}</span>`:'';
    cells+=`<div class="${cls.join(' ')}" onclick="ledgerScrollDay('${ds}')"><span class="lgc-d">${dd}</span>${amt}</div>`;
  }
  return `<div class="lgc-grid" style="margin-bottom:var(--gap-section)">${cells}</div>`;
}
function ledgerScrollDay(ds){ scrollScreenTo('lgday-'+ds); }   // [버그] scrollIntoView는 window까지 스크롤해 탭바가 밀림 → #screen 컨테이너만 스크롤하는 scrollScreenTo 재사용
// [#가계부 날짜] 내역을 '날짜별'로 묶어 표시 — 각 날짜 헤더에 그날 순액. 행은 시간만(날짜는 헤더가 담당).
//  여러 날(이번 달/최근 7일) 내역에서 며칠 건지 한눈에 구분되게 함.
function ledgerListHtml(recs){
  if(!recs.length) return `<div class="open-list"><div class="muted">기록이 없어요</div></div>`;
  // recs는 ts 내림차순(최신 먼저) → 날짜 그룹도 최신일 먼저
  const groups = [], map = {};
  recs.forEach(r=>{
    const ds = ymd(new Date(r.ts));
    if(!map[ds]){ map[ds] = { ds, items:[] }; groups.push(map[ds]); }
    map[ds].items.push(r);
  });
  // [요청] 같은 날짜 = 한 색으로 묶음(그 안 내역은 선으로 구분). 날짜가 바뀌면 2톤(기본↔연한) 번갈아. 화면 끝까지.
  let html='';
  groups.forEach((g, gi)=>{
    const inc = sumIncome(g.items), exp = sumExpense(g.items);
    // [요청] 날짜 옆 합계는 숫자 하나만 — 지출이 있으면 지출, 지출 없는 날(급여 등)은 수입.
    const sumHtml = exp>0 ? `<span class="lg-day-exp">−${won(exp)}원</span>` : (inc>0 ? `<span class="lg-day-inc">+${won(inc)}원</span>` : '');
    const rows = g.items.map(r=>renderRecordRow(r,{showTime:true,editable:true,hideRole:memberScope!=='all'})).join('');   // [요청] 캘린더와 통일 — 전체 필터일 땐 구성원 표시, 특정 구성원 선택 시 숨김
    html += `<div class="lg-day-group" id="lgday-${g.ds}">
      <div class="lg-day-head"><span class="lg-day-date">${escapeHtml(ledgerDayLabel(g.ds))}</span><span class="lg-day-sum">${sumHtml}</span></div>
      ${rows}</div>`;
  });
  return `<div class="lg-flat">${html}</div>`;
}
// 날짜 헤더 라벨 — 오늘/어제는 단어 + 날짜(요일), 그 외엔 "6월 28일 (토)"
function ledgerDayLabel(ds){
  const d = parseYmd(ds);
  const base = fmtDateK(d);   // 이미 "6월 28일 (토)" 형태 — 요일 포함
  if(ds===ymd(NOW)) return `오늘 · ${base}`;
  if(ds===ymd(addDays(NOW,-1))) return `어제 · ${base}`;
  return base;
}
// 카테고리 관리 시트 (수입/지출 카테고리 추가·삭제) — 기록 시트 밖에서 독립 관리
let catMgrFlow = 'out';
let catEditId = null;   // [P3] 카테고리 편집 중인 id
function openCategoryManager(){ catEditId=null; catDraft={ name:'', color:PRESET_COLORS[0], flow:catMgrFlow, icon:'🍚' }; renderCategoryManager(); }
// [P3] 카테고리 편집 시작 — 이름·아이콘을 폼에 불러옴
function editCatInMgr(id){
  const c=(DB.categories||[]).find(x=>x.id===id); if(!c) return;
  catEditId=id; catMgrFlow=c.flow||'out';
  catDraft={ name:c.name, color:c.color||SWATCH_DEFAULT, flow:c.flow||'out', icon:c.icon||'receipt' };
  renderCategoryManager();
}
function renderCategoryManager(){
  const cats=(DB.categories||[]).filter(c=>(c.flow||'out')===catMgrFlow);
  const emos=CATEGORY_ICONS.map(e=>`<div class="emoji-opt ${catDraft.icon===e?'on':''}" onclick="catDraft.icon='${e}';renderCategoryManager()">${e}</div>`).join('');
  const list=cats.map(c=>{
    return `<div class="cat-mini-row"><span class="cat-ava-sm">${catIconHtml(c)}</span><span class="cname">${escapeHtml(c.name)}</span>
      <span style="margin-left:auto;display:flex;gap:var(--sp-4);align-items:center">
        <span class="cedit" onclick="editCatInMgr('${c.id}')">수정</span>
        <span class="cdel" onclick="deleteCategory('${c.id}','manager')">삭제</span>
      </span></div>`;
  }).join('');   // [요청] 기본 카테고리도 삭제 가능(삭제 시 deletedCats에 기록해 재병합 방지)
  const editing = !!catEditId;
  showSheet(`<h3>카테고리 관리</h3>
    <div class="field" style="margin-bottom:var(--sp-4)"><label>${editing?'카테고리 수정':'새 '+(catMgrFlow==='in'?'수입':(catMgrFlow==='save'?'저축·투자':'지출'))+' 카테고리'} 이름</label><input type="text" id="cmName" value="${escapeHtml(catDraft.name)}" placeholder="${catMgrFlow==='in'?'예: 부수입':(catMgrFlow==='save'?'예: 청약':'예: 반려동물')}" oninput="catDraft.name=this.value;refreshSheetDone()"></div>
    <div class="field" style="margin-bottom:var(--sp-4)"><label>아이콘</label><div class="emoji-pick">${emos}</div></div>
    <div style="height:1px;background:var(--line);margin:var(--gap-block) 0"></div>
    <div class="seg" style="margin-bottom:var(--sp-5)">
      <button class="${catMgrFlow==='out'?'on':''}" onclick="catMgrFlow='out';catEditId=null;renderCategoryManager()">지출</button>
      <button class="${catMgrFlow==='in'?'on':''}" onclick="catMgrFlow='in';catEditId=null;renderCategoryManager()">수입</button>
      <button class="${catMgrFlow==='save'?'on':''}" onclick="catMgrFlow='save';catEditId=null;renderCategoryManager()">저축·투자</button>
    </div>
    <div class="cat-mini" style="margin-top:0;padding-top:0;border-top:none;margin-bottom:var(--sp-8)">${list||'<div class="muted">카테고리가 없어요</div>'}</div>
    <div class="sheet-foot">
      <button class="btn btn-primary btn-block" onclick="addCategoryFromManager()">${editing?'저장':'추가하기'}</button>
      ${editing?`<button class="btn btn-neutral btn-block" onclick="catEditId=null;catDraft={name:'',color:PRESET_COLORS[0],flow:catMgrFlow,icon:'🍚'};renderCategoryManager()">편집 취소</button>`:''}
    </div>`, {stickyFoot:true, formKind:'catmgr', done:{ready: !!catDraft.name.trim()}, back: catMgrReturnRecord?{label:'기록으로', onclick:'backToRecordFromCatMgr()'}:null});   // [요청] 기록처럼 완료 헤더 + 닫을 때 초안 자동추가. '추가하기'는 연속추가용 유지
}
// [일관성] 카테고리 초안 커밋(추가/수정) — 화면 갱신 없이 DB만. 닫기 자동저장·기록복귀 공용. 커밋했으면 true.
function commitCatDraft(){
  if(!catDraft.name.trim()) return false;
  if(catEditId){
    const c=(DB.categories||[]).find(x=>x.id===catEditId);
    if(c){ c.name=catDraft.name.trim(); c.icon=catDraft.icon||'🧾'; }
    catEditId=null;
  } else {
    DB.categories=DB.categories||[];
    DB.categories.push({ id:uid(), name:catDraft.name.trim(), color:catDraft.color||SWATCH_DEFAULT, flow:catMgrFlow, icon:catDraft.icon||'🧾' });
  }
  catDraft={ name:'', color:PRESET_COLORS[Math.floor(Math.random()*PRESET_COLORS.length)], flow:catMgrFlow, icon:'🍚' };
  saveDB();
  return true;
}
// [요청] '추가하기' 버튼 = 명시적 추가 후 계속(초안 비우고 유지 → 여러 개 연속 추가)
function addCategoryFromManager(){
  if(!catDraft.name.trim()){ toast('카테고리 이름을 입력해주세요'); return; }
  const wasEdit=!!catEditId;
  commitCatDraft(); renderAll(); renderCategoryManager(); toast(wasEdit?'카테고리를 수정했어요':'카테고리를 추가했어요');
}

/* --- 계좌(자산) 관리 — 카테고리 관리와 동일 패턴(완료 헤더·닫으면 자동추가) --- */
let acctDraft = { name:'', type:'bank', icon:'', startBalance:0 };
let acctEditId = null;
let acctMgrReturnRecord = false;   // [요청] 기록 폼에서 계좌 관리 열면 '기록으로' 복귀
function openAccountManagerFromRecord(){ acctMgrReturnRecord=true; openAccountManager(); }
function backToRecordFromAcctMgr(){ if(commitAcctDraft()) renderAll(); acctMgrReturnRecord=false; renderRecordSheet(); }
function openAccountManager(){ acctEditId=null; acctDraft={ name:'', type:'bank', icon:'', balance:0 }; renderAccountManager(); }
function openAccountEdit(id){ const a=accountById(id); if(!a) return; acctEditId=id; acctDraft={ name:a.name, type:a.type||'bank', icon:a.icon||'', balance:accountBalance(id) }; renderAccountManager(); }   // [요청] 수정 시 '지금 잔액'을 보여줌(시작잔액 아님)
function renderAccountManager(){
  const editing=!!acctEditId;
  const typeChips = `<div class="chip-row">${['cash','bank','card','save'].map(t=>`<div class="chip ${acctDraft.type===t?'on':''}" onclick="acctDraft.type='${t}';renderAccountManager()">${ACCT_TYPE[t].i} ${ACCT_TYPE[t].l}</div>`).join('')}</div>`;
  const list=(DB.accounts||[]).map(a=>{
    const bal=accountBalance(a.id);
    return `<div class="cat-mini-row"><span class="cat-ava-sm">${a.icon||(ACCT_TYPE[a.type]||{}).i||'🏦'}</span><span class="cname">${escapeHtml(a.name)} <b style="color:${bal<0?'var(--danger)':'var(--ink-2)'};font-weight:600;font-variant-numeric:tabular-nums">${bal<0?'−':''}${won(Math.abs(bal))}원</b></span>
      <span style="margin-left:auto;display:flex;gap:var(--sp-4);align-items:center">
        <span class="cedit" onclick="openAccountEdit('${a.id}')">수정</span>
        ${((DB.accounts||[]).length>1)?`<span class="cdel" onclick="deleteAccount('${a.id}')">삭제</span>`:''}
      </span></div>`;
  }).join('');
  showSheet(`<h3>계좌 관리</h3>
    <div class="field" style="margin-bottom:var(--sp-4)"><label>${editing?'계좌 수정':'새 계좌'} 이름</label><input type="text" id="accName" value="${escapeHtml(acctDraft.name)}" placeholder="예: 신한통장 / 현대카드" oninput="acctDraft.name=this.value;refreshSheetDone()"></div>
    <div class="field" style="margin-bottom:var(--sp-4)"><label>종류</label>${typeChips}</div>
    <div class="field" style="margin-bottom:var(--sp-4)"><label>잔액</label><div class="unit-input"><input type="number" id="accStart" value="${acctDraft.balance||0}" oninput="acctDraft.balance=+this.value||0"><span class="ui-suffix">원</span></div><div class="fhint">지금 이 계좌에 있는 실제 금액. 여기 맞추면 잔액이 그 값이 돼요. 카드는 보통 0(쓴 만큼 미결제로 쌓여요).</div></div>
    <div style="height:1px;background:var(--line);margin:var(--gap-block) 0"></div>
    <div class="cat-mini" style="margin-top:0;padding-top:0;border-top:none;margin-bottom:var(--sp-8)">${list||'<div class="muted">계좌가 없어요</div>'}</div>
    <div class="sheet-foot">
      <button class="btn btn-primary btn-block" onclick="addAccountFromManager()">${editing?'저장':'추가하기'}</button>
      ${editing?`<button class="btn btn-neutral btn-block" onclick="acctEditId=null;acctDraft={name:'',type:'bank',icon:'',balance:0};renderAccountManager()">편집 취소</button>`:''}
    </div>`, {stickyFoot:true, formKind:'acctmgr', done:{ready: !!acctDraft.name.trim()}, back: acctMgrReturnRecord?{label:'기록으로', onclick:'backToRecordFromAcctMgr()'}:null});
}
function commitAcctDraft(){
  if(!acctDraft.name.trim()) return false;
  const icon = acctDraft.icon || (ACCT_TYPE[acctDraft.type]||{}).i || '🏦';
  const target = acctDraft.balance||0;   // 사용자가 입력한 '지금 잔액'
  if(acctEditId){
    const a=accountById(acctEditId);
    if(a){
      const cur = accountBalance(acctEditId);   // 현재 잔액(옛 시작잔액 기준)
      a.name=acctDraft.name.trim(); a.type=acctDraft.type; a.icon=icon;
      a.startBalance = (a.startBalance||0) + (target - cur);   // [요청] 잔액을 입력값에 맞추도록 시작잔액 역산
    }
    acctEditId=null;
  } else {
    DB.accounts=DB.accounts||[];
    DB.accounts.push({ id:uid(), name:acctDraft.name.trim(), type:acctDraft.type, icon:icon, startBalance:target });
  }
  acctDraft={ name:'', type:'bank', icon:'', balance:0 };
  saveDB();
  return true;
}
function addAccountFromManager(){
  if(!acctDraft.name.trim()){ toast('계좌 이름을 입력해주세요'); return; }
  const wasEdit=!!acctEditId;
  commitAcctDraft(); renderAll(); renderAccountManager(); toast(wasEdit?'계좌를 수정했어요':'계좌를 추가했어요');
}
function deleteAccount(id){
  if((DB.accounts||[]).length<=1){ toast('최소 1개는 필요해요'); return; }
  const a=accountById(id); if(!a) return;
  const used=DB.records.filter(r=>r.kind==='expense' && (r.accountId===id||r.fromAccountId===id||r.toAccountId===id)).length;
  confirmDanger({ title:`‘${escapeHtml(a.name)}’ 계좌를 삭제할까요?`, body:used?`이 계좌로 된 기록 ${used}건은 남아요(주계좌로 처리). 삭제 직후 실행취소 가능.`:'삭제 직후 실행취소 가능.', onConfirm:`doDeleteAccount('${id}')` });
}
function doDeleteAccount(id){
  const a=accountById(id); if(!a) return;
  const snap={...a};
  DB.accounts=(DB.accounts||[]).filter(x=>x.id!==id);
  if(DB.mainAccountId===id) DB.mainAccountId=((DB.accounts||[])[0]||{}).id||null;
  saveDB(); renderAll(); renderAccountManager();
  toastAction('계좌를 삭제했어요','실행취소',()=>{ DB.accounts.push(snap); if(!DB.mainAccountId) DB.mainAccountId=snap.id; saveDB(); renderAll(); toast('되돌렸어요'); });
}
// [기간 탐색] 세그 = 단위 전환 + 그 단위의 '현재'로 점프(jump-to-current)
function setRecordView(v){
  recordView=v;
  recDay = ymd(NOW);
  recWeekStart = ymd(addDays(NOW, -((NOW.getDay()+6)%7)));
  recMonth = { y:NOW.getFullYear(), m:NOW.getMonth() };
  selDay = ymd(NOW);
  renderRecord();
}
// 현재 선택된 기록 기간이 '지금' 기준인지 (세그 활성 표시용)
// [기간 탐색] 이전/다음 기간 이동 (단위별)
function shiftRecPeriod(dir){
  if(recordView==='today'){
    recDay = ymd(addDays(parseYmd(recDay), dir));
    selDay = recDay;
  } else if(recordView==='week'){
    recWeekStart = ymd(addDays(parseYmd(recWeekStart), dir*7));
    selDay = recWeekStart;   // 주 이동 시 선택일을 그 주 시작일로
  } else {
    let m=recMonth.m+dir, y=recMonth.y;
    if(m<0){ m=11; y--; } if(m>11){ m=0; y++; }
    recMonth={ y, m };
    selDay = ymd(new Date(y, m, 1));   // 월 이동 시 선택일을 그 달 1일로
  }
  renderRecord();
}
// [기간 탐색] 기간 라벨 탭 → 날짜/주 시작일/월 선택 시트 (보고서 openReportPeriodPicker 패턴)
function openRecordPeriodPicker(){
  let field='';
  if(recordView==='today'){
    field=`<div class="field"><label>날짜 선택</label><input type="date" id="recpVal" value="${recDay}" onchange="applyRecordPeriodPick()"></div>`;
  } else if(recordView==='week'){
    field=`<div class="field"><label>주 시작일 선택</label><input type="date" id="recpVal" value="${recWeekStart}" onchange="applyRecordPeriodPick()">
      <div class="fhint">고른 날짜가 속한 주(월요일 시작)로 맞춰져요.</div></div>`;
  } else {
    const mv=`${recMonth.y}-${String(recMonth.m+1).padStart(2,'0')}`;
    field=`<div class="field"><label>연·월 선택</label><input type="month" id="recpVal" value="${mv}" onchange="applyRecordPeriodPick()"></div>`;
  }
  // [P4] 가계부와 동일 — 세그로 주/월 전환 + 날짜 고르면 바로 적용(적용/취소 버튼 제거).
  const unitSeg=`<div class="seg seg-sm" style="margin-bottom:var(--sp-5)">
    <button class="${recordView==='week'?'on':''}" onclick="setRecordViewInPicker('week')">주간</button>
    <button class="${recordView==='month'||recordView==='today'?'on':''}" onclick="setRecordViewInPicker('month')">월간</button>
  </div>`;
  showSheet(`<h3>기간 선택</h3>${unitSeg}${field}`);
}
function setRecordViewInPicker(v){ setRecordView(v); openRecordPeriodPicker(); }
function applyRecordPeriodPick(){
  const el=document.getElementById('recpVal'); if(!el){ closeSheet(); return; }
  const val=el.value;
  if(recordView==='today'){
    if(val){ recDay=val; selDay=val; }
  } else if(recordView==='week'){
    if(val){ const d=parseYmd(val); recWeekStart=ymd(addDays(d, -((d.getDay()+6)%7))); selDay=recWeekStart; }
  } else {
    if(val){ const [y,m]=val.split('-').map(Number); recMonth={ y, m:(m-1) }; selDay=ymd(new Date(y,m-1,1)); }
  }
  closeSheet(); renderRecord();
}
// [기간 탐색] 현재 단위·기준점의 라벨/범위 (네비게이터 라벨 + 동적 제목용)
//  label: 화면 제목용 (오늘/어제/날짜 · 주 범위 · 선택 월) · pickLabel: 네비게이터 라벨
function recordRange(){
  if(recordView==='today'){
    const d=parseYmd(recDay);
    const todayS=ymd(NOW), yestS=ymd(addDays(NOW,-1));
    let lab;
    if(recDay===todayS) lab='오늘';
    else if(recDay===yestS) lab='어제';
    else lab=fmtDateK(d);
    return { label:lab, pickLabel:`${d.getFullYear()}년 ${fmtDateK(d)}` };
  }
  if(recordView==='week'){
    const s=parseYmd(recWeekStart); const e=addDays(s,6);
    const isThis = recWeekStart===ymd(addDays(NOW, -((NOW.getDay()+6)%7)));
    const rangeLab=`${s.getMonth()+1}/${s.getDate()} ~ ${e.getMonth()+1}/${e.getDate()}`;
    return { label: isThis ? `이번 주 (${rangeLab})` : rangeLab, pickLabel:`${rangeLab} 주간` };
  }
  // month
  const y=recMonth.y, mo=recMonth.m;
  const isThis = (y===NOW.getFullYear() && mo===NOW.getMonth());
  const monthLab=`${y}년 ${mo+1}월`;
  return { label: isThis ? `${monthLab} (이번 달)` : monthLab, pickLabel:monthLab };
}

/* ============================================================
   [P4] 기록 탭 경량 필터 — 단일 '필터' 버튼 + 활성 필터 칩
   상시 노출되던 구성원/종류 칩 행을 접고, '필터' 버튼 + 켜진 필터만 칩으로 표시.
   칩의 X를 탭하면 그 필터만 '전체'로 해제. 자세한 선택은 시트(모든 기능 유지).
   ============================================================ */
const REC_KIND_LABELS = { all:'전체', expense:'가계부', workout:'운동', event:'일정', weight:'체중' };
// [#4] scope: 'calendar'=구성원+종류 필터 / 'ledger'=구성원 필터만(돈 전용이라 종류 필터 불필요)
// [전역] 스코프 시트 — 어느 탭에서 열어도 구성원 스코프(전역) 선택. 종류(kind)는 캘린더 전용(로컬).
function fabScope(){ return curTab==='calendar' ? 'calendar' : (curTab==='ledger' ? 'ledger' : (curTab==='vision' ? 'vision' : 'home')); }
function openRecordFilterSheet(scope){
  scope = scope || fabScope();
  let kindSection = '';
  if(scope==='calendar'){   // 종류 필터는 캘린더에서만(일정·운동·체중). 다른 탭은 구성원만.
    const kinds=[['all','전체','funnel'],['event','일정','calendar'],['workout','운동','barbell'],['weight','체중','scale']];
    const kindChips = kinds.map(k=>`<div class="chip ${recKindFilter===k[0]?'on':''}" onclick="setScopeKind('${k[0]}')">${icon(k[2],14)} ${k[1]}</div>`).join('');
    kindSection = `<div class="flabel">종류</div><div class="chip-row mem">${kindChips}</div>`;   // [요청] 종류행도 .mem(gap-mem) → 구성원행과 칩 간격 통일
  }
  const active = memberScope!=='all' || (scope==='calendar' && recKindFilter!=='all');
  showSheet(`<h3>필터</h3>
    <div class="flabel" style="margin-top:0">구성원 <span class="muted" style="font-weight:400">· 전 탭 공통</span></div>
    ${memberFilterPills(memberScope, 'setScopeMember', true)}
    ${kindSection}
    <div class="filter-reset-row"><button type="button" class="filter-reset${active?'':' is-off'}" onclick="resetRecFilters()">전체로 초기화</button><button type="button" class="filter-reset" onclick="closeSheet();go('more')">${icon('pencil',13)} 구성원 편집</button></div>`);   // [요청] 전체로 초기화(좌·항상 노출)+구성원 편집(우, 연필 왼쪽)
}
// 구성원 선택 = 전역 스코프 변경 → 전 탭 재렌더 + 시트 재오픈(선택 상태 반영)
function setScopeMember(id){ memberScope=id; renderAll(); openRecordFilterSheet(); }
function setScopeKind(kind){ recKindFilter=kind; renderAll(); openRecordFilterSheet('calendar'); }
function resetRecFilters(){ memberScope='all'; recKindFilter='all'; renderAll(); openRecordFilterSheet(); }
// [전역] 배너/FAB에서 스코프 해제(시트 안 열고 바로 전체로)
function clearScope(){ memberScope='all'; recKindFilter='all'; renderAll(); }
// [전역] 상단 스코프 배너 갱신 — 특정 구성원일 때만 노출, 그 색으로 물듦
function updateScopeBanner(){
  const sb=document.getElementById('scopeBanner'); if(!sb) return;
  const scoped = memberScope!=='all';
  sb.classList.toggle('hide', !scoped);
  if(scoped){
    const m=memberById(memberScope);
    sb.style.setProperty('--sc', (m&&m.color)||'var(--accent)');
    sb.innerHTML = `<span class="sc-lead"><span class="sc-dot"></span><b>${m?escapeHtml(m.name):''}</b>만 보는 중</span><span class="sc-cta">전체 보기 ${icon('chevron-right',13)}</span>`;   // [회의] 문구 축약 '시점으로 보는 중'→'만 보는 중'
  }
}

function recsForDayFiltered(dstr){
  // [#4] 캘린더는 '시간·활동' 전용 → 돈(지출/수입)은 제외. 일정·반복일정·운동·체중만 표시.
  const pool = filteredRecords().filter(r=>r.kind!=='expense');
  // 실제 기록 + 반복 일정의 그날 occurrence (원본 발생일 제외 → 중복 없음). 종류 필터가 'event'/'all'/'전체'면 occurrence도 노출.
  const base = pool.filter(r=>ymd(new Date(r.ts))===dstr);
  let occ = [];
  if(recKindFilter==='all' || recKindFilter==='event'){
    occ = repeatOccurrencesOnDay(dstr, pool);
  }
  return base.concat(occ).sort((a,b)=>a.ts-b.ts);
}
// [P4] 그날 '완료한' 습관(읽기전용 표시용) — 별도 기록 생성 없이 캘린더/활동에 완료표시만. 종류필터가 특정종류면 숨김(습관은 별도 종류 아님).
function completedRoutinesOnDay(dstr){
  if(recKindFilter!=='all') return [];
  let rs = DB.routines.filter(r=> routineDueOnDay(r,dstr) && routineComplete(r,dstr));
  if(memberScope!=='all') rs = rs.filter(r=>r.memberId===memberScope);
  return rs;
}
// [P4] 캘린더 날짜별 상세: 실제 기록 + 완료 습관(읽기전용) 합쳐 렌더
function dayDetailHtml(dstr){
  const recs = recsForDayFiltered(dstr);
  const rts = completedRoutinesOnDay(dstr);
  const hideRole = memberScope!=='all';   // [P4] 특정 구성원 필터 시 이름 pill 숨김(전체일 때만 표시)
  const rows = recs.map(r=>renderRecordRow(r,{showTime:true,editable:true,hideRole}))
    .concat(rts.map(r=>scheduleRowRoutine(r,{interactive:false, day:dstr, hideRole})));
  return rows.length ? rows.join('') : '<div class="muted">기록이 없어요</div>';
}
// [안A] 달력 항목 칩: 색=구성원(원), 흰색 아이콘=종류. max 초과분은 "+N"
function calItemsForDay(dstr, max){
  const recs = recsForDayFiltered(dstr);
  const items = recs.map(r=>{
    const m = memberById(r.memberId);
    const color = m ? m.color : 'var(--ink-3)';
    const km = kindMeta(recordKindKey(r));   // [라벨, 아이콘명, kind색]
    const iconName = km ? km[1] : 'check';
    // [P4] 접근성: 색만으로 사람 구분 불가 → 이름·종류를 title/aria-label로 병기
    const lbl = `${roleName(r.memberId)} · ${km?km[0]:'기록'}`;
    return `<span class="cal-item" style="background:${escapeHtml(color)}" title="${escapeHtml(lbl)}" aria-label="${escapeHtml(lbl)}">${icon(iconName)}</span>`;
  });
  // [P4] 완료한 습관을 흰 체크 링 칩으로 병기(읽기전용 표시)
  completedRoutinesOnDay(dstr).forEach(r=>{
    const m = memberById(r.memberId);
    const color = m ? m.color : 'var(--ink-3)';
    const lbl = `${roleName(r.memberId)} · ${r.title} 완료`;
    items.push(`<span class="cal-item done-rt" style="background:${escapeHtml(color)}" title="${escapeHtml(lbl)}" aria-label="${escapeHtml(lbl)}">${icon('check')}</span>`);
  });
  if(!items.length) return '';
  let html = items.slice(0, max).join('');
  if(items.length > max) html += `<span class="cal-more">+${items.length-max}</span>`;
  return html;
}
// [안A] 달력 전용 범례 — 색=구성원 / 아이콘=종류 (현재 필터 반영)
function viewWeek(){
  // [기간 탐색] 선택된 주(recWeekStart, 월요일 시작) 기준. 제목은 실제 주 범위로 동적.
  const start = parseYmd(recWeekStart);
  let strip='';
  for(let i=0;i<7;i++){
    const d=addDays(start,i); const ds=ymd(d);
    const isToday = ds===ymd(NOW);
    strip+=`<div class="d ${isToday?'today':''} ${selDay===ds?'sel':''}" onclick="pickDay('${ds}')">
      <div class="dn">${DOW[d.getDay()]}</div><div class="dd">${d.getDate()}</div>
      <div class="cal-items">${calItemsForDay(ds,4)}</div></div>`;
  }
  const weekRecs = (function(){ let arr=[]; for(let i=0;i<7;i++){ arr=arr.concat(recsForDayFiltered(ymd(addDays(start,i)))); } return arr; })();
  return calSummaryHtml(weekRecs) + `<div class="sec-title">${escapeHtml(recordRange().label)}</div>
    <div class="wk" style="margin-bottom:var(--sp-5)">${strip}</div>
    <div class="sec-title" id="calDayHead">${escapeHtml(dayTitle(selDay))}</div>
    <div class="open-list">${dayDetailHtml(selDay)}</div>`;
}
// [기간 탐색] 선택일 제목 — 오늘/어제면 그 단어, 그 외엔 "6월 24일 (화)"
function dayTitle(dstr){
  if(dstr===ymd(NOW)) return '오늘';
  if(dstr===ymd(addDays(NOW,-1))) return '어제';
  return fmtDateK(parseYmd(dstr));
}
function calCell(d, inMonth){

  return `<div class="${cls.join(' ')}" onclick="pickDay('${ds}')"><span class="cdate">${d.getDate()}</span><div class="cal-items">${calItemsForDay(ds,6)}</div></div>`;
}

// 기간 이동 (과거/미래 선택)
function shiftPeriod(dir){
  if(repPeriod==='day') repDay = ymd(addDays(parseYmd(repDay), dir));
  else if(repPeriod==='week') repWeekStart = ymd(addDays(parseYmd(repWeekStart), dir*7));
  else if(repPeriod==='month'){
    let m=repMonth.m+dir, y=repMonth.y;
    if(m<0){ m=11; y--; } if(m>11){ m=0; y++; }
    repMonth={ y, m };
  }
  else if(repPeriod==='year') repYear += dir;
  // [10] 보고서가 이미 보이면 이동 시 즉시 갱신. [버그수정] 회고는 목표 탭이라 renderRecord(가계부)가 아니라 renderAll
  renderAll();
}

// [3] 기간 라벨 탭 → 직접 날짜/월/연도 선택 시트 (단위별 입력기)
function openReportPeriodPicker(){
  let field='';
  if(repPeriod==='day'){
    field=`<div class="field"><label>날짜 선택</label><input type="date" id="rpVal" value="${repDay}" onchange="applyReportPeriodPick()"></div>`;
  } else if(repPeriod==='week'){
    field=`<div class="field"><label>주 시작일 선택</label><input type="date" id="rpVal" value="${repWeekStart}" onchange="applyReportPeriodPick()">
      <div class="fhint">고른 날짜가 속한 주(월요일 시작)로 맞춰져요.</div></div>`;
  } else if(repPeriod==='month'){
    const mv=`${repMonth.y}-${String(repMonth.m+1).padStart(2,'0')}`;
    field=`<div class="field"><label>연·월 선택</label><input type="month" id="rpVal" value="${mv}" onchange="applyReportPeriodPick()"></div>`;
  } else {
    const baseY=NOW.getFullYear(); let opts='';
    for(let y=baseY-5;y<=baseY+1;y++){ opts+=`<option value="${y}" ${repYear===y?'selected':''}>${y}년</option>`; }
    field=`<div class="field"><label>연도 선택</label><select id="rpVal" onchange="applyReportPeriodPick()">${opts}</select></div>`;
  }
  // [P4] 스테퍼 중심 통일 + 박스 감량(적용/취소 제거, 고르면 바로 적용).
  const unitSeg=`<div class="seg seg-sm" style="margin-bottom:var(--sp-5)">
    <button class="${repPeriod==='day'?'on':''}" onclick="setReportPeriodInPicker('day')">일간</button>
    <button class="${repPeriod==='week'?'on':''}" onclick="setReportPeriodInPicker('week')">주간</button>
    <button class="${repPeriod==='month'?'on':''}" onclick="setReportPeriodInPicker('month')">월간</button>
    <button class="${repPeriod==='year'?'on':''}" onclick="setReportPeriodInPicker('year')">연간</button>
  </div>`;
  showSheet(`<h3>기간 선택</h3>${unitSeg}${field}`);
}
// 시트 안 단위 전환 — 단위만 바꾸고 시트 갱신(적용 전까지 리포트는 그대로)
function setReportPeriodInPicker(p){ repPeriod=p; openReportPeriodPicker(); }
function applyReportPeriodPick(){
  const el=document.getElementById('rpVal'); if(!el){ closeSheet(); return; }
  const val=el.value;
  if(repPeriod==='day'){
    if(val) repDay=val;
  } else if(repPeriod==='week'){
    if(val){ const d=parseYmd(val); repWeekStart=ymd(addDays(d, -((d.getDay()+6)%7))); }
  } else if(repPeriod==='month'){
    if(val){ const [y,m]=val.split('-').map(Number); repMonth={ y, m:(m-1) }; }
  } else {
    repYear=+val;
  }
  repShown=true; closeSheet(); renderAll();   // [버그수정] 회고는 목표 탭 → renderAll
}
function reportRange(){
  if(repPeriod==='day'){
    const d=parseYmd(repDay);
    return { from:repDay, to:repDay, label:fmtDateK(d), pickLabel:`${d.getFullYear()}년 ${fmtDateK(d)}` };
  }
  if(repPeriod==='week'){
    const s=parseYmd(repWeekStart); const e=addDays(s,6);
    return { from:ymd(s), to:ymd(e), label:`${fmtDateK(s)} ~ ${fmtDateK(e)}`, pickLabel:`${s.getMonth()+1}/${s.getDate()} ~ ${e.getMonth()+1}/${e.getDate()} 주간` };
  }
  if(repPeriod==='month'){
    const y=repMonth.y, mo=repMonth.m;
    return { from:ymd(new Date(y,mo,1)), to:ymd(new Date(y,mo+1,0)), label:`${y}년 ${mo+1}월`, pickLabel:`${y}년 ${mo+1}월` };
  }
  // year
  const y=repYear;
  return { from:ymd(new Date(y,0,1)), to:ymd(new Date(y,11,31)), label:`${y}년 전체`, pickLabel:`${y}년` };
}

/* [3] 보고서 접기 섹션 상태 (재렌더 시 유지). 기본: 카테고리=펼침, 운동 목록=접힘 */
const repCollapse = { cat:false, member:false, trend:false, save:false, workout:true, weight:true, vision:true };   // [요청] 운동목록·체중기록·목표진행현황 기본 접힘
function toggleRepSection(key, el){

  //  getElementById는 먼저 나온 가계부 카드를 잡아 목표 탭 토글이 먹통이 됨.
  //  → 클릭한 제목(el) 기준으로 바로 다음 형제(.collapse-body)를 토글해 카드 내부에서 처리.

  if(body.classList.contains('scrolly')) body.style.maxHeight = on ? '0px' : '360px';
}
/* [2] 선택한 보고 기간(연/월/일/주)에 해당하는 목표인지.
   연간 보고서 = 그 연도의 연간 목표. 월간 보고서 = 그 연·월의 월간 목표.
   일간/주간 보고서 = 그 기간이 속한 연·월의 (연간+월간) 목표(겹치는 목표 노출). */
function visionInReportPeriod(v){
  // [P4] 기한 목표(QUAL)는 '진행 중'인 기간이면 노출 — 만든 날~마감일 구간이 리포트 기간과 겹치면 표시.
  //  (이전엔 '마감일이 그 기간에 있을 때'만 떠서, 마감이 몇 달 뒤인 진행 중 목표가 이번달 회고에 안 뜨는 문제)
  if(v.type==='QUAL' && v.dueDate){
    const rng=reportRange();
    const start = v.createdAt || '0000-01-01';   // 생성일 모르면 진행 중으로 간주
    return start<=rng.to && v.dueDate>=rng.from;
  }
  const vy = visionYear(v);
  if(repPeriod==='year') return v.period==='year' && vy===repYear;
  if(repPeriod==='month') return v.period==='month' && vy===repMonth.y && visionMonth(v)===repMonth.m;
  // day/week: 보고 범위가 속한 연·월 기준 (범위 시작일로 판정)
  const rng = reportRange();
  const d = parseYmd(rng.from);
  if(v.period==='year') return vy===d.getFullYear();
  return vy===d.getFullYear() && visionMonth(v)===d.getMonth();
}
/* [2] 개인 보고서: 그 구성원과 관련된 목표인지 (그 구성원의 기록 또는 습관이 연결된 목표) */
function visionRelatedToMember(v, memberId){

  if(DB.routines.some(r=>r.visionId===v.id && r.memberId===memberId)) return true;

}
/* [3] 체중 미니 스파크라인 (SVG 폴리라인). 값 배열 → 작은 라인. 색 = 구성원 색. */
function weightSparkline(vals, color){
  if(vals.length<2) return '';
  const W=120, H=28, pad=3;
  const mn=Math.min(...vals), mx=Math.max(...vals);
  const span=(mx-mn)||1;
  const pts=vals.map((v,i)=>{
    const x=pad + (i/(vals.length-1))*(W-pad*2);
    const y=pad + (1-(v-mn)/span)*(H-pad*2);   // 위가 큰 값
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" style="display:block" preserveAspectRatio="none">
    <polyline fill="none" stroke="${escapeHtml(color)}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" points="${pts}"/>
  </svg>`;
}
/* [3] 보고서 체중 섹션 본문 — 선택 기간 내 구성원별 시작→최근 + 변화(±kg) + 미니 추세. */
function reportWeightBody(recs, isHouse){
  const wRecs = recs.filter(r=>r.kind==='weight' && r.value!=null);
  if(!wRecs.length) return '<div class="muted" style="padding:var(--sp-5) 0">이 기간 체중 기록이 없어요</div>';
  const members = isHouse ? DB.members : DB.members.filter(m=>m.id===memberScope);
  let rows='';
  members.forEach(m=>{
    const series = wRecs.filter(r=>r.memberId===m.id).sort((a,b)=>a.ts-b.ts);
    if(!series.length) return;
    const first=series[0].value, last=series[series.length-1].value;
    const diff=Math.round((last-first)*10)/10;
    const vals=series.map(s=>s.value);
    const diffColor = diff<0 ? 'var(--good)' : (diff>0 ? 'var(--danger)' : 'var(--ink-3)');
    const diffTxt = diff===0 ? '±0kg' : (diff>0?`+${diff}kg`:`${diff}kg`);
    const datesList = series.map(s=>`${fmtMonthDay(new Date(s.ts))} ${s.value}kg`).join(' · ');
    rows += `<div style="padding:var(--sp-4) 10px;border-bottom:1px solid var(--line)">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:var(--gap-row);margin-bottom:var(--sp-3)">
        <div style="display:flex;align-items:center;gap:var(--sp-3);min-width:0">${memberPill(m,{size:'sm',filled:true})}
          <span style="font-size:var(--fs-md);font-weight:500;color:var(--ink)">${first}kg → ${last}kg</span></div>
        <span style="font-size:var(--fs-md);font-weight:600;color:${diffColor};flex-shrink:0">${diffTxt}</span>
      </div>
      ${vals.length>1?`<div style="margin:var(--sp-1) 0 var(--sp-3)">${weightSparkline(vals, m.color)}</div>`:''}
      <div style="font-size:var(--fs-cap);color:var(--ink-3);font-weight:400;line-height:var(--lh-body);white-space:normal">${escapeHtml(datesList)}</div>
    </div>`;
  });
  return rows || '<div class="muted" style="padding:var(--sp-5) 0">이 기간 체중 기록이 없어요</div>';
}
function renderReportCard(opts){

  });
  const cats = Object.entries(catMap).sort((a,b)=>b[1].sum-a[1].sum).slice(0,8);
  const catMax = totalExp;   // [요청] 막대 기준 = 전체 지출 → 막대 길이가 옆 % 숫자와 일치(1등 대비 ❌)

  // [P4] 저축·투자(자산 이동) — 소비와 별도로 리포트에 집계(총액 + 카테고리별). 초록 톤.

  });
  const saveCats = Object.entries(saveCatMap).sort((a,b)=>b[1].sum-a[1].sum).slice(0,8);
  const saveMax = totalSave;   // [요청] 막대 기준 = 전체 저축 → 막대 길이가 옆 % 숫자와 일치

  // [3] 체중 기록 섹션 본문 (선택 기간 내). 다이어트 목표와 자연 연계.
  const weightBody = reportWeightBody(recs, isHouse);
  const weightCount = recs.filter(r=>r.kind==='weight' && r.value!=null).length;

  // 구성원별 (가구 전체) — 지출 기준 막대. 막대 색 = 각 구성원 색(member.color)
  //  [P4] 삭제된 구성원도 기록은 남으므로 리포트에 표시: 활성 구성원(항상) + 아카이브 구성원(기록 있으면, '삭제됨') + 담당없음 버킷
  let memBars = '';
  if(isHouse){
    const entries = DB.members.map(m=>({ name:m.name, color:m.color, exp:sumExpense(recs.filter(r=>r.memberId===m.id)) }));
    // [요청] 삭제된 구성원 = 이름 유지 '{이름} (삭제됨)' (담당없음보다 맥락이 살아 선호)
    (DB.deletedMembers||[]).forEach(m=>{
      const mr = recs.filter(r=>r.memberId===m.id);
      if(sumExpense(mr)>0) entries.push({ name:`${m.name} (삭제됨)`, color:m.color||'var(--ink-3)', exp:sumExpense(mr) });
    });
    // [요청] 공용(memberId 미지정) = 공동 지출 → '공용' 버킷(회색)
    const shared = recs.filter(r=>!r.memberId);
    if(sumExpense(shared)>0) entries.push({ name:'전체', color:'var(--ink-3)', exp:sumExpense(shared) });
    // 담당없음 = 지정됐으나 활성·아카이브 어디에도 없는 진짜 유실 기록만
    const activeIds = new Set(DB.members.map(m=>m.id));
    const archIds = new Set((DB.deletedMembers||[]).map(m=>m.id));
    const orphan = recs.filter(r=>r.memberId && !activeIds.has(r.memberId) && !archIds.has(r.memberId));
    if(sumExpense(orphan)>0) entries.push({ name:'담당없음', color:'var(--ink-3)', exp:sumExpense(orphan) });
    entries.sort((a,b)=>b.exp-a.exp);
    const mmax = totalExp||1;   // [요청] 막대 기준 = 전체 지출 → 막대 길이가 옆 % 숫자와 일치
    memBars = `<div class="sec-title collapsible ${repCollapse.member?'collapsed':''}" id="repSecTitle-member" style="font-size:var(--fs-md)" onclick="toggleRepSection('member', this)">

      </div>
      <div class="collapse-body ${repCollapse.member?'collapsed':''}" id="repSecBody-member">${entries.map(e=>renderBarWon(e.name, e.exp, mmax, e.color, totalExp>0?Math.round(e.exp/totalExp*100)+'%':'')).join('')}</div>`;
  }

  // 연간: 월별 추이 (지출/수입)
  let yearTrend = '';
  if(repPeriod==='year'){
    const expByMon = new Array(12).fill(0);
    const incByMon = new Array(12).fill(0);
    recs.forEach(r=>{
      if(r.kind!=='expense') return;
      const mo = new Date(r.ts).getMonth();
      if(isIncome(r)) incByMon[mo]+=(r.amount||0); else if(isExpenseOut(r)) expByMon[mo]+=(r.amount||0);   // [P4] 저축은 지출 추이에서 제외
    });
    const mx = Math.max(...expByMon, ...incByMon, 1);
    let rows='';
    for(let i=0;i<12;i++){
      if(incByMon[i]===0 && expByMon[i]===0) continue;
      rows += renderBarWon(`${i+1}월 수입`, incByMon[i], mx, 'var(--income)');
      rows += renderBarWon(`${i+1}월 지출`, expByMon[i], mx, 'var(--danger)');
    }
    yearTrend = `<div class="sec-title collapsible ${repCollapse.trend?'collapsed':''}" id="repSecTitle-trend" style="font-size:var(--fs-md)" onclick="toggleRepSection('trend', this)">
        <span class="sec-cap">월별 추이 <span class="sec-count">(수입/지출)</span></span><span class="sec-chev">${icon('chevron-down')}</span>
      </div>
      <div class="collapse-body ${repCollapse.trend?'collapsed':''}" id="repSecBody-trend">${rows||'<div class="muted" style="padding:var(--sp-5) 0">기록이 없어요</div>'}</div>`;
  }

  const targetLabel = isHouse ? '가구 전체' : escapeHtml((memberById(memberScope)||{}).name||'');
  const periodLabel = {day:'일간',week:'주간',month:'월간',year:'연간'}[repPeriod];

  // [2] 목표 진행 현황 = '선택한 보고 기간(연/월)에 해당하는 목표'만 표시.
  //  · 연간 보고서 = 그 연도의 연간 목표, 월간 보고서 = 그 연·월의 월간 목표.
  //  · 일간/주간 보고서 = 그 날짜가 속한 연·월의 (연간+월간) 목표.
  //  · 개인 보고서면 그 구성원 관련 목표만(그 구성원의 기록/습관이 연결된 목표).
  //  각 목표 진행률은 목표 자체 기간 기준(visionPct/충실도 — 기존 로직 유지). 바 색 메인 #0044FF.
  let periodVisions = DB.visions.filter(v=>visionInReportPeriod(v));
  if(!isHouse) periodVisions = periodVisions.filter(v=>visionRelatedToMember(v, memberScope));
  const visionBars = periodVisions.map(v=>{
    const periodLbl = visionPeriodLabel(v);
    if(v.type==='QUANT'){
      const p = visionPct(v);
      return renderBar(`${v.title} · ${periodLbl}`, p, 100, 'var(--accent)');
    }
    // QUAL: dueDate 우선, 없으면 목표 기간 종료일 기준 D-day. 진행률 = 누적 달성률.
    const dleft = (v.dueDate!=null) ? dday(v) : visionPeriodDday(v);
    const ddLbl = dleft>0 ? `D-${dleft}` : (dleft===0 ? 'D-day' : `D+${-dleft}`);
    return renderBar(`${v.title} · ${ddLbl}`, visionQualPct(v), 100, 'var(--accent)');
  }).join('');

  return `<div id="reportCard" class="report-open">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--sp-5)">
      <div style="font-size:var(--fs-title);font-weight:600">${targetLabel} · ${escapeHtml(rng.pickLabel)} ${periodLabel} 보고서</div>
      <span class="pill">${icon('chart')}</span>
    </div>
    ${moneyGrid2x2(totalInc, totalExp, totalSave, net)}
    <div class="report-asset"><span>총자산</span><b class="${totalAssets()<0?'neg':''}">${totalAssets()<0?'−':''}${won(Math.abs(totalAssets()))}원</b></div>
    ${money?'':`<div class="activity-line">운동 <b>${wks.length}회</b> · 일정 <b>${evs.length}개</b> · 전체 기록 <b>${recs.length}건</b></div>`}

    ${yearTrend}

    <div class="sec-title collapsible ${repCollapse.cat?'collapsed':''}" id="repSecTitle-cat" style="font-size:var(--fs-md)" onclick="toggleRepSection('cat', this)">
      <span class="sec-cap">카테고리별 지출 <span class="sec-count">(수입의 ${totalInc>0?Math.round(totalExp/totalInc*100):0}%)</span></span>
      <span class="sec-chev">${icon('chevron-down')}</span>
    </div>
    <div class="collapse-body ${repCollapse.cat?'collapsed':''}" id="repSecBody-cat">
      ${cats.length?cats.map(c=>renderBarWon(c[0], c[1].sum, catMax, 'var(--ink-3)', totalExp>0?Math.round(c[1].sum/totalExp*100)+'%':'')).join(''):'<div class="muted" style="padding:var(--sp-5) 0">지출 기록이 없어요</div>'}
    </div>

    ${totalSave>0?`<div class="sec-title collapsible ${repCollapse.save?'collapsed':''}" id="repSecTitle-save" style="font-size:var(--fs-md)" onclick="toggleRepSection('save', this)">
      <span class="sec-cap">저축·투자별 <span class="sec-count">(수입의 ${totalInc>0?Math.round(totalSave/totalInc*100):0}%)</span></span>
      <span class="sec-chev">${icon('chevron-down')}</span>
    </div>
    <div class="collapse-body ${repCollapse.save?'collapsed':''}" id="repSecBody-save">
      ${saveCats.map(c=>renderBarWon(c[0], c[1].sum, saveMax, 'var(--good)', totalSave>0?Math.round(c[1].sum/totalSave*100)+'%':'')).join('')}
    </div>`:''}

    ${memBars}

    ${money?'':`<div class="sec-title collapsible ${repCollapse.workout?'collapsed':''}" id="repSecTitle-workout" style="font-size:var(--fs-md)" onclick="toggleRepSection('workout', this)">
      <span class="sec-cap">운동 목록 <span class="sec-count">(${wks.length}건)</span></span>
      <span class="sec-chev">${icon('chevron-down')}</span>
    </div>
    <div class="collapse-body scrolly ${repCollapse.workout?'collapsed':''}" id="repSecBody-workout" style="max-height:${repCollapse.workout?'0':'360px'}">
      ${wks.length?wks.sort((a,b)=>b.ts-a.ts).map(r=>{
        // [E][A] 좌측 아이콘 타일 = 구성원 색 (전부 주황 ❌). 본문은 통일 행 형태
        const m=memberById(r.memberId);
        const tileColor = m ? m.color : 'var(--ink-3)';
        // [버그수정] 운동 목록도 날짜 컬럼만 넓힘(--col-time). 역할 고정폭(--col-role) 공용 유지 → 제목 정렬.
        return `<div class="srow" style="--col-time:96px"><div class="lead"><div class="lead-tile" style="background:${escapeHtml(tileColor)}">${icon('barbell')}</div></div><div class="srole">${roleTagHtml(r.memberId)}</div><div class="stime">${fmtMonthDay(new Date(r.ts))}</div><span class="stitle-text">${escapeHtml(r.title)}</span><div class="trailing"></div></div>`;
      }).join(''):'<div class="muted" style="padding:var(--sp-5) 0">운동 기록이 없어요</div>'}
    </div>

    <div class="sec-title collapsible ${repCollapse.weight?'collapsed':''}" id="repSecTitle-weight" style="font-size:var(--fs-md)" onclick="toggleRepSection('weight', this)">
      <span class="sec-cap">체중 기록 <span class="sec-count">(${weightCount}회)</span></span>
      <span class="sec-chev">${icon('chevron-down')}</span>
    </div>
    <div class="collapse-body ${repCollapse.weight?'collapsed':''}" id="repSecBody-weight">
      ${weightBody}
    </div>

    <div class="sec-title collapsible ${repCollapse.vision?'collapsed':''}" id="repSecTitle-vision" style="font-size:var(--fs-md)" onclick="toggleRepSection('vision', this)">
      <span class="sec-cap">목표 진행 현황</span><span class="sec-chev">${icon('chevron-down')}</span>
    </div>
    <div class="collapse-body ${repCollapse.vision?'collapsed':''}" id="repSecBody-vision">${visionBars||'<div class="muted" style="padding:var(--sp-5) 0">이 기간의 목표가 없어요</div>'}</div>`}

    <div class="report-actions noprint">
      <button onclick="printReport()">${icon('floppy-disk',15)} PDF 저장</button>
      <button onclick="shareReport()">${icon('share',15)} 공유</button>
    </div>
  </div>`;
}

/* ============================================================
   ROUTINE / 습관(습관) — 탭은 목표 탭의 '습관 현황' 섹션으로 흡수됨.
   아래 통계/허브 헬퍼들은 목표 탭(habitHubRow)에서 그대로 재사용.
   ============================================================ */
// [5] 습관 허브 통계 — 이번주 7칸(월~일), 이번달 달성률%
// [P4] 이번 주 달성률(월~오늘, 예정 요일 기준) — 습관 현황 미니 점(이번 주)과 지표 통일
function routineWeekRate(r){
  const monOff=(NOW.getDay()+6)%7, monday=addDays(NOW,-monOff);
  let done=0, total=0;
  for(let i=0;i<7;i++){
    const d=addDays(monday,i);
    if(!routineOnWeekday(r,d.getDay())) continue;
    total++;   // [버그수정] 이번 주 예정일 '전부'(미래 포함)를 분모로 — 첫 예정일 한 번 완료해도 100% 되던 문제(오늘까지만 세던 것)
    if(routineComplete(r,ymd(d))) done++;
  }
  return total? Math.round(done/total*100):0;
}
// [P4] 이번 주 미니 점(7칸) — 큰 그리드 대신 간소 표시
function routineWeekMini(r){
  const monOff=(NOW.getDay()+6)%7, monday=addDays(NOW,-monOff);
  let cells='';
  for(let i=0;i<7;i++){
    const d=addDays(monday,i), ds=ymd(d);
    const due=routineOnWeekday(r,d.getDay());
    const future = d.getTime()>NOW.getTime() && ds!==ymd(NOW);
    let cls='wmd';
    if(routineComplete(r,ds)) cls+=' on';
    else if(routineProgress(r,ds).cur>0) cls+=' partial';
    if(ds===ymd(NOW)) cls+=' today';
    if(!due||future) cls+=' dim';
    cells+=`<span class="${cls}"></span>`;
  }
  return `<span class="wkmini" title="이번 주">${cells}</span>`;
}
// 습관 현황 행: 간결한 습관 줄 + 한 줄 요약(이번주 미니 점 + 이번 달 달성률). 연속(🔥)은 줄 트레일링에 표시됨.
function habitHubRow(r, interactive, hideRole){
  const base = scheduleRowRoutine(r, {interactive, hideRole});
  const rate = routineWeekRate(r);
  const m = memberById(r.memberId);
  const rc = m ? m.color : 'var(--accent)';   // [5] 채운 점·% = 구성원 역할색(--rc)
  const panel = `<div class="habit-panel" style="--rc:${escapeHtml(rc)}">
    ${routineWeekMini(r)}
    <span class="hm-rate">이번 주 <b>${rate}%</b></span>
  </div>`;
  return `<div class="habit-wrap${hideRole?' hr-norole':''}">${base}${panel}</div>`;
}

// ring 탭: 카운트형은 1탭=부분 채움(+1, 목표 도달 후 다시 탭하면 리셋), 단일형은 토글
function tapRoutine(id, dstr){
  const r=DB.routines.find(x=>x.id===id); if(!r) return;
  const t = dstr || ymd(NOW);
  if(t > ymd(NOW)){ toast('미래 날짜는 체크할 수 없어요'); return; }   // [P3] 백필은 과거·오늘만
  const goal = r.count>1 ? r.count : 1;
  if(goal>1){
    const raw = r.checks[t];
    let cur = raw===true ? goal : (typeof raw==='number' ? raw : 0);
    cur = (cur>=goal) ? 0 : cur+1;          // 도달 후 탭하면 리셋
    if(cur<=0) delete r.checks[t]; else r.checks[t]=cur;
  } else {
    if(r.checks[t]) delete r.checks[t]; else r.checks[t]=true;
  }
  recomputeVisions(); saveDB();   // [QA] 다른 저장 경로와 일관되게 목표 재계산
  if(routineComplete(r,t)){
    if(r.visionId){
      // [마이크로피드백] "→[목표명] +N%" — 습관 완료가 연결 목표를 움직임
      const v=visionById(r.visionId);
      if(v){ const p = visionProgressPct(v); toast(`→ ${v.title} (${p}%)`); }
      else toast('습관 완료! 연속 ' + routineStreak(r) + '일');
    } else toast('습관 완료! 연속 ' + routineStreak(r) + '일');
  }
  renderAll();
}

  });

  // --- [P4] 가계부 카테고리 관리 (설정성 액션 → 더보기로. 필터 시트에서 이동) ---

      <div><div class="ma-t">계좌 관리</div><div class="ma-d">현금·통장·카드·저축 계좌와 시작 잔액을 관리해요</div></div>
      <span class="ma-go">${icon('chevron-right')}</span>
    </div>
    <div class="more-action" onclick="catMgrReturnRecord=false;openCategoryManager()">
      <span class="ma-ic">${icon('wallet')}</span>
      <div><div class="ma-t">카테고리 관리</div><div class="ma-d">지출·수입·저축 카테고리를 추가·수정·삭제해요</div></div>
      <span class="ma-go">${icon('chevron-right')}</span>

  html += `<div class="open-list"><div class="more-action" onclick="openProSheet()">

      <div><div class="ma-t">${DB.isPro?'프로 사용 중 ✓':'프로 잠금해제'}</div><div class="ma-d">${DB.isPro?'무제한 + 백업 + 전체 보고서가 열려 있어요':'구성원·목표·습관 무제한 + 백업 + 전체 보고서 · ₩12,000 일회성'}</div></div>
      <span class="ma-go">${icon('chevron-right')}</span>
    </div></div>`;

  // --- 백업 / 내보내기 (실제 JSON export/import) ---
  html += `<div class="sec-title" style="font-size:var(--fs-md)">백업 / 내보내기</div>`;
  html += `<div class="open-list">
    <div class="more-action" onclick="openExportSheet()">

function doImport(){
  const f=document.getElementById('impFile');
  const file=f&&f.files&&f.files[0];
  if(!file){ toast('백업 파일을 선택해주세요'); return; }
  const reader=new FileReader();
  reader.onerror=function(){ toast('파일을 읽지 못했어요'); };
  reader.onload=function(e){
    let obj;
    try{ obj=JSON.parse(e.target.result); }
    catch(err){ toast('복원 실패 — JSON 형식이 아니에요'); return; }
    if(!obj || !Array.isArray(obj.members) || !obj.members.length || !Array.isArray(obj.visions)){
      toast('올바른 백업 파일이 아니에요'); return;
    }
    autoBackup();                              // 덮어쓰기 직전 현재 상태 스냅샷
    DB=obj; normalizeDB(); resetViewState();    // 누락/손상 필드 보정(크래시 방지) + 필터 stale 방지
    saveDB(); applyTheme(DB.theme);
    document.documentElement.classList.toggle('dark', !!DB.dark);
    recomputeVisions(); renderAll(); closeSheet();
    toastAction('백업을 복원했어요','실행취소',restoreAutoBackup);
  };
  reader.readAsText(file);
}

// [P4] 긴 시트(가계부 등)에서 위로 스크롤해 닫아야 하는 불편 해소 → 항상 상단에 붙어있는 고정 닫기(X) 버튼을 시트마다 자동 추가.
function showSheet(html, opts){ opts=opts||{}; activeSheetKind = opts.formKind || null;   /* [자동저장] 입력 시트만 formKind 지정 → 그 외(상세·필터·확인창)는 null이라 닫아도 저장 안 함 */ const s=document.getElementById('sheet'); const _keep = opts.keepScroll ? s.scrollTop : 0; s.classList.toggle('sheet-fixed', !!opts.fixed); s.classList.toggle('sheet-dialog', !!opts.dialog); s.classList.toggle('sheet-tinted', !!opts.tinted); s.classList.toggle('sheet-stickyfoot', !!opts.stickyFoot); s.classList.toggle('sheet-wizard', !!opts.wizard); s.style.transform=''; s.style.transition=''; s.innerHTML='<div class="sheet-head">'+(opts.back?'<button class="rec-back" type="button" onclick="'+opts.back.onclick+'">'+icon('chevron-left',15)+' '+escapeHtml(opts.back.label)+'</button>':'')+(opts.headAction||'')+(opts.done ? '<button class="sheet-done'+(opts.done.ready?' ready':'')+'" type="button" onclick="closeSheet()">'+(opts.done.ready?'완료':'닫기')+'</button>' : '<button class="sheet-x" onclick="closeSheet()" aria-label="닫기">'+icon('x',18)+'</button>')+'</div>'+html; attachClearButtons(); document.getElementById('overlay').classList.add('show'); s.scrollTop=_keep; requestAnimationFrame(()=>{ s.scrollTop=_keep; });   /* [버그] 긴 폼(가계부)이 열릴 때 레이아웃 후 잔여 스크롤로 제목이 위로 밀려 보이던 문제 → 다음 프레임에 스크롤 재확정(모든 시트 상단 위치 통일) */ }
// [요청] 텍스트·숫자 입력칸에 x(clear) 버튼 자동 부착 — 값 있을 때만 표시, 탭하면 비우고 포커스
function attachClearButtons(){
  const s=document.getElementById('sheet'); if(!s) return;
  s.querySelectorAll('.field input[type=text], .field input[type=number]').forEach(inp=>{
    if(inp.parentElement && inp.parentElement.classList.contains('inp-wrap')) return;
    const wrap=document.createElement('span'); wrap.className='inp-wrap'+(inp.type==='number'?' inp-num':'');   // [요청] 숫자 필드는 inp-num → x를 스피너 화살표 왼쪽에 배치
    inp.parentNode.insertBefore(wrap, inp); wrap.appendChild(inp);
    const btn=document.createElement('button'); btn.type='button'; btn.className='inp-x'; btn.tabIndex=-1; btn.setAttribute('aria-label','지우기'); btn.innerHTML='&times;';
    btn.addEventListener('click',()=>{ inp.value=''; inp.dispatchEvent(new Event('input',{bubbles:true})); inp.focus(); wrap.classList.remove('has-val'); });
    wrap.appendChild(btn);
    const upd=()=>wrap.classList.toggle('has-val', !!inp.value);
    inp.addEventListener('input',upd); upd();
  });
}
/* ===== [자동 저장] 시트를 닫을 때(X·배경탭·드래그·뒤로) 필수값이 충분하면 자동 저장, 덜 채웠으면 조용히 폐기 =====
   - 어떤 입력 시트가 열려 있는지 = activeSheetKind (showSheet의 formKind로 매 렌더 세팅, 다른 시트 열면 null)
   - 편집 모드는 진입 스냅샷(activeSheetSnap)과 비교해 '변경됐을 때만' 저장(원본 훼손·소음 방지)
   - 저장 성공 판정은 각 저장버튼과 동일한 유효성 규칙 사용(닫아서 저장 == 버튼으로 저장) */
let activeSheetKind = null;   // 'record'|'vision'|'routine'|'member' (그 외 시트=null)
let activeSheetSnap = null;   // 편집 진입 시 폼 스냅샷(JSON). 신규는 null
let _autosaving = false;      // 자동저장 실행 중 — 저장함수가 부르는 closeSheet의 재저장 방지
function recordFormValid(){
  // [계좌] 이체 = 금액 + 서로 다른 출금·입금 계좌. 내용(메모) 불필요.
  if(rForm.kind==='expense' && rForm.flow==='transfer'){ return parseInt(rForm.amount)>0 && !!rForm.fromAccountId && !!rForm.toAccountId && rForm.fromAccountId!==rForm.toAccountId; }
  if(rForm.kind==='weight') return !(rForm.value===''||rForm.value==null);
  if(rForm.kind==='expense'){
    if(!rForm.amount || parseInt(rForm.amount)<=0) return false;
    if(!String(rForm.title||'').trim() && !rForm.categoryId) return false;   // [요청] 지출은 내용 또는 카테고리(카테고리 있으면 제목은 저장 시 카테고리명으로)
    return true;
  }
  return !!String(rForm.title||'').trim();   // 일정/운동은 내용 필수
}
function visionFormValid(){ return !!String(vForm.title||'').trim(); }
function routineFormValid(){
  if(!String(rtForm.title||'').trim()) return false;
  if(rtForm.freq==='weekly' && (!Array.isArray(rtForm.days)||!rtForm.days.length)) return false;
  return true;
}
function memberFormValid(){ return !!String(mForm.name||'').trim(); }
// [자동저장] 헤더 '완료' 신호등을 입력 중 실시간 갱신(텍스트 입력은 재렌더 안 하므로) — 필수값 충족=완료(강조), 미충족=닫기(흐림)
function refreshSheetDone(){
  const btn=document.querySelector('.sheet-done'); if(!btn) return;
  let ready=false;
  if(activeSheetKind==='record') ready=recordFormValid();
  else if(activeSheetKind==='vision') ready=visionFormValid();
  else if(activeSheetKind==='routine') ready=routineFormValid();
  else if(activeSheetKind==='member') ready=memberFormValid();
  else if(activeSheetKind==='catmgr') ready=!!String(catDraft.name||'').trim();
  else if(activeSheetKind==='acctmgr') ready=!!String(acctDraft.name||'').trim();
  btn.classList.toggle('ready', ready); btn.textContent = ready?'완료':'닫기';
}
// 닫기 직전 호출 — 유효+변경됐으면 커밋(저장함수가 닫기까지 처리 → true 반환), 아니면 폐기(false)
function autosaveActiveSheet(){
  const kind=activeSheetKind; activeSheetKind=null;
  if(!kind) return false;
  if(kind==='catmgr'){ if(commitCatDraft()) renderAll(); return false; }   // [요청] 카테고리 관리: 닫을 때 초안(이름 채워진) 자동 추가/수정. closeSheet가 이어서 닫음
  if(kind==='acctmgr'){ if(commitAcctDraft()) renderAll(); return false; }   // [계좌] 계좌 관리: 닫을 때 초안 자동 추가/수정
  if(kind==='curval'){   // [요청] 현재값 업데이트: 닫으면 값 커밋 후 목표 상세로 복귀
    const el=document.getElementById('cvVal'); const raw=el?el.value:''; const v=curValId?visionById(curValId):null;
    if(v && raw!=='' && Number(raw)!==(v.currentValue||0)){ v.currentValue=Number(raw); saveDB(); renderAll(); toast('현재값을 업데이트했어요'); }
    if(curValId){ openVisionDetail(curValId); return true; }   // 상세 재오픈(closeSheet 조기 종료)
    return false;
  }
  let valid=false, form=null, saveFn=null;
  if(kind==='record'){ valid=recordFormValid(); form=rForm; saveFn=saveRecord; }
  else if(kind==='vision'){ valid=visionFormValid(); form=vForm; saveFn=saveVision; }
  else if(kind==='routine'){ valid=routineFormValid(); form=rtForm; saveFn=saveRoutine; }
  else if(kind==='member'){ valid=memberFormValid(); form=mForm; saveFn=function(){ saveMember(mForm.id||''); }; }
  else return false;
  if(!valid) return false;                                                            // 덜 채움 → 폐기
  if(activeSheetSnap!=null && JSON.stringify(form)===activeSheetSnap) return false;    // 편집인데 변경 없음 → 그대로 둠
  _autosaving=true;
  try{ saveFn(); } finally{ _autosaving=false; }
  return true;
}
function closeSheet(){
  if(!_autosaving){ if(autosaveActiveSheet()) return; }   // [자동저장] 유효하면 저장하고 종료(저장함수가 닫음)
  // [버그] 기여 기록 시트를 닫을 때(저장/삭제/배경탭/취소 모두) 원래 보던 목표 상세로 복귀
  if(recSheetReturnVision){
    const back = recSheetReturnVision;
    recSheetReturnVision = null;
    openVisionDetail(back);   // 목표 상세 다시 표시 (visionDetailOpen 재설정됨)
    return;
  }
  visionDetailOpen = null;
  document.getElementById('overlay').classList.remove('show');
}
document.getElementById('overlay').addEventListener('click',e=>{ if(e.target.id==='overlay') closeSheet(); });
// [P4] 시트를 아래로 쓸어내려 닫기 — 긴 폼에서 상단 X까지 안 올라가도 엄지 위치에서 바로 닫힘. 스크롤 맨 위에서 아래로 끌 때만 발동(콘텐츠 스크롤과 충돌 방지).
(function(){
  const sheet=document.getElementById('sheet');
  let startY=0, dy=0, active=false;
  sheet.addEventListener('touchstart',e=>{
    if(e.touches.length!==1 || sheet.scrollTop>0){ active=false; return; }
    startY=e.touches[0].clientY; dy=0; active=true; sheet.style.transition='none';
  },{passive:true});
  sheet.addEventListener('touchmove',e=>{
    if(!active) return;
    dy=e.touches[0].clientY-startY;
    sheet.style.transform = dy>0 ? 'translateY('+dy+'px)' : '';
  },{passive:true});
  sheet.addEventListener('touchend',()=>{
    if(!active) return; active=false;
    sheet.style.transition='transform .24s cubic-bezier(.2,.8,.2,1)';
    if(dy>100){ sheet.style.transform='translateY(110%)'; setTimeout(()=>{ closeSheet(); sheet.style.transform=''; sheet.style.transition=''; },200); }
    else sheet.style.transform='';
  });
})();

/* [1] 빠른기록 바텀시트 — 배경탭 닫기 + 아래로 드래그(손잡이/시트) 닫기 */
(function(){
  const ov = document.getElementById('qsheetOverlay');
  const sheet = document.getElementById('qsheet');
  // 배경 탭 닫기
  ov.addEventListener('click', e=>{ if(e.target===ov) closeQuickSheet(); });
  // 아래로 드래그(스와이프)해서 닫기 — 시트 상단 영역에서 시작
  let startY=null, dy=0, dragging=false;
  function down(e){
    const y = (e.touches?e.touches[0].clientY:e.clientY);
    startY=y; dy=0; dragging=true;
    sheet.style.transition='none';
  }
  function move(e){
    if(!dragging||startY===null) return;
    const y = (e.touches?e.touches[0].clientY:e.clientY);
    dy = Math.max(0, y-startY);          // 아래로만
    sheet.style.transform = `translateY(${dy}px)`;
  }
  function up(){
    if(!dragging) return;
    dragging=false;
    sheet.style.transition='';
    sheet.style.transform='';
    if(dy>80) closeQuickSheet();          // 충분히 끌어내리면 닫기
  }
  // 손잡이 + 헤더 영역에서 드래그 시작 (그리드 스크롤 방해 없이)
  sheet.addEventListener('touchstart', down, {passive:true});
  sheet.addEventListener('touchmove', move, {passive:true});
  sheet.addEventListener('touchend', up);
  sheet.addEventListener('mousedown', down);
  window.addEventListener('mousemove', move);
  window.addEventListener('mouseup', up);
})();

/* --- 구성원 추가/편집 시트 (컬러 pill: 이름 + 색만) --- */
let mForm = {};
function openMemberSheet(id){

function renderMemberSheet(id){
  const idArg = id||'';
  const colors = PRESET_COLORS.map(c=>`<span class="sw ${mForm.color===c?'on':''}" style="background:${c}" onclick="mForm.color='${c}';renderMemberSheet('${idArg}')"></span>`).join('');

  showSheet(html, {formKind:'member', done:{ready:memberFormValid()}});   // [요청] 하단 저장박스 제거 → 헤더 '완료'(자동저장). 편집만 하단 삭제
}
// 이름 입력 시 미리보기만 갱신 (입력 포커스 유지)
function renderMemberPreview(idArg){
  const nameEl=document.getElementById('mName'); if(nameEl) mForm.name=nameEl.value;
  const wrap=document.getElementById('mPreview'); if(!wrap) return;
  wrap.innerHTML = memberPill({ name:mForm.name||'이름', color:mForm.color },{size:'lg',active:true});

function saveMember(id){
  activeSheetKind=null;   // [자동저장] 명시적 저장 — 이어지는 closeSheet가 재저장하지 않게
  const nameEl=document.getElementById('mName'); if(nameEl) mForm.name=nameEl.value;
  if(!mForm.name.trim()){ toast('이름을 입력해주세요'); return; }
  if(id){ const m=memberById(id); Object.assign(m,mForm); delete m.emoji; delete m.shape; }
  else { mForm.id=uid(); DB.members.push({...mForm}); }
  saveDB(); closeSheet(); renderAll(); toast('저장되었어요');
}
// [P4] 구성원 삭제 = 확인 + 습관은 함께 삭제(사람 전용)·기록은 담당'없음'으로 보존 + 실행취소
function deleteMember(id){
  if(DB.members.length<=1){ toast('최소 1명은 필요해요'); return; }
  const m=memberById(id); if(!m) return;
  const recN=DB.records.filter(r=>r.memberId===id).length;
  const rouN=DB.routines.filter(r=>r.memberId===id).length;
  const parts=[];
  if(rouN) parts.push(`습관 ${rouN}개는 <b>함께 삭제</b>`);
  if(recN) parts.push(`기록 ${recN}건은 <b>남아요(담당없음)</b>`);
  const note = parts.length ? `연결된 ${parts.join(', ')}.` : `연결된 기록·습관이 없어요.`;
  confirmDanger({
    title:`‘${escapeHtml(m.name)}’ 구성원을 삭제할까요?`,
    body:`${note} 삭제 직후 잠깐 <b>실행취소</b>할 수 있어요.`,
    onConfirm:`doDeleteMember('${id}')`
  });
}
function doDeleteMember(id){
  const m=memberById(id); if(!m) return;
  const snapMember={...m};
  const snapRoutines=DB.routines.filter(r=>r.memberId===id).map(r=>({...r}));   // 습관은 스냅샷 후 삭제(사람 전용)
  DB.routines=DB.routines.filter(r=>r.memberId!==id);   // 홈에 담당없는 습관 남지 않게 함께 삭제
  // [P4] 기록은 memberId 그대로 보존(리포트에 남아야 함). 구성원은 아카이브로 이동 → memberById가 이름·색 계속 조회.
  DB.deletedMembers = DB.deletedMembers || [];
  if(!DB.deletedMembers.some(d=>d.id===id)) DB.deletedMembers.push({ id:m.id, name:m.name, color:m.color, deleted:true });
  DB.members=DB.members.filter(x=>x.id!==id);
  const wasCurrent=DB.currentMemberId===id;
  if(wasCurrent) DB.currentMemberId=DB.members[0].id;
  // [P4][QA] 필터/리포트가 삭제된 구성원을 계속 가리켜 '빈 화면'되는 것 방지
  if(memberScope===id) memberScope='all';
  recomputeVisions(); saveDB(); closeSheet(); renderAll();
  toastAction('구성원을 삭제했어요','실행취소',()=>{
    DB.members.push(snapMember);
    DB.deletedMembers=(DB.deletedMembers||[]).filter(d=>d.id!==id);
    snapRoutines.forEach(r=>DB.routines.push({...r}));
    if(wasCurrent) DB.currentMemberId=id;
    recomputeVisions(); saveDB(); renderAll(); toast('되돌렸어요');
  });
}

function setVisionDue(v){ if(v){ vForm.dueDate=v; vForm.period='year'; vForm.year=+String(v).slice(0,4); } renderVisionSheet(); }
function setVisionPreset(p){
  const P=VIS_PRESETS[p]; if(!P) return;
  visStartAdv=false;   // [요청] 프리셋 바꾸면 시작값 자동 모드로 리셋
  vForm.preset=p; vForm.type=P.type;
  if(P.type==='QUANT'){ vForm.metric=P.metric; vForm.unit=P.unit; if(P.start!=null){ vForm.startValue=P.start; vForm.currentValue=P.start; } if(P.target!=null) vForm.targetValue=P.target; }   // [요청] 프리셋별 기본 시작/목표값(권 목표에 100만 같은 엉뚱값 방지)
  if(P.metric==='cap' && !(Array.isArray(vForm.capCategoryIds)&&vForm.capCategoryIds.length)) vForm.capCategoryIds=['__allout__'];
  if(P.metric==='saving' && !(Array.isArray(vForm.savingCategoryIds)&&vForm.savingCategoryIds.length)) vForm.savingCategoryIds=['__allsave__'];
  if(P.type==='QUAL'){ syncVisionDue(); return; }   // syncVisionDue가 렌더

    visStartAdv = (vForm.metric==='manual' && vForm.startValue!==vForm.currentValue);   // 편집: 백필된(시작≠현재) 목표는 시작값 노출

  activeSheetSnap = null;   // [자동저장] 신규 목표

// 목표 대상 기간(날짜) 선택 — 연간=연도, 월간=연·월
function visionPeriodPicker(){
  const baseY = NOW.getFullYear();
  const yOpts = [];
  for(let y=baseY-1; y<=baseY+3; y++){ yOpts.push(`<option value="${y}" ${vForm.year===y?'selected':''}>${y}년</option>`); }
  if(vForm.period==='month'){
    const mOpts = [];
    for(let mo=0; mo<12; mo++){ mOpts.push(`<option value="${mo}" ${vForm.month===mo?'selected':''}>${mo+1}월</option>`); }
    return `<div class="field"><div class="finline"><label>연·월</label><div style="display:flex;gap:var(--gap-row);flex:1;min-width:0">
        <select style="flex:1.3" onchange="vForm.year=+this.value;syncVisionDue()">${yOpts.join('')}</select>
        <select style="flex:1" onchange="vForm.month=+this.value;syncVisionDue()">${mOpts.join('')}</select>
      </div></div></div>`;
  }
  return `<div class="field"><div class="finline"><label>연도</label><select onchange="vForm.year=+this.value;syncVisionDue()">${yOpts.join('')}</select></div></div>`;
}
// 정성 목표 목표일을 대상 기간 안으로 보정 (기간 밖이면 기간 종료일로 클램프)
function syncVisionDue(){
  if(vForm.type==='QUAL'){
    const rng = visionPeriodRange(vForm);
    if(!vForm.dueDate || vForm.dueDate < rng.from || vForm.dueDate > rng.to){
      const todayInRange = (todayStr()>=rng.from && todayStr()<=rng.to);
      vForm.dueDate = todayInRange ? rng.to : rng.from;
    }
  }
  renderVisionSheet(true);   // [버그] 연간/월간 토글 등에서 스크롤 위치 유지(맨 위로 튐 방지)
}
// [P4] 대상 카테고리 칩 다중선택 토글 ('전체' 칩은 배타적)
function toggleCapCat(id){ vForm.capCategoryIds = toggleCatId(vForm.capCategoryIds, id, '__allout__'); renderVisionSheet(true); }   // [버그] 대상 칩 토글 시 스크롤 위치 유지(맨 위로 튀지 않게)
function toggleSaveCat(id){ vForm.savingCategoryIds = toggleCatId(vForm.savingCategoryIds, id, '__allsave__'); renderVisionSheet(true); }
function toggleCatId(arr, id, allSentinel){
  let ids = Array.isArray(arr)&&arr.length ? arr.slice() : [allSentinel];
  if(id===allSentinel){ return [allSentinel]; }           // '전체' 선택 = 배타적
  ids = ids.filter(x=>x!==allSentinel);                    // 개별 선택 시 '전체' 해제
  const i=ids.indexOf(id);
  if(i>=0) ids.splice(i,1); else ids.push(id);
  return ids.length ? ids : [allSentinel];                 // 아무것도 없으면 전체로 복귀
}
function renderVisionSheet(keepScroll){
  const quant = vForm.type==='QUANT';
  const isCap = vForm.metric==='cap';
  const isManual = vForm.metric==='manual';
  const editing = !!vEditId;
  const preset = vForm.preset || (quant?(isCap?'budget':(vForm.metric==='saving'?'saving':'diet')):'deadline');
  const capSel = (Array.isArray(vForm.capCategoryIds)&&vForm.capCategoryIds.length)?vForm.capCategoryIds:['__allout__'];
  const saveSel = (Array.isArray(vForm.savingCategoryIds)&&vForm.savingCategoryIds.length)?vForm.savingCategoryIds:['__allsave__'];
  const suf = vForm.unit?`<span class="ui-suffix">${escapeHtml(vForm.unit)}</span>`:'';
  const presetRow = Object.keys(VIS_PRESETS).map(k=>{const P=VIS_PRESETS[k];return `<button type="button" class="vpreset ${preset===k?'on':''}" onclick="setVisionPreset('${k}')"><span class="vp-em">${P.emoji}</span><span class="vp-lb">${P.label}</span></button>`;}).join('');
  // 유형별 주요 입력(첫 화면엔 이것만)
  let primary='';
  if(!quant){
    primary=`<div class="field"><div class="finline"><label>목표일</label><input type="date" id="vDue" value="${vForm.dueDate}" min="${ymd(NOW)}" onchange="setVisionDue(this.value)"></div><div class="fhint">이 날짜까지가 목표예요. 진행은 <b>연결한 습관</b>으로 채워져요 — 만든 뒤 상세에서 <b>‘이 목표에 습관 추가’</b>로 연결하세요.</div></div>`;
  } else if(isCap){
    primary=`<div class="field"><div class="finline"><label>예산</label><div class="unit-input"><input type="number" id="vTar" value="${vForm.targetValue}" oninput="vForm.targetValue=+this.value">${suf}</div></div></div>`;
  } else {
    primary=`<div class="field"><div class="finline"><label>목표값</label><div class="unit-input"><input type="number" id="vTar" value="${vForm.targetValue}" oninput="vForm.targetValue=+this.value">${suf}</div></div></div>`
      + (isManual?`<div class="field"><div class="finline"><label>현재값</label><div class="unit-input"><input type="number" id="vCur" value="${vForm.currentValue}" oninput="vForm.currentValue=+this.value; if(!visStartAdv) vForm.startValue=vForm.currentValue">${suf}</div></div></div>`:'');
  }
  const periodSummary = vForm.period==='year'?`${vForm.year}년 · 연간`:`${vForm.year}년 ${vForm.month+1}월 · 월간`;

}
function saveVision(){
  activeSheetKind=null;   // [자동저장] 명시적 저장 — closeSheet 재저장 방지
  if(!vForm.title.trim()){ toast('제목을 입력해주세요'); return; }
  const editing = !!vEditId;
  const v = editing ? visionById(vEditId) : { id:uid(), createdAt:ymd(NOW) };   // [P4] 누적 달성률·회고 노출의 시작 기준
  if(editing && !v){ toast('목표를 찾을 수 없어요'); return; }
  v.title=vForm.title.trim(); v.type=vForm.type; v.period=vForm.period;
  v.memberId = vForm.memberId||'';   // [요청] 누구의 목표('' = 공용/공동)
  // [2] 대상 기간(날짜): 연간=year, 월간=year+month
  v.year = (vForm.year!=null)?vForm.year:NOW.getFullYear();
  if(vForm.period==='month') v.month = (vForm.month!=null)?vForm.month:NOW.getMonth(); else delete v.month;
  if(vForm.type==='QUANT'){
    v.metric = (vForm.metric==='saving'?'saving':(vForm.metric==='cap'?'cap':'manual'));
    v.targetValue = vForm.targetValue||1;
    v.unit = vForm.unit||'원';
    if(v.metric==='cap'){
      v.capCategoryIds = (Array.isArray(vForm.capCategoryIds)&&vForm.capCategoryIds.length)?vForm.capCategoryIds.slice():['__allout__'];
      delete v.capCategoryId; delete v.savingCategoryIds; delete v.savingCategoryId;
      v.startValue = 0; v.currentValue = 0;   // recomputeVisions가 지출로 채움
    } else {
      delete v.capCategoryId; delete v.capCategoryIds;
      v.startValue = vForm.startValue||0;
      v.currentValue = (v.metric==='saving') ? 0 : (vForm.currentValue!=null?vForm.currentValue:v.startValue);
      if(v.metric==='saving'){ v.savingCategoryIds = (Array.isArray(vForm.savingCategoryIds)&&vForm.savingCategoryIds.length)?vForm.savingCategoryIds.slice():['__allsave__']; delete v.savingCategoryId; }
      else { delete v.savingCategoryIds; delete v.savingCategoryId; }
    }
    delete v.dueDate;
  } else {
    const rng=visionPeriodRange(v);
    let due=vForm.dueDate||rng.to;
    if(due<rng.from) due=rng.from; if(due>rng.to) due=rng.to;
    v.dueDate=due;
    delete v.metric; delete v.startValue; delete v.targetValue; delete v.unit; delete v.currentValue; delete v.capCategoryId; delete v.savingCategoryId; delete v.capCategoryIds; delete v.savingCategoryIds;
  }
  if(!editing) DB.visions.push(v);
  const reopenId = (editing || !isActiveVision(v)) ? v.id : null;   // [UX-6] 편집·미래(비활성) 목표는 저장 후 상세를 열어 '저장됨' 확인(조용히 사라지는 혼란 방지)
  vEditId=null;
  recomputeVisions(); saveDB(); closeSheet(); renderAll();
  // [P4] 대상 기간이 현재가 아니면 목록에 안 뜨므로 안내(조용히 사라지는 혼란 방지)
  if(!editing && !isActiveVision(v)){
    toast('목표를 만들었어요 · 대상 기간이 지금이 아니라 목록엔 아직 안 보여요 (그 기간이 되면 나타나요)');
  } else {
    toast(editing?'목표를 수정했어요':'목표가 추가되었어요');
  }
  if(reopenId) openVisionDetail(reopenId);   // 편집 후 상세로 복귀
}

function openRecordSheet(editId, defaultKind, defaultFlow, defaultMember, occDate, defaultDate){
  rEditId = editId || null;
  recWiz = false;   // [모두쓰] 위저드 상태 초기화(수정·타종류는 항상 단일폼)
  rOccDate = occDate || null;

  recSheetReturnVision = (editId && visionDetailOpen) ? visionDetailOpen : null;

    const r=DB.records.find(x=>x.id===editId);

    const d=new Date(r.ts);
    rForm={ memberId:r.memberId, kind:r.kind, flow:recFlow(r), title:r.title, amount:r.amount||'', value:(r.value!=null?r.value:''), categoryId:r.categoryId||'', visionId:r.visionId||'', date:ymd(d), time:(r.allDay?'':hm(d)), repeat:eventRepeat(r), remind:recRemind(r), accountId:(r.accountId||DB.mainAccountId), fromAccountId:(r.fromAccountId||DB.mainAccountId), toAccountId:(r.toAccountId||'') };
    activeSheetSnap = JSON.stringify(rForm);   // [자동저장] 편집 스냅샷 — 변경 없으면 닫아도 저장 안 함
    // [P3] 수정 시 이미 설정된 고급 옵션(반복·알림·목표연결)이 있으면 '옵션 더보기'를 펼친 채로 보여줌
    recAdvOpen = (eventRepeat(r)!=='none') || hasRemind(r) || !!r.visionId;
    renderRecordSheet();
    return;
  } else {
    // 체중 기록은 기본적으로 다이어트(manual·kg) 목표에 연결 시도
    let defVis='';
    if((defaultKind||'')==='weight'){ const dv=DB.visions.find(v=>v.type==='QUANT'&&v.metric==='manual'&&/kg/i.test(v.unit||'')&&isActiveVision(v)); if(dv) defVis=dv.id; }
    // [P3] 기본값 상속: 종류=직전 사용값 / 구성원=헤더 활성 구성원 / 카테고리=최근 사용 칩 / 날짜·시간=지금
    const defKind = defaultKind||DB.lastKind||'expense';

    const defMember = defaultMember || (memberScope!=='all' ? memberScope : null) || DB.currentMemberId || DB.members[0].id;   // [전역] 필터 스코프 구성원을 기록 기본값으로
    rForm={ memberId:defMember, kind:defKind, flow:defFlow, title:'', amount:'', value:'', categoryId:defCat, visionId:defVis, date:(defaultDate||ymd(NOW)), time:hm(NOW), repeat:'none', remind:'none', accountId:DB.mainAccountId, fromAccountId:DB.mainAccountId, toAccountId:'' };   // [P4][QA] 홈에서 선택한 날짜로 저장(오늘로 박히던 문제) · [계좌] 결제수단 기본=주계좌
    activeSheetSnap = null;   // [자동저장] 신규 기록

  recAutoFocusAmt = (!editId && rForm.kind==='expense');

// [모두쓰] 기록 입력 위저드 (신규 가계부) — 위플식 스텝. 기존 컴포넌트(setRecFlowForm·categoryChips·accountsForRole·saveRecord) 재사용.

        +`<div class="field"><label>입금 계좌 <span style="font-weight:400;color:var(--ink-3);font-size:var(--fs-sm)">(탭하면 저장)</span></label><div class="wz-acc-list">${accountsForRole('xferTo').map(a=>`<button class="wz-acc" onclick="pickRecToAcct('${a.id}')"><span>${(a.icon||'')}</span> ${escapeHtml(a.name)}</button>`).join('')}</div></div>`;

function wzAmt(el){ rForm.amount=el.value.replace(/[^0-9]/g,''); el.value=rForm.amount?Number(rForm.amount).toLocaleString('ko-KR'):''; const b=document.getElementById('wzNext'); if(b) b.disabled=!(rForm.amount&&parseInt(rForm.amount)>0); }
function recWizDir(f){ if(!(rForm.amount&&parseInt(rForm.amount)>0)){ toast('금액을 먼저 입력해주세요'); return; } rForm.flow=f; rForm.categoryId=''; if(f==='transfer'){ rForm.fromAccountId=rForm.fromAccountId||DB.mainAccountId; if(!rForm.toAccountId||rForm.toAccountId===rForm.fromAccountId) rForm.toAccountId=((DB.accounts||[]).find(a=>a.id!==rForm.fromAccountId)||{}).id||''; } recStep=2; renderRecordWizard(); }   // [모두쓰] 방향 탭=확정+다음
