function makeSeedRec(m,k,dt,expenseTitles,workoutTitles,eventTitles){
  let rec = { id:uid(), memberId:m.id, kind:k, ts:dt.getTime() };
  if(k==='expense'){ const t=expenseTitles[Math.floor(Math.random()*expenseTitles.length)]; rec.title=t[0]; rec.amount=t[1]; rec.visionId=t[2]; rec.categoryId=t[3]; rec.flow='out'; }
  else if(k==='workout'){ const t=workoutTitles[Math.floor(Math.random()*workoutTitles.length)]; rec.title=t[0]; rec.visionId=t[1]; }
  else { const t=eventTitles[Math.floor(Math.random()*eventTitles.length)]; rec.title=t[0]; rec.visionId=t[1]; }
  return rec;
}

/* ============================================================
   FLOW HELPERS / 수입·지출 (flow:'in'|'out')
   ============================================================ */
// [P4] flow 3분류: 'in'(수입) · 'out'(지출) · 'save'(저축·투자, 자산 이체 — 소비 아님)
function recFlow(r){ return r.flow || 'out'; }                       // 기본 지출
function isIncome(r){ return r.kind==='expense' && recFlow(r)==='in'; }
function isExpenseOut(r){ return r.kind==='expense' && recFlow(r)==='out'; }   // [P4] 지출은 정확히 out만 — 저축이 지출총액에 새지 않게
function isTransfer(r){ return r.kind==='expense' && recFlow(r)==='save'; }    // [P4] 저축·투자(제3유형)
function sumIncome(recs){ return recs.filter(isIncome).reduce((s,r)=>s+(r.amount||0),0); }
function sumExpense(recs){ return recs.filter(isExpenseOut).reduce((s,r)=>s+(r.amount||0),0); }
function sumSave(recs){ return recs.filter(isTransfer).reduce((s,r)=>s+(r.amount||0),0); }   // [P4] 저축·투자 합계(요약 별도 줄)
/* ============================================================
   ACCOUNT / 계좌(자산) — 사용자 관리, 은행연동 아님. 계좌별 잔액·총자산·이체
   ============================================================ */
function accountById(id){ return (DB.accounts||[]).find(a=>a.id===id) || null; }
function acctOf(r){ return r.accountId || DB.mainAccountId; }   // 미지정 기록=주계좌
function isXfer(r){ return r.kind==='expense' && recFlow(r)==='transfer'; }   // [계좌] 이체(신규 flow) — 카드대금/인출/계좌이동. 수입·지출·저축 어디에도 안 잡힘
function saveToOf(r){ return r.toAccountId || 'acc-save'; }   // 저축·투자 입금처(기본 저축·투자 계좌)
const ACCT_TYPE = { cash:{l:'현금',i:'💵'}, bank:{l:'통장',i:'🏦'}, card:{l:'카드',i:'💳'}, save:{l:'저축·투자',i:'📈'} };
// 계좌 잔액 = 시작잔액 + 수입(+) − 지출(−) + 저축입금(+)/출금(−) + 이체 in(+)/out(−). 카드 지출=미결제(마이너스), 카드대금=이체로 정산.
function accountBalance(accId){
  let bal = (accountById(accId)||{}).startBalance || 0;
  DB.records.forEach(r=>{
    if(r.kind!=='expense') return;
    const f = recFlow(r), amt = r.amount||0;
    if(f==='transfer'){
      if(r.fromAccountId===accId) bal -= amt;
      if(r.toAccountId===accId) bal += amt;
    } else if(!r.accountId){ return;   // [수정] 계좌 미지정(예전·샘플 기록)은 잔액에 영향 없음 → 시작잔액이 그대로 반영
    } else if(f==='save'){
      if(r.accountId===accId) bal -= amt;                 // 출금 계좌
      if((r.toAccountId||'acc-save')===accId) bal += amt; // 저축·투자 계좌 입금 → 순자산 보존
    } else if(f==='in'){
      if(r.accountId===accId) bal += amt;
    } else {   // out(지출) — 카드면 미결제 누적(마이너스)
      if(r.accountId===accId) bal -= amt;
    }
  });
  return bal;
}
function totalAssets(){ return (DB.accounts||[]).reduce((s,a)=>s+accountBalance(a.id),0); }
// [계좌] 역할별 선택 가능 계좌 — 신용카드는 '지출 결제'와 '이체 입금(카드대금)'에서만. 수입·저축출금·이체출금엔 신용카드 제외.
function accountsForRole(role){
  return (DB.accounts||[]).filter(a=>{
    if(a.type!=='card') return true;
    return role==='out' || role==='xferTo';
  });
}

/* ============================================================
   VISION CALC / 목표 진행률 계산
   ============================================================ */
function recomputeVisions(){
  DB.visions.forEach(v=>{
    if(v.type!=='QUANT') return;
    if(isCompleted(v)) return;   // [검토] 완료 목표는 값 동결 — 이후 같은 기간 저축·지출 입력에 걸어온길 %가 사후 표류하던 문제
    if(v.targetValue==null && v.target!=null) v.targetValue = v.target;
    if(v.startValue==null) v.startValue = 0;
    // saving(저축형): 연결된 수입 기록을 누적 기여로 자동 합산 (지출은 차감)
    if(v.metric==='saving' || (v.metric==null && /모으기|저축/.test(v.title))){
      let sum = 0;
      DB.records.forEach(r=>{
        if(r.kind!=='expense') return;
        if(v.memberId && r.memberId!==v.memberId) return;   // [BUG-1] 개인(구성원 지정) 목표는 그 사람 기록만(공용 제외). 공용 목표(memberId='')은 전체 집계.
        if(!recInVisionPeriod(v, r)) return;   // 목표 대상 기간 내 기록만 집계
        // [P4] 집계 대상(자동집계가 정식): savingCategoryId = '__allsave__'(전체 저축·투자) | 특정 저축 카테고리 | (하위호환) visionId 수동연결
        const linked = r.visionId===v.id;
        const sIds = saveCatIds(v);
        const catMatch = sIds.indexOf('__allsave__')>=0 ? isTransfer(r)
                        : (sIds.indexOf(r.categoryId)>=0 && !isExpenseOut(r));
        if(!linked && !catMatch) return;
        // 저축·투자(save)·수입(in)은 + 기여, 지출(out)만 차감
        sum += isExpenseOut(r) ? -(r.amount||0) : (r.amount||0);
      });
      v.metric = 'saving';
      // [회의] 투명 환산: 현재값 = 시작값(이미 모은 돈) + 연결 기여 순합. 임의 보정상수(*5,+21.5M) 제거.
      v.currentValue = Math.max(0, (v.startValue||0) + sum);
    }
    // [P4] cap(상한형·"○○ 이하"): 기간 내 지출 합을 자동 집계. 적을수록 좋음.
    //  집계 대상 = '__allout__'(전체 지출) | 지정 카테고리(capCategoryId) | (하위호환) visionId 연결 지출.
    else if(v.metric==='cap'){
      let sum = 0;
      DB.records.forEach(r=>{
        if(!isExpenseOut(r)) return;   // [P4] 예산 사용액은 지출(out)만 — 수입·저축(save) 제외
        if(v.memberId && r.memberId!==v.memberId) return;   // [BUG-1] 개인 예산 목표는 그 사람 지출만(공용 제외).
        const cIds = capCatIds(v);
        const matchCat = cIds.indexOf('__allout__')>=0 ? true : cIds.indexOf(r.categoryId)>=0;
        const matchVis = r.visionId===v.id;
        if(!matchCat && !matchVis) return;
        if(!recInVisionPeriod(v, r)) return;
        sum += (r.amount||0);
      });
      v.currentValue = sum;
    }
    // [P4] manual(체중 등): 연결된 체중 기록이 있으면 최신값으로 자동 반영(삭제해도 되돌아감). 없으면 사용자 입력값 유지.
    else if(v.metric==='manual'){
      const wr = DB.records.filter(r=>r.visionId===v.id && r.kind==='weight' && r.value!=null && recInVisionPeriod(v,r));
      if(wr.length){ wr.sort((a,b)=>a.ts-b.ts); v.currentValue = wr[wr.length-1].value; v._autoWeight=true; }
      else if(v._autoWeight){ v.currentValue = v.startValue; v._autoWeight=false; }   // [BUG-2] 체중 자동추적 중이던 목표의 연결 기록이 전부 삭제되면 시작값으로 복귀(주석대로). 순수 수동입력 목표는 건드리지 않음.
    }
  });
}
// [P4] cap 목표 = 예산 사용률(%). 100 초과 = 예산 초과. (일반 진행률과 의미 다름)
function capUsedPct(v){
  const t=(v.targetValue!=null)?v.targetValue:v.target;
  if(!t) return 0;
  return Math.round(((v.currentValue||0)/t)*100);
}
function isCapVision(v){ return v.type==='QUANT' && v.metric==='cap'; }
// [P4] cap/saving 대상 카테고리 = 다중선택 배열. 구버전(단일 capCategoryId/savingCategoryId)·빈 값 하위호환.
function capCatIds(v){ return (Array.isArray(v.capCategoryIds)&&v.capCategoryIds.length) ? v.capCategoryIds : (v.capCategoryId?[v.capCategoryId]:['__allout__']); }
function saveCatIds(v){ return (Array.isArray(v.savingCategoryIds)&&v.savingCategoryIds.length) ? v.savingCategoryIds : (v.savingCategoryId?[v.savingCategoryId]:['__allsave__']); }
function capCovers(v, catId){ const ids=capCatIds(v); return ids.indexOf('__allout__')>=0 || ids.indexOf(catId)>=0; }
function saveCovers(v, catId){ const ids=saveCatIds(v); return ids.indexOf('__allsave__')>=0 || ids.indexOf(catId)>=0; }
// 대상 라벨(칩 요약·상세용): '전체 지출' / '식비 + 여가 (2개)'
function catIdsLabel(ids, allWord, allSentinel){
  if(ids.indexOf(allSentinel)>=0) return allWord;
  const names=ids.map(id=>{ const c=categoryById(id); return c?c.name:null; }).filter(Boolean);
  if(!names.length) return allWord;
  return names.length<=2 ? names.join(' + ') : `${names.slice(0,2).join(' + ')} 외 ${names.length-2}`;
}
function visionPct(v){
  if(v.type!=='QUANT') return 0;
  const s = (v.startValue!=null) ? v.startValue : 0;
  const t = (v.targetValue!=null) ? v.targetValue : v.target;
  const c = (v.currentValue!=null) ? v.currentValue : 0;
  const denom = (t - s);
  if(denom===0) return 0;
  return Math.max(0, Math.min(100, Math.round(((c - s) / denom) * 100)));
}
// [P4] 최근 지킨 비율 — '요즘 얼마나 꾸준한가'(최근 7일=1주 창). 습관 만들기 이전 날은 제외(억울한 실패 방지). 목표 진행률이 아니라 보조 지표.
function visionFidelity(v){
  const rts = DB.routines.filter(r=>r.visionId===v.id);
  if(!rts.length) return 0;
  let done=0, total=0;
  rts.forEach(r=>{
    const start = r.createdAt ? parseYmd(r.createdAt) : null;
    for(let i=0;i<7;i++){
      const d = addDays(NOW,-i);
      if(start && d<start) continue;   // 습관 생성 전 날은 세지 않음
      if(routineOnWeekday(r, d.getDay())){ total++; if(routineComplete(r,ymd(d))) done++; }
    }
  });
  return total? Math.round(done/total*100):0;
}
// [P4] 누적 달성률(기한 목표) — 시작(습관/목표 만든 날)부터 마감일까지 '예정된 습관 날' 중 지금까지 지킨 날의 비율. 예) 매일 175일 중 1일 지킴 = 1%.
function visionAchieveCounts(v){
  const rts = DB.routines.filter(r=>r.visionId===v.id);
  if(!rts.length || !v.dueDate) return {done:0,total:0};
  const due = parseYmd(v.dueDate);
  const todayStr = ymd(NOW);
  let done=0, total=0;
  rts.forEach(r=>{
    // 시작 기준: 습관 생성일 → 목표 생성일 → (구버전) 첫 기록일 → 오늘
    const startStr = r.createdAt || v.createdAt || routineFirstCheck(r) || todayStr;
    let d = parseYmd(startStr), guard=0;
    while(d<=due && guard<20000){
      if(routineOnWeekday(r, d.getDay())){
        total++;
        if(ymd(d)<=todayStr && routineComplete(r, ymd(d))) done++;
      }
      d = addDays(d,1); guard++;
    }
  });
  return {done,total};
}
// 기한 목표 진행률(%) = 누적 달성률. 연결 습관 없으면 0.
function visionQualPct(v){ const c=visionAchieveCounts(v); return c.total? Math.round(c.done/c.total*100):0; }
// 목표 진행률 통합 — 숫자목표=visionPct, 기한목표=누적 달성률. (표시용 공통)
function visionProgressPct(v){ return v.type==='QUANT' ? visionPct(v) : visionQualPct(v); }
function dday(v){
  return Math.ceil((parseYmd(v.dueDate) - parseYmd(ymd(NOW)))/(1000*60*60*24));
}

/* ============================================================
   VISION PERIOD / 목표 대상 기간 (연간=연도, 월간=연·월)
   year/month 미지정(구버전)이면 올해/이번달로 보정. 진행률·집계 기준.
   ============================================================ */
function visionYear(v){ return (v.year!=null)?v.year:NOW.getFullYear(); }
function visionMonth(v){ return (v.month!=null)?v.month:NOW.getMonth(); }
// 목표 대상 기간의 [from,to] 날짜 문자열 (집계 필터용)
function visionPeriodRange(v){
  const y = visionYear(v);
  if(v.period==='month'){
    const mo = visionMonth(v);
    return { from:ymd(new Date(y,mo,1)), to:ymd(new Date(y,mo+1,0)) };
  }
  return { from:ymd(new Date(y,0,1)), to:ymd(new Date(y,11,31)) };
}
// 목표 대상 기간 표시 라벨 (예: 2026년 / 2026년 6월)
function visionPeriodLabel(v){
  const y = visionYear(v);
  return v.period==='month' ? `${y}년 ${visionMonth(v)+1}월` : `${y}년`;
}
// 해당 목표 기간 안의 기록인지
function recInVisionPeriod(v, r){
  const rng = visionPeriodRange(v);
  const ds = ymd(new Date(r.ts));
  return ds>=rng.from && ds<=rng.to;
}
// [2] 현재 진행 중인 목표인지 (연간=올해, 월간=올해·이번달). 홈·목표탭은 현재 목표만 노출(과거 목표는 보고서에서만).
// [P4] 기한 목표(QUAL)는 '마감일까지 진행 중인 목표' → 마감일이 아직 안 지났으면(미래 마감 포함) 지금부터 활성. (예: 7월에 만든 '10월까지 앱 출시')
function isCurrentPeriodVision(v){
  if(v.type==='QUAL' && v.dueDate) return v.dueDate >= ymd(NOW);
  if(v.period==='month') return visionYear(v)===NOW.getFullYear() && visionMonth(v)===NOW.getMonth();
  return visionYear(v)===NOW.getFullYear();
}
// [P3] 완료(달성) 목표 — completedAt 표시 시 보관함으로. 활성 = 현재기간 & 미완료.
function isCompleted(v){ return !!v.completedAt; }
function isActiveVision(v){ return isCurrentPeriodVision(v) && !isCompleted(v); }
function isPastVision(v){ if(isCompleted(v)) return false; if(v.type==='QUAL' && v.dueDate) return v.dueDate < ymd(NOW); return visionPeriodDday(v) < 0; }   // [C·수정] 기간 끝났는데 미완료. QUAL은 dueDate 기준(isActiveVision과 판정축 일치) — 마감 지난 기한목표가 사라지던 버그 수정
// 목표 대상 기간 기준 D-day (기간 종료일까지 남은 일수)
function visionPeriodDday(v){
  const rng = visionPeriodRange(v);
  return Math.ceil((parseYmd(rng.to) - parseYmd(ymd(NOW)))/(1000*60*60*24));
}

/* ============================================================
   COMPONENT: memberPill / 구성원 컬러 라운드 pill (전 화면 공용)
   색 틴트 배경 + 색 점 + 이름. active=선택 상태(더 진한 틴트 + 굵은 테두리).
   opts: { size:'sm'|'md'|'lg', active:bool }
   ============================================================ */
function memberPill(member, opts){
  opts = opts || {};
  // [회의] 옆에 색 리드타일 있는 곳 = 이름만.
  if(opts.nameOnly) return `<span class="mp-nameonly">${escapeHtml(member.name)}</span>`;
  const size = opts.size || 'md';
  const active = !!opts.active;
  const c = member.color || 'var(--accent)';
  // [요청] 아웃라인 칩 → 선택 시 색 풀 채움(FAB식). 미선택=구성원색 테두리, 선택=색 채움+자동대비 글씨. 이름만 박스 안, 별도 점 없음. 전 화면(누가·필터·목표·습관·더보기) 공통.
  const style = `style="--mc:${escapeHtml(c)};--mci:${readableInk(c)}"`;
  return `<span class="mpill ${size} ${active?'active':''}${opts.filled?' fill':''}" ${style}>
    <span class="mpname">${escapeHtml(member.name)}</span>
  </span>`;
}
// [P4] 삭제된 구성원도 아카이브(deletedMembers)에서 조회 — 리포트·기록에 이름·색이 계속 보이도록. 활성 목록(DB.members)엔 없어 필터/홈/피커엔 안 뜸.
function memberById(id){ return DB.members.find(m=>m.id===id) || (DB.deletedMembers||[]).find(m=>m.id===id); }
// [요청] 기록 담당 표기 규칙: 미지정('')=공용(공동) / 활성 구성원=이름 / 삭제된 구성원=이름 (삭제됨) / 그 외 유실=담당없음.
function deletedMemberById(id){ return (DB.deletedMembers||[]).find(x=>x.id===id); }
function roleName(memberId){ if(!memberId) return '전체'; const m=DB.members.find(x=>x.id===memberId); if(m) return m.name; const dm=deletedMemberById(memberId); return dm?`${dm.name} (삭제됨)`:'담당없음'; }
function roleTagHtml(memberId){ if(!memberId) return `<span class="mp-nameonly">전체</span>`; const m=DB.members.find(x=>x.id===memberId); if(m) return memberPill(m,{nameOnly:true}); const dm=deletedMemberById(memberId); return `<span class="mp-nameonly">${dm?escapeHtml(dm.name)+' (삭제됨)':'담당없음'}</span>`; }
function visionById(id){ return DB.visions.find(v=>v.id===id); }
function categoryById(id){ return (DB.categories||[]).find(c=>c.id===id); }
function visionTarget(v){ return (v.targetValue!=null)?v.targetValue:v.target; }

/* ============================================================
   COMPONENT: memberFilterPills / 공용 구성원 필터 (홈/기록/습관 재사용)
   ============================================================ */
function memberFilterPills(selId, onPick, includeAll){
  let html = `<div class="mfilter">`;
  if(includeAll){
    // '전체'도 구성원 pill과 동일 형태·크기·정렬 (중립 회색 틴트, active 동일 표현)
    const on = selId==='all';
    html += `<span onclick="${onPick}('all')" style="flex-shrink:0"><span class="mpill md all ${on?'active':''}"><span class="mpdot"></span><span class="mpname">전체</span></span></span>`;
  }
  DB.members.forEach(m=>{
    html += `<span onclick="${onPick}('${m.id}')" style="flex-shrink:0">${memberPill(m,{size:'md',active:selId===m.id})}</span>`;
  });
  html += `</div>`;
  return html;
}

/* ============================================================
   COMPONENT: renderVisionCard / 목표 카드
   ============================================================ */
function visionContribDots(v){
  const set = new Set();
  const add = r => { const m=memberById(r.memberId); if(m) set.add(m.color); };
  if(v.metric==='cap'){   // [검토] 예산=기간 내 대상 카테고리 지출의 구성원 (자동집계 기여가 점에 안 뜨던 문제)
    const cIds=capCatIds(v);
    DB.records.forEach(r=>{ if(isExpenseOut(r) && recInVisionPeriod(v,r) && (cIds.indexOf('__allout__')>=0 || cIds.indexOf(r.categoryId)>=0)) add(r); });
  } else if(v.metric==='saving'){   // [검토] 저축=기간 내 대상 저축 기록의 구성원
    const sIds=saveCatIds(v);
    DB.records.forEach(r=>{ if(recInVisionPeriod(v,r) && (sIds.indexOf('__allsave__')>=0 ? isTransfer(r) : (sIds.indexOf(r.categoryId)>=0 && !isExpenseOut(r)))) add(r); });
  } else {
    DB.records.forEach(r=>{ if(r.visionId===v.id) add(r); });
  }
  if(!set.size) return '<div class="contrib-dots"></div>';   // [요청] 점 없어도 자리 예약 → 카드 높이 통일
  return `<div class="contrib-dots">${[...set].map(c=>`<i style="background:${escapeHtml(c)}"></i>`).join('')}</div>`;
}
function visionMainHtml(v){
  // [P4] cap(상한형) = 예산 트래커: 사용률·남은/초과 예산·경고색
  if(isCapVision(v)){
    const used = capUsedPct(v);
    const cur = v.currentValue||0, tgt = visionTarget(v);
    const over = cur - tgt;
    const barColor = used>=100 ? 'var(--danger)' : (used>=80 ? 'var(--warn)' : 'var(--good)');
    const unit = escapeHtml(v.unit||'');
    const bigTxt = over>0 ? `<span style="color:var(--danger)">${wonShortSmall(over)}<small>${unit}</small></span>` : `${wonShortSmall(tgt-cur)}<small>${unit}</small>`;
    return {
      big:`<div class="vbig">${bigTxt}</div>`,   // [요청] 예산형 주 숫자 = 남은 예산(방향 명확, 저축형 %와 혼동 방지)
      sub:`${used}% 사용`,   // [요청] 카드 오른쪽 짧게(글자 넘침 방지) — 남은 예산은 큰 숫자가 담당
      barPct:Math.min(100,used), barColor
    };
  }
  if(v.type==='QUANT'){
    const pct = visionPct(v);
    return {
      big:`<div class="vbig">${pct} <small>%</small></div>`,
      sub:`${wonShort(v.currentValue)} / ${wonShort(visionTarget(v))}${escapeHtml(v.unit||'')}`,   // [요청] 축약(123만/100만원)·단위 붙여 한 글자 넘침 방지
      barPct:pct, barColor:'var(--accent)'
    };
  }else{
    const d = dday(v); const c = visionAchieveCounts(v); const pct = c.total?Math.round(c.done/c.total*100):0;
    return {
      big:`<div class="vbig">${d>=0?'D-'+d:'D+'+(-d)}</div>`,
      sub:`목표일 ${escapeHtml(v.dueDate)}`,   // [요청] 기한 목표 카드엔 목표일만 — 지킨 날 상세는 카드에서 생략
      barPct:pct, barColor:'var(--accent)'
    };
  }
}
const revealedVisions = new Set();
// [버그] 목표 상세 시트가 열려있는 동안의 목표 id. 기여 기록 수정 시트를 닫으면 이 상세로 복귀.
let visionDetailOpen = null;
// [토스류 재설계] 목표 상세의 '기여한 기록' 접힘 상태(기본 접힘)
let visionDetailContribOpen = false;
function toggleVisionContrib(){
  visionDetailContribOpen = !visionDetailContribOpen;
  const b=document.getElementById('vdContribBody'), c=document.getElementById('vdContribChev');
  if(b) b.classList.toggle('collapsed', !visionDetailContribOpen);
  if(c) c.classList.toggle('open', visionDetailContribOpen);
}
function renderVisionCard(v, opts){
  opts = opts || {};
  const privacy = !!opts.privacy;
  const periodLabel = (v.period==='year'?'연간':'월간')+' '+visionPeriodLabel(v);
  const main = visionMainHtml(v);
  const revealed = revealedVisions.has(v.id);

  const revealedBody = `<div class="vrevealed">
      <div class="vstatline">${main.big}<div class="vmeta">${main.sub}</div></div>
      <div class="bar"><span style="width:${main.barPct}%;background:${main.barColor}"></span></div>
      ${visionContribDots(v)}
    </div>`;
  const lockedBody = `<div class="vlocked">
      <div class="vlock-mask"></div>
      <div class="vlock-hint">${icon('lock',14)} 탭하여 진행 보기</div>
    </div>`;

  if(privacy){
    return `<div class="vcard ${revealed?'':'locked'}" id="vcard-${v.id}" onclick="toggleVisionReveal('${v.id}')">
      <div class="vtop"><span class="pill">${v.type==='QUANT'?'숫자 목표':'기한 목표'}</span>
        <span class="more" style="font-size:var(--fs-cap)" onclick="event.stopPropagation();openVisionDetail('${v.id}')">자세히</span></div>
      <div class="vname">${escapeHtml(v.title)}</div>
      <div class="vmeta">${periodLabel}</div>
      ${lockedBody}
      ${revealedBody}
    </div>`;
  }
  return `<div class="vcard" onclick="openVisionDetail('${v.id}')">
    <div class="vtop"><span class="pill">${v.type==='QUANT'?'숫자 목표':'기한 목표'}</span></div>
    <div class="vname">${escapeHtml(v.title)}</div>
    <div class="vmeta">${periodLabel}</div>
    <div class="vstatline">${main.big}<div class="vmeta">${main.sub}</div></div>
    <div class="bar"><span style="width:${main.barPct}%;background:${main.barColor}"></span></div>
    ${visionContribDots(v)}
  </div>`;
}
function toggleVisionReveal(id){
  if(revealedVisions.has(id)) revealedVisions.delete(id);
  else revealedVisions.add(id);
  // [B] 버그 수정: 전체 재렌더(renderHome) 시 .vscroll innerHTML이 새로 그려져
  // 캐러셀 scrollLeft가 0으로 리셋됨 → 누른 카드만 toggle (스크롤 위치 보존)
  const card = document.getElementById('vcard-'+id);
  if(card){
    card.classList.toggle('locked', !revealedVisions.has(id));
  } else {
    renderHome();
  }
}

/* ============================================================
   COMPONENT: ScheduleRow / 통일 행 (event / routine / record)
   color = 카테고리(소속), 완료상태는 채움+취소선+opacity로 표현
   ============================================================ */
/* [3] 종류(kind)는 무채색 — 색은 '구성원 원'에만, 종류는 아이콘 모양으로만 구분.
   기존 고유색(teal/orange/indigo/pink) 전면 제거 → 회색 계열로 통일.
   (행 LEAD 원의 색은 구성원 색으로 별도 적용되므로 영향 없음) */
const KIND_COLORS = {
  expense:'var(--ink-3)',
  workout:'var(--ink-3)',
  event:'var(--ink-3)',
  weight:'var(--ink-3)'
};
function kindMeta(k){
  // [라벨, 아이콘명, kind색]
  return ({
    expense_out:['지출','trend-down',KIND_COLORS.expense],
    expense_in:['수입','trend-up',KIND_COLORS.expense],
    expense_save:['저축·투자','bank',KIND_COLORS.expense],
    workout:['운동','barbell',KIND_COLORS.workout],
    event:['일정','calendar',KIND_COLORS.event],
    weight:['체중','scale',KIND_COLORS.weight]
  })[k];
}
function recordKindKey(r){
  if(r.kind==='expense') return isIncome(r)?'expense_in':(isTransfer(r)?'expense_save':'expense_out');
  return r.kind;
}

/* --- variant 'record' --- [A] LEAD=구성원색 타일+종류아이콘, 오른쪽=금액/체중값만 --- */
function scheduleRowRecord(r, opts){
  opts = opts || {};
  const m = memberById(r.memberId);
  const km = kindMeta(recordKindKey(r)) || ['기록','check','var(--ink-3)'];   // [P4] 예상 밖 kind(import/레거시)에도 안 죽게 폴백
  // [A2] 색 = 구성원, 아이콘 = 종류. (기존 kind색/카테고리색 타일 → 구성원색)
  const tileColor = m ? m.color : 'var(--ink-3)';
  const d = new Date(r.ts);
  // [A6] 오른쪽: 금액(수입 +파랑/지출 -빨강) 또는 체중값만. 종류 배지 삭제.
  let amount = '';
  if(r.kind==='expense'){
    if(isXfer(r)){   // [계좌] 이체 = 중립 회색, ↔ 기호
      amount = `<div class="samt" style="color:var(--ink-3)">↔${won(r.amount||0)}원</div>`;
    } else if(isTransfer(r)){   // [P4] 저축·투자 = 중립(초록), ↔ 기호
      amount = `<div class="samt save" style="color:var(--good)">↔${won(r.amount||0)}원</div>`;
    } else {
      const inc = isIncome(r);
      amount = `<div class="samt ${inc?'in':'out'}">${inc?'+':'-'}${won(r.amount||0)}원</div>`;
    }
  } else if(r.kind==='weight'){
    amount = `<div class="samt" style="color:var(--ink)">${r.value!=null?r.value:''}kg</div>`;
  }
  // [2] 1줄 컬럼 정렬: LEAD · 시간/날짜 · 역할(pill) · 제목 · trailing(금액/체중)
  // [목표 기여] contribDate=true면 시간 대신 날짜(예 6월 24일) 표시 (여러 날 기록이므로)
  const timeCol = opts.contribDate ? fmtMonthDay(d) : (opts.showTime ? (r.allDay?'종일':hm(d)) : '');
  // [버그수정] 목표 기여기록은 둘째 컬럼이 '날짜(6월 25일)'라 더 넓음 → 시간 트랙만 넓힘(--col-time).
  // 역할(--col-role)은 공용 고정값 유지 → 이 리스트 내 제목 1fr 시작선이 동일하게 정렬.
  const gridStyle = opts.contribDate ? `style="--col-time:78px"` : '';   // [요청] 기여 기록도 날짜↔제목 간격 확보(규칙 행과 통일감)
  const altCls = opts.alt ? ' alt' : '';
  const hideRole = !!opts.hideRole;   // [P4] 가계부 내역: 색 타일이 이미 구성원색이라 중복 pill 생략
  const [metaCls, metaCell] = rowMetaCell(roleTagHtml(r.memberId), timeCol, hideRole, opts.contribDate);
  const tapAttr = opts.editable ? `class="srow record tap${altCls}${metaCls}" onclick="openRecordSheet('${r.id}')" ${gridStyle}` : `class="srow record${altCls}${metaCls}" ${gridStyle}`;
  return `<div ${tapAttr}>
    <div class="lead"><div class="lead-tile" style="background:${escapeHtml(tileColor)}">${icon(km[1])}</div></div>
    ${metaCell}
    <span class="stitle-text">${escapeHtml(r.title)}</span>
    <div class="trailing">${amount}</div>
  </div>`;
}
// [요청] 목록 좌측 메타(구성원·시간) 셀 빌더: 전체=2줄 스택(구성원 위·시간 아래, 시간없으면 가운데) / 필터=시간만 / 비전기여=기존 2칸
function rowMetaCell(roleHtml, timeCol, hideRole, contribDate){
  if(hideRole) return [' no-role', `<div class="stime">${timeCol}</div>`];
  if(contribDate) return ['', `<div class="srole">${roleHtml}</div><div class="stime">${timeCol}</div>`];
  return [' meta-stack', `<div class="smeta"><div class="srole">${roleHtml}</div>${timeCol?`<div class="stime">${timeCol}</div>`:''}</div>`];
}

/* --- variant 'event' --- [A] LEAD=원형 완료체크(구성원색), 오른쪽 종류 배지 삭제 --- */
function scheduleRowEvent(r, opts){
  opts = opts || {};
  const m = memberById(r.memberId);
  const d = new Date(r.ts);
  // [A2] 체크 컨트롤 색 = 구성원 색
  const memColor = m ? m.color : 'var(--ink-3)';   /* [요청] 공용(구성원 없음) = 전체색 회색 */
  // [1] occurrence 맥락: _occDate가 있으면 그 날짜, 아니면 원본 ts 날짜. 완료상태는 occurrence별.
  const occDate = r._occDate || ymd(d);
  const realId = r._occOf || r.id;   // 원본 event id (수정 시트는 원본을 연다)
  const done = isRepeatEvent(r) ? isEventDoneOn(r, occDate) : !!r.done;
  // [버그수정] 목표 기여기록(날짜 컬럼)은 시간 트랙만 넓힘(--col-time). 역할 고정폭은 공용 유지.
  const gridStyle = opts.contribDate ? `style="--col-time:78px"` : '';   // [요청] 기여 기록도 날짜↔제목 간격 확보(규칙 행과 통일감)
  const occArg = (isRepeatEvent(r) && r._occDate) ? `,null,null,null,'${occDate}'` : '';
  // [3] 목표 기여(contribDate) 맥락에서는 체크가 표시 전용(완료 상태로 고정 표시, 토글 불가)
  const checkInteractive = opts.editable !== false && !opts.contribDate;
  // [1] occurrence별 완료 토글: (원본 event id, 발생 날짜)로 처리
  const checkClick = checkInteractive ? `onclick="event.stopPropagation();toggleEventDoneOn('${realId}','${occDate}')"` : '';
  // [2] 1줄 컬럼 정렬: LEAD(체크) · 시간/날짜 · 역할(pill) · 제목 · trailing
  const timeCol = opts.contribDate ? fmtMonthDay(d) : (r.allDay?'종일':hm(d));
  const [metaCls, metaCell] = rowMetaCell(roleTagHtml(r.memberId), timeCol, !!opts.hideRole, opts.contribDate);
  const tap = opts.editable ? `class="srow event tap ${done?'done':''}${metaCls}" onclick="openRecordSheet('${realId}'${occArg})" ${gridStyle}` : `class="srow event ${done?'done':''}${metaCls}" ${gridStyle}`;
  // [1] 반복 라벨/아이콘 (배지 배경 없이 무채색 텍스트 — 기존 주기 배지 스타일)
  const repLbl = repeatLabel(r);
  const repBadge = repLbl ? `<span class="kind-badge cycle">${icon('arrows-clockwise')} ${escapeHtml(repLbl)}</span>` : '';
  // [1] 알림 설정된 일정엔 작은 종 아이콘(무채색, 은은하게) — 원본 기록 기준
  const bell = hasRemind(r) ? `<span class="bell-ind" title="알림 ${escapeHtml(REMIND_LABELS[recRemind(r)]||'')}">${icon('bell')}</span>` : '';
  return `<div ${tap}>
    <div class="lead">${eventCheck(done, memColor, checkClick)}</div>
    ${metaCell}
    <span class="stitle-text">${escapeHtml(r.title)}${bell}</span>
    <div class="trailing">${repBadge}</div>
  </div>`;
}
// 원형 완료 체크 컨트롤 (이진: 일정·일반 습관 공통). 완료=채움, 미완료=빈 원
function checkCircle(done, color, clickAttr){
  const c = color || 'var(--accent)';
  return `<div class="check-ctl ${done?'done':''}" style="--kc:${escapeHtml(c)}" ${clickAttr||''}>
    ${done ? `<span class="cc-fill">${icon('check')}</span>` : `<span class="cc-ring"></span>`}
  </div>`;
}
// [회의] 일정 전용 LEAD — 미완=구성원색 옅은 '달력' 아이콘(링), 완료=색 채움+체크. 습관(빈 링/진행 링)과 시각적으로 구분해 "일정이 습관처럼 보이는" 문제 해소. done 데이터·토글은 그대로.
function eventCheck(done, color, clickAttr){
  const c = color || 'var(--accent)';
  return `<div class="check-ctl evt ${done?'done':''}" style="--kc:${escapeHtml(c)}" ${clickAttr||''}>
    ${done ? `<span class="cc-fill">${icon('calendar')}</span>` : `<span class="cc-cal">${icon('calendar')}</span>`}
  </div>`;
}
// [1] occurrence별 완료 토글. dstr 없으면 원본 발생일로 간주.
function toggleEventDoneOn(id, dstr){
  const r = DB.records.find(x=>x.id===id); if(!r) return;
  const day = dstr || ymd(new Date(r.ts));
  const nowDone = setEventOccDone(r, day);
  saveDB();
  if(nowDone) toast('일정을 완료했어요');
  renderAll();
}

/* --- variant 'routine' --- LEAD=progress ring, TRAILING=반복+streak --- */
// 카운트형: checks[day]가 숫자, 단일형: true. 진행도 0~1
function routineProgress(r, dstr){
  const goal = r.count>1 ? r.count : 1;
  const raw = r.checks[dstr];
  const cur = raw===true ? goal : (typeof raw==='number' ? raw : 0);
  return { goal, cur, ratio: goal>0 ? Math.min(1, cur/goal) : 0 };
}
function routineComplete(r, dstr){
  const p = routineProgress(r, dstr);
  return p.cur >= p.goal && p.goal>0;
}
// [P4] 가장 이른 기록일(YYYY-MM-DD) — createdAt 없는 구버전/시드 습관의 시작 추정용
function routineFirstCheck(r){
  const keys = Object.keys((r&&r.checks)||{});
  if(!keys.length) return null;
  return keys.sort()[0];
}
// [P4] 습관이 그 요일(0=일..6=토)에 예정인지. daily=매일, weekly=선택 요일(days). 구버전(days 없음)=월·수·토 하위호환.
function routineOnWeekday(r, dayIdx){
  if(r.freq==='daily') return true;
  return Array.isArray(r.days) ? r.days.indexOf(dayIdx)>=0 : [1,3,6].indexOf(dayIdx)>=0;
}
// [P4] 선택 요일 라벨 (예: '월·수·금')
function routineDaysLabel(r){
  if(r.freq==='daily') return '매일';
  const ds = Array.isArray(r.days)&&r.days.length ? r.days.slice() : [1,3,6];
  return ds.slice().sort(function(a,b){return a-b;}).map(function(i){return DOW[i];}).join('·');
}
function routineStreak(r){
  let s=0;
  for(let i=0;i<90;i++){
    const d=addDays(NOW,-i);
    if(!routineOnWeekday(r, d.getDay())) continue;   // 예정 아닌 요일은 연속에서 스킵
    if(routineComplete(r,ymd(d))) s++; else break;
  }
  return s;
}
// [요청] 카운트 링 = 파이 필(채워지는 원). 0=구성원색 외곽선만, 진행=파이 조각(12시부터 시계방향), 완료=솔리드+체크.
function ringSVG(ratio, full){
  const cx=22, cy=22, r=20.5, sw=2.5, rc='var(--rc,var(--accent))';   // [수정] r 19→20.5: 링 크기를 체크박스(cc-ring 24)와 맞춤
  const border=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${rc}" stroke-width="${sw}"/>`;
  if(full) return `<svg viewBox="0 0 44 44"><circle cx="${cx}" cy="${cy}" r="22" fill="${rc}"/></svg>`;   // [수정] 완료 원이 svg(26px) 꽉 채우게 r=22 → 완료체크(cc-fill 26)와 동일 크기
  let wedge='';
  if(ratio>0){
    const rr=r-1.5, a0=-Math.PI/2, a1=a0+Math.min(ratio,0.999)*2*Math.PI;
    const x0=(cx+rr*Math.cos(a0)).toFixed(2), y0=(cy+rr*Math.sin(a0)).toFixed(2);
    const x1=(cx+rr*Math.cos(a1)).toFixed(2), y1=(cy+rr*Math.sin(a1)).toFixed(2);
    const large=ratio>0.5?1:0;
    wedge=`<path d="M${cx},${cy} L${x0},${y0} A${rr},${rr} 0 ${large} 1 ${x1},${y1} Z" fill="${rc}"/>`;
  }
  return `<svg viewBox="0 0 44 44">${wedge}${border}</svg>`;
}
function scheduleRowRoutine(r, opts){
  opts = opts || {};
  const interactive = !!opts.interactive;
  const today = opts.day || ymd(NOW);   // [P3] 백필: 선택일 기준 진행/완료/토글
  const p = routineProgress(r, today);
  const done = routineComplete(r, today);
  const m = memberById(r.memberId);
  const st = routineStreak(r);
  const freqLabel = routineDaysLabel(r);
  const isCount = r.count>1;
  // [A2][5] LEAD = 완료 체크(원형 체크/카운트 ring), 완료 시각요소 색=구성원 역할색
  const memColor = m ? m.color : 'var(--ink-3)';   /* [요청] 공용(구성원 없음) = 전체색 회색 */
  let lead;
  if(isCount){
    let center='';
    if(done) center = icon('check');   // [요청] 파이 필로 진행 표현 → 중앙 숫자 제거(레퍼런스 스타일). 완료 시만 체크
    const ringCls = `ring ${done?'full':''} ${interactive?'':'disabled'}`;
    const ringClick = interactive ? `onclick="event.stopPropagation();tapRoutine('${r.id}','${today}')"` : '';
    // [5][6] --rc 주입: 링/카운트 '0/4' 글자가 구성원 역할색으로 렌더 (홈·습관탭 공통)
    lead = `<div class="${ringCls}" style="--rc:${escapeHtml(memColor)}" ${ringClick}>${ringSVG(p.ratio, done)}<div class="rcenter">${center}</div></div>`;
  } else {
    const clk = interactive ? `onclick="event.stopPropagation();tapRoutine('${r.id}','${today}')"` : '';
    lead = checkCircle(done, memColor, clk) ;
    if(!interactive) lead = `<div style="opacity:.55">${lead}</div>`;
  }
  // [2] 1줄 컬럼 정렬: LEAD(링/체크) · 시간 · 역할(pill) · 제목 · trailing(주기 배지+streak)
  // [습관탭] hideRole=true면 구성원 pill 생략(헤더가 이미 'OO님의 습관' → 중복 제거)
  const timeCol = r.time ? escapeHtml(r.time) : '';
  const roleCell = (!opts.hideRole && m) ? memberPill(m,{nameOnly:true}) : '';
  const [metaCls, metaCell] = rowMetaCell(roleCell, timeCol, !!opts.hideRole, false);   // [요청] 전체=구성원 위·시간 아래(시간없으면 가운데)
  // [1] 알림 설정된 습관엔 작은 종 아이콘(무채색, 은은하게)
  const bell = hasRemind(r) ? `<span class="bell-ind" title="알림 ${escapeHtml(REMIND_LABELS[recRemind(r)]||'')}">${icon('bell')}</span>` : '';
  return `<div class="srow routine ${done?'done':''}${metaCls}" onclick="openRoutineSheet('${r.id}')">
    <div class="lead">${lead}</div>
    ${metaCell}
    <span class="stitle-text">${escapeHtml(r.title)}${bell}</span>
    <div class="trailing">
      <span class="kind-badge cycle">${icon('arrows-clockwise')} ${freqLabel}</span>
      ${(st>1 && today===ymd(NOW))?`<span class="streak-trail">${icon('fire')} ${st}일 연속</span>`:''}
    </div>
  </div>`;
}

/* ============================================================
   RECORD HELPERS / 기록·습관 조회
   ============================================================ */
// [P3] 특정 날짜에 그 습관이 예정인지 (과거 백필용). 선택 요일 기준.
function routineDueOnDay(r, dstr){ return routineOnWeekday(r, parseYmd(dstr).getDay()); }

/* ============================================================
   PAGE: HOME / 홈 (인사 + 목표 + 오늘의 일정[필터])
   ============================================================ */
// [전역 스코프] 구성원 스코프 = 전 탭 공통. 전체='all'(가족 전부·공용 포함) / 특정 id=그 사람 것만(공용 제외). 홈·캘린더·가계부·습관·회고 통합.
let memberScope = 'all';
// [하이브리드 홈] 주간 스트립이 보여줄 날짜(기본 오늘). ◀▶로 주 이동, 날짜 탭하면 그날의 통합 리스트로.
let homeSelDay = ymd(NOW);
// [P2] 홈 섹션 접힘 상태 (포커스가 아닌 부가 섹션은 기본 접힘 → 첫인상 경량화). 재렌더 시 유지.
const homeCollapse = {};
function toggleHomeSection(key){
  homeCollapse[key] = !homeCollapse[key];
  const title = document.getElementById('homeSecTitle-'+key);
  const body  = document.getElementById('homeSecBody-'+key);
  if(!title || !body) return;
  const on = homeCollapse[key];
  title.classList.toggle('collapsed', on);
  body.classList.toggle('collapsed', on);
}
// [P2] 홈 섹션 빌더 — collapsible=true면 접기 가능(부가 섹션). more=우측 액션 HTML.
function homeSection(key, capHtml, bodyHtml, opts){
  opts = opts || {};
  if(opts.collapsible){
    const collapsed = !!homeCollapse[key];
    return `<div class="sec-title collapsible ${collapsed?'collapsed':''}" id="homeSecTitle-${key}" onclick="toggleHomeSection('${key}')">
        <span class="sec-cap">${capHtml}</span><span class="sec-chev">${icon('chevron-down')}</span>
      </div>
      <div class="collapse-body ${collapsed?'collapsed':''}" id="homeSecBody-${key}">${bodyHtml}</div>`;
  }
  const more = opts.more ? opts.more : '';
  return `<div class="sec-title">${capHtml}${more}</div>${bodyHtml}`;
}
/* [하이브리드 홈] 대표 streak — 모든 습관 중 가장 긴 연속(없으면 0). 🔥 표시용 */
function topStreak(){
  let best=0, bestR=null;
  DB.routines.forEach(r=>{ const s=routineStreak(r); if(s>best){ best=s; bestR=r; } });
  return { days:best, routine:bestR };
}
/* [하이브리드 홈] 그날(dstr)에 일정/지출이 있는 구성원 색들 (주간 스트립 점) */
function dayMemberColors(dstr){
  const set=new Set();
  recsForHomeDay(dstr).forEach(r=>{ const m=memberById(r.memberId); if(m) set.add(m.color); });
  return [...set];
}
// 홈 통합 리스트/스트립용 그날 기록 (필터 반영 + 반복 occurrence 포함)
function recsForHomeDay(dstr){
  const sel = memberScope;
  let recs = DB.records.filter(r=>ymd(new Date(r.ts))===dstr);
  recs = recs.concat(repeatOccurrencesOnDay(dstr));
  if(sel!=='all') recs = recs.filter(r=>r.memberId===sel);
  return recs.sort((a,b)=>a.ts-b.ts);
}
function renderHome(){
  const tStr = ymd(NOW);

  // --- 1) 오늘 헤더 + 대표 스트릭 ---
  const ts = topStreak();
  const streakHtml = ts.days>0
    ? `<div class="home-streak"><span class="hs-fire">🔥</span><span class="hs-n">${ts.days}</span><span class="hs-l">일 연속</span></div>`
    : '';
  // [회의] 포커스 변경은 '더보기 > 시작 포커스'로 일원화 → 홈 배너 제거(자주 바꾸는 설정 아님, 홈 prime 자리 절약). 포커스는 여전히 홈 섹션 위계를 결정.
  // [P4] 둘러보기(샘플) 상태 상시 배너 — 항상 인지 + 한 번에 빠져나갈 출구
  const sampleBanner = DB.isSample
    ? `<div class="sample-bar" onclick="openSampleGate()"><span>🔍 샘플 데이터로 둘러보는 중</span><span class="sb-cta">내 걸로 시작 ${icon('chevron-right',13)}</span></div>`
    : '';
  let html = sampleBanner + `<div class="home-hero">
    <div class="hh-lbl">${NOW.getMonth()+1}월 · ${DOW[NOW.getDay()]}요일</div>
    ${streakHtml}
  </div>`;

  // --- 2) 주간 스트립 (미니 캘린더) ---
  html += weekStripHtml();

  // --- 3) 오늘(선택일) 통합 리스트 + 빠른입력 ---
  //  [#3b] 입력(빠른입력) → 구분선 → 보기(구성원 필터 + 타임라인) 순으로 영역을 분리해 촘촘함 완화.
  const dayLbl = dayTitle(homeSelDay);
  // [P4] 홈 인라인 빠른입력 타일 제거 → 우측 하단 통합 FAB로 일원화(홈·캘린더·가계부 동일). 보기(필터+타임라인)만 남김.
  // [회의] 홈 '오늘'=할 일·일정만(행동). 운동·체중 로그는 캘린더 담당 → 있으면 하단에 점프 링크만(인라인 X)
  const todayLogN = DB.records.filter(r=>(r.kind==='workout'||r.kind==='weight') && ymd(new Date(r.ts))===homeSelDay && (memberScope==='all'||r.memberId===memberScope)).length;
  const todayLogJump = todayLogN ? `<div class="today-logjump" onclick="go('calendar')"><span>오늘 기록 ${todayLogN}건</span><span class="tlj-cta">캘린더에서 보기 ${icon('chevron-right',13)}</span></div>` : '';
  const todayBody = `<div class="open-list">${renderTodayTimeline(homeSelDay)}${todayLogJump}</div>`;   // [요청] 로그점프를 리스트 안으로 → 마지막 일정 행(김서연)이 :last-child가 아니게 되어 아래 구분선 유지
  const todaySection = homeSection('today', `${escapeHtml(dayLbl)} 할 일 · 일정`, todayBody, { more:`<span class="more" onclick="go('calendar')">전체</span>` });   // [요청] 목표처럼 '전체' → 캘린더

  // --- 4) 목표 진행률 요약 ---
  const homeVisions = DB.visions.filter(isActiveVision).slice(0,4);
  const visionBody = `<div class="open-list">${
    homeVisions.length
      ? homeVisions.map(v=>visionSummaryRow(v)).join('')
      : `<div class="empty-cta">아직 가족 목표가 없어요<button class="btn btn-primary btn-sm" onclick="openVisionSheet()">${icon('plus',15)} 첫 목표 세우기</button></div>`
  }</div>`;
  const visionMore = `<span class="more" onclick="go('vision')">전체</span>`;
  const visionSection = homeSection('vision', '우리 가족 목표', visionBody, { more:visionMore });

  // [FEAT-1] 시작 포커스 제거 → 홈은 [오늘 + 목표] 고정 위계. (수동·목표지향 정체성에 맞춰 앱이 위계를 자동 재배치하지 않음)
  html += homeRoutineToday() + todaySection + visionSection;   // [요청] 오늘의 습관 달성(주간 달력 아래 · 오늘 할 일 위)
  document.getElementById('page-home').innerHTML = html;
  requestAnimationFrame(centerWsStrip);   // [모두쓰] 선택일을 스트립 가운데로(스와이프 위치 자연스럽게)
}
// [모두쓰] 주간 스트립: 선택일이 화면 밖으로 나갔을 때만 가운데로 스크롤(보이는 날 탭 시 튐 방지)
function centerWsStrip(){
  const sc=document.getElementById('wsScroll'), el=document.getElementById('wsSel');
  if(!sc||!el) return;
  const scR=sc.getBoundingClientRect(), elR=el.getBoundingClientRect();
  if(elR.left < scR.left+8 || elR.right > scR.right-8){ sc.scrollLeft += (elR.left - scR.left) - (sc.clientWidth - el.offsetWidth)/2; }
  updateWsCap();
}
function weekRangeCap(ds){
  const d=parseYmd(ds), start=addDays(d, -((d.getDay()+6)%7)), end=addDays(start,6);
  return `${start.getMonth()+1}/${start.getDate()} ~ ${end.getMonth()+1}/${end.getDate()}`;
}
// [모두쓰] 스와이프 시 화면 가운데 날짜의 '그 주' 기간을 상단 캡션에 표시
function updateWsCap(){
  const sc=document.getElementById('wsScroll'), cap=document.getElementById('wsCap');
  if(!sc||!cap) return;
  const mid=sc.getBoundingClientRect().left + sc.clientWidth/2;
  let best=null, bestDist=1e9;
  sc.querySelectorAll('.ws-day').forEach(el=>{ const r=el.getBoundingClientRect(); const dist=Math.abs(r.left+r.width/2-mid); if(dist<bestDist){ bestDist=dist; best=el; } });
  if(best) cap.textContent=weekRangeCap(best.dataset.ds);
}
// [요청] 오늘의 습관 달성 요약 — 오늘 예정 습관이 있을 때만. 탭하면 목표·습관 탭.
function homeRoutineToday(){
  let routines = DB.routines.filter(r=>routineDueOnDay(r, homeSelDay));   // [검토] 주간에서 다른 날 선택 시에도 그 날 기준(오늘 고정 버그 수정)
  if(memberScope!=='all') routines = routines.filter(r=>r.memberId===memberScope);
  const total = routines.length;
  if(!total) return '';
  const done = routines.filter(r=>routineComplete(r, homeSelDay)).length;
  const pct = Math.round(done/total*100);
  // [요청] 박스만(진행률 한눈). 박스 탭 시 습관 현황. 라벨은 선택일(오늘/어제/날짜)에 맞춤.
  return `<div class="focus-hi" onclick="goVisionHabits()">
      <div class="fh-col"><div class="fh-v">${done} <span style="color:var(--ink-3);font-weight:400">/</span> ${total}</div><div class="fh-l">${escapeHtml(dayTitle(homeSelDay))} 습관 완료</div></div>
      <div class="fh-bar"><span style="width:${pct}%"></span></div>
    </div>`;
}
// [수정] 창(window)까지 스크롤돼 탭바가 밀리던 문제 → #screen 컨테이너만 스크롤
function scrollScreenTo(elId){
  setTimeout(()=>{
    const sc=document.getElementById('screen'), el=document.getElementById(elId);
    if(sc && el){ const d=el.getBoundingClientRect().top - sc.getBoundingClientRect().top; sc.scrollTo({top:sc.scrollTop + d - 8, behavior:'smooth'}); }
  }, 90);
}
// [요청] 홈 '오늘의 습관 > 전체' → 목표 탭의 습관 현황을 펼치고 그 위치로 스크롤
function goVisionHabits(){ visionCollapse.habits=false; renderVision(); go('vision'); scrollScreenTo('visSecTitle-habits'); }

// [하이브리드 홈] 주간 스트립 — ◀ 월~일 7칸 ▶, 오늘 강조, 날짜 점(색=사람), 탭하면 그날로
function homeWeekStart(){
  const d = parseYmd(homeSelDay);
  return addDays(d, -((d.getDay()+6)%7));   // 월요일 시작
}
function weekStripHtml(){
  // [모두쓰] 화살표 폐기 → 손가락 스와이프. 오늘 기준 앞뒤 넉넉히 렌더하고 선택일을 가운데로(centerWsStrip).
  const tStr = ymd(NOW);
  let cells='';
  for(let i=-14;i<=21;i++){
    const d=addDays(NOW,i); const ds=ymd(d);
    const dots = dayMemberColors(ds).slice(0,4).map(c=>`<i style="background:${escapeHtml(c)}"></i>`).join('');
    const sel = ds===homeSelDay;
    cells += `<div class="ws-day ${ds===tStr?'today':''} ${sel?'sel':''}"${sel?' id="wsSel"':''} data-ds="${ds}" onclick="pickHomeDay('${ds}')">
      <span class="ws-dn">${DOW[d.getDay()]}</span><span class="ws-dd">${d.getDate()}</span>
      <span class="ws-dots">${dots}</span></div>`;
  }
  return `<div class="ws-strip-cap" id="wsCap">${weekRangeCap(homeSelDay)}</div><div class="ws-days" id="wsScroll" onscroll="updateWsCap()">${cells}</div>`;
}
function pickHomeDay(ds){ homeSelDay=ds; renderHome(); }
function shiftHomeWeek(dir){ homeSelDay = ymd(addDays(parseYmd(homeSelDay), dir*7)); renderHome(); }

// [하이브리드 홈] 빠른입력 타일 — 지출·수입·운동·일정·체중·습관 동등
// [FEAT-1] homeFocusLedger·homeFocusRoutine 제거 — 시작 포커스 폐지로 홈 위계 자동 재배치 안 함.

// [하이브리드 홈] 목표 진행률 요약 행 (이번주 +N% 표기) — 탭하면 목표 상세
function visionSummaryRow(v){
  const cap=isCapVision(v);
  const used=cap?capUsedPct(v):0;
  const barPct = cap ? Math.min(100,used) : visionProgressPct(v);
  const delta = cap ? 0 : weeklyVisionDelta(v);
  const over = cap && used>=100;
  const deltaHtml = over ? `<span class="vs-delta" style="color:var(--danger)">예산 초과</span>`
                    : (delta>0 ? `<span class="vs-delta">이번 주 +${delta} %</span>` : '');
  const barColor = cap ? (over?'var(--danger)':(used>=80?'var(--warn)':'var(--good)')) : 'var(--accent)';
  return `<div class="vsum-row" onclick="openVisionDetail('${v.id}')">
    <div class="vs-main">
      <div class="vs-name">${escapeHtml(v.title)}</div>
      <div class="vs-bar"><span style="width:${barPct}%;background:${barColor}"></span></div>
    </div>
    <div><div class="vs-pct"${over?' style="color:var(--danger)"':''}>${cap?used:barPct} %</div>${deltaHtml}</div>
  </div>`;
}
// 이번주 목표 진행 증가분(근사) — 연결 기록/습관 완료 기반 데모 수치
function weeklyVisionDelta(v){
  const weekStart = ymd(addDays(NOW, -((NOW.getDay()+6)%7)));
  if(v.type==='QUANT'){
    if(v.metric==='cap') return 0;   // [BUG-3] 예산형은 '더 쓸수록 나쁨' → 주간 +델타 무의미
    const t = visionTarget(v) || 0;
    if(!t) return 0;
    let moved=0;
    DB.records.forEach(r=>{
      if(r.kind!=='expense') return;
      if(v.memberId && r.memberId!==v.memberId) return;   // [BUG-1] 개인 목표 일관성
      if(ymd(new Date(r.ts))<weekStart) return;
      if(v.metric==='saving'){
        // [BUG-3] 저축형은 자동집계와 동일 기준(연결 or 저축 카테고리, isTransfer/수입 +, 지출 −)
        const linked = r.visionId===v.id;
        const sIds = saveCatIds(v);
        const catMatch = sIds.indexOf('__allsave__')>=0 ? isTransfer(r) : (sIds.indexOf(r.categoryId)>=0 && !isExpenseOut(r));
        if(!linked && !catMatch) return;
        moved += isExpenseOut(r) ? -(r.amount||0) : (r.amount||0);
      } else {
        if(r.visionId!==v.id) return;
        moved += isIncome(r)?(r.amount||0):0;
      }
    });
    return Math.max(0, Math.min(100, Math.round(moved/t*100)));
  }
  // QUAL: 이번주 연결 습관 완료 횟수 → 충실도 증가 근사
  let done=0;
  DB.routines.filter(r=>r.visionId===v.id).forEach(r=>{
    for(let i=0;i<7;i++){ const d=addDays(NOW,-i); if(ymd(d)>=weekStart && routineComplete(r,ymd(d))) done++; }
  });
  return Math.min(20, done*2);
}

// [P4] 통합 기록 추가 그리드 (FAB 바텀시트) — 일회성 기록 5종(지출·수입·운동·일정·체중) + 아래 '반복 습관 만들기' 별도 행.
function quickRecordGrid(){
  // [3] 무채색·라운드 타일 (색 제거). 종류는 아이콘 모양으로만 구분.
  // [회의] 지출/수입 → '가계부' 하나로(수입/지출/저축은 폼 안 유형 세그). 종류 4종 + 습관 + 목표 만들기.
  // [요청] 순서 = 캘린더 활동(일정·운동·체중) + 지출·수입. '가계부' 라벨 → '지출·수입'.
  const tiles = [
    { lb:'일정', ic:'calendar',   onclick:`pickQuickKind('event')` },
    { lb:'운동', ic:'barbell',    onclick:`pickQuickKind('workout')` },
    { lb:'체중', ic:'scale',      onclick:`pickQuickKind('weight')` },
    { lb:'지출·수입', ic:'wallet', onclick:`pickQuickKind('expense','out')` }
  ];
  return `<div class="qgrid">${tiles.map(t=>`
    <div class="qtile" onclick="${t.onclick}">
      <span class="qic">${icon(t.ic)}</span>
      <span class="qlb">${t.lb}</span>
    </div>`).join('')}</div>
    <button class="q-routine" onclick="closeQuickSheet();openVisionSheet()">${icon('target',16)} 목표 만들기</button>
    <button class="q-routine" onclick="closeQuickSheet();openRoutineSheet()">${icon('arrows-clockwise',16)} 반복 습관 만들기</button>`;
}
/* [1] FAB 빠른기록 바텀시트 — 아래에서 위로 슬라이드, 손잡이/배경탭/아래로 드래그 닫기 */
function openQuickSheet(){
  const ov = document.getElementById('qsheetOverlay');
  const t = document.getElementById('qsheetTitle'); if(t) t.textContent = '기록 추가';
  document.getElementById('qsheetBody').innerHTML = quickRecordGrid();
  // 다음 프레임에 show → transform 트랜지션 작동
  requestAnimationFrame(()=>ov.classList.add('show'));
}
function closeQuickSheet(){ document.getElementById('qsheetOverlay').classList.remove('show'); }
// [회의] 가이드 2단계 기록(캘린더·가계부 통일) — ① 누구?(역할) → ② 무엇?(종류). 필터에 의존하지 않는 독립 입력.
//  domain: 'calendar'(일정·운동·체중) | 'ledger'(지출·수입). 필터 중이면 그 사람이 출발점.
let quickFlow = { domain:'calendar', member:null };
function renderGuidedRecord(){
  // ① 누구? — 구성원만(전체 없음. 기록은 항상 '누구 것'). 왼쪽 정렬.
  const memPills = DB.members.map(m=>
    `<span onclick="pickGuidedMember('${m.id}')" style="flex-shrink:0">${memberPill(m,{size:'md',active:quickFlow.member===m.id})}</span>`
  ).join('');
  let body = `<div class="flabel" style="margin-top:0">누구 기록인가요?</div><div class="mfilter">${memPills}</div>`;
  if(quickFlow.domain==='ledger'){
    // [요청] 가계부 = 1단계: 누구 고르면 바로 '지출' 선택된 기록 창. (수입은 창 안 토글로 전환)
    body += `<div class="muted" style="padding:var(--sp-4) var(--sp-1) var(--sp-1)">누구를 고르면 바로 지출 기록 창이 열려요 · 수입은 창에서 전환</div>`;
  } else if(quickFlow.member){
    // 캘린더 = 2단계: 누구 고른 다음 종류 타일 등장. 왼쪽 정렬(위 역할 행과 시작선 통일).
    const tiles = [ {lb:'일정',ic:'calendar',k:'event'}, {lb:'운동',ic:'barbell',k:'workout'}, {lb:'체중',ic:'scale',k:'weight'} ];
    body += `<div class="flabel">무엇을 기록할까요?</div><div class="qrow">${tiles.map(t=>`
      <div class="qtile" onclick="pickGuidedKind('${t.k}','')"><span class="qic">${icon(t.ic)}</span><span class="qlb">${t.lb}</span></div>`).join('')}</div>`;
  } else {
    body += `<div class="muted" style="padding:var(--sp-4) var(--sp-1) var(--sp-1)">먼저 누구 기록인지 골라주세요</div>`;
  }
  document.getElementById('qsheetBody').innerHTML = body;

// 선택일 통합 (일정기록 event + 그날 습관) 시간순, 무시간/종일은 상단존.
// [하이브리드 홈] dstr 인자로 임의 날짜 지원(주간 스트립 날짜 탭). 구성원 필터는 memberScope.
function renderTodayTimeline(dstr){
  const tStr = dstr || ymd(NOW);
  const sel = memberScope;
  const isAll = sel==='all';
  let events = DB.records.filter(r=>r.kind==='event' && ymd(new Date(r.ts))===tStr);
  // [1] 그날이 반복 규칙에 맞는 반복 일정 occurrence도 표시 (원본 발생일은 위에 이미 포함 → 제외됨)
  events = events.concat(repeatOccurrencesOnDay(tStr));
  if(!isAll) events = events.filter(r=>r.memberId===sel);
  // [P4] 습관은 예정 요일이면 미래일에도 '미리보기'로 표시(체크는 오늘·과거만 가능). 이전엔 미래일에 아예 안 떠서 '내일 습관이 없다'고 오해됨.
  const isFutureDay = tStr>ymd(NOW);
  let routines = DB.routines.filter(r=>routineDueOnDay(r,tStr));
  if(!isAll) routines = routines.filter(r=>r.memberId===sel);

  const items = [];
  events.forEach(r=>{
    const d=new Date(r.ts);
    items.push({ min:d.getHours()*60+d.getMinutes(), type:'event', rec:r });
  });
  routines.forEach(r=>{
    const hasTime = !!r.time;
    const t=(r.time||'00:00').split(':'); const min=(+t[0])*60+(+t[1]);
    items.push({ min:hasTime?min:-1, type:'routine', rt:r });
  });
  if(!items.length) return `<div class="muted">${tStr===ymd(NOW)?'오늘 일정이 없어요':'이 날 일정이 없어요'}</div>`;

  // [P4] 구성원 이름 pill = 전체 볼 때만(특정 구성원 선택 시 다 그 사람이라 중복 → 숨김). 색은 리드에 이미 있음.
  const hideRole = !isAll;
  // [회의] 홈 오늘 = 체크할 것(습관) + 미리보기(일정). 습관 블록을 위로 모아 연속 체크가 쉽게, 일정은 아래 시간순 아젠다. 각 블록 내 시간순(무시간 습관 상단). 진짜 시간순 '하루 흐름'은 캘린더 탭 담당.
  const routineRows = items.filter(i=>i.type==='routine').sort((a,b)=>a.min-b.min)
    .map(it=>scheduleRowRoutine(it.rt, {interactive:!isFutureDay, day:tStr, hideRole}));   // [3] 카운트형 포함 모든 습관 탭으로 진행/완료
  const eventRows = items.filter(i=>i.type==='event').sort((a,b)=>a.min-b.min)
    .map(it=>scheduleRowEvent(it.rec, {editable:true, hideRole}));
  let out = routineRows.join('');
  if(eventRows.length){
    if(routineRows.length) out += `<div class="tl-div">일정</div>`;   // 두 블록 다 있을 때만 경계에 조용한 '일정' 라벨(습관 블록은 위 진행박스+체크링이 이미 프레이밍)
    out += eventRows.join('');
  }
  return out;
}

const visionCollapse = { habits:true, report:true, journey:true };   // [요청] 걸어온 길·습관 현황·회고 모두 기본 접힘 → 현재 목표가 첫인상

// [목표 탭] 습관(습관) 필터 — 기존 습관 탭에서 흡수
function renderVision(){
  let html = '';
  // [2] 목표 탭은 현재 진행 중(올해/이번달)인 목표만.
  const curV = DB.visions.filter(isActiveVision);

  if(yearV.length){ html += `<div class="sec-title">연간 목표</div><div class="vscroll">${yearV.map(renderVisionCard).join('')}</div>`; }
  if(monthV.length){ html += `<div class="sec-title">월간 목표</div><div class="vscroll">${monthV.map(renderVisionCard).join('')}</div>`; }
  if(!curV.length) html += `<div class="empty-cta">아직 목표가 없어요. 가족이 함께 키울 첫 목표를 세워보세요!<button class="btn btn-primary btn-sm" onclick="openVisionSheet()">${icon('plus',15)} 첫 목표 세우기</button></div>`;
  else html += `<div class="row-add" onclick="openVisionSheet()">${icon('plus',16)} 새 목표 세우기</div>`;   // [요청] 기존 목표를 본 뒤 세우도록 월간 목표 아래로
  // [회의·요청] 달성+미달성 종료 목표를 '우리가 걸어온 길' 한 연대기로 병합(시간 역순, 🏆/⚑, 한 줄 소감). 접기 기본.
  const doneV = DB.visions.filter(isCompleted);
  const pastV = DB.visions.filter(isPastVision);
  const journey = doneV.concat(pastV);
  if(journey.length){
    const endKey = v => isCompleted(v) ? (v.completedAt||'0') : ((v.type==='QUAL' && v.dueDate) ? v.dueDate : visionPeriodRange(v).to);   // [수정] QUAL 미달은 dueDate로 정렬
    journey.sort((a,b)=>String(endKey(b)).localeCompare(String(endKey(a))));
    // [요청] '우리가 걸어온 길'도 가계부 목록처럼 연도별 박스로 묶기(최신 연도 먼저, 박스 안은 기존 정렬 유지)
    const jvYearOf = v => { const m=String(endKey(v)).match(/^(\d{4})/); if(m) return m[1]; const m2=String((visionPeriodRange(v)||{}).to||'').match(/^(\d{4})/); return m2?m2[1]:'기타'; };
    const jvYGroups=[], jvYMap={};
    journey.forEach(v=>{ const y=jvYearOf(v); if(!jvYMap[y]){ jvYMap[y]={y,items:[]}; jvYGroups.push(jvYMap[y]); } jvYMap[y].items.push(v); });
    const jvRowHtml = v => {
      const done = isCompleted(v);
      const pct = v.type==='QUANT' ? (isCapVision(v)?capUsedPct(v):visionProgressPct(v)) : visionQualPct(v);
      const capKept = isCapVision(v) && !done && pct<=100;   // [버그수정] 예산(적을수록 좋음)을 지킨 채 종료 = 성공(미달 아님)
      const win = done || capKept;
      const res = done ? `<span class="jv-res done">달성</span>`
        : capKept ? `<span class="jv-res done">지킴</span>`
        : isCapVision(v) ? `<span class="jv-res miss">${pct}% 초과</span>`
        : `<span class="jv-res miss">${pct}% 미달</span>`;
      const dateLbl = done ? (v.completedAt||'') : ((v.type==='QUAL' && v.dueDate) ? v.dueDate : visionPeriodLabel(v));   // [수정] QUAL 미달은 마감일 표기
      const note = v.retroNote ? `<div class="jv-note">“${escapeHtml(v.retroNote)}”</div>` : '';
      return `<div class="jv-row" onclick="openVisionDetail('${v.id}')">
        <div class="jv-lead ${win?'done':'miss'}">${win?'🏆':'⚑'}</div>
        <div class="jv-main">
          <div class="jv-top"><span class="jv-title">${escapeHtml(v.title)}</span>${res}</div>
          <div class="jv-date">${escapeHtml(dateLbl)}</div>${note}

        <div class="lg-day-head"><span class="lg-day-date">${escapeHtml(g.y)}${g.y==='기타'?'':'년'}</span><span class="lg-day-sum jv-yr-sum">${sum}</span></div>
        ${g.items.map(jvRowHtml).join('')}</div>`;
    }).join('')}</div>`;
    html += visionSectionWrap('journey', `우리가 걸어온 길 <span class="sec-count">(달성 ${doneV.length} · 지난 ${pastV.length})</span>`, jBody);
  }

  // --- 습관 습관 현황 흡수 (연결 습관의 streak·주간그리드·이번달 달성률) ---
  const habitBody = (function(){   // [전역] 인라인 구성원 pill 제거 → 우하단 FAB(전역 스코프)로 일원화
        const isAll = memberScope==='all';
        let list = isAll ? DB.routines : DB.routines.filter(r=>r.memberId===memberScope);
        list = list.slice().sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99'));
        return `<div class="open-list">${list.length?list.map(r=>habitHubRow(r, true, !isAll)).join(''):'<div class="muted">습관이 없어요</div>'}</div>`;
      })()
    + `<div class="row-add" onclick="openRoutineSheet()">${icon('plus',16)} 새 습관 추가</div>`;   // [요청] 기존 습관을 본 뒤 추가하도록 아래로
  html += visionSectionWrap('habits', `습관 현황 <span class="sec-count">(연속·주간·달성률)</span>`, habitBody);

  // --- 기간별 회고 (보고서 종합) ---
  html += visionSectionWrap('report', `기간별 회고 <span class="sec-count">(보고서 종합)</span>`, reportControlsHtml() + (repShown?renderReportCard({mode:'full'}):''));   // [요청] 돈/전체 토글 삭제 → 항상 전체. '걸어온 길' 점프 링크도 제거(같은 탭 내 중복)

  document.getElementById('page-vision').innerHTML = html;
  fitStatValues(); requestAnimationFrame(fitStatValues);
}
function openVisionDetail(id){

  }
  else if(v.type==='QUANT'){

  }

  const contribList = contrib.length
    ? `<div style="padding-top:var(--sp-3)">${contrib.slice(0,40).map(r=>renderRecordRow(r,{editable:true,contribDate:true})).join('')}</div>`
    : `<div class="muted" style="padding:var(--sp-5) 0">아직 연결된 기록이 없어요</div>`;

  // [재설계/요청] 하단 = 주 버튼 1개(핵심 루프, 채움) + 나머지 텍스트 버튼(박스·여백 대폭 축소).
  const addLabel = v.type==='QUAL' ? '이 목표에 습관 추가' : '이 목표에 기록 추가';
  const hasRecordFlow = v.type==='QUAL' || v.metric==='cap' || v.metric==='saving' || (v.metric==='manual' && /kg/i.test(v.unit||''));
  const isCap = isCapVision(v);
  // 주 버튼(채움) — 달성/100%도달 전에만. 그 외 액션은 전부 텍스트로 낮춤.
  const addRecCta = (!vDone && !vPctDone && hasRecordFlow) ? `<button class="btn btn-primary btn-block vd-cta" onclick="addToVision('${v.id}')">${icon('plus',15)} ${addLabel}</button>` : '';
  // 달성 상태/버튼
  const pctDoneCta = vPctDone ? `<div class="vd-doneflag">🎉 목표를 달성했어요!</div><button class="btn btn-primary btn-block vd-cta" onclick="completeVision('${v.id}')">🏆 달성 완료로 표시</button>` : '';
  // 상태 플래그(완료/예산 결과) — 박스 아님
  let vFlag='';
  if(vDone) vFlag = `<div class="vd-doneflag">🏆 ${escapeHtml(v.completedAt||'')} 달성 완료</div>`;
  else if(isCap && isPastVision(v)){ const kept=(v.currentValue||0)<=visionTarget(v); vFlag = `<div class="vd-doneflag" style="color:${kept?'var(--good)':'var(--danger)'}">${kept?'✅ 예산을 지켰어요':'⚠ 예산을 초과했어요'}</div>`; }
  // 전환 액션(달성/다음): 둘이면 한 줄 나란히(구분선), 하나면 좌측. 예산형은 수동 달성 없음.
  let actDone=null, actNext=null;
  if(vDone) actDone = {l:'달성 취소', on:`uncompleteVision('${v.id}')`, c:'undo'};
  else if(!vPctDone && !isCap) actDone = {l:'달성 완료', on:`completeVision('${v.id}')`, c:'done'};
  if(vDone||isPastVision(v)) actNext = {l:'다음 목표', on:`nextVisionFrom('${v.id}')`, c:'next'};
  const mkAct = (a,pair) => `<button class="vd-actx ${a.c}${pair?'':' solo'}" onclick="${a.on}">${escapeHtml(a.l)}</button>`;
  let tailCta='';
  if(actDone && actNext) tailCta = `<div class="vd-pair">${mkAct(actDone,true)}<span class="pair-div"></span>${mkAct(actNext,true)}</div>`;
  else if(actDone) tailCta = mkAct(actDone,false);
  else if(actNext) tailCta = mkAct(actNext,false);

  // [토스류 재설계] 작은 강조 라벨 + 큰 제목 → 큰 지표+굵은 바+회색 서브라인 → 접힌 기록 요약 → CTA 1개. 구분선·2단 통계 제거.
  const body = `    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:var(--gap-row)">
      <div style="min-width:0">
        <div class="vd-label">${v.type==='QUANT'?'숫자 목표':'기한 목표'} · ${v.period==='year'?'연간':'월간'} ${escapeHtml(visionPeriodLabel(v))}</div>
        <div class="vd-title">${escapeHtml(v.title)}</div>
      </div>
      ${titleRight?`<div class="vd-dday">${titleRight}</div>`:''}
    </div>
    <div class="vd-hero">
      <div class="vd-num" style="display:flex;align-items:baseline;justify-content:space-between;gap:var(--gap-row)"><span>${heroNum}</span>${numRight?`<span class="vd-num-right">${numRight}</span>`:''}</div>
      <div class="vd-bar"><span style="width:${barPct}%;background:${barColor}"></span></div>
      <div class="vd-sub">${subline}</div>
    </div>
    ${extraCta}
    ${(vDone||isPastVision(v))?`<div class="vd-retro"><label>한 줄 회고</label><input type="text" value="${escapeHtml(v.retroNote||'')}" placeholder="${vDone?'이룬 소감을 남겨보세요 (선택)':(isCap?'이번 기간 예산은 어땠나요 (선택)':'왜 못 이뤘는지 한 줄로 (선택)')}" onchange="setRetroNote('${v.id}', this.value)"></div>`:''}
    <div class="vd-row" onclick="toggleVisionContrib()">
      <span>기여한 기록 <b>${contrib.length}건</b></span>
      <span class="vd-row-chev" id="vdContribChev">${icon('chevron-down')}</span>
    </div>
    <div class="collapse-body collapsed" id="vdContribBody">${contribList}</div>
    ${addRecCta}
    ${pctDoneCta}
    ${vFlag}
    ${tailCta}`;
  showSheet(body, {headAction:`<button class="vedit" onclick="openVisionSheet('${v.id}')" aria-label="목표 편집">${icon('more',20)}</button>`});   // [요청] 편집 연필을 헤더 X 왼쪽으로 이동(본문 X 아래 겹침 해소)
  visionDetailOpen = id;   // [버그] 기여 기록 수정 후 이 목표 상세로 복귀하기 위해 기억
}
// [요청] 끝난 목표 → 다음 목표(제목·유형·목표·카테고리·구성원 이어받아 새 기간으로). 체중은 끝난 값에서 이어가기, 나머지는 0부터.
function nextVisionFrom(vid){
  const v=visionById(vid); if(!v) return;
  vEditId=null;
  const isKg=(v.metric==='manual' && /kg/i.test(v.unit||''));
  const st=isKg?(v.currentValue||0):0;
  vForm={ preset:visPresetOf(v), title:v.title, type:v.type, metric:v.metric||'manual', period:v.period||'year', year:NOW.getFullYear(), month:NOW.getMonth(), startValue:st, currentValue:st, targetValue:(v.targetValue||1), unit:(v.unit||'원'), capCategoryIds:capCatIds(v), savingCategoryIds:saveCatIds(v), dueDate:ymd(addDays(NOW,30)), memberId:(v.memberId||'') };
  renderVisionSheet();
}
// [요청] 목표 관리 메뉴 제거 — 연필 누르면 바로 편집(openVisionSheet)로, 삭제는 편집 시트 하단 danger 버튼으로 일원화.
// [P3] 목표 달성 완료/취소
function completeVision(id){
  const v=visionById(id); if(!v) return;
  v.completedAt = ymd(NOW); saveDB(); renderAll(); toast('🎉 목표 달성을 축하해요!'); openVisionDetail(id);
}
function uncompleteVision(id){
  const v=visionById(id); if(!v) return;
  delete v.completedAt; saveDB(); renderAll(); openVisionDetail(id);
}
// [UX-2/FEAT-3] 목표에 바로 기여 — QUAL은 습관, QUANT는 기록(종류 자동) 시트를 목표 미리 연결해 연다.
function addToVision(vid){
  const v=visionById(vid); if(!v) return;
  closeSheet();
  if(v.type==='QUAL'){ openRoutineSheet(); rtForm.visionId=vid; renderRoutineSheet(rtEditId||''); return; }
  // [수정] manual 카운트형(권·회·원 등)은 연동할 기록 종류가 없으니 '현재값 업데이트'로. kg만 체중기록 연동.
  if(v.metric==='manual' && !/kg/i.test(v.unit||'')){ openCurrentValueSheet(vid); return; }
  let kind='expense', flow='out';
  if(v.metric==='saving') flow='save';
  else if(v.metric==='manual') kind='weight';
  openRecordSheet(null, kind, flow);
  rForm.visionId=vid; renderRecordSheet();
}
// [회의] 한 줄 회고 저장 — 자동연동 앱은 못 만드는 '사람이 직접 돌아본 기록'(이 앱의 차별점)
function setRetroNote(id, val){ const v=visionById(id); if(!v) return; const t=(val||'').trim(); if(t) v.retroNote=t; else delete v.retroNote; saveDB(); renderVision(); }

// 기존 기간/필터/보고서 핸들러들이 호출하던 renderRecord()는 세 탭을 함께 갱신하는 shim으로 유지(호출부 보존).
function renderRecord(){

// [E] stat 값(.sv)이 칸 폭을 넘으면 transform:scale로 한 줄에 다 들어오게 축소 (말줄임 없이 전체 노출)
function fitStatValues(){
  const svs = document.querySelectorAll('.stat .sv');
  svs.forEach(sv=>{
    sv.style.transform='';
    const cell = sv.parentElement;
    const avail = cell.clientWidth - 12;   // 좌우 여유
    const w = sv.scrollWidth;
    // 숨겨진 페이지(clientWidth 0)에서는 측정 불가 → 스킵. 보이는 record 탭 진입 시 정확히 맞춤
    if(avail > 0 && w > avail && w > 0){
      const s = Math.max(0.62, avail / w);
      sv.style.transform = `scale(${s})`;
    }
  });
}

function filteredRecords(){
  return DB.records.filter(r=>{
    if(memberScope!=='all' && r.memberId!==memberScope) return false;
